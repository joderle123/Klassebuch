d_002","studentId":"stud_lilly","date":"2026-03-02","author":"","category":"Therapie & Suivi","tags":["Dr Königs","Dr Bertholdt","SCAP"],"text":"De Papp huet décidéiert mat der Pedopsychiaterin vum SCAP, der Madame Königs, ofzebriechen. An si sinn elo bei der Dr Berthold.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_003","studentId":"stud_jason","date":"2026-03-02","author":"","category":"Medikation","tags":["Medikation","ATVA"],"text":"Huet zanter haut eng nei Medikatioun (Elvanse), hellt se net mei an der Annexe moies. ATVA kennt den Donneschden um 9h. Keng Infos zum Cardiolog.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_004","studentId":"stud_miguel","date":"2026-03-02","author":"","category":"Verhalten & Krisen","tags":["Vape","CNI","Stage","RDV"],"text":"Dëse Mëttwoch ass CNI um 8h30. 17.03 um 8 Auer RDV um Consulat fir carte d'identité ze erneieren. Méindes vun 11:30-12:00 weider Bezuchszäit. Auerzäiten Training: mardis, jeudis et vendredis à 17h. Papp proposéiert amplaatz Dënschdes schon um 14:00, 2 Deeg an der Woch um 15:00. Geigepropose: Denschtdes um 15h an 1mol soll de Papp siche kommen. Stage beim Coiffer Cap Act vum 18.05-23.05 (convention de stage muss nach ausgefëllt ginn). Vapesituatioun: Säit de Mëttwoch keng Vape dobäi (eidel ginn). An der HG-Zäit ass et him ganz schwéier gefall (Nikotinentzug). Sin dun Velo fuere gaangen wou et him däitlech besser gaangen ass. Donneschden och keng dobäi an huet den Dag gepackt. Säin Zil ass et keng Vape méi wärend der Schoulzäit ze benotzen. Haut och keng dobäi. Awer een Aan drop haalen, net dass hien eis eppes fir mescht... Identitätsfindung?","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_005","studentId":"stud_chase","date":"2026-03-02","author":"","category":"Schule","tags":["LTA","Reintegration","Franséisch","RDV","Dr Meinhardt"],"text":"War de Freideg am LTA. Hie wollt eleng an d'Gebai ragoen an och eleng de Sall sichen. Vu dass hien no der Schell awer nach ëmmer am Preau stoung, hunn ech mech mat him zesummen op d'Sich nom Sall gemaach. D'Franséischproff huet hien am Gank empfaang. Den Dag ass senger Ausso no gutt verlaf an et huet him gefall. Ech hat nach e Gespréich mat der Mme vun der ESEB an dem Directeur adjoint. Hunn den 19.3 mëttes e gemeinsamen RV mat Elteren, ESEB, Proffen an Direktioun. D'Bezuchszäit eréischt de Mëttwoch um 13.00. Den Donneschdeg de Mëtteg huet hie RV beim Dr.Meinhardt, ech ginn mat dohinner.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_006","studentId":"stud_ben","date":"2026-03-02","author":"","category":"Stage & Berufsorientierung","tags":["Stage","Liewenshaff","CISP"],"text":"Huet haut et net an de Stage gepackt, well et muer nach eemol probeieren. Ass läscht Woch 2mol reischt kuerz virun 16h opgetaucht... Eis Recommandation ass CISP Liewenshaff, Ben well dat awer net. Gespréich mat Elteren an Foyer gett organiséiert.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_007","studentId":"stud_mia","date":"2026-03-02","author":"","category":"Anwesenheit & Mobibus","tags":["Anwesenheit","Promotioun"],"text":"Ass haut rem ofgemellt weinst der Engleschprüfung, kann am Moment Denschtdegs um 14h heem. Wie fueren mer wieder? 01 wann et net kennt? Et kann definitif net sinn datt et eng 5G avancé certificeiert kritt… Mir sinn dogeint datt Promotioun op der Basis vun enger Semesterzensur gemaach gett. Et ass keng Demande un eis do, mir haalen op him entgeint ze kommen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_008","studentId":"stud_lilly","date":"2026-03-09","author":"","category":"Therapie & Suivi","tags":["Suivi","Pedopsychiatrie","CNI"],"text":"Zensur, kritt et een Modul bai? Modul 1 am Daitschen, Sport an Atelier Kichen. Atelier Metal. Frai Schreiwprouwen am FR an DE (z.B Diktat) fir den Testing. D'Sarah mellt hinnen zreck datt et net méiglech ass, hat blockéiert. De Papp krut eng Mail wou mir konkret Kontakter ernimmt hunn fir dem Lilly e Suivi ze bidden, hien muss sech just mellen. Et gouf och rëm drun erënnert dass d'Lilly et suivi pedopsychiatrique brauch laut der CNI an dass e Pediater net duer geet. --> 0 Reaktioun","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_009","studentId":"stud_jason","date":"2026-03-09","author":"","category":"Schule","tags":["Zensur","Stage"],"text":"Zensur, kritt en een Modul bai? Daitsch Modul 5, Culge a Franc net, Sport jo. Optioun Metal erem e riesen Thema, wann hien net well schaffen dann soll en do setzen. Classe de cohabitation zu Miersch ass momentan voll.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_010","studentId":"stud_miguel","date":"2026-03-09","author":"","category":"Verhalten & Krisen","tags":["Vape","CNI","Signalement","Familie"],"text":"Rdv CPI&co 16.03 9h30, keen Vertrauensvirschoss. Daitsch Modul 5? Franc Module 4, Culge Module 5?, Konscht, Sport, Atelier métal. Lëscht Woch huet de Miguel keng Vape oofginn. Hien huet behaapt, dass hien keng Vape méi am schoulsche Kontext brauch (daat wier säin Zil). Opgefall ass awer, datt hien méi dacks op d'Toilette geet. D'Eltere reprochéieren eis, wéisou mer Moies him d'Vape net ofhuelen. Gläichzäiteg betounen si, datt si frou a stolz sinn, datt hien et packt an der Schoulzäit net ze konsuméieren a gesinn d'Toilettepausen eventuell als Stressregulatioun... Haut huet hien d'Vape ofginn. 1. Block Däitsch - am Iessall (keen Bock op Däitsch). An der Paus heut en no senger 5 min Paus gefrot. Hunn him se refuséiert well e 'jo keng méi brauch'. Hien ass roose ginn, an den Iessraum gestiermt a gesot hien géif d'ganz Woch net schaffen. Laut den Elteren war déi lescht Woch fir de Miguel ganz stressvoll wéinst der CNI Réunioun (wéineg Schlof, Angschtreaktiounen). Dieren weiderhinn zousperren: Lescht Woch hunn ech en erwëscht wéi en an de Büro geschlach ass. D'Vertrauensbasis tëscht Schoul, Miguel an den Elteren ass ganz fragil.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_011","studentId":"stud_chase","date":"2026-03-09","author":"","category":"Schule","tags":["LTA","Reintegration","Franséisch","Familie","RDV","Dr Meinhardt"],"text":"Bezuchszäit beim Chase well hien sech de Mëttwoch ofgemellt hat. Hie war do Moies schlecht opkomm an net gutt drop, mä ab 8:20 Auer huet hie fonctionnéiert. Den Chase huet du moies doheem Hausaufgabe gemaach. Hien war nervös fir de Freideg, méi wéi fir déi éischte Kéier, wahrscheinlech 'Angscht' virum Franséischen. Den Chase hat net un d'Franséischprüfung geduecht, hat also näischt dofir geléiert. Et war ganz offensichtlech, dass den Chase sech geschummt huet an net wuelgefillt huet, well ech elo gesinn hu wéi si 'hausen'. D'Haus ass an engem schlechten, net gepflegten Zoustand. Hunn dem Chase réckgemellt, dass d'Saach mam Geroch sech gebessert hätt. Hien huet seng Kummer geraumt an d'Kaazenhoer gestaubsaugt. Positiv Réckmeldung de Freideg vun den LTA-Proffen. Den Chase war owes och glécklech a frou. Dem Chase seng Therapeutin wëll eis 'Bibel' (Buch mat den ElDib-Ziler) gesinn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_012","studentId":"stud_ben","date":"2026-03-09","author":"","category":"Schule","tags":["Zensur","Stage"],"text":"Zensur, wat fehlt? Option Musique, Option Anglais, Vieso (vum Sandra), Info (vum Sarah). War de Méinden net, an de Freiden e bëssen ze spéit an den Stage, fir de Rescht war hien emmer do an motivéiert seet den Foyer. Ech ginn hien haut besichen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_013","studentId":"stud_mia","date":"2026-03-09","author":"","category":"Anwesenheit & Mobibus","tags":["Anwesenheit","Promotioun","Signalement","RDV"],"text":"Rdv Orientation LNB 17.03 14h30. Huet der Mamm kloer gesot dass hat net well. Mir mussen och do un en Signalement denken.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_014","studentId":"stud_alexp","date":"2026-03-09","author":"","category":"Termine & RDV","tags":["Dr Meinhardt","RDV"],"text":"Rdv Dr Meinhardt 23.03 15h.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_015","studentId":"stud_lilly","date":"2026-03-16","author":"","category":"Therapie & Suivi","tags":["Dr Bertholdt"],"text":"Dem Lilly säin RDV bei der Dokter Berthold steet des Woch un. Sie probéieren aner Weeër ze goen wéi déi déi mir recommandéiert hunn an ginn awer all Kéiers rem rappelléiert dass et net dat ass wat dem Lilly eppes bréngt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_016","studentId":"stud_jason","date":"2026-03-16","author":"","category":"Externe Stellen & Netzwerk","tags":["ATVA","CTSA","Stage","Mobibus"],"text":"ATVA kënnt den Dënschden um 13h30-14h30 fir mam Jason säin CV ze maachen. Rdv e Mëttwoch zu Useldeng, Joey begleed (Vanessa ass am Congé), 23 Moduler op der Zensur, d'Schoul huet no engem avis d'orientation gefrot, ech sot mir kinnten net wirklech een ginn deen realistesch wier (hien huet Accès op all CCP'en). Den Gary huet dem CTSA geschriwwen fir ze froen wou den Dossier drun ass, den Dossier ass ukomm mee nach net dispatched.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_017","studentId":"stud_miguel","date":"2026-03-16","author":"","category":"Termine & RDV","tags":["Mediation scolaire","PEI"],"text":"Muer um 16h ass PEI Gespréich, mir soen datt mir de Service de médiation scolaire aschalten wellen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_018","studentId":"stud_chase","date":"2026-03-16","author":"","category":"Schule","tags":["Reintegration","LTA","Mobbing"],"text":"Bis elo leeft d'Reintegratioun gutt. Fillt sech wuel an der Klass. Papp ass nach virsichteg wéinst Angscht viru Mobbing. Krut 30/60 an dem Dossier Sciences naturelles deen hien wärend dem 1.Semester autonom ausgefëllt huet. Ab dem 3.Trimester Mëttwochs a Freides am LTA. Dann huet hie Mathé, Däitsch, Englesch a Sciences sociales jeweils 1x bei eis an 1x am LTA. Franséisch just nach 1x d'Woch (freides am LTA) a guer net méi hei. D'Mme Krack huet en Teams opgemaach wou si Material fir den Chase drasetzt. Den LTA huet dann de Lead an all deene Fächer. Den Chase bleiwt elo bis Juli am Niveau de base am Däitschen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_019","studentId":"stud_ben","date":"2026-03-16","author":"","category":"Stage & Berufsorientierung","tags":["Stage","DAP","ADEM"],"text":"Gemeng Ettelbréck bild aus fir de Landschaftsgärtner, se stellen och nach an der Carrière A an (ouvrier non qualifié), vill Gemengen maachen dat net mei. De Ben huet mir kloer gesoot dass hien well schaffen goen an méi spéit säin DAP nomaachen. Hien ass och gewëllt beim Bauer zu Keespelt testen/kucken ze goen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_020","studentId":"stud_mia","date":"2026-03-16","author":"","category":"Anwesenheit & Mobibus","tags":["Promotioun","Signalement","RDV"],"text":"Feedback Rdv LNB. Mir brauchen Datumer fir Prüfungen, 01 wann et net kennt. Mat der Zensur vum 1. Semester wier hat souguer am Couloir fir eng Réussite vun enger 5C. Mia huet refuséiert haut an Gespréich an Annexe ze kommen. Signalement ass eraus gaang.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_021","studentId":"stud_alexp","date":"2026-03-16","author":"","category":"Termine & RDV","tags":["Dr Meinhardt","HRS","RDV"],"text":"Rdv Dr Meinhardt 15h00 HRS.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_022","studentId":"stud_lilly","date":"2026-03-23","author":"","category":"Therapie & Suivi","tags":["Dr Bertholdt","Suivi"],"text":"Dem Lilly säin RDV bei der Dokter Berthold steet des Woch un. Sie probéieren aner Weeër ze goen wéi déi déi mir recommandéiert hunn an ginn awer all Kéiers rem rappelléiert dass et net dat ass wat dem Lilly eppes bréngt. (Erënnerung: Suivi pedopsychiatrique laut CNI néideg.)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_023","studentId":"stud_jason","date":"2026-03-23","author":"","category":"Externe Stellen & Netzwerk","tags":["ATVA","CTSA","Stage"],"text":"ATVA kënnt den Dënschden um 13h30-14h30 fir mam Jason säin CV ze maachen. Rdv e Mëttwoch zu Useldeng, Joey begleed. 23 Moduler op der Zensur. Den Gary huet dem CTSA geschriwwen fir ze froen wou den Dossier drun ass, den Dossier ass ukomm mee nach net dispatched.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_024","studentId":"stud_miguel","date":"2026-03-23","author":"","category":"Familie & Eltern","tags":["Signalement","CPI","Familie","Mediation scolaire"],"text":"Debriefing vun Gespreich moies: Fazit de Problem ass a war emmer Schoul, mir sinn net konsequent genuch a kommunizeieren net kloer. An hiren Aan mussen si emmer bestroofen fir eppes wat si net gesinn. Doheem ass alles an der Reih. D'CPI huet eis gesot datt Scheedung zanter 3 Wochen am Raum steht. D'Mamm huet mei wie eng Keier gesot datt si en hellt a mat him a Portugal geht. Elteren beschwätzen ennert eneen ob si fraiwelleg un de Juge runtrieden (d'CPI ennerstetzt si dobai a prepareiert de Breif). Mir signaleieren. D'CPI recommandeiert den IMP zu Etalle, d'Mamm huet keen Vertrauen. Den 24.03 um 16h ass datt nächst Gespreich an der AJ (PEI + Kader klären). De Miguel kritt keng Informatiounen zu Juge an IMP zu desem Zaitpunkt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_025","studentId":"stud_chase","date":"2026-03-23","author":"","category":"Medikation","tags":["Medikation","Dr Meinhardt","LTA"],"text":"Den Chase huet e gutt Referat am Däitschen gehal an eng anstänneg franséisch Prüfung geschriwwen. Rendez-vous beim Dr.Meinhardt ass gutt verlaf. Den Chase huet sech bereet erklärt sech op Medikatioun anzeloossen respektiv auszeprobéieren. Hëllt et säit gëschter Moien. De Freideg am Lycée ass et rëm gutt gaang. Hun dësen Donneschdeg de Mëtteg RV mat de Proffen, dem Chase sengem Papp an der Direktioun vum LTA.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_026","studentId":"stud_ben","date":"2026-03-23","author":"","category":"Stage & Berufsorientierung","tags":["Stage","Medikation","Dr Karst","DAP","Liewenshaff"],"text":"War super motivéiert, wollt méi laang an den Stage an huet gesoot hien wéilt onbedengt Landschaftsgärtner ginn. Waren um RDV beim Dr. Karst, hien hëllt Moies keen Risperdal méi, hien seet seng Tic'en wieren vill méi present. De Ben ass elo ganz fixeiert op dei Ekipp vun der Gemeng. E kinnt e Stage zu Keespelt beim Bauer 'A Lill' maan an do och souguer evt speider eng Aarbecht kreien. Mir organiseieren elo deemnächst en HPG fir Zukunftsperspektiven ze klären (mat Foyer an Elteren): DAP Landschaftsgärtner, SNJ, schaffen goen, CISP,…","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_027","studentId":"stud_mia","date":"2026-03-23","author":"","category":"Anwesenheit & Mobibus","tags":["Signalement","RDV"],"text":"Mamm gouf informéiert dass mir en Signalement mussen schreiwen wéinst den Non-excusé. Mia war haut do.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_028","studentId":"stud_alexp","date":"2026-03-23","author":"","category":"Termine & RDV","tags":["Dr Meinhardt","RDV"],"text":"Rdv Dr Meinhardt 23.03 15h.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_029","studentId":"stud_alexk","date":"2026-04-13","author":"","category":"Diagnostik","tags":["Asperger/ASS","Hochbegabung","HRS","CTSA","Ermesinde","Dr Pignoloni","Mme Karp","Mobibus"],"text":"15J, 6G am Ermesinde, adopteiert, Hautpotentiel, krut rezent Autismusspektrum Diagnose vum HRS (Clearing mam CTSA ufroen soubal de Rapport médical do ass), si huelen rem RDV beim Dr Pignoloni, HRS mécht keen Suivi, seng Psychotherapeutin Mme Karp ass aktuell am Congé de maternité, Elteren sichen no Ersatz. War an der Dagesklinik, konnt sech net richteg drop aloossen. Conditioun vum Dr Meinhardt: Schoul soss Statioun. Adoptivelteren sinn getrennt zanter 2022, si schaffen allebeid um CEJHP. En huet eng Schwester vun 20 Joer, Emma. Spillt Volleyball 2mol Woch plus Matcher (an Airsoft). Ech hunn driwwert informéiert datt mir net dem Ermesinde säin System iwwerhuelen, kritt keng Zensur dëst Trimester. Lycéeswiessel evt LJBM oder ALR. Hat eng ISA vum CEjHP (Sam Nilles). E wunnt beim Papp, Bus huelen ass en Thema. Huet all zweet Woch Psychomot Freides mëttes. Ass un Musik interesséiert, spillt Piano an Drums, komponéiert selwer um Computer. Ass un der Geschichte interesséiert (2. Weltkrich, Japan, Pazifik). Weilt gären en Animé ophuelen. Ka Schwammen a Velofueren, keng Allergien bekannt. Esst gären koreanesch/asiatesch. Kennt an den L2, Bezuch iwwerhellt den Jean-Pierre, Bezugszait Meindes um 11h15. Et huet dem JP am eischten Bezuch verzielt datt hien sech als FemBoy verkleed. Huet als Zil uginn: liewen...","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_030","studentId":"stud_colin","date":"2026-04-13","author":"","category":"Diagnostik","tags":["Asperger/ASS","Familie"],"text":"16J, 6P, liewt mat senger Mamm, dem Steifpapp an den 3 Hallefschwesteren zesummen zu Rosport. Kommunikatiounsproblemer doheem, hien fillt sech net geheiert, gesinn. Meng Beobachtungen beim Eischtgespréich: ganz distant Mamm, si hunn opginn, et brengt naischt eppes. Autismusspektrum Diagnose stoung am Raum, Elteren gesinn awer net wat datt brenge soll, och weinst de Waardezaiten. Ech gesinn hien am L2, Bezuch iwwerhellt den Jean-Pierre, Bezuchszait ass Dneschtdegs vun 13-14h. De Colin wärt bis Summervakanz weiderhin Meindes an de Lycée goen. Brauch keen Mobibus, kennt mam öffentlechen Transport. Wonschiessen: Spagetti carbonara (ouni Rahm), Pizza oder Schnitzel. Interessen/Hobbien: Computer spillen, Lego, Zeechnen. Geif gären an de Fitness goen. Ass net gären am Mettelpunkt. Breicht een Brell, well awer net. Ka Velofueren a Schwammen. Geht vum 8-10.6 mat senger Schoulklass op De Panne. Huet 12 Moduler (à confirmer). Seng Elteren wenschen sech datt en sech mei zoutraut, en ordentlechen Start an Berufswelt. ALLEM M3 en voie d'acquisition, FRANC M2 kennt elo, MATHE M2 en voie d'acquisition, CULGE kennt elo M6.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_031","studentId":"stud_lilly","date":"2026-04-13","author":"","category":"Externe Stellen & Netzwerk","tags":["Dr Bertholdt"],"text":"Dr Bertholdt an Mme Everling kennt op Besuch, den Joey an Carole ginn mat de Schüler.innen op den Terrain.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_032","studentId":"stud_jason","date":"2026-04-13","author":"","category":"Stage & Berufsorientierung","tags":["Stage","Mobibus","Medikation"],"text":"Stage zu Useldeng an der Epicerie vum 20-24.4, Mobibus ze speit ugefrot ginn, den Joey kuckt mat der Patronne op de stage ob mer emt eng Woch verleen kennen. Huet verschloof haut an keen konnt hien bréngen. Feedback Medikamenter un Dr Bertholdt wann se kennt? (consentement vun der Mamm anhuelen)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_033","studentId":"stud_miguel","date":"2026-04-13","author":"","category":"Medikation","tags":["Medikation","Signalement","Mediation scolaire","RDV"],"text":"Signalement ass raus, 14.04 hunn si RDV mat der Mediation scolaire, hien war bei engem neien Psychiater (keen Pédopsychiater) Dr Tomozei, an deem Kontext huet hien eng nei Medikatioun: moies wéi gewinnt an um 12 Auer 1 Medikinet (léit alles bei mir am Tirang). 16.04 gëtt um 15:00 ofgeholl (am LLIS) -> RDV Sportsdokter.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_034","studentId":"stud_chase","date":"2026-04-13","author":"","category":"Schule","tags":["Medikation","Mobbing","LTA","Familie"],"text":"Feedback Mamm: den Chase hat Freed un der Geo Arbécht ze schaffen (mindestens 4 Stonnen drugeschafft); zu der Mobbing-Geschicht an der EIMAB: war dun an eng aner Klass gesat ginn a wou do erëm eppes virgefall war, konnt hien direkt Hëllef froen. Ass elo op 15 mg ropgaang mam Medikament. An der Vakanz all Dag 30 Minutte Sport gemaach a seng Kummer geraumt. Ass ab dëser Woch Mëttwochs a Freides am LTA. Ab dem 27.4 Méindes, Mëttwochs a Freides.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_035","studentId":"stud_ben","date":"2026-04-13","author":"","category":"Stage & Berufsorientierung","tags":["Stage","HPG","Familie","Schlof"],"text":"HPG den 29.04, ass awer nach net confirmeiert… zweeten Stage steht an de Stären. Huet en Vakanzenjob. Huet bei der Mamm geschloof an huet et gëschter net gepackt an den Foyer, huet anscheinend Suergen wéinst der Beschoulung.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_036","studentId":"stud_mia","date":"2026-04-13","author":"","category":"Verhalten & Krisen","tags":["Anwesenheit","Signalement"],"text":"Krut Denschdes virun der Vakanz den Punkt op den i gesat a ganz kloer erklärt wat et fir Meiglechkeeten huet an datt et net geht sou mat Leit emzegoen. Huet sain Physikdossier ofginn. Huet et haut net gepackt, war anscheinend prett an huet de lëschten Moment entscheed net ze kommen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_037","studentId":"stud_alexp","date":"2026-04-13","author":"","category":"Therapie & Suivi","tags":["HRS","Dr Meinhardt","Internat","Statioun"],"text":"Elteren sinn net ganz zefridden mat der Prise en charge vum HRS, Psychologin ass gewiesselt ginn. Alex leeft gutt op der Statioun. Internat ass hinnen ze deier, si kreien datt net finanziell gestemmt. Den Dr Meinhardt huet ze verstoen ginn datt Elteren datt Alex soss placeiert waert ginn. No der Vakanz soll elo e Schoulversuch bei eis gestart ginn, bis elo huet awer nach keen sech gemellt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_038","studentId":"stud_alexk","date":"2026-04-20","author":"","category":"Risiko & Sorge","tags":["Selbstverletzung","Suizidalität","Schlof","Familie","Hochbegabung"],"text":"Individuelle Stonneplang mol déi nächst 2 Wochen: Mo bis 12 (um 11:15 Bezuchszäit), Dë vu 10:00 bis 16:00, Më ganzen Dag bis 16:00, Do bis 14:00, Fr bis 13:00. Huet läscht Woch vun 5 Deeg 3 gepackt. De Papp hëllt lo méi eng 'opbauend' Haltung. Zu sengem Schlofverhaale: hien kann just mat Musek aschlofen. Gëschter owend Diskussion, de Papp huet den Internet ausgemaach fir dass e schléift, war awer kontraproduktiv (huet de Wifi rem um 2 Auer an der Nuecht ugemaach). De Papp huet mam Alex eis Beobachtungen vum selbstverletzenden Verhaalen (Bläistëft an d'Hand picken) thématiséiert. Alex konnt dëst confirméieren: 'Et soll wéi doen domat de Stress ophällt'. Si wëllen him een Skillsrank matginn. Thema Suizid: waar bei him Thema, dowéinst ass hien hospitaliséiert ginn. Ech thematisiéieren dat mam Alex dass en seng Themen fir sech soll haalen a wann hien Besoin huet driwwer ze schwätze bei mech soll kommen. Schoulesch huet den Alex nach keng richteg Mathe gemaach. Papp schwätzt iwwert eng Mathe 'Phobie'. D'Eltere wënschen sech eng Bestandsopnahm. Mobibus? Hunn nach net ugefrot.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_039","studentId":"stud_colin","date":"2026-04-20","author":"","category":"Schule","tags":["Familie","Autonomie"],"text":"De Colin war d'ganz Woch präsent, huet un de Coursen deelgeholl. Hien huet Freides am Réckbléck uginn dass hien Stolz op sech ass well hien d'ganz Woch gepackt huet an ufänkt sech unzepassen. Pausesituationen waar hien lescht Woch net beim Grupp, soutz uewen sech 'auszerouen'. Dest Woch ass Zil hien e bessi méi an d'Pausesituatiounen z'intégréieren. Doheem huet hien den Elteren näicht iwwer seng Deeg an der AJ erzielt, dofir war d'Mamm emsou méi frou iwwer mäin Uruff.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_040","studentId":"stud_lilly","date":"2026-04-20","author":"","category":"Familie & Eltern","tags":["Familie","Dr Bertholdt","RDV"],"text":"Retour consentement? De Papp ass a Spuenien fëschen an dofir konnt d'Lilly e Freiden net an d'Schoul kommen well hatt zousätzlech e RDV beim Zänndokter hat um 14 Auer an d'Mamm hatt net sichen kann kommen wéinst PTSD (Accident). D'Lilly huet sech erëm selwer ofgemellt amplatz dass d'Elteren dat gemach hunn, an ech hunn nach eng Kéier drop higewisen dass dat net geet. RDV en Donneschden mat der Dr Berthold: zimlech informativ fir si. Informativ fir eis war, dass d'Madame Everling net komm ass nodeems mir kloer gemach hunn dass mir eis un de secret professionnel mussen halen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_041","studentId":"stud_jason","date":"2026-04-20","author":"","category":"Stage & Berufsorientierung","tags":["Stage","CTSA","Mobibus","RDV"],"text":"Stage elo vum 27.04-4.05, dei nei convention de stage ass am MLG ukomm, e Mëttwoch huet den Joey Rdv mam CTSA. Krut een n-e vir lëschten Méinden. Mamm ass am gaangen ze paaken, dauert net mei laang mam plenneren, viraussichtlich am Mee. Mobibus fiert net vun Irrel aus (oder?).","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_042","studentId":"stud_miguel","date":"2026-04-20","author":"","category":"Medikation","tags":["Medikation","Stage"],"text":"Medikatioun, e leeft elo gudd sou krass/traureg wei datt ass... Convention de stage ufroen (alj@lbv.lu).","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_043","studentId":"stud_chase","date":"2026-04-20","author":"","category":"Schule","tags":["Anwesenheit","Franséisch","LTA","Therapie","RDV"],"text":"Läschten Dënschdeg hat d'Mamm annoncéiert dass den Chase moies net gutt drop wär; bei eis hu mir näischt bemiertkt; war gutt drop. Läschten Donneschdeg immens gutt drop, de Freideg net an de Lycée (Bauchwéih); hätt Franséischprüfung gehat, schreiwt déi elo muer bei eis no. Haut war hie furchtbar, souwuel am Engleschcours wéi och op der Schoulfoire. Hat läschte Méindeg déi bäschte Therapiesstonn säit Ufank, laut der Mme Kirsch-Pedrosa.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_044","studentId":"stud_ben","date":"2026-04-20","author":"","category":"Verhalten & Krisen","tags":["HPG","Schule","Familie"],"text":"War läscht Woch just 1 Dag do, HPG ass confirméiert. Fir hien gëtt et keng Extrawurschten méi, entweder hien hällt sech un de Programm oder geet an den Iesssall. Refuséiert eppes an der Geschicht ze leieren wou hien 01 krut, huet awer net agesinn eppes ze maachen fir die nächst Prüfung, suguer den Chase huet him et ugerooden. 'Wat ass dann wann ech eng Datz hunn.'","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_045","studentId":"stud_mia","date":"2026-04-20","author":"","category":"Therapie & Suivi","tags":["ATVA","Familie"],"text":"Geht bei Therapeutin mee et packt et net heihinner. D'Mamm ass driwwert informeiert ginn datt mir sou net weiderfueren kennen an datt ATVA elo schon matagebonnen misst ginn wann se die Hellef wellen…","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_046","studentId":"stud_alexp","date":"2026-04-20","author":"","category":"Schule","tags":["Reintegration"],"text":"Nach keng Neiegkeeten wienie e Schoulversuch gestart gett.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_047","studentId":"stud_alexp","date":"2026-04-27","author":"","category":"Schule","tags":["Reintegration","ALR","Familie"],"text":"Kennt de Mëttwoch de moien. Ech huelen hat déi éischt 30-45min an duerno geet hat normal an den Cours. Vir de Moment kënnt hat 1x d'Woch an demno wéi Charly Tissier bréngt et klappt gett progressiv ropgesat. Internat an fräiwëlleg Foyer kennt fir Elteren net a Fro.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_048","studentId":"stud_alexk","date":"2026-04-27","author":"","category":"Diagnostik","tags":["Hochbegabung","Asperger/ASS","Familie","RDV","Selbstgefährdung"],"text":"Bleiwt HP onofhängeg vum neie Diagnostik. 15.05 RDV Psychologin. Méindes, Dënschdes absent, Mëttwoch um 10h10 ukomm (amplaatz vun 8h), Donneschden absent, Freiden bis 12h obwuel bis 13h ausgemaach wor. De Papp schwéngt immens mat. Den Dënschden wou den Alex behaapt huet hien hätt Kapp wéi a kéint dofir net an d'Schoul kommen huet de Papp him gesot dass hien dann och net op den Training goe kann. Doropshin ass den Alex aggressiv gin. D'Mireille huet dem Papp an dem Alex kloer gemaach dass net si déi sinn déi bestemmen wéi dem Alex säin Dag ausgesäit. Mathe: ganz nidderschwelleg ugefaangen: z.B 19-7 ass gaangen, 2x5 gaangen, 2x7 net gaangen. Weist seng kognitiv Fähegkeeten net. En huet eng erofloosend Art a Weis mat den Erwuessenen, wierkt arrogant, keng Frustratiounstoleranz. En ass ganz anescht am schouleschen Setting wei an de Pausen. Haut huet hien mir méi iwwer säin Projet Anime Serie geschwaat, hien brauch Synchronsprecher op Däitsch. Wëll net mat den aaneren Iessen an him schmaacht d'iessen och net...","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_049","studentId":"stud_colin","date":"2026-04-27","author":"","category":"Verhalten & Krisen","tags":["Familie","Selbstverletzung"],"text":"Wéi ass et mam Austausch vum Schoulmaterial? Donneschden hongreg an AJ komm, mat den Elteren thematiséieren, se sollen him eng Packung Müsli matginn. Fest vun der Frëndschaft net do, um Ausflug mat senger Klass. Am Daitschen jo, am Engleschen manner. Beim Sandra soll hien CULGE Module 6 maan.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_050","studentId":"stud_lilly","date":"2026-04-27","author":"","category":"Schule","tags":["Schule","Verhalten"],"text":"Retour consentement? orthophoniste? D'Lilly well verschidde Sachen net verstoen (Beispill: Excuse vum Dokter heescht keen Sport), ech mengen dass et wichteg ass him direkt ze soen wéi et ass an wat mir erwarden. Hatt mengt hatt misst fir déi aner Schüler do sinn an si motivéieren, hatt muss domat ophalen. Keng Progressioun am schouleschen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_051","studentId":"stud_jason","date":"2026-04-27","author":"","category":"Stage & Berufsorientierung","tags":["Stage","Mobibus","CTSA"],"text":"Am Stage elo vum 27.04-4.05, en ass gutt do ukomm. Mobibus Ausland geht net, och net ab Grenz, de Schüler muss eng Adress am Land hunn. Den 21.05 um 10h30 kënnt den CTSA an den Theater observéieren, den 15.05 schwätzten si mat der Mamm a mam Jason. Wann den Jason seng Medikamenter vergiess huet ze huelen, dierfen mir him déi an der AJ ginn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_052","studentId":"stud_miguel","date":"2026-04-27","author":"","category":"Risiko & Sorge","tags":["Vape","Selbstgefährdung","Stage","Familie"],"text":"Ass lëscht Woch 2x wärend senger Vape Paus bei den Duarte gaangen. De Freiden hat hien e Leatherman (Täschemesser 8cm) dobäi, hunn him en ofgeholl. Et besteet erhéischten Verdacht dass hien eng zweet Vape bei sech huet. Hien huet och ugefaangen mat Bieden. Oppassen: net dass hien dat benotzt fir op der Toilette ze vapen. Den Donneschden fueren ech mam Miguel op Déifferdéng, convention de stage beim Coiffersalon Cap Act. D'Schoul huet eis informéiert dass si oft Stagen an deem Betriib refuséieren. D'Gespréich mat der Médiation Scolaire ass gutt verlaaf. Si hunn drop opmierksam gemaach datt si eis an dem Miguel seng Elteren wëllen ennersetzen de passenden Projet Scolaire fir hien ze fannen. De Miguel kritt doheem agetrichert datt mir hien hei net wëllen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_053","studentId":"stud_chase","date":"2026-04-27","author":"","category":"Verhalten & Krisen","tags":["Anwesenheit","Franséisch","LTA","Therapie"],"text":"War Méindes net gutt drop; seng sozial Batterie war net opgelueden; konnt sech net op d'Schoulfoire aloossen. Dënschdes besser drop. Huet déi Franséischprüfung bei eis nogeschriwwen, ka guer net aschätzen wéivill dat gëtt. Wëll demnächst am LTA an de Franséisch-Appui goen. Hien hätt keng Angscht an d'Schoul ze goen, héchstens virun der Prüfung. Hat dun awer an der Nuecht hefteg Problemer mat Mo an Daarm a war weder Mëttwochs am LTA nach Donneschdes bei eis. Hat läschte Méindeg déi bäschte Therapiesstonn. De Freideg war hien am LTA, 'gudden' Dag.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_054","studentId":"stud_ben","date":"2026-04-27","author":"","category":"Stage & Berufsorientierung","tags":["Stage","Liewenshaff","CISP","HPG"],"text":"Mir hunn viraussichtlech een Stage bei Hein fonnt (zu Remich), 1 Stonn vun Fueren. De Ben war ganz frou dass hien konnt mat engem Patron schwätz. Ech froen un den Stage op den 01-05.06 ze lëen. Hien huet sech fir d'Optioun 'Schaffe goen' entscheed no der 5AD, ech krut hien awer dozou anzewëllegen den Liewenshaff opmannst kucken ze goen. E Freiden 15/05 huet Mireille Rdv am LTA fir iwwert eng Admissioun an de CISP Liewenshaff ze schwätzen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_055","studentId":"stud_mia","date":"2026-04-27","author":"","category":"Anwesenheit & Mobibus","tags":["Anwesenheit"],"text":"Krut gesot et misst eng Entscheedung huelen, Schoul oder net.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_056","studentId":"stud_alexp","date":"2026-05-04","author":"","category":"Schule","tags":["Reintegration","ALR","Familie"],"text":"Nach keng Réckmeldung wéini dem Alex säin nächsten Dag ass. War immens frou hei ze sinn, gesäit sech am September an den Réidener Lycée goen an fest bei den Elteren ze wunnen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_057","studentId":"stud_alexk","date":"2026-05-04","author":"","category":"Diagnostik","tags":["Asperger/ASS","Hochbegabung","Familie","RDV"],"text":"Hien packt et aktuell net, reegelméisseg an d'Schoul ze kommen. Mir hunn den Androck, datt d'Schwieregkeeten éischter am schoulesche Kontext leien, onofhängeg vu sengem Autismus. An deem Kader iwwerleeë mir, en adaptéierte Stonneplang beim Ministère unzefroen. RDV mat den Elteren: Virraussiichtlech nächste Méinden um 15:00. Infos aus DS: 2017 CHL Psychologin Mme Karp stellt fest: Vorliegen einer besonderen sensorischen Integration und eine narzistisstische Verletzlichkeit aufgrund einer Bindungsstörung, die zu aggressivem und destruktivem Verhalten führt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_058","studentId":"stud_colin","date":"2026-05-04","author":"","category":"Verhalten & Krisen","tags":["Reintegration","Familie","Selbstverletzung"],"text":"Versteet net wéisou hien an d'AJ muss kommen. Versicht virun allem an de Bezuchszäiten duerch argumentéieren e Wee zrëck an de Lycée ze fannen. Säin Zil Rentrée 26/27 ganz am Lycée ze sinn, en huet awer selwer gemierkt dass hien ëmmer rëm mat deem Thema kënnt. Hien zielt vill Geschichten, e kreckelt der gären, e bleiwt net bei der Wourecht am Morning Meeting, liicht manipulatif. D'Eltere si frou dass hien all Dag kënnt. Wann hien heem kënnt seet e net Moien, verzitt sech an d'Kummer. Am Summer geet hien 2 Wochen op d'Gemeng schaffen. Et fällt op dass hien extremst d'Haut vu sengen Fangeren zitt, se sinn bluddeg. Ass frou iwwert Opmierksamkeet wann een niewt em setzt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_059","studentId":"stud_lilly","date":"2026-05-04","author":"","category":"Schule","tags":["Medikation","Schule"],"text":"D'Lilly huet sech d'lescht Woch méi drun ginn wéi soss. Consentement ass nach net do. Et hellt rëm 30mg Medikinet, mir wëllen wëssen wei et wat fir eng Medikamenter hellt. Mir kommen schoulesch net weider obwuel am klengen Setting mat him geschafft gëtt, et mécht ëmmer rem dei nämmlecht Fehler. Silben liesen oder 1x1 kennt et net weider. Sarah a J-P trainéieren datt verstäerkt mat him am 1:1. Lilly ass harmoniebedürfteg a net nodroend.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_060","studentId":"stud_jason","date":"2026-05-04","author":"","category":"Stage & Berufsorientierung","tags":["Stage","CTSA","CIP","Mobibus","Medikation"],"text":"Ass frou am Stage, en ass awer och frou fir muer rem bei eis well et get him schlecht am Bus. Wat ass de Plang B wann et näischt mam CTSA gëtt? CIP Klass an mei laang Stagen (ATVA) bis do eng Plaatz ass. Mamm seet de Mobibus kéint den Jason an Däitschland sichen goen, wier just een aaneren Service. Gëtt awer wahrscheinlech September bis se plenneren. Ordonnance fir d'Medikament huet se missen ofginn, freet e neien Certificat bei der Dr.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_061","studentId":"stud_miguel","date":"2026-05-04","author":"","category":"Risiko & Sorge","tags":["Vape","Selbstgefährdung","Stage","Familie"],"text":"Leschten Donneschden war geplangt vun 12:00 bis 14:00 op Déifferdeng ze fueren convention de stage ze ënnereschreiwen. Huet refuséiert well hien net um 14:00 mat zréck wollt kommen. Ass op de Späicher gaangen a loung uewen um Balken (Selbstgefährdung). D'Mamm hätt him gesot, ech soll him den Ziedel matginn fir dass si selwer bei de Patron ginn. Haut am MM huet hien de Grupp gestéiert mat sengen Kommentarer. Huet wärend dem 1. Block geschlof. Vape Paus duerno Paus mam Grupp.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_062","studentId":"stud_chase","date":"2026-05-04","author":"","category":"Anwesenheit & Mobibus","tags":["Anwesenheit","Franséisch","LTA","Sport"],"text":"Huet mir am Bezuch erzielt dass de Bus Freides um Wee fir an d'Schoul eng Pann hat. Hei ass hien dunn einfach zu Fouss drop lassgetrëppelt well hien net wollt ze spéit kommen, huet et schlussendlech zur Zäit gepackt. Hat just eng Situatioun am Sport wou hien sech kuerz onwuel gefillt huet. Den Chase mécht natierlech déi 'richteg' Rull a gesäit kee Sënn dran eng aner ze maachen. Krut eng 32 am Franséischen an eng 54 am Däitschen zréck. Mathé léiert hie mat ChatGPT. Proposéieren fir ab dem 1.6 och Méindes an den LTA ze goen am Fall wou et elo 3 Wochen mat deenen 2 Deeg klappt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_063","studentId":"stud_ben","date":"2026-05-04","author":"","category":"Stage & Berufsorientierung","tags":["Liewenshaff","CISP","DAP","Berufsorientierung"],"text":"De Ben war dobai, dem Ben seng Mamm net. De Ben kruut die Optiounen virgestallt: CISP Liewenshaff (eis Recommandatioun), direkt schaffe goen als non qualifié an zreck an den LTA fir en DAP Landwirtschaftsgärtner. En Donneschtdeg huet hien d'Bezuchszait refuseiert a well sech keng Gedanken maachen iwwert seng Zukunft. Ech hat en haut an d'Gespreich geruff, ech mengen hien huet de Message verstaan an ugeholl. Mir ginn den Donneschden op d'Job Days.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_064","studentId":"stud_mia","date":"2026-05-04","author":"","category":"Anwesenheit & Mobibus","tags":["Anwesenheit","ATVA"],"text":"Naischt neies, d'Schoul ass informeiert. Ech telefoneieren mat der Mamm an der ATVA.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_065","studentId":"stud_alexp","date":"2026-05-11","author":"","category":"Familie & Eltern","tags":["Familie","Selbstgefährdung","HRS","ALR","Mobibus"],"text":"Hätt haut sollen kommen huet sech awer anscheinend déi kléng Zéiw gebrach. Den Här Tissier ass sech net secher ob et net en Vermeidungsversuch vum Alex an sengem Papp ass fir net an d'AJ ze kommen. Si maachen eng Röntgen. Den Här Tissier huet gesot dass den Papp all Fortschrëtter an Richtung Autonomie vum Alex torpedéiert. Hat kënnt wann alles klappt den Freiden (ganzen Dag).","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_066","studentId":"stud_alexk","date":"2026-05-11","author":"","category":"Diagnostik","tags":["Asperger/ASS","Hochbegabung","Dys","ATVA","CDA","CTSA","Schlof","Familie"],"text":"Clearing ATVA, Conseiller ass de Fabrice Krez: Underachiever, Schwachpunkt mémoire de travail, Dyspraxie? Twice Exceptional (2e) – Hochbegabung und Teilleistungsstörung im selben Kopf? Am Gespréich mat den Elteren zwou zentral Froestellungen: 1) Diskrepanz tëscht intellektuellem Potenzial a schoulescher Leeschtung. Am schouleschen Alldag: niddreg Belastbarkeet, keng Grondkenntnisser, séier Frustratioun, staark Vermeidungstendenzen. Gläichzäiteg: huet sech Piano an Englesch selwer bäibruecht (eegen ganz staark Technik, awer net bereed Basics am Solfège ze leieren), wëll aner Sproochen (Koreanesch, Russesch, Japanesch) léieren, kritt et awer net emgesaat. Mir stellen eis d'Fro ob nieft der diagnostizéiertem ASS zousätzlech Dys'en, Léierschwieregkeeten, exekutiv Problemer eng Roll spillen. Mir emfroen eis fir Conseil/Guidance beim CDA/CTSA. 2) Zukunftsperspektiv: Orientatioun Richtung 5P (mat 0 Moduler) a speider CIP Klass sënnvoll. Optiounen: am Lycée Ermesinde ageschriwwen bleiwen (Ofklärung CIP Struktur) oder Neiorientatioun Lycée Réiden oder Mamer (Präferenz LJBM). D'Elteren huelen d'Ënnerstetzung vun der ATVA un, schrëftlechen Accord do. D'Elteren hunn den Androck dass auditiv vermëttelt Informatioune gutt bei him hänke bleiwen. D'Elteren hunn beschriwwen datt den Alex schwéier aschléift an e staarkt Owesritual brauch (Podcasts fir anzeschlofen). Fréier wéineg gelies, wann dann éischter Mangaen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_067","studentId":"stud_colin","date":"2026-05-11","author":"","category":"Schule","tags":["Autonomie","Sport"],"text":"Huet déi lescht Woch insgesamt eng positiv Entwécklung gewisen. Besonnesch gutt gefall hunn him de Mathescours an den Ausfluch en Dënschdeg beim Echternacher Séi. Nodeems eng Réckmeldung iwwert säi Schaffverhale gemaach gouf, huet hien sech sichtbar méi Méi ginn an och méi Eigeninitiativ. Positiv: méi Autonomie am Alldag, Participatioun um Vëlofueren (obwuel hien virdru gesot hat dass hien dat net gär huet). Aktuell sicht hien Opmierksamkeet iwwer 'Dommheeten, Geräischer'. Bei sou engem Verhaalen direkt stoppen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_068","studentId":"stud_lilly","date":"2026-05-11","author":"","category":"Familie & Eltern","tags":["Familie","Orthophonistin","RDV"],"text":"Huet den 19.5 den eischten Rdv bei der Orthophonistin. Consentement ass nach ëmmer net do. D'Lilly hat läscht Woch eng méi schwéier Woch well seng Boma um Stierwen loung. En Donnesden ass et dann och zum Stiewesfall komm an d'Lilly ass ofgeholl ginn. Ech fannen dass de Papp dat gutt gehändelt huet. D'Lilly war am Generellen zimlech duercheneen. Dem Lilly seng Interpretatiounen dierfen gäeren ënnert d'Loupe geholl ginn, well se baséieren net emmer op Wourechten. Hatt huet schon e gutt Gespier, dofir soll een net d'Sach a Fro stellen, mee et ass net emmer wéi hatt mengt. D'Lilly huet e Gespréich mam Ben gehat deen him konnt soen dass hien genervt ass well hatt 'ëmmer de Prof spillt'. Begriewnis vun der Boma ass e Mëttwoch.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_069","studentId":"stud_jason","date":"2026-05-11","author":"","category":"Externe Stellen & Netzwerk","tags":["Stage","CTSA","DS","Mobibus","Medikation"],"text":"Huet haut RDV mat der Mamm um CTSA fir den DS (21.05 Observatioun bei eis während der Optioun Theater), war e Freiden net do well de Concert deen Owend virdrun ze laang gedauert huet, krut eng absence non-excusé. Et ass un der Mamm een aaneren Service ze kontaktéieren vir den Transport iwwert d'Grenz ze organiséieren.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_070","studentId":"stud_miguel","date":"2026-05-11","author":"","category":"Verhalten & Krisen","tags":["Vape","Stage","Sport"],"text":"Vun Dënschden un ass d'Woch insgesamt gutt verlaf. Hien war an all de Coursen präsent a huet matgeschafft, méi kooperativ. Hien ass frou iwwer seng Stage Plaatz. Gläichzäiteg huet hien méi dacks no Vape-Pausen gefrot, huet selwer matgedeelt datt hien déi lescht Woch keng zweet Vape dobäi hat. Besonnesch gutt gefall: Vëlofueren an Mathescours (Modul 5 ofgeschloss). Säin Zil fir dës Woch: säi Vape-Konsum op all 2 Stonnen ze reduzéieren.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_071","studentId":"stud_chase","date":"2026-05-11","author":"","category":"Verhalten & Krisen","tags":["Anwesenheit","LTA","Sport","Familie"],"text":"Läscht Woch war et méi schwiereg am Bezuch. Den Chase war liicht iwwerfuerdert mat der Gestioun vum Teams, WebUntis. Hat d'Norichte vun de Proffen aus dem LTA einfach net gekuckt. Et war ganz schwéier fir der Proff eng kuerz Réckmeldung ze schécken. Hat Mëttwochs Geosprüfung am LTA, ass awer ok gaang. D'Mamm hëlleft fir d'Gestioun vum Teams. War e Film op Franséisch kucken an zimmlech begeeschtert. E Freideg am Lycée war et ok laut him.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_072","studentId":"stud_ben","date":"2026-05-11","author":"","category":"Stage & Berufsorientierung","tags":["Stage","Liewenshaff","CISP","Familie","Schlof"],"text":"Den 29.04 ass HPG, d'Fro déi sech stëllt ass schaffen goen oder awer Liewenshaff. War den Freiden um 15h do, opwuel hien wosst dass keen do wier. Huet an der Vakanz en 'Experiment' gemaach wou hien keen Medikament geholl huet bei der Mamm. Dr. Karst seet dass de Ben net an d'Schoul komm ass wëll hien keen Schloofrhythmus méi hat. Martina Mick well datt hien e Plang B huet (net just Gemeng), Jobdag 7.05.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_073","studentId":"stud_mia","date":"2026-05-11","author":"","category":"Anwesenheit & Mobibus","tags":["Anwesenheit"],"text":"Krut Denschdes virun der Vakanz den Punkt op den i gesat. Huet et haut net gepackt, war anscheinend prett an huet de lëschten Moment entscheed net ze kommen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_074","studentId":"stud_alexp","date":"2026-05-18","author":"","category":"Schule","tags":["Reintegration","HRS","ALR","Familie","Autonomie"],"text":"Plang fir des Woch: Alex kennt e Mëttwoch an en Donneschdeg, Rdv am ALR no der Péngschtvakanz (12.06). D'Elteren kruten vun der Schoul gesot datt Gespréich géif mat mir zesummen stattfannen. No der Vakanz ass och Gespréich am HRS (5.06), den Joey geht dohinner. Falls den Papp irgentwann sollt optauchen, net op een Gespréich agoen, mais dorop opmierksam maachen dass hien dat mat mir oder dem Mireille soll beschwätzen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_075","studentId":"stud_alexk","date":"2026-05-18","author":"","category":"Risiko & Sorge","tags":["Asperger/ASS","Hochbegabung","Familie","RDV","Medikation"],"text":"'Du hast einen hochbegabten Jugendlichen mit Asperger vor dir, dessen Begabung das ASS-Profil jahrelang verdeckt hat — bis das Kompensationsbudget aufgebraucht war. Was du jetzt als Depression siehst, ist die Erschöpfung nach Jahren des „ich bin doch klug, also muss ich es schaffen\". Neurokognitiv liegt hier typischerweise eine ausgeprägte Index-Spreizung im WISC-V vor — verbales Verständnis und fluides Schließen oft 130+, Arbeitsgedächtnis und Verarbeitungsgeschwindigkeit deutlich darunter. Was wir brauchen, ist eine doppelte Anpassung: Die Begabung braucht herausforderndes Material — Akzeleration, Enrichment. Das ASS-Profil braucht Struktur, Vorhersehbarkeit und sensorische Anpassungen.' De Weekend hat den Alex e puer 'Minikrisen' wou et ëmmer dremm gaangen ass datt hien seng Musek oder seng Pläng net géif hikréien. War de Weekend mat Zäit an d'Bett (12:00-01:00) an moies opkomm. Geschter Owend rem total refuséiert, net ukomm bis spéid an Nuecht. Hien huet och an 2 Wochen B-Day (2.06). Dem Papp fällt op dass ronderem säin Gebuetsdaag säin Verhaalen nach méi schwiereg ass, Frustratiounen a Krisen si virprogramméiert. 11.06 RDV bei der Mme Rizzi. Dëse Freiden um 10:00 RDV Dr. Pignoloni (Medikatioun/Antidepressiva). D'Elteren wëllen Hëllef beim groupe de support fir Autismus an der Belge ufroen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_076","studentId":"stud_colin","date":"2026-05-18","author":"","category":"Familie & Eltern","tags":["Familie","Motorik","ATVA"],"text":"Leschten Donneschden ass hien säin Bop an d'Klinik besiche gaangen. Hien war schockéiert säin Bop an deem Zoustand ze gesinn a mescht sech Suergen. Dëst Situatioun hat de Freiden Auswierkungen op dem Colin säin Wuelbefannen. Mëttes ass et him immens schwéier gefall sech ze konzentréiren. Op meng Fro ob hien am Workshop vun der ATVA eppes matkritt: 'Brauch net opzepassen, ech kann näicht a mech brauch souwéisou keen.' Hunn d'Mamm op seng Motorik, Koordinatioun higewisen. A Bezuch op den Openthalt an der Klinik huet d'Mamm gesot, de Colin wier den sensibelschen an der Famill.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_077","studentId":"stud_jason","date":"2026-05-18","author":"","category":"Externe Stellen & Netzwerk","tags":["CTSA","Theater","Autismus","Familie"],"text":"Beobachtung CTSA des Woch. Krut vun der Madamm Leber erklärt wat Autismus ass an hien schéngt immens frou ze sinn dass seng Mamm hien elo besser versteed. Hien well oft läscht Wuert hunn. Am Theater weist hien schon extrem Reaktiounen, zB wann en roosen soll ginn: e gëtt dann richteg ausfaalend. E kann sech net an Situatiounen eraversetzen dei net mat senger Liewenssituatioun iwwerteneen stemmen. Sarah an Annick spillen datt Spill en Donneschtdeg an der Theateroptioun, perfekt fir wann Mme Leber kucke kennt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_078","studentId":"stud_miguel","date":"2026-05-18","author":"","category":"Stage & Berufsorientierung","tags":["Stage","Familie"],"text":"Am Stage des ganz Woch, de J-P war haut fir Mëtteg dohinner an e geet och e Mëttwoch nach eemol, d'Elteren äntwerten net mei wirklech op Feedback mailen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_079","studentId":"stud_chase","date":"2026-05-18","author":"","category":"Therapie & Suivi","tags":["Therapie","Medikation","LTA","Familie"],"text":"Hat de Méindeg vergiess bei d'Psychotherapeutin op Esch ze fueren. De RV den Dënschdeg beim Dr.Meinhardt war gutt, den Dr war ganz zefridden mam Chase senger Entwécklung, huet vill méi geschwat wéi soss. Feedback Spendenlaaf LTA: huet sech immens druginn; ee Moment huet en Blutt am Mond geschmaacht (eventuell sech am Mond gebass), éischt Hëllef huet no him gekuckt, näicht festgestallt. Huet sech e Moment op d'Mauer gesat a liischt gekrasch, ass duerno rem weidergelaf. War éiergäizeg. Vun der Franséischproff krut hien de Choix ob hien den Exposé bei eis oder virun der Klass am LTA mécht, huet sech fir d'Klass entscheed. De Moien Bioprüfung. Den Donneschdeg Mathéprüfung.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_080","studentId":"stud_ben","date":"2026-05-18","author":"","category":"Stage & Berufsorientierung","tags":["Liewenshaff","CISP","Stage","Familie"],"text":"Feedback vum Gespréich am LTEtt: d'Schoul ennerstetzt de Wee a Richtung CISP Liewenshaff. Die nächst Etapp ass fir e Rdv um Liewenshaff auszemaachen fir zesummen mat den Elteren kucken ze goen. Kontakt ass Mme Claudine Welbes. No engem Stage vun 10 Wochen kennt et reischt zur definitver Admissioun. Hien soll e Motivatiounsbreif schreiwen. D'Schoul wärt dem Ben seng Absencen mellen. De Foyer deelt Suerg datt de Ben bei seng Mamm geht wann en der 18 kritt. De Ben huet mir gesoot hien wéilt wahrscheinlech bis 20 am Foyer bleiwen wann méiglech.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_081","studentId":"stud_mia","date":"2026-05-18","author":"","category":"Anwesenheit & Mobibus","tags":["Anwesenheit","Cloture"],"text":"D'Mamm huet sech bei der Schoul gemellt fir et ofzemellen, d'Schoul seed Bescheed wann d'fiche de départ ausgefëllt ass (Ofschlossrapport schreiwen).","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_082","studentId":"stud_alexp","date":"2026-06-01","author":"","category":"Termine & RDV","tags":["HRS","ALR","Familie","Mobibus"],"text":"Kennt des Woch Dënschdeg, Mëttwoch, Donneschdeg an nächst Woch all Dag ausser Freiden, e Freiden ass Rdv am HRS, dei Woch drop am ALR. Elteren kréien keen Gespreichsangebot wann de Taxi spillen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_083","studentId":"stud_alexk","date":"2026-06-01","author":"","category":"Diagnostik","tags":["LEM","CTSA","CDA","Dys","Medikation","Dr Pignoloni","Mme Rizzi","CeHJP","CHL"],"text":"Wann den Alex sech net u sai Plang hält kritt en non-excusé, bis elo ass alles entschellegt ginn. Austausch mam Fabrice KERG vun der ATVA a mam Philippe DEMART vum LEM: Promotioun op eng 5PRO, mir schreiwen datt op den Complément au Bulletin als classe visée, hien kritt keng LEM-Zensur. Muer um 11h ass Austausch mam Psychomotoriker vum CeHJP. Clearing beim CTSA ass den 8.06 um 9h00. Feedback RDV beim Dr Pignoloni (CHL): Hëllt säit enger Woch Antidepressiva. Aktuell hu si keen Psycholog, seng Psychologin kënnt réischt a puer Méint zréck. En attentant gi si nächst Woch bei d'Mme Rizzi fir e Suivi. Geschwat gouf och iwwert eventuel Dys'en an datt den Alex déi Tester dann am CDA misst maachen. Beim Dr Ristow beschwätzen mer den Alex.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_084","studentId":"stud_colin","date":"2026-06-01","author":"","category":"Termine & RDV","tags":["LLIS","Ausfluch"],"text":"Vum 08.06-10.06 mam LLIS um Ausfluch.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_085","studentId":"stud_jason","date":"2026-06-01","author":"","category":"Externe Stellen & Netzwerk","tags":["CTSA"],"text":"CTSA wärt eng scolspé ausschwätzen, phase d'observation fënnt awer net mei dëst Schouljoer statt dat ass secher.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_086","studentId":"stud_miguel","date":"2026-06-01","author":"","category":"Risiko & Sorge","tags":["Stage","Familie","HRS","CNI","Vertrauen"],"text":"Feedback Stage: Sinn hien zweemol besiche gaangen, et huet alles gutt geschéngt, positiven Retour. Dënschden Mëtten wärend senger Paus vun 12:00-14:00 wor hien beim Zänndokter a krut eng Zahnspang. Hien huet mir haut matgedeelt dass hien 15€ um Buedem am Pausenraum vum Salon fonnt huet. Hien huet se agestach a sech Panini Stickeren domat kaaf. Wou hien an lescht Woch den Evaluationsfiche siche gangen ass hun si en drop ugeschwat: Si hätten et op der Kamera gesinn a hien soll se zréck ginn soss kritt hien Fiche net a se géifen bei d'Police goen. De Miguel wees net wat hien maache soll well e keng 15€ huet a sech net traut sengen Eltere bescheed ze soen well déi lescht Wochen gutt gelaaf ass a senge Elteren ufänken him rëm méi ze vertrauen. Haut deelt hien dëst senger assistance en famille mat a seet senger Mamm bescheed a frëet si no Geld fir dass hien haut se am Salon ofgëtt. CNI e Mëttwoch um 8h30. Net mei beim HRS am suivi, Dr. Marie-Christine Liegeois-Dom (nach net konfirmiert vun den Elteren).","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_087","studentId":"stud_chase","date":"2026-06-01","author":"","category":"Schule","tags":["Reintegration","LTA"],"text":"Ab haut 3x am Lycée.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_088","studentId":"stud_ben","date":"2026-06-01","author":"","category":"Stage & Berufsorientierung","tags":["Liewenshaff","Stage","Familie","RDV"],"text":"Visite vum Liewenshaff ass ofgesot haut well den Joey krank ass, neie Rdv ass nächste Meinden um 13h30, de Foyer relanceiert bei den Elteren. Mobibus ufroen fir de Stage beim Hein (Datum?).","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_089","studentId":"stud_mia","date":"2026-06-01","author":"","category":"Anwesenheit & Mobibus","tags":["Cloture"],"text":"Cloture ass gemach, se kommen des Woch dem Mia seng Saachen sichen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_090","studentId":"stud_lilly","date":"2026-06-01","author":"","category":"Risiko & Sorge","tags":["Orthophonistin","CNI","Medikation","Familie","Signalement","RDV"],"text":"Lilly kennt muer den 02.06 net an d'Schoul wéinst 2 Dokter RDV. Austausch mat der Dr Bertholdt den 4.06. Feedback Orthoponistin: Si fënnt dem Lilly säin Fall alarmant an konnt net schlofen well deen Fall hir souvill Suerge gemach huet. Ze gesinn dass en 14 jähregt Meedchen kaum liesen an schreiwen kann, wier ongewinnt. Si fënnt dass d'Elteren vill Excusen riets a lénks siche ginn, mee dat wier keng Begrënnung fir dem Lilly seng Lacunen. Si hat dunn een Suivi firgeschloen vun 2x30 Minutten wöchentlech. D'Elteren haten dat awer ofgelehnt wéinst finanziellen Grënn. Ech hat virun der Vakanz den Elteren ugeruff an hinen ze verstoen ginn dass dat net geet an dass mir grad 0 Konditiounen vun der CNI géingen erfëllen. Meng Obligatioun wier et dofir gleich ze signaléieren. D'RDV bei der Orthophonistin sinn elo finalement fest. Den Antidepresseur ass net dem Lilly säint, Si hunn naischt esou am Haus, d'Lilly hätt sech gemellt gehat well do 10mg stoung an hatt gemengt huet et wier säin Medikinet.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_091","studentId":"stud_jayson","date":"2026-06-01","author":"","category":"Stage & Berufsorientierung","tags":["Ofbroch","Ausbildung","ATVA"],"text":"Schouljoer net gepackt, denkt iwwer Ofbroch no; eventuell eng nei Ausbildung; Telefonéieren haut nach eemol; aktuell keng Ënnerstëtzung méi vun der ATVA.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_092","studentId":"stud_levi","date":"2026-06-01","author":"","category":"Stage & Berufsorientierung","tags":["Contrat d'apprentissage","Kontrolldokter"],"text":"Krut säi contrat d'apprentissage gekënnegt, hien geht des Woch nach eemol bei de Kontrolldokter.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_093","studentId":"stud_alexp","date":"2026-06-07","author":"","category":"Therapie & Suivi","tags":["HRS","Dr Meinhardt","ALR","SCAS","Mobibus","Autonomie","Familie","Reintegration"],"text":"Kennt des Woch all Dag ausser haut. Rapport vum RDV de Freiden: D'Alex bléift bis de Freide vollstationär an duerno 2 Wochen Hôpital du jour, Ufank Juli wäert d'Ofschlossgespréich stattfannen. Den Dr. Meinhardt ass ganz zefridden mam Alex senger Entwécklung, hat kann besser verbaliséieren wat hat brauch. Et ass ganz kloer gesot ginn dass d'Alex bei eis an der Annexe bleift fir d'nächst Schouljoer an am Laf vum Joer kéint een un eng Reintegratioun nodenken. Nom Ofschlossgespréich wäert d'Alex weiderhin vu senger Therapeutin suivéiert ginn, den Här Schmalen vum ONE huet annoncéiert dass hien sech zeréckzitt (net optimal). D'Alex soll weiderhin seng Medikatioun (Stëmmungsophëllend) huelen bis sech alles stabiliséiert huet. Den Dr. Meinhardt bleift Pedopsychiater. D'Elteren wëllen dass d'Alex d'Joer redoubléiert an dës Woch ass RDV am Réidener Lycée. D'Elteren goufen kloer dorop higewisen dass si d'Alex mussen ënnerstëtzen an senger Autonomie an net bei all Schwieregkeet déi schützend Hand ausstrecken. Wat den Transport ugeet hunn d'Elteren mam Averständnis vun der Psychologin gehandelt an d'Alex bruecht. Leider gëtt et keen Opfangnetz am Fall wou d'Alex am September net méi kënnt. Vir d'Elteren kënnt en Internat net a Fro, dat heescht an dem Fall wäert d'Affaire iwwert SCAS/Geriicht verlafen. Ech telefonéieren dës Woch mam Här Tissier.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_094","studentId":"stud_colin","date":"2026-06-07","author":"","category":"Externe Stellen & Netzwerk","tags":["LLIS","Ausfluch"],"text":"Vum 08.06-10.06 mam LLIS um Ausfluch.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null}},{"id":"seed_095","studentId":"stud_jason","date":"2026-06-07","author":"","category":"Externe Stellen & Netzwerk","tags":["CTSA","phase d'observation"],"text":"CTS ase geet 3x an der Woch an d’Dusch- hun him geroden bal all Dag ze goen an d’Kleeder méi oft ze wiesselen.\nSchoulesch fillt den Chase sech néirens iwwerfuerdert. D’Mathé huet hien am Ufank e bësse méi schwéier fonnt, mä elo ass et an der Rei.\nOch d’Mamm huet keng Ahnung dass d’Mathésprüfung total an dBox gaang ass. Si huet déi franséisch Termen an der Mathé mam Chase fir d’Prüfung geléiert.\nEch hunn no den Zensuren gefrot an no der Lëscht vun de Bicher.\nMail un de Regent gemaach fir en Teamgespréich unzefroen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-06T13:00:00.000Z","updatedAt":"2025-01-06T13:00:00.000Z"},{"id":"e_reu_20250113_jason","studentId":"stud_jason","date":"2025-01-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Lëscht Kéier beim Julia gewierscht. Ab dem 20.01 am 2ten Block an der Mathe. Haat eng gutt Woch, kann sech relativ schnell erëm huelen. Kicker ass méi problematesch, do éischter handelen an den Ball fort huelen wann hien sech opreegt -> Huet Auswierkungen op den Cours. Mamm war den Freiden am Spidol.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-13T13:00:00.000Z","updatedAt":"2025-01-13T13:00:00.000Z"},{"id":"e_reu_20250113_ben","studentId":"stud_ben","date":"2025-01-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hëllt den Adapto Moies, wann hien en net kritt ass seng Fëmmpaus vir deen Dag gestrach. Ab dëser Woch ganz bei eis beschoult, Dënschdes beim Carole an der Konscht an Donneschdes vun 14h-16h beim Sarah. Huet säin néit Ziil eng propper Sprooch ze benotzen, hien drop opmierksam maachen an jeglech Form vun rassisteschen Ausdréck direkt ënnerbannen. Keen Retour vum Foyer wéinst Pédopsychiater.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-13T13:00:00.000Z","updatedAt":"2025-01-13T13:00:00.000Z"},{"id":"e_reu_20250113_alexp","studentId":"stud_alexp","date":"2025-01-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gouf méi Drock Doheem ausgeübt, kann ganz schwéier iwwert säin Schied sprangen wann et drëms geet op d’Zänn ze bäissen. Och ganz rigide wann hat sech eppes an den Kapp gesaat huet, dëst ze modifizéieren. Wann hat Moies vir sech décidéiert huet Doheem ze bleiwen oder um 12h Heem ze goen, dann ass do näischt drun ze fréckelen. Wéineg op säin Kappwéi/Schwindel agoen, dierf net ze vill Plaatz anhuelen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-13T13:00:00.000Z","updatedAt":"2025-01-13T13:00:00.000Z"},{"id":"e_reu_20250113_chase","studentId":"stud_chase","date":"2025-01-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"D’Mamm woust nach näischt vun der Note an der Mathé; war e bëssen erschloen winnst der Konfrontatioun mat der Realitéit. Wann nach en 2.Fach géing dobäikommen wou den Chase vill Retard opzeschaffen huet; wahrscheinlech e Genéckbroch; e gudde General ass fir si kee Beebroch awer den Chase soll d’Chance kréien ze probéieren. Fir si ganz ok wann hien nächst Joer nach 1x d’6e (S2) mécht. Hunn hier och, op hir Ufro, d’Mailen vum Engleschproff (L2) weidergeschéckt.\nHu gesinn dass d’Mail vum Régent un den Engleschproff net richteg formuléiert war; muss dat nofroen/richtegstellen. Gespréich mat der Mme Grober froen ech un!\nDen Chase selwer war erstaunt wéi gutt et gaang ass fir no der Vakanz erëm ze starten; huet e gutt Gefill. D'Mamm woust och näischt dovunn dass de LeLa soll no Suen gefrot hunn, mä dat heescht awer näischt. Den Chase zielt sou Saachen net onbedéngt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-13T13:00:00.000Z","updatedAt":"2025-01-13T13:00:00.000Z"},{"id":"e_reu_20250120_jason","studentId":"stud_jason","date":"2025-01-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Mamm haat sech beim STEP nach net ugemëllt, dat misst awer de Weekend geschitt sinn. Verhaalen Doheem huet sech extrem verbessert, d’Mamm seet hien wier wéi ausgewiesselt, wier vill manner impulsiv an och unhuelen wann een eppes seet. Kann mettlerweil bal all d’Flaggen vun Europa, duerch en Lidd, wat ech generéiert hunn, wann dir e wichtegt Thema kënnt dir mir gären Bescheed ginn, dann kann ech nach een Lidd genéréieren.\nNach keng Infos vun der Fondation Autisme an PEI gëtt festgeluecht wann d’Mamm säin Schaffplang huet.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-20T13:00:00.000Z","updatedAt":"2025-01-20T13:00:00.000Z"},{"id":"e_reu_20250120_ben","studentId":"stud_ben","date":"2025-01-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Ass psychorigide. Fillt sech onwuel an senger Haut momentan, seet hien wier extrem schnell gereizt an impulsiv an hien géing net verstoen wisou. Hien seet dass hien schwéier nee kann soen wann den Léeno hien well matzéien, huet awer seng Momenter wou hien d’Situatioun richteg aschätzt an sech fréizäiteg eraus zitt. Huet dem Foyer vum Léeno erzielt, wourob ech een Mail krut vir mech op dës Situatioun opmierksam ze maachen, hien mëscht sech Gedanken iwwert den Léeno. Probéiert am Moment zesummen mam Léeno ganz vill d’Grenzen auszetesten an réagéiert mat Vermeidungsverhaalen wann hien konfrontéiert gëtt, kann awer méi spéit reflektéieren. Hien hätt esou gär een gudden Kolleg, Situatioun Naturmusée. Hien wëll Verännerung, ass awer net Bereed eppes ze änneren. Wichteg ass et ganz kloer ze sinn, him d’Konsequenzen ze erläuteren an eventuell och méi reaktiv sinn wann et am Cours net geet. Ech mëllen Deeg wéi Haut och beim Foyer zeréck. Ben bleift an der Konscht an mussen no Fuesvakanz kucken ob hien an den Metallatelier geht oder bleift. Geschicht mam Duarte, seet den Léeno géing klauen an och Suen schëllegen. Maachen nach een Rappel wéinst Pédopsychiater. Mireille rifft dem Martina Mick un.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-20T13:00:00.000Z","updatedAt":"2025-01-20T13:00:00.000Z"},{"id":"e_reu_20250120_alexp","studentId":"stud_alexp","date":"2025-01-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet am EZG vill iwwert d’Primärschoul geschwat, den Mobbing etc. Haaptgrënn waren seng schweeseg Hänn an d’Mathe. War wierklech quasi net an der Schoul an huet selwer gesoot dass hat gemierkt huet wéi gutt et Doheem wier wann hat net an der Schoul ass. (fréier) Ass nemmen um Handy wann hat krank ass, ech beschwätzen mat den Elteren dass hat net non stop Accès dorop huet. Waren de Freiden mam Mara an Laura an der Stadt. PEI den 11.02 um 15h30. Berufswonsch geäussert vir Mécanicienne (ass awer net realistesch weinst der Mathe)\nRéevaluation Dyscalculie an 2 Meint, Dispositif?","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-20T13:00:00.000Z","updatedAt":"2025-01-20T13:00:00.000Z"},{"id":"e_reu_20250120_chase","studentId":"stud_chase","date":"2025-01-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Bezuchzäit ass net sou gutt verlaf; do virdrun am 1:1 (wollt Mathé mat him kucken) huet hie komplett zougemaach; hienhuet op absolut näischt méi geäntwert a war am Freeze; konnt/wollt och mol net ukräizen ob hie genervt, rosen, oder traureg...wär. Wollt eigentlech Stärkensuche maachen an en neit Zil formuléieren, mä dorunner war net ze denken. Hunn am Endeffekt e Spill gespillt ouni ee Wuert ze schwätzen.\nDoheem huet hien erzielt hien hätt mat mir an der Mathé iwwer d’Prüfung gekuckt; fir d’Engleschprüfung huet hien doheem 3 Deeg geléiert, ass opgefrot ginn; läschte Méindeg war et schwöier fir den Chase fir ze kommen, mä d’Mamm seet dat wär kee Verglach méi mat deem wéi et soss war; si gesäit een enorme Fortschrëtt; Elteren hunn anscheinend den Drock doheem erausgeholl; RV mat der EIMAB ass ugefrot.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-20T13:00:00.000Z","updatedAt":"2025-01-20T13:00:00.000Z"},{"id":"e_reu_20250127_ben","studentId":"stud_ben","date":"2025-01-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Infos MM: de Freide bei der Mamm. De Sonnden kruut hien vun der Mamm gesoot, dass een 38 jähregen Mann (deen emmer un d’Hotel Diir tockt) der Mamm erzielt huet, dass de Ben hien geschloen huet. “Dëst géif net stemmen, lo well ech hien schloen” (mescht sech Gedanken..)\nMartina Mick wënscht sech vum Bezuchspädagog méi Kontakt mat mir, Blutanalyse + RDV mam Dr Karst hëllt hat an den Grapp.\nLycée schreift normal d’Notten vum Ben an den Fichier élève.\nPEI nach net définéiert, waarden op Retour vum Foyer.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-27T13:00:00.000Z","updatedAt":"2025-01-27T13:00:00.000Z"},{"id":"e_reu_20250127_alexp","studentId":"stud_alexp","date":"2025-01-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"PEI ass den 11.02 um 15h30\nInfo MM: Gudde Weekend gehaat: De Samsten vun 10 bis 17h mam Laura ennerwee: Kockelscheier Schlittschong a Cloche d’Or\nIddi vir schoulescht Ziil? Privatgesprächer mam Laura reduzéieren am Cours.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-27T13:00:00.000Z","updatedAt":"2025-01-27T13:00:00.000Z"},{"id":"e_reu_20250127_jason","studentId":"stud_jason","date":"2025-01-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet par rapport zum Chase dat N Wuert benotzt an och zum J-P gesot hien kéint hien eemol. Ass net an den Atelier gaangen, hunn mat der Mamm dass mir géingen évaluéieren ob et nach dawert huet hien dohinn ze schécken. Konnt mat Reflexioun iwwert d’Situatioun schwätzen, huet sech rausgestallt, dass hien net wees wat dat N Wuert bedéit, war schockéiert wou hien et rausfonnt huet.\nNeit Zil: Op seng Sprooch oppassen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-27T13:00:00.000Z","updatedAt":"2025-01-27T13:00:00.000Z"},{"id":"e_reu_20250127_chase","studentId":"stud_chase","date":"2025-01-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"PEI ass den 13.02 um 13h\n22.01.25: Teams Mme Grober (Attachée EIMAB), M.Krieps (Régent), Mireille a Sandy; état des lieux: Wiessel L2-L3 war ugestrieft wéinst Lacunen am FRANC; mä fir en Engleschtest am Mee ze bestoen gëtt schwiereg; egalwéi ass den Niveau op enger S3 ze héich; nächst Joer Reintegratioun op eng S2 wäert wuel kaum vum Conseil de Classe approuvéiert ginn; proposéieren eng CIP-i Klass (oppen Orientatioun méiglech - zB als Virbereedung op den LTA); méi strukturéiert an disziplinéiert wéi eng 5G\n23.01.25: erëm Vermeidung an der Bezuchzäit, Bezuch desen Donneschdeg just wann de Wonsch dozou geäussert gëtt\n24.01.25: Gespréich mat der Mamm dass den Chase nach e Suivi brauch; Kontakteiert hir Psychotherapeutin; och iwwer Autismus geschwat, ass getest ginn, Opfällegkeeten waren do....; beschwätzen dat ob d’accord mat engem Screening Test; Mamm ass genervt, dass trotz 2 x Klinikobenthalt nach ëmmer keng definitiv Diagnos virläit\nAm Cycle 3 an am Cycle 4 stoung e Rallongement am Raum, mä Enseignants dogéint; ass ëmmer weidergerutscht.\nSi wëllen nächst Joer nach 1x eng 6eG; wann net an der EIMAB, dann eben soss entzwouch; Note am Engleschen (huet net esou vill geléiert) bestärkt si dass den Chase eng G ka packen, mat villem Schaffen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-01-27T13:00:00.000Z","updatedAt":"2025-01-27T13:00:00.000Z"},{"id":"e_reu_20250203_ben","studentId":"stud_ben","date":"2025-02-03","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet den 10.02 RDV beim Dr Karst fir seng Medikatioun ze adaptéieren.\nFillt sech am Foyer/Doheem net sou richteg wuel am Moment, huet d’Gefill dass d’Konsequenzen ze hefteg sinn an huet den Androck wéi wann Papp/Mamm/Foyer him emmer eppes aaneres soen. Huet den Freiden am Foyer betount dass hien immens Stress Doheem hätt, ech beschwätzen dat dës Woch mat him. Angscht dass den Foyer alles kontrolléieren kann bei him um Handy. War e Freiden net prett am Kapp fir Prüfung a wollt net datt seng Punkten dorënner leiden.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-03T13:00:00.000Z","updatedAt":"2025-02-03T13:00:00.000Z"},{"id":"e_reu_20250203_alexp","studentId":"stud_alexp","date":"2025-02-03","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Freides alleguer zësummen geholl, Meedecher sech beschwéiert iwwert Aussoen vun de Jongen, hunn hinnen et awer net konnten verbal matdëelen. D’Meedecher hunn an der Situatioun guer näischt gesot, mee se sinn amplaatz bei den Joey komm fir dat hien daat reegelt.\nUfanks März Réevaluatioun Dyscalculie durch ESEB vum EF vu Miersch.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-03T13:00:00.000Z","updatedAt":"2025-02-03T13:00:00.000Z"},{"id":"e_reu_20250203_jason","studentId":"stud_jason","date":"2025-02-03","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"PEI Méindes den 24.02 um 11h. Net op säi Knéi agoen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-03T13:00:00.000Z","updatedAt":"2025-02-03T13:00:00.000Z"},{"id":"e_reu_20250203_chase","studentId":"stud_chase","date":"2025-02-03","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"war d’ganz Woch net do: Gastritis; ka stressbedingt sinn; seet hien hätt awer grad kee Stress. Hie wëll och all Dag kommen, fënnt d’Schoul zwar nach ëmmer net “wow”, ass awer gär an der AJ. Den Chase huet bei sengem Bruder materliewt, wéi et ass, wann deen anere komplett zou mécht. Hie war e bësse schockéiert, et eemol vun deer anerer Säit ze gesinn. D’Eltere sinn averstan mam Screeningtest; hunn dem Chase erkläert, dass et net drëms geet him e Stempel opzedrécken, mä dass eng Diagnos ka vun Notze sinn. Den Chase ass och genervt, dass si nach ëmmer keng definitiv Diagnos hunn. D’Mamm huet beim LTA e bësse gekuckt wéinst dem Fierschterberuff. Si kennen e Fierschter, do kann hien ee Stage maachen. Hat scho fir d’Mathesprüfung geléiert, huet dei e haut geschriwwen.\nPEI den 12.2: Ressourcen? Fortschrëtter?","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-03T13:00:00.000Z","updatedAt":"2025-02-03T13:00:00.000Z"},{"id":"e_reu_20250210_chase","studentId":"stud_chase","date":"2025-02-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"PEI","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-10T13:00:00.000Z","updatedAt":"2025-02-10T13:00:00.000Z"},{"id":"e_reu_20250210_ben","studentId":"stud_ben","date":"2025-02-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"/","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-10T13:00:00.000Z","updatedAt":"2025-02-10T13:00:00.000Z"},{"id":"e_reu_20250210_alexp","studentId":"stud_alexp","date":"2025-02-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"/","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-10T13:00:00.000Z","updatedAt":"2025-02-10T13:00:00.000Z"},{"id":"e_reu_20250210_jason","studentId":"stud_jason","date":"2025-02-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"/","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-10T13:00:00.000Z","updatedAt":"2025-02-10T13:00:00.000Z"},{"id":"e_reu_20250224_chase","studentId":"stud_chase","date":"2025-02-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"PEI war schwéier fir hien; gutt Gespréich mat den Elteren; gi mat op de Wee vun enger 6G; de Choix vum Lycée gëtt an deenen nächste Woche gemaach; ass am September nach bei eis; de Moien am komplette Refus fir an d’AJ ze kommen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-24T13:00:00.000Z","updatedAt":"2025-02-24T13:00:00.000Z"},{"id":"e_reu_20250224_ben","studentId":"stud_ben","date":"2025-02-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Kruut seng Medikatioun adaptéiert an eroofgesat. 0,25mg Risperdal Moies an Owes. Haut net de Wee an d’Annexe fonnt, keng Motivatioun. Romuland Oberle säin lëschten Dag Haut. (een vun den Bezuchspädagogen), PEI ass e Mettwoch\nGëtt schweier fir elo unzekommen ouni de Léeno...","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-24T13:00:00.000Z","updatedAt":"2025-02-24T13:00:00.000Z"},{"id":"e_reu_20250224_alexp","studentId":"stud_alexp","date":"2025-02-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"PEI gutt verlaaf, Alex huet gesot dass de Lycée verbrannten Äerd wier. Elteren immens dankbar an gesinn e groussen Fortschrëtt beim Alex. RDV Diagnostik Dyscalculie gëtt mat den Elteren an ESEB Miersch definéiert. Krank, Mamm mengt et kéint Influenza B sinn. Emmer no der Vakanz krank...","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-24T13:00:00.000Z","updatedAt":"2025-02-24T13:00:00.000Z"},{"id":"e_reu_20250224_jason","studentId":"stud_jason","date":"2025-02-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"5. März 12h evtl. Joey mat bei den Pédopsychiater Dr Bern
