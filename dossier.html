    return formState.tags.map(tagChipHtml).join('') +
      '<input type="text" id="tag-input" placeholder="Tag eingeben + Enter…" list="tag-suggestions" autocomplete="off">';
  }

  var html =
    '<div class="page-head">' +
      '<div><h2>' + (isEdit ? 'Eintrag bearbeiten' : 'Neuen Eintrag erfassen') + '</h2>' +
      (existing ? '<p class="muted">Erstellt am ' + escapeHtml(formatDateTime(existing.createdAt)) + (existing.updatedAt && existing.updatedAt !== existing.createdAt ? ' &middot; zuletzt geändert ' + escapeHtml(formatDateTime(existing.updatedAt)) : '') + '</p>' : '') +
      '</div>' +
    '</div>' +
    '<form id="entry-form" class="card form-card">' +
      '<div class="row">' +
        '<div class="field">' +
          '<label for="f-student">Schüler</label>' +
          '<select id="f-student" required>' + optionsHtml(students.map(function (s) { return { value: s.id, label: s.name }; }), defaultStudentId) + '</select>' +
        '</div>' +
        '<div class="field">' +
          '<label for="f-date">Datum (Wochendatum des Rapports)</label>' +
          '<input type="date" id="f-date" required value="' + escapeAttr(defaultDate) + '">' +
        '</div>' +
        '<div class="field">' +
          '<label for="f-author">Autor (Kürzel)</label>' +
          '<input type="text" id="f-author" placeholder="z. B. JP" value="' + escapeAttr(existing ? existing.author : '') + '">' +
        '</div>' +
      '</div>' +
      '<div class="row">' +
        '<div class="field">' +
          '<label for="f-category">Primärkategorie</label>' +
          '<select id="f-category" required>' + optionsHtml(CATEGORIES, defaultCategory) + '</select>' +
        '</div>' +
      '</div>' +
      '<div class="field">' +
        '<label for="tag-input">Themen-Tags <span class="hint">(0..n, Enter oder Komma zum Hinzufügen — neue Tags landen automatisch im Vorschlags-Vokabular)</span></label>' +
        '<div class="tag-input-wrap" id="tag-wrap">' + tagsWrapHtml() + '</div>' +
        '<datalist id="tag-suggestions">' + vocabulary.map(function (t) { return '<option value="' + escapeAttr(t) + '">'; }).join('') + '</datalist>' +
      '</div>' +
      '<div class="field">' +
        '<label for="f-text">Eintragstext (Luxemburgisch — Originaltext, nicht übersetzen)</label>' +
        '<textarea id="f-text" rows="8" required>' + escapeHtml(existing ? existing.text : '') + '</textarea>' +
        '<div id="detected-themes" class="detected-themes" aria-live="polite"></div>' +
      '</div>' +
      '<div class="field">' +
        '<label>Verlaufs-Slider <span class="hint">(optional, 1–10 — bleiben „nicht bewertet“, wenn nicht angehakt)</span></label>' +
        '<div class="row">' + SLIDER_DEFS.map(function (d) { return '<div style="flex:1; min-width:230px;">' + sliderFieldHtml(d) + '</div>'; }).join('') + '</div>' +
      '</div>' +
      '<hr class="divider">' +
      '<div class="page-head" style="margin:0;">' +
        '<button type="button" class="btn" data-route="' + escapeAttr(returnTo || (isEdit ? '#/student/' + existing.studentId : '#/dashboard')) + '">Abbrechen</button>' +
        '<button type="submit" class="btn btn-primary">' + (isEdit ? 'Änderungen speichern' : 'Eintrag speichern') + '</button>' +
      '</div>' +
    '</form>';

  return {
    navKey: '',
    html: html,
    afterRender: function (root) {
      var form = qs('#entry-form', root);
      var tagWrap = qs('#tag-wrap', root);

      function rerenderTags() {
        tagWrap.innerHTML = tagsWrapHtml();
        wireTagInput();
      }

      function addTag(raw) {
        var value = raw.trim().replace(/,$/, '').trim();
        if (!value) return;
        if (formState.tags.indexOf(value) !== -1) { rerenderTags(); return; }
        formState.tags.push(value);
        rerenderTags();
        var input = qs('#tag-input', tagWrap);
        if (input) input.focus();
      }

      function wireTagInput() {
        var input = qs('#tag-input', tagWrap);
        if (input) {
          input.addEventListener('keydown', function (ev) {
            if (ev.key === 'Enter' || ev.key === ',') {
              ev.preventDefault();
              addTag(input.value);
              input.value = '';
            } else if (ev.key === 'Backspace' && !input.value && formState.tags.length) {
              formState.tags.pop();
              rerenderTags();
            }
          });
          input.addEventListener('blur', function () {
            if (input.value.trim()) { addTag(input.value); input.value = ''; }
          });
        }
        qsa('[data-action="remove-tag"]', tagWrap).forEach(function (btn) {
          btn.addEventListener('click', function () {
            var idx = Number(btn.getAttribute('data-idx'));
            formState.tags.splice(idx, 1);
            rerenderTags();
          });
        });
      }
      wireTagInput();

      /* Live-Erkennung: Themen aus dem Text vorschlagen, per Klick als Tag übernehmen */
      var textArea = qs('#f-text', form);
      var detectedWrap = qs('#detected-themes', form);
      var detectTimer = null;

      function renderDetectedThemes() {
        var found = analyzeText(textArea.value);
        var suggestions = found.filter(function (f) { return formState.tags.indexOf(f.key) === -1; });
        if (!suggestions.length) {
          detectedWrap.innerHTML = found.length
            ? '<span class="hint">Alle erkannten Themen sind bereits als Tag gesetzt.</span>'
            : '';
          return;
        }
        detectedWrap.innerHTML =
          '<span class="hint">Im Text erkannte Themen (klicken = als Tag übernehmen):</span> ' +
          suggestions.map(function (f) {
            return '<button type="button" class="chip theme-chip sev-' + f.severity + '" data-add-theme="' + escapeAttr(f.key) + '" ' +
              'title="Treffer: ' + escapeAttr(f.terms.join(', ')) + '">+ ' + escapeHtml(f.key) + '</button>';
          }).join(' ');
        qsa('[data-add-theme]', detectedWrap).forEach(function (btn) {
          btn.addEventListener('click', function () {
            addTag(btn.getAttribute('data-add-theme'));
            renderDetectedThemes();
          });
        });
      }

      textArea.addEventListener('input', function () {
        clearTimeout(detectTimer);
        detectTimer = setTimeout(renderDetectedThemes, 350);
      });
      renderDetectedThemes();

      qsa('.slider-field', form).forEach(function (field) {
        var toggle = qs('[data-role="rated-toggle"]', field);
        var row = qs('.slider-row', field);
        var range = qs('[data-role="slider-input"]', field);
        var valueLabel = qs('[data-role="slider-value"]', field);
        toggle.addEventListener('change', function () {
          row.hidden = !toggle.checked;
        });
        range.addEventListener('input', function () {
          valueLabel.textContent = range.value;
        });
      });

      form.addEventListener('submit', function (ev) {
        ev.preventDefault();
        var studentId = qs('#f-student', form).value;
        var date = qs('#f-date', form).value;
        var text = qs('#f-text', form).value.trim();
        if (!studentId || !date || !text) {
          showToast('Bitte Schüler, Datum und Text ausfüllen.', { error: true });
          return;
        }
        var sliders = {};
        SLIDER_DEFS.forEach(function (def) {
          var field = qs('.slider-field[data-slider="' + def.key + '"]', form);
          var toggle = qs('[data-role="rated-toggle"]', field);
          var range = qs('[data-role="slider-input"]', field);
          sliders[def.key] = toggle.checked ? Number(range.value) : null;
        });

        var payload = {
          id: existing ? existing.id : null,
          studentId: studentId,
          date: date,
          author: qs('#f-author', form).value,
          category: qs('#f-category', form).value,
          tags: formState.tags,
          text: text,
          sliders: sliders,
          createdAt: existing ? existing.createdAt : null
        };

        Repo.saveEntry(payload).then(function (saved) {
          showToast(isEdit ? 'Eintrag aktualisiert.' : 'Eintrag gespeichert.');
          navigate(returnTo || ('#/student/' + saved.studentId), true);
        }).catch(function (err) {
          showToast('Fehler beim Speichern: ' + err.message, { error: true });
        });
      });
    }
  };
}

function todayIso() {
  var d = new Date();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + m + '-' + day;
}


'use strict';

/* ============================================================
   Ansicht D — Suche
   Volltextsuche über Eintragstexte und Tags, kombinierbar mit
   Filtern (Schüler, Kategorie, Tag, Zeitraum).
   ============================================================ */

function viewSearch(params, query) {
  var students = Repo.listStudents();
  var tagVocabulary = Repo.tagVocabulary();

  var state = {
    q: query.q || '',
    studentId: query.student || '',
    category: query.category || '',
    tag: query.tag || '',
    from: query.from || '',
    to: query.to || ''
  };

  function matches(entry) {
    if (state.studentId && entry.studentId !== state.studentId) return false;
    if (state.category && entry.category !== state.category) return false;
    if (state.tag && (entry.tags || []).indexOf(state.tag) === -1) return false;
    if (state.from && entry.date < state.from) return false;
    if (state.to && entry.date > state.to) return false;
    if (state.q) {
      var needle = state.q.toLowerCase();
      var inText = entry.text.toLowerCase().indexOf(needle) !== -1;
      var inTags = (entry.tags || []).some(function (t) { return t.toLowerCase().indexOf(needle) !== -1; });
      if (!inText && !inTags) return false;
    }
    return true;
  }

  function results() {
    return Repo.listEntries().filter(matches).sort(function (a, b) { return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
  }

  function resultRowHtml(e) {
    var student = Repo.getStudent(e.studentId);
    var snippet = snippetAround(e.text, state.q);
    var matchedTags = (e.tags || []).filter(function (t) { return state.q && t.toLowerCase().indexOf(state.q.toLowerCase()) !== -1; });
    return '<article class="card search-result" data-route="#/student/' + e.studentId + '/entry/' + e.id + '">' +
      '<div class="meta">' +
        '<strong>' + escapeHtml(student ? student.name : e.studentId) + '</strong>' +
        '<span>' + escapeHtml(formatDate(e.date)) + '</span>' +
        '<span class="cat-badge" style="background:' + categoryColor(e.category) + '">' + escapeHtml(e.category) + '</span>' +
        (e.tags && e.tags.length ? '<span class="chip-row">' + e.tags.map(function (t) { return '<span class="chip">' + highlightMatch(t, state.q) + '</span>'; }).join('') + '</span>' : '') +
      '</div>' +
      '<div class="snippet">' + highlightMatch(snippet, state.q) + '</div>' +
      '</article>';
  }

  function resultsHtml() {
    var list = results();
    var summary = '<p class="muted">' + pluralize(list.length, 'Treffer', 'Treffer') + (state.q ? ' für „' + escapeHtml(state.q) + '"' : '') + '</p>';
    if (!list.length) {
      return summary + '<div class="empty-state">Keine Einträge gefunden. Filter anpassen oder Suchbegriff ändern.</div>';
    }
    return summary + '<div class="search-results">' + list.map(resultRowHtml).join('') + '</div>';
  }

  var html =
    '<div class="page-head"><div><h2>Suche</h2><p class="muted">Volltextsuche über alle Eintragstexte und Tags, kombinierbar mit Filtern.</p></div></div>' +
    '<div class="card export-config">' +
      '<div class="field"><label for="s-q">Suchtext</label><input type="search" id="s-q" placeholder="z. B. Vape, Suizidalität, CTSA…" value="' + escapeAttr(state.q) + '"></div>' +
      '<div class="row">' +
        '<div class="field"><label for="s-student">Schüler</label><select id="s-student"><option value="">Alle Schüler</option>' + optionsHtml(students.map(function (s) { return { value: s.id, label: s.name }; }), state.studentId) + '</select></div>' +
        '<div class="field"><label for="s-category">Kategorie</label><select id="s-category"><option value="">Alle Kategorien</option>' + optionsHtml(CATEGORIES, state.category) + '</select></div>' +
        '<div class="field"><label for="s-tag">Tag</label><select id="s-tag"><option value="">Alle Tags</option>' + optionsHtml(tagVocabulary, state.tag) + '</select></div>' +
      '</div>' +
      '<div class="row">' +
        '<div class="field"><label for="s-from">Zeitraum von</label><input type="date" id="s-from" value="' + escapeAttr(state.from) + '"></div>' +
        '<div class="field"><label for="s-to">Zeitraum bis</label><input type="date" id="s-to" value="' + escapeAttr(state.to) + '"></div>' +
        '<div class="field"><label>&nbsp;</label><button type="button" class="btn" id="s-reset">Filter zurücksetzen</button></div>' +
      '</div>' +
    '</div>' +
    '<div id="search-results-wrap">' + resultsHtml() + '</div>';

  return {
    navKey: 'search',
    html: html,
    afterRender: function (root) {
      var wrap = qs('#search-results-wrap', root);
      function rerender() { wrap.innerHTML = resultsHtml(); }

      qs('#s-q', root).addEventListener('input', function (e) { state.q = e.target.value; rerender(); });
      qs('#s-student', root).addEventListener('change', function (e) { state.studentId = e.target.value; rerender(); });
      qs('#s-category', root).addEventListener('change', function (e) { state.category = e.target.value; rerender(); });
      qs('#s-tag', root).addEventListener('change', function (e) { state.tag = e.target.value; rerender(); });
      qs('#s-from', root).addEventListener('change', function (e) { state.from = e.target.value; rerender(); });
      qs('#s-to', root).addEventListener('change', function (e) { state.to = e.target.value; rerender(); });
      qs('#s-reset', root).addEventListener('click', function () {
        state.q = ''; state.studentId = ''; state.category = ''; state.tag = ''; state.from = ''; state.to = '';
        qs('#s-q', root).value = '';
        qs('#s-student', root).value = '';
        qs('#s-category', root).value = '';
        qs('#s-tag', root).value = '';
        qs('#s-from', root).value = '';
        qs('#s-to', root).value = '';
        rerender();
      });
      if (state.q) qs('#s-q', root).focus();
    }
  };
}


'use strict';

/* ============================================================
   Ansicht E — PDF-Export pro Thema
   Saubere Druckansicht via window.print() ("Als PDF speichern").
   ============================================================ */

function viewPdfExport(params, query) {
  var students = Repo.listStudents();
  var preselectStudent = query.student || (students[0] && students[0].id) || '';

  var state = {
    studentId: preselectStudent,
    category: '',
    tags: {},
    from: '',
    to: '',
    preview: null // { entries, scopeLabel, periodLabel }
  };

  function tagsForStudent(studentId) {
    return uniqueSorted(flatten(Repo.entriesForStudent(studentId).map(function (e) { return e.tags || []; })));
  }

  function configHtml() {
    var availableTags = state.studentId ? tagsForStudent(state.studentId) : [];
    var tagChips = availableTags.map(function (t) {
      var active = !!state.tags[t];
      return '<button type="button" class="toggle-chip' + (active ? ' active' : '') + '" data-tag="' + escapeAttr(t) + '">' + escapeHtml(t) + '</button>';
    }).join('');
    return '<div class="card export-config no-print">' +
      '<div class="field"><label for="pe-student">Schüler</label>' +
        '<select id="pe-student">' + optionsHtml(students.map(function (s) { return { value: s.id, label: s.name }; }), state.studentId) + '</select>' +
      '</div>' +
      '<div class="field"><label for="pe-category">Kategorie <span class="hint">(optional)</span></label>' +
        '<select id="pe-category"><option value="">Alle Kategorien</option>' + optionsHtml(CATEGORIES, state.category) + '</select>' +
      '</div>' +
      '<div class="field"><label>Tags <span class="hint">(optional, Mehrfachauswahl — der Schüler hat ' + availableTags.length + ' verschiedene Tags)</span></label>' +
        '<div class="chip-row" id="pe-tags">' + (tagChips || '<span class="muted">Keine Tags vorhanden.</span>') + '</div>' +
      '</div>' +
      '<div class="row">' +
        '<div class="field"><label for="pe-from">Zeitraum von <span class="hint">(optional)</span></label><input type="date" id="pe-from" value="' + escapeAttr(state.from) + '"></div>' +
        '<div class="field"><label for="pe-to">Zeitraum bis <span class="hint">(optional)</span></label><input type="date" id="pe-to" value="' + escapeAttr(state.to) + '"></div>' +
      '</div>' +
      '<button type="button" class="btn btn-primary" id="pe-generate">Vorschau erzeugen</button>' +
    '</div>';
  }

  function buildScopeLabel(student) {
    var parts = [];
    if (state.category) parts.push('Kategorie „' + state.category + '"');
    var tagList = Object.keys(state.tags);
    if (tagList.length) parts.push('Tags: ' + tagList.join(', '));
    if (!parts.length) parts.push('alle Themen');
    return student.name + ' — ' + parts.join(' &middot; ');
  }

  function buildPeriodLabel() {
    if (state.from && state.to) return formatDate(state.from) + ' – ' + formatDate(state.to);
    if (state.from) return 'ab ' + formatDate(state.from);
    if (state.to) return 'bis ' + formatDate(state.to);
    return 'gesamter erfasster Zeitraum';
  }

  function generatePreview() {
    var student = Repo.getStudent(state.studentId);
    if (!student) { showToast('Bitte zuerst einen Schüler wählen.', { error: true }); return; }
    var tagList = Object.keys(state.tags);
    var entries = Repo.entriesForStudent(student.id).filter(function (e) {
      if (state.category && e.category !== state.category) return false;
      if (tagList.length && !(e.tags || []).some(function (t) { return tagList.indexOf(t) !== -1; })) return false;
      if (state.from && e.date < state.from) return false;
      if (state.to && e.date > state.to) return false;
      return true;
    }).sort(function (a, b) { return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); });

    state.preview = {
      student: student,
      entries: entries,
      scopeLabel: buildScopeLabel(student),
      periodLabel: buildPeriodLabel()
    };
    return state.preview;
  }

  function previewHtml() {
    if (!state.preview) return '';
    var p = state.preview;
    if (!p.entries.length) {
      return '<div class="empty-state no-print">Keine Einträge für diese Auswahl gefunden — bitte Filter anpassen.</div>';
    }
    var entriesHtml = p.entries.map(function (e) {
      return '<div class="print-entry">' +
        '<strong>' + escapeHtml(formatDate(e.date)) + '</strong> &middot; ' +
        '<span>' + escapeHtml(e.category) + '</span>' +
        (e.author ? ' &middot; <span>Autor: ' + escapeHtml(e.author) + '</span>' : '') +
        (e.tags && e.tags.length ? '<br><em>Tags: ' + escapeHtml(e.tags.join(', ')) + '</em>' : '') +
        '<p>' + escapeHtml(e.text) + '</p>' +
      '</div>';
    }).join('');
    return '<div class="card no-print" style="padding:16px; margin-bottom:14px;">' +
        '<p><strong>Vorschau bereit:</strong> ' + p.entries.length + ' Einträge — ' + escapeHtml(p.scopeLabel) + ', ' + escapeHtml(p.periodLabel) + '</p>' +
        '<button type="button" class="btn btn-primary" id="pe-print">Drucken / Als PDF speichern</button>' +
        '<p class="hint" style="margin-top:8px;">Öffnet den Druckdialog Ihres Browsers — wählen Sie dort „Als PDF speichern".</p>' +
      '</div>' +
      '<div class="print-sheet" id="print-sheet">' +
        '<h1>Dossier-Auszug — ' + escapeHtml(p.student.name) + '</h1>' +
        '<h2>' + escapeHtml(p.scopeLabel.split(' — ')[1] || 'alle Themen') + ' &middot; Zeitraum: ' + escapeHtml(p.periodLabel) + '</h2>' +
        '<p class="muted">Erstellt am ' + escapeHtml(formatDateTime(nowIso())) + ' &middot; ' + p.entries.length + ' Einträge, chronologisch</p>' +
        '<hr class="divider">' +
        entriesHtml +
      '</div>';
  }

  var html =
    '<div class="page-head no-print"><div><h2>PDF-Export pro Thema</h2><p class="muted">Wählen Sie Schüler, optional Kategorie/Tags und Zeitraum — dann „Vorschau erzeugen" und drucken / als PDF speichern.</p></div></div>' +
    '<div id="pe-config-wrap">' + configHtml() + '</div>' +
    '<div id="pe-preview-wrap">' + previewHtml() + '</div>';

  return {
    navKey: 'export',
    html: html,
    afterRender: function (root) {
      var configWrap = qs('#pe-config-wrap', root);
      var previewWrap = qs('#pe-preview-wrap', root);

      function rerenderConfig() { configWrap.innerHTML = configHtml(); wireConfig(); }
      function rerenderPreview() { previewWrap.innerHTML = previewHtml(); wirePreview(); }

      function wireConfig() {
        qs('#pe-student', configWrap).addEventListener('change', function (e) {
          state.studentId = e.target.value;
          state.tags = {};
          state.preview = null;
          rerenderConfig();
          rerenderPreview();
        });
        qs('#pe-category', configWrap).addEventListener('change', function (e) { state.category = e.target.value; });
        qs('#pe-from', configWrap).addEventListener('change', function (e) { state.from = e.target.value; });
        qs('#pe-to', configWrap).addEventListener('change', function (e) { state.to = e.target.value; });
        qsa('[data-tag]', configWrap).forEach(function (btn) {
          btn.addEventListener('click', function () {
            var tag = btn.getAttribute('data-tag');
            if (state.tags[tag]) delete state.tags[tag]; else state.tags[tag] = true;
            rerenderConfig();
          });
        });
        qs('#pe-generate', configWrap).addEventListener('click', function () {
          generatePreview();
          rerenderPreview();
          if (state.preview && state.preview.entries.length) {
            previewWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      }

      function wirePreview() {
        var printBtn = qs('#pe-print', previewWrap);
        if (printBtn) printBtn.addEventListener('click', function () { window.print(); });
      }

      wireConfig();
      wirePreview();
    }
  };
}


'use strict';

/* ============================================================
   Ansicht §4 — Anonymisierter KI-Export
   Drei Phasen: 1) Umfang & Aufgabe wählen  2) erkannte Namen
   prüfen/ergänzen  3) Vorschau & "In Zwischenablage kopieren".
   Nichts wird automatisch versendet.
   ============================================================ */

function viewAiExport(params, query) {
  var students = Repo.listStudents();

  var state = {
    phase: 'config', // 'config' | 'names' | 'preview'
    scopeType: 'student', // 'student' | 'theme' | 'selection'
    studentId: query.student || (students[0] && students[0].id) || '',
    category: '',
    tags: {},
    selectedEntries: {},
    selectedPrompts: {},
    freeText: '',
    anonymizeInstitutions: false,
    replacements: [],
    institutionMap: [],
    builtText: ''
  };

  function studentEntries() { return Repo.entriesForStudent(state.studentId); }

  function scopedEntries() {
    var all = studentEntries();
    if (state.scopeType === 'student') return all.slice().sort(byDateAsc);
    if (state.scopeType === 'theme') {
      var tagList = Object.keys(state.tags);
      return all.filter(function (e) {
        if (state.category && e.category !== state.category) return false;
        if (tagList.length && !(e.tags || []).some(function (t) { return tagList.indexOf(t) !== -1; })) return false;
        return true;
      }).sort(byDateAsc);
    }
    // selection
    return all.filter(function (e) { return !!state.selectedEntries[e.id]; }).sort(byDateAsc);
  }
  function byDateAsc(a, b) { return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); }

  function scopeLabel() {
    var student = Repo.getStudent(state.studentId);
    if (!student) return '(kein Schüler gewählt)';
    if (state.scopeType === 'student') return 'Gesamtes Dossier von ' + student.anonLabel + ' (' + studentEntries().length + ' Einträge)';
    if (state.scopeType === 'theme') {
      var bits = [];
      if (state.category) bits.push('Kategorie „' + state.category + '"');
      var tagList = Object.keys(state.tags);
      if (tagList.length) bits.push('Tags: ' + tagList.join(', '));
      if (!bits.length) bits.push('alle Themen');
      return 'Thema bei ' + student.anonLabel + ' — ' + bits.join(' · ') + ' (' + scopedEntries().length + ' Einträge)';
    }
    return 'Eigene Auswahl bei ' + student.anonLabel + ' (' + scopedEntries().length + ' Einträge)';
  }

  function taskText() {
    var lines = [];
    AI_PROMPT_OPTIONS.forEach(function (p, i) { if (state.selectedPrompts[i]) lines.push('- ' + p); });
    if (state.freeText.trim()) lines.push('- ' + state.freeText.trim());
    return lines.join('\n');
  }

  /* ---------------- Phase 1: Umfang & Aufgabe ---------------- */
  function configHtml() {
    var student = Repo.getStudent(state.studentId);
    var availableTags = student ? uniqueSorted(flatten(studentEntries().map(function (e) { return e.tags || []; }))) : [];
    var tagChips = availableTags.map(function (t) {
      var active = !!state.tags[t];
      return '<button type="button" class="toggle-chip' + (active ? ' active' : '') + '" data-tag="' + escapeAttr(t) + '">' + escapeHtml(t) + '</button>';
    }).join('');
    var entryCheckboxes = student ? studentEntries().slice().sort(byDateAsc).map(function (e) {
      var checked = !!state.selectedEntries[e.id];
      return '<label class="checkbox-row"><input type="checkbox" data-entry-pick="' + e.id + '" ' + (checked ? 'checked' : '') + '>' +
        '<span><strong>' + escapeHtml(formatDate(e.date)) + '</strong> &middot; ' + escapeHtml(e.category) +
        (e.tags && e.tags.length ? ' &middot; <span class="muted">' + escapeHtml(e.tags.join(', ')) + '</span>' : '') +
        '<br><span class="muted">' + escapeHtml(snippetAround(e.text, '', 70)) + '</span></span></label>';
    }).join('') : '';

    return '<div class="card export-config no-print">' +
      '<h3 style="margin-top:0;">1. Umfang wählen</h3>' +
      '<div class="field"><label for="ai-student">Schüler</label>' +
        '<select id="ai-student">' + optionsHtml(students.map(function (s) { return { value: s.id, label: s.name + ' (' + s.anonLabel + ')' }; }), state.studentId) + '</select>' +
      '</div>' +
      '<div class="field"><label>Art der Auswahl</label>' +
        '<div class="row" style="gap:8px;">' +
          scopeOptionBtn('student', 'Ganzes Dossier') +
          scopeOptionBtn('theme', 'Ein Thema (Kategorie/Tags)') +
          scopeOptionBtn('selection', 'Eigene Auswahl an Einträgen') +
        '</div>' +
      '</div>' +
      (state.scopeType === 'theme' ? (
        '<div class="row">' +
          '<div class="field"><label for="ai-category">Kategorie <span class="hint">(optional)</span></label>' +
            '<select id="ai-category"><option value="">Alle Kategorien</option>' + optionsHtml(CATEGORIES, state.category) + '</select></div>' +
        '</div>' +
        '<div class="field"><label>Tags <span class="hint">(optional, Mehrfachauswahl)</span></label><div class="chip-row" id="ai-tags">' + (tagChips || '<span class="muted">Keine Tags vorhanden.</span>') + '</div></div>'
      ) : '') +
      (state.scopeType === 'selection' ? (
        '<div class="field"><label>Einträge auswählen</label><div style="max-height:280px; overflow:auto; border:1px solid var(--border); border-radius:var(--radius); padding:10px;">' + (entryCheckboxes || '<p class="muted">Keine Einträge vorhanden.</p>') + '</div></div>'
      ) : '') +
      '<p class="muted" id="ai-scope-summary">' + escapeHtml(scopeLabel()) + '</p>' +

      '<h3>2. Frage / Aufgabe an die KI</h3>' +
      AI_PROMPT_OPTIONS.map(function (p, i) {
        return '<label class="checkbox-row"><input type="checkbox" data-prompt="' + i + '" ' + (state.selectedPrompts[i] ? 'checked' : '') + '> <span>' + escapeHtml(p) + '</span></label>';
      }).join('') +
      '<div class="field"><label for="ai-free">Eigene Frage / Ergänzung <span class="hint">(optional)</span></label>' +
        '<textarea id="ai-free" rows="2" placeholder="z. B. Worauf sollten wir im nächsten Gespräch mit den Eltern besonders achten?">' + escapeHtml(state.freeText) + '</textarea></div>' +

      '<button type="button" class="btn btn-primary" id="ai-step-names">Weiter: Namen prüfen</button>' +
    '</div>';
  }

  function scopeOptionBtn(type, label) {
    var active = state.scopeType === type;
    return '<button type="button" class="toggle-chip' + (active ? ' active' : '') + '" data-scope="' + type + '" style="flex:1;">' + escapeHtml(label) + '</button>';
  }

  /* ---------------- Phase 2: Namen prüfen ---------------- */
  function namesHtml() {
    var entries = scopedEntries();
    var student = Repo.getStudent(state.studentId);
    var detected = detectNamesInText(
      entries.map(function (e) { return e.text; }),
      { excludeNames: student ? [student.name] : [] }
    );
    if (!state.replacements.length) {
      state.replacements = buildReplacementList(detected);
      // Querverweise auf andere App-Schüler: deren anonLabel als Platzhalter
      state.replacements.forEach(function (r) {
        if (r.category !== 'Schüler') return;
        var other = students.filter(function (s) { return s.name === r.name; })[0];
        if (other && other.anonLabel) r.placeholder = other.anonLabel;
      });
    }
    var institutions = detectInstitutions(entries);
    if (!state.institutionMap.length && institutions.length) {
      state.institutionMap = institutions.map(function (name, i) { return { name: name, placeholder: 'Stell ' + (i + 1) }; });
    }

    var rows = state.replacements.map(function (r, i) {
      return '<tr>' +
        '<td>' + escapeHtml(r.name) + '</td>' +
        '<td><span class="muted">' + escapeHtml(r.category) + '</span></td>' +
        '<td><input type="text" data-replacement-idx="' + i + '" value="' + escapeAttr(r.placeholder) + '"></td>' +
        '<td><label class="checkbox-label"><input type="checkbox" data-replacement-active="' + i + '" ' + (r.active ? 'checked' : '') + '> ersetzen</label></td>' +
      '</tr>';
    }).join('');

    var institutionRows = state.institutionMap.map(function (m, i) {
      return '<tr><td>' + escapeHtml(m.name) + '</td><td class="muted">Institution</td>' +
        '<td><input type="text" data-institution-idx="' + i + '" value="' + escapeAttr(m.placeholder) + '"></td><td></td></tr>';
    }).join('');

    return '<div class="card export-config no-print">' +
      '<h3 style="margin-top:0;">3. Erkannte Namen prüfen &amp; ergänzen</h3>' +
      '<p class="muted">Die App hat folgende mögliche Personen-/Elternbezeichnungen im gewählten Textumfang gefunden. Prüfen Sie die Platzhalter, passen Sie sie bei Bedarf an, oder fügen Sie weitere Namen hinzu.</p>' +
      (state.replacements.length ?
        '<table class="replacement-table"><thead><tr><th>Erkannter Name</th><th>Kategorie</th><th>Platzhalter</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>' :
        '<p class="muted">Keine Namen automatisch erkannt — Sie können unten weitere von Hand ergänzen.</p>') +
      '<div class="row" style="align-items:flex-end;">' +
        '<div class="field"><label for="ai-add-name">Name ergänzen</label><input type="text" id="ai-add-name" placeholder="z. B. Mme Schmit"></div>' +
        '<div class="field"><label for="ai-add-placeholder">Platzhalter</label><input type="text" id="ai-add-placeholder" placeholder="z. B. Therapeut 2"></div>' +
        '<div class="field"><button type="button" class="btn" id="ai-add-row">+ Hinzufügen</button></div>' +
      '</div>' +
      '<hr class="divider">' +
      '<label class="checkbox-row"><input type="checkbox" id="ai-anon-inst" ' + (state.anonymizeInstitutions ? 'checked' : '') + '> <span>Institutionen ebenfalls anonymisieren (' +
        (state.institutionMap.length ? state.institutionMap.map(function (m) { return escapeHtml(m.name); }).join(', ') : 'keine erkannt') + ' &rarr; „Stell 1, Stell 2, …")</span></label>' +
      (state.anonymizeInstitutions && state.institutionMap.length ?
        '<table class="replacement-table"><tbody>' + institutionRows + '</tbody></table>' : '') +
      '<div class="page-head" style="margin:14px 0 0;">' +
        '<button type="button" class="btn" id="ai-back-config">&larr; Zurück</button>' +
        '<button type="button" class="btn btn-primary" id="ai-step-preview">Vorschau erzeugen</button>' +
      '</div>' +
    '</div>';
  }

  /* ---------------- Phase 3: Vorschau & Kopieren ---------------- */
  function buildAnonymizationContext() {
    var student = Repo.getStudent(state.studentId);
    return {
      replacements: state.replacements,
      anonymizeInstitutions: state.anonymizeInstitutions,
      institutionMap: state.institutionMap,
      studentNameMap: student ? [{ name: student.name, anonLabel: student.anonLabel }] : []
    };
  }

  function previewHtml() {
    var entries = scopedEntries();
    var ctx = buildAnonymizationContext();
    var screeningText = '';
    try {
      if (window.KB_SCREENING && state.studentId) {
        var sd = window.KB_SCREENING.detail(state.studentId);
        if (sd && sd.text) screeningText = sd.text;
      }
    } catch (e) {}
    state.builtText = buildAiExportText({
      scopeLabel: scopeLabel(),
      taskText: taskText(),
      entries: entries,
      ctx: ctx,
      screeningText: screeningText
    });
    return '<div class="card export-config no-print">' +
      '<h3 style="margin-top:0;">4. Vorschau &amp; Übergabe</h3>' +
      '<div class="warn-banner"><strong>Hinweis:</strong> Dieser Text verlässt die App nur, wenn Sie ihn selbst in eine externe KI einfügen. ' +
        'Er wird ausschließlich in Ihre Zwischenablage kopiert — niemals automatisch versendet. Bitte prüfen Sie ihn sorgfältig auf verbliebene Namen, bevor Sie ihn weitergeben.</div>' +
      '<div class="preview-box" id="ai-preview-text">' + escapeHtml(state.builtText) + '</div>' +
      '<div class="page-head" style="margin:14px 0 0;">' +
        '<button type="button" class="btn" id="ai-back-names">&larr; Zurück zu den Namen</button>' +
        '<button type="button" class="btn btn-primary" id="ai-copy">In Zwischenablage kopieren</button>' +
      '</div>' +
    '</div>';
  }

  var html =
    '<div class="page-head no-print"><div><h2>An externe KI geben</h2><p class="muted">Anonymisierter Export — wählen Sie Umfang und Aufgabe, prüfen Sie die Namenserkennung, und kopieren Sie das Ergebnis selbst in das KI-Werkzeug Ihrer Wahl.</p></div></div>' +
    '<div id="ai-phase-wrap">' + phaseHtml() + '</div>';

  function phaseHtml() {
    if (state.phase === 'names') return namesHtml();
    if (state.phase === 'preview') return previewHtml();
    return configHtml();
  }

  return {
    navKey: 'ai-export',
    html: html,
    afterRender: function (root) {
      var wrap = qs('#ai-phase-wrap', root);
      function rerender() { wrap.innerHTML = phaseHtml(); wire(); }

      function wire() {
        if (state.phase === 'config') wireConfig();
        else if (state.phase === 'names') wireNames();
        else wirePreview();
      }

      function wireConfig() {
        qs('#ai-student', wrap).addEventListener('change', function (e) {
          state.studentId = e.target.value;
          state.tags = {};
          state.selectedEntries = {};
          state.replacements = [];
          state.institutionMap = [];
          rerender();
        });
        qsa('[data-scope]', wrap).forEach(function (btn) {
          btn.addEventListener('click', function () {
            state.scopeType = btn.getAttribute('data-scope');
            state.replacements = [];
            state.institutionMap = [];
            rerender();
          });
        });
        var catSel = qs('#ai-category', wrap);
        if (catSel) catSel.addEventListener('change', function (e) { state.category = e.target.value; qs('#ai-scope-summary', wrap).textContent = scopeLabel(); });
        qsa('[data-tag]', wrap).forEach(function (btn) {
          btn.addEventListener('click', function () {
            var tag = btn.getAttribute('data-tag');
            if (state.tags[tag]) delete state.tags[tag]; else state.tags[tag] = true;
            rerender();
          });
        });
        qsa('[data-entry-pick]', wrap).forEach(function (cb) {
          cb.addEventListener('change', function () {
            var id = cb.getAttribute('data-entry-pick');
            if (cb.checked) state.selectedEntries[id] = true; else delete state.selectedEntries[id];
            qs('#ai-scope-summary', wrap).textContent = scopeLabel();
          });
        });
        qsa('[data-prompt]', wrap).forEach(function (cb) {
          cb.addEventListener('change', function () {
            var idx = cb.getAttribute('data-prompt');
            if (cb.checked) state.selectedPrompts[idx] = true; else delete state.selectedPrompts[idx];
          });
        });
        var freeEl = qs('#ai-free', wrap);
        if (freeEl) freeEl.addEventListener('input', function () { state.freeText = freeEl.value; });
        qs('#ai-step-names', wrap).addEventListener('click', function () {
          if (!state.studentId) { showToast('Bitte zuerst einen Schüler wählen.', { error: true }); return; }
          if (!scopedEntries().length) { showToast('Die aktuelle Auswahl enthält keine Einträge.', { error: true }); return; }
          state.phase = 'names';
          rerender();
        });
      }

      function wireNames() {
        qsa('[data-replacement-idx]', wrap).forEach(function (input) {
          input.addEventListener('input', function () {
            var idx = Number(input.getAttribute('data-replacement-idx'));
            state.replacements[idx].placeholder = input.value;
          });
        });
        qsa('[data-replacement-active]', wrap).forEach(function (cb) {
          cb.addEventListener('change', function () {
            var idx = Number(cb.getAttribute('data-replacement-active'));
            state.replacements[idx].active = cb.checked;
          });
        });
        qsa('[data-institution-idx]', wrap).forEach(function (input) {
          input.addEventListener('input', function () {
            var idx = Number(input.getAttribute('data-institution-idx'));
            state.institutionMap[idx].placeholder = input.value;
          });
        });
        qs('#ai-anon-inst', wrap).addEventListener('change', function (e) {
          state.anonymizeInstitutions = e.target.checked;
          rerender();
        });
        qs('#ai-add-row', wrap).addEventListener('click', function () {
          var nameEl = qs('#ai-add-name', wrap);
          var phEl = qs('#ai-add-placeholder', wrap);
          var name = nameEl.value.trim();
          var placeholder = phEl.value.trim();
          if (!name || !placeholder) { showToast('Bitte Name und Platzhalter angeben.', { error: true }); return; }
          state.replacements.push({ name: name, category: 'manuell', placeholder: placeholder, active: true });
          nameEl.value = ''; phEl.value = '';
          rerender();
        });
        qs('#ai-back-config', wrap).addEventListener('click', function () { state.phase = 'config'; rerender(); });
        qs('#ai-step-preview', wrap).addEventListener('click', function () { state.phase = 'preview'; rerender(); });
      }

      function wirePreview() {
        qs('#ai-back-names', wrap).addEventListener('click', function () { state.phase = 'names'; rerender(); });
        qs('#ai-copy', wrap).addEventListener('click', function () {
          copyTextToClipboard(state.builtText).then(function (ok) {
            showToast(ok ? 'In die Zwischenablage kopiert.' : 'Kopieren nicht möglich — bitte Text manuell markieren und kopieren.', { error: !ok });
          });
        });
      }

      wire();
    }
  };
}

function copyTextToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).then(function () { return true; }).catch(function () { return fallbackCopy(text); });
  }
  return Promise.resolve(fallbackCopy(text));
}

function fallbackCopy(text) {
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    var ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) { return false; }
}


'use strict';

/* ============================================================
   Ansicht F — Backup (Export / Import als Datei)
   ============================================================ */

function viewBackup() {
  var pendingImport = null; // { data, filename }

  function summaryHtml() {
    return '<p class="muted">Aktuell gespeichert: ' + pluralize(Repo.students.length, 'Schüler', 'Schüler') + ' &middot; ' +
      pluralize(Repo.entries.length, 'Eintrag', 'Einträge') + ' &middot; Speicherort: ' +
      (Storage.mode === 'indexeddb' ? 'IndexedDB (lokal im Browser)' : 'localStorage (lokal im Browser, Fallback)') + '</p>';
  }

  function importPanelHtml() {
    if (!pendingImport) return '';
    var d = pendingImport.data;
    return '<div class="card export-config" style="margin-top:14px;">' +
      '<h3 style="margin-top:0;">Import vorbereiten: ' + escapeHtml(pendingImport.filename) + '</h3>' +
      '<p>Die Datei enthält ' + pluralize((d.students || []).length, 'Schüler', 'Schüler') + ' und ' +
        pluralize((d.entries || []).length, 'Eintrag', 'Einträge') +
        (d.exportedAt ? ' (exportiert am ' + escapeHtml(formatDateTime(d.exportedAt)) + ')' : '') + '.</p>' +
      '<div class="field">' +
        '<label class="checkbox-row"><input type="radio" name="import-mode" value="merge" checked> <span><strong>Zusammenführen</strong> — neue Datensätze ergänzen, gleiche IDs werden überschrieben, bestehende Daten bleiben sonst erhalten.</span></label>' +
        '<label class="checkbox-row"><input type="radio" name="import-mode" value="replace"> <span><strong>Ersetzen</strong> — die komplette aktuelle Datenbank wird durch den Inhalt dieser Datei ersetzt. Nicht rückgängig zu machen!</span></label>' +
      '</div>' +
      '<div class="page-head" style="margin:0;">' +
        '<button type="button" class="btn" id="bk-cancel-import">Abbrechen</button>' +
        '<button type="button" class="btn btn-primary" id="bk-confirm-import">Import durchführen</button>' +
      '</div>' +
    '</div>';
  }

  var html =
    '<div class="page-head"><div><h2>Backup</h2><p class="muted">Sicherung &amp; Geräteübertrag im Team — als JSON-Datei, komplett lokal.</p></div></div>' +
    '<div class="card export-config">' +
      '<h3 style="margin-top:0;">Backup exportieren</h3>' +
      '<div id="bk-summary">' + summaryHtml() + '</div>' +
      '<button type="button" class="btn btn-primary" id="bk-export">Backup als .json herunterladen</button>' +
    '</div>' +
    '<div class="card export-config" style="margin-top:14px;">' +
      '<h3 style="margin-top:0;">Backup importieren</h3>' +
      '<p class="muted">Wählen Sie eine zuvor exportierte <span class="kbd">.json</span>-Datei. Sie können danach wählen, ob die Daten zusammengeführt oder die Datenbank komplett ersetzt werden soll.</p>' +
      '<input type="file" id="bk-file" accept="application/json,.json">' +
    '</div>' +
    '<div id="bk-import-panel">' + importPanelHtml() + '</div>';

  return {
    navKey: 'backup',
    html: html,
    afterRender: function (root) {
      qs('#bk-export', root).addEventListener('click', function () {
        var data = Repo.exportAll();
        var filename = 'dossier-backup_' + nowIso().slice(0, 10) + '.json';
        downloadBlob(filename, JSON.stringify(data, null, 2), 'application/json');
        showToast('Backup wird heruntergeladen: ' + filename);
      });

      var fileInput = qs('#bk-file', root);
      var importPanel = qs('#bk-import-panel', root);

      fileInput.addEventListener('change', function () {
        var file = fileInput.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var data = JSON.parse(reader.result);
            if (!data || !Array.isArray(data.students) || !Array.isArray(data.entries)) {
              showToast('Diese Datei sieht nicht wie ein gültiges Dossier-Backup aus.', { error: true });
              return;
            }
            pendingImport = { data: data, filename: file.name };
            importPanel.innerHTML = importPanelHtml();
            wireImportPanel();
            importPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
          } catch (e) {
            showToast('Datei konnte nicht gelesen werden: ' + e.message, { error: true });
          }
        };
        reader.readAsText(file);
      });

      function wireImportPanel() {
        var cancelBtn = qs('#bk-cancel-import', importPanel);
        var confirmBtn = qs('#bk-confirm-import', importPanel);
        if (cancelBtn) cancelBtn.addEventListener('click', function () {
          pendingImport = null;
          fileInput.value = '';
          importPanel.innerHTML = '';
        });
        if (confirmBtn) confirmBtn.addEventListener('click', function () {
          var mode = (qs('input[name="import-mode"]:checked', importPanel) || {}).value || 'merge';
          if (mode === 'replace' && !confirm('Wirklich die GESAMTE aktuelle Datenbank durch diese Datei ersetzen? Das kann nicht rückgängig gemacht werden.')) return;
          Repo.importAll(pendingImport.data, mode).then(function () {
            showToast('Import abgeschlossen (' + (mode === 'replace' ? 'ersetzt' : 'zusammengeführt') + ').');
            pendingImport = null;
            fileInput.value = '';
            navigate('#/backup', true);
          }).catch(function (err) {
            showToast('Import fehlgeschlagen: ' + err.message, { error: true });
          });
        });
      }
    }
  };
}


'use strict';

/* ============================================================
   Ansicht — Themen-Analyse
   Macht automatisch erkannte Themen (lexikalische Schlagwort-
   Treffer, kein manuelles Tagging nötig) sichtbar:
   - quantitativ: Häufigkeits-Balken + Wochen-Heatmap
   - qualitativ: Stufen-Markierung + Original-Belege pro Thema
   ============================================================ */

function viewThemeAnalysis(params, query) {
  var students = Repo.listStudents();

  var state = {
    studentId: query.student || '',
    from: query.from || '',
    to: query.to || '',
    selectedTheme: query.theme || ''
  };

  function filteredEntries() {
    return Repo.listEntries().filter(function (e) {
      if (state.studentId && e.studentId !== state.studentId) return false;
      if (state.from && e.date < state.from) return false;
      if (state.to && e.date > state.to) return false;
      return true;
    });
  }

  function controlsHtml() {
    return '<div class="card export-config no-print" style="margin-bottom:18px;">' +
      '<div class="row">' +
        '<div class="field"><label for="th-student">Schüler</label>' +
          '<select id="th-student"><option value="">Alle Schüler</option>' + optionsHtml(students.map(function (s) { return { value: s.id, label: s.name }; }), state.studentId) + '</select></div>' +
        '<div class="field"><label for="th-from">Zeitraum von</label><input type="date" id="th-from" value="' + escapeAttr(state.from) + '"></div>' +
        '<div class="field"><label for="th-to">Zeitraum bis</label><input type="date" id="th-to" value="' + escapeAttr(state.to) + '"></div>' +
      '</div>' +
      '<div class="legend-row">' +
        [3, 2, 1].map(function (sev) {
          return '<span class="legend-item"><span class="legend-dot" style="background:' + SEVERITY_META[sev].color + '"></span>' + escapeHtml(SEVERITY_META[sev].label) + '</span>';
        }).join('') +
      '</div>' +
    '</div>';
  }

  function barsHtml(aggList, entryTotal) {
    if (!aggList.length) return '<div class="empty-state">Keine Themen-Treffer im gewählten Bereich.</div>';
    var maxCount = aggList[0] ? Math.max.apply(null, aggList.map(function (a) { return a.entryCount; })) : 1;
    return '<div class="theme-bars">' + aggList.map(function (a) {
      var pct = Math.max(3, Math.round(100 * a.entryCount / maxCount));
      var selected = state.selectedTheme === a.key;
      var studentCount = Object.keys(a.students).length;
      return '<button type="button" class="theme-bar-row' + (selected ? ' selected' : '') + '" data-theme="' + escapeAttr(a.key) + '">' +
        '<span class="theme-bar-label">' + escapeHtml(a.key) + '</span>' +
        '<span class="theme-bar-track"><span class="theme-bar-fill" style="width:' + pct + '%; background:' + SEVERITY_META[a.severity].color + '"></span></span>' +
        '<span class="theme-bar-count">' + a.entryCount + '/' + entryTotal + ' Einträge · ' + a.matchCount + ' Treffer · ' + pluralize(studentCount, 'Schüler', 'Schüler') + '</span>' +
      '</button>';
    }).join('') + '</div>';
  }

  function heatmapHtml(aggList, entries) {
    if (!aggList.length) return '';
    var weekSet = {};
    entries.forEach(function (e) { weekSet[e.date] = true; });
    var weeks = Object.keys(weekSet).sort();
    if (weeks.length < 2) return '';
    var topThemes = aggList.slice(0, 14);
    var maxCell = 1;
    topThemes.forEach(function (a) { weeks.forEach(function (w) { if ((a.weeks[w] || 0) > maxCell) maxCell = a.weeks[w]; }); });

    var head = '<tr><th></th>' + weeks.map(function (w) { return '<th>' + escapeHtml(formatDateShort(w)) + '</th>'; }).join('') + '</tr>';
    var rows = topThemes.map(function (a) {
      var cells = weeks.map(function (w) {
        var c = a.weeks[w] || 0;
        if (!c) return '<td></td>';
        var alpha = 0.18 + 0.82 * (c / maxCell);
        return '<td><span class="heat-cell" style="background:' + SEVERITY_META[a.severity].color + '; opacity:' + alpha.toFixed(2) + '" title="' + escapeAttr(a.key + ' — ' + formatDate(w) + ': ' + c + ' Treffer') + '">' + c + '</span></td>';
      }).join('');
      return '<tr><th class="heat-theme' + (state.selectedTheme === a.key ? ' selected' : '') + '" data-theme="' + escapeAttr(a.key) + '">' + escapeHtml(a.key) + '</th>' + cells + '</tr>';
    }).join('');

    return '<h3 class="section-title">Verlauf über die Wochen (Heatmap)</h3>' +
      '<div class="card" style="padding:14px; overflow-x:auto;">' +
        '<table class="heatmap-table"><thead>' + head + '</thead><tbody>' + rows + '</tbody></table>' +
        '<p class="hint" style="margin:8px 0 0;">Zahl = Stichwort-Treffer in der Woche. Zeile anklicken, um die Belege unten zu sehen.</p>' +
      '</div>';
  }

  function evidenceHtml(agg) {
    if (!state.selectedTheme) {
      return '<div class="empty-state">Thema oben anklicken, um die Original-Textstellen (Belege) zu sehen.</div>';
    }
    var a = agg[state.selectedTheme];
    if (!a) return '<div class="empty-state">Keine Belege für „' + escapeHtml(state.selectedTheme) + '" im gewählten Bereich.</div>';
    var items = a.evidence.slice().sort(function (x, y) { return x.date < y.date ? -1 : (x.date > y.date ? 1 : 0); });
    return '<div class="search-results">' + items.map(function (ev) {
      var student = Repo.getStudent(ev.studentId);
      var snippetHtml = escapeHtml(ev.snippet);
      ev.terms.forEach(function (t) {
        try {
          var re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
          snippetHtml = snippetHtml.replace(re, '<mark class="theme-mark sev-' + a.severity + '">$1</mark>');
        } catch (err) { /* Tooltip-Hervorhebung ist optional */ }
      });
      return '<article class="card search-result" data-route="#/student/' + ev.studentId + '/entry/' + ev.entryId + '">' +
        '<div class="meta"><strong>' + escapeHtml(student ? student.name : ev.studentId) + '</strong><span>' + escapeHtml(formatDate(ev.date)) + '</span>' +
          '<span class="muted">Treffer: ' + escapeHtml(ev.terms.join(', ')) + '</span></div>' +
        '<div class="snippet">' + snippetHtml + '</div>' +
      '</article>';
    }).join('') + '</div>';
  }

  function bodyHtml() {
    var entries = filteredEntries();
    var agg = analyzeEntries(entries);
    var aggList = sortedThemeAggregates(agg);
    return '<h3 class="section-title">Häufigkeit (' + pluralize(entries.length, 'Eintrag', 'Einträge') + ' im gewählten Bereich)</h3>' +
      barsHtml(aggList, entries.length) +
      heatmapHtml(aggList, entries) +
      '<h3 class="section-title">Belege' + (state.selectedTheme ? ': ' + escapeHtml(state.selectedTheme) : '') + '</h3>' +
      evidenceHtml(agg);
  }

  var html =
    '<div class="page-head"><div><h2>Themen-Analyse</h2>' +
      '<p class="muted">Automatisch erkannte Themen aus allen Eintragstexten — ohne dass Tags gesetzt sein müssen.</p></div></div>' +
    '<div class="warn-banner" style="background:#eef3f7; border-color:#c6d6e3; color:#2a4257;">' +
      'Diese Analyse ist eine rein <strong>lexikalische Stichwort-Zählung</strong> als Lese- und Suchhilfe. ' +
      'Sie ist keine fachliche Bewertung, Diagnose oder Alarmierung — die Einschätzung bleibt beim Team.' +
    '</div>' +
    controlsHtml() +
    '<div id="th-body">' + bodyHtml() + '</div>';

  return {
    navKey: 'themes',
    html: html,
    afterRender: function (root) {
      var body = qs('#th-body', root);
      function rerender() { body.innerHTML = bodyHtml(); wireBody(); }

      qs('#th-student', root).addEventListener('change', function (e) { state.studentId = e.target.value; rerender(); });
      qs('#th-from', root).addEventListener('change', function (e) { state.from = e.target.value; rerender(); });
      qs('#th-to', root).addEventListener('change', function (e) { state.to = e.target.value; rerender(); });

      function wireBody() {
        qsa('[data-theme]', body).forEach(function (el) {
          el.addEventListener('click', function () {
            var key = el.getAttribute('data-theme');
            state.selectedTheme = state.selectedTheme === key ? '' : key;
            rerender();
          });
        });
      }
      wireBody();

      if (state.selectedTheme) {
        var sel = qs('.theme-bar-row.selected', body);
        if (sel) sel.scrollIntoView({ block: 'center' });
      }
    }
  };
}


'use strict';

/* ============================================================
   Ansicht — Réunion (Méindes-Teamversammlung)
   Alles op ee Bléck: Orga-Punkte uewen, duerno d'Schüler an
   hirer Reiefolleg — mat dem Réunions-Update, Ziler an den
   automatesch erkannten Themen. Ee Klick féiert an d'Dossier.
   ============================================================ */

/* Nächster Montag (heute, falls Montag) als ISO-Datum */
function nextMondayIso() {
  var d = new Date();
  var day = d.getDay(); // 0 = So, 1 = Mo
  var add = day === 1 ? 0 : ((8 - day) % 7);
  d.setDate(d.getDate() + add);
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + m + '-' + dd;
}

function viewReunion(params, query) {
  var reunions = Repo.listReunions(); // neueste zuerst
  var state = {
    date: query.date || (reunions[0] ? reunions[0].date : ''),
    editOrg: false
  };

  function current() { return Repo.getReunionByDate(state.date); }

  function returnRoute() { return '#/reunion?date=' + encodeURIComponent(state.date); }

  /* ---------- Kopf: Datumswahl + nächste Réunion ---------- */
  function headerHtml() {
    var nm = nextMondayIso();
    var hasNext = !!Repo.getReunionByDate(nm);
    var options = reunions.map(function (r) {
      return { value: r.date, label: formatDate(r.date) + (r.date === nm ? ' (nächste Réunion)' : '') };
    });
    return '<div class="card export-config no-print" style="margin-bottom:18px;">' +
      '<div class="row" style="align-items:flex-end;">' +
        '<div class="field"><label for="reu-date">Réunion vom</label>' +
          '<select id="reu-date">' + optionsHtml(options, state.date) + '</select></div>' +
        '<div class="field"><span class="hint">Nächste Réunion: Montag, ' + escapeHtml(formatDate(nm)) + '</span><br>' +
          (hasNext
            ? '<button type="button" class="btn" data-route="#/reunion?date=' + escapeAttr(nm) + '">Zur nächsten Réunion</button>'
            : '<button type="button" class="btn btn-primary" id="reu-create-next">+ Réunion für ' + escapeHtml(formatDate(nm)) + ' anlegen</button>') +
        '</div>' +
      '</div>' +
    '</div>';
  }

  /* ---------- Orga-Block ---------- */
  function orgHtml(r) {
    var items = r.orgItems || [];
    var body;
    if (state.editOrg) {
      // Bearbeitung: ein Punkt pro Absatz (Leerzeile trennt Punkte;
      // Zeilenumbrüche innerhalb eines Punkts bleiben erhalten)
      var text = items.join('\n\n');
      body = '<p class="hint">Ein Orga-Punkt pro Absatz — Leerzeile trennt die Punkte.</p>' +
        '<textarea id="org-edit" rows="' + Math.min(18, Math.max(6, items.length * 2)) + '">' + escapeHtml(text) + '</textarea>' +
        '<div class="page-head" style="margin:10px 0 0;">' +
          '<button type="button" class="btn" id="org-cancel">Abbrechen</button>' +
          '<button type="button" class="btn btn-primary" id="org-save">Orga speichern</button>' +
        '</div>';
    } else if (!items.length) {
      body = '<p class="muted">Keine Orga-Punkte erfasst.</p>';
    } else {
      body = '<ul class="org-list">' + items.map(function (it) {
        var parts = it.split('\n');
        return '<li>' + escapeHtml(parts[0]) +
          (parts.length > 1 ? '<ul class="org-sublist">' + parts.slice(1).map(function (p) { return '<li>' + escapeHtml(p) + '</li>'; }).join('') + '</ul>' : '') +
        '</li>';
      }).join('') + '</ul>';
    }
    var groupGoal = r.goals && r.goals.group && r.goals.group.length
      ? '<div class="group-goal"><strong>Gruppenziel:</strong> ' + escapeHtml(r.goals.group.join(' ')) + '</div>'
      : '';
    return '<section class="card reunion-org">' +
      '<div class="page-head" style="margin:0 0 8px;">' +
        '<h3 style="margin:0;">Organisation <span class="muted">(' + items.length + ' Punkte)</span></h3>' +
        (state.editOrg ? '' : '<button type="button" class="btn btn-sm" id="org-edit-btn">Bearbeiten</button>') +
      '</div>' +
      body + groupGoal +
    '</section>';
  }

  /* ---------- Schüler-Abschnitte ---------- */
  function studentSectionHtml(r) {
    // Reihenfolge der Versammlung + alle weiteren aktiven Schüler hinten dran
    var order = (r.studentOrder || []).slice();
    Repo.listStudents().forEach(function (s) {
      if (s.active !== false && order.indexOf(s.id) === -1) order.push(s.id);
    });

    var blocks = order.map(function (sid, i) {
      var s = Repo.getStudent(sid);
      if (!s) return '';
      var entry = Repo.reunionEntryFor(r.date, sid);
      var goals = (r.goals && r.goals[sid]) || [];
      var themes = entry ? analyzeText(entry.text) : [];
      var themeChips = themes.slice(0, 6).map(function (t) {
        return '<span class="chip theme-chip sev-' + t.severity + '" title="Treffer: ' + escapeAttr(t.terms.join(', ')) + '">' + escapeHtml(t.key) + '</span>';
      }).join(' ');

      return '<section class="card reunion-student">' +
        '<div class="reunion-student-head">' +
          '<span class="reunion-order">' + (i + 1) + '</span>' +
          '<a href="#/student/' + escapeAttr(sid) + '" class="reunion-student-name" data-route="#/student/' + escapeAttr(sid) + '">' + escapeHtml(s.name) + '</a>' +
          (entry
            ? '<button type="button" class="btn btn-sm" data-route="#/entry/' + escapeAttr(entry.id) + '/edit?return=' + encodeURIComponent(returnRoute()) + '">Bearbeiten</button>'
            : '<button type="button" class="btn btn-sm btn-primary" data-route="#/entry/new/' + escapeAttr(sid) + '?date=' + escapeAttr(r.date) + '&category=' + encodeURIComponent('Team-Réunion') + '&return=' + encodeURIComponent(returnRoute()) + '">+ Update erfassen</button>') +
        '</div>' +
        (entry
          ? '<div class="entry-body reunion-update">' + highlightThemesHtml(entry.text) + '</div>' +
            (themeChips ? '<div class="reunion-themes">' + themeChips + '</div>' : '')
          : '<p class="muted" style="margin:6px 0;">Kein Update für diese Réunion.</p>') +
        (goals.length
          ? '<div class="goal-box"><strong>Ziele:</strong><ul class="goal-list">' + goals.map(function (g) { return '<li>' + escapeHtml(g) + '</li>'; }).join('') + '</ul></div>'
          : '') +
      '</section>';
    }).join('');

    return blocks || '<div class="empty-state">Keine Schüler vorhanden.</div>';
  }

  function contentHtml() {
    var r = current();
    if (!r) {
      return '<div class="empty-state">Keine Réunion für dieses Datum.' +
        (reunions.length ? '' : ' Legen Sie oben die erste Réunion an.') + '</div>';
    }
    return orgHtml(r) + '<h3 class="reunion-section-title">Schüler.innen — Reihenfolge der Versammlung</h3>' + studentSectionHtml(r);
  }

  var html =
    '<div class="page-head"><div><h2>Réunion</h2>' +
    '<p class="muted">Die Montags-Teamversammlung auf einen Blick: Orga oben, danach alle Schüler in der Reihenfolge der Versammlung. Updates sind normale Dossier-Einträge (Kategorie „Team-Réunion") — Änderungen erscheinen überall.</p></div></div>' +
    '<div id="reunion-wrap">' + headerHtml() + '<div id="reunion-content">' + contentHtml() + '</div></div>';

  return {
    navKey: 'reunion',
    html: html,
    afterRender: function (root) {
      var wrap = qs('#reunion-wrap', root);

      function rerender() {
        wrap.innerHTML = headerHtml() + '<div id="reunion-content">' + contentHtml() + '</div>';
        wire();
      }

      function wire() {
        var sel = qs('#reu-date', wrap);
        if (sel) sel.addEventListener('change', function () {
          navigate('#/reunion?date=' + encodeURIComponent(sel.value), true);
        });

        var createBtn = qs('#reu-create-next', wrap);
        if (createBtn) createBtn.addEventListener('click', function () {
          var nm = nextMondayIso();
          var last = Repo.listReunions()[0];
          Repo.saveReunion({
            date: nm,
            orgItems: [],
            studentOrder: last ? (last.studentOrder || []).slice() : Repo.listStudents().map(function (s) { return s.id; }),
            goals: last && last.goals ? JSON.parse(JSON.stringify(last.goals)) : {}
          }).then(function () {
            showToast('Réunion für ' + formatDate(nm) + ' angelegt (Ziele aus der letzten Woche übernommen).');
            navigate('#/reunion?date=' + encodeURIComponent(nm), true);
          }).catch(function (err) {
            showToast('Fehler beim Anlegen: ' + err.message, { error: true });
          });
        });

        var editBtn = qs('#org-edit-btn', wrap);
        if (editBtn) editBtn.addEventListener('click', function () { state.editOrg = true; rerender(); });

        var cancelBtn = qs('#org-cancel', wrap);
        if (cancelBtn) cancelBtn.addEventListener('click', function () { state.editOrg = false; rerender(); });

        var saveBtn = qs('#org-save', wrap);
        if (saveBtn) saveBtn.addEventListener('click', function () {
          var r = current();
          var raw = qs('#org-edit', wrap).value;
          var items = raw.split(/\n\s*\n/).map(function (s) { return s.trim(); }).filter(Boolean);
          r.orgItems = items;
          Repo.saveReunion(r).then(function () {
            state.editOrg = false;
            showToast('Orga-Punkte gespeichert.');
            rerender();
          }).catch(function (err) {
            showToast('Fehler beim Speichern: ' + err.message, { error: true });
          });
        });
      }

      wire();
    }
  };
}

/* ============================================================
   Ansicht — Organisation (chronologisches Logbuch)
   Alle Orga-Punkte aus allen Réunions, neueste zuerst,
   mit Volltext-Filter. Klick auf das Datum öffnet die Réunion.
   ============================================================ */

function viewOrgLog(params, query) {
  var state = { q: query.q || '' };

  function filteredReunions() {
    var q = state.q.trim().toLowerCase();
    return Repo.listReunions().map(function (r) {
      var items = (r.orgItems || []);
      if (q) items = items.filter(function (it) { return it.toLowerCase().indexOf(q) !== -1; });
      return { reunion: r, items: items };
    }).filter(function (x) { return x.items.length > 0; });
  }

  function listHtml() {
    var groups = filteredReunions();
    var total = groups.reduce(function (n, g) { return n + g.items.length; }, 0);
    if (!groups.length) {
      return '<div class="empty-state">' + (state.q ? 'Keine Orga-Punkte für „' + escapeHtml(state.q) + '".' : 'Noch keine Orga-Punkte erfasst.') + '</div>';
    }
    return '<p class="muted">' + pluralize(total, 'Orga-Punkt', 'Orga-Punkte') + ' in ' + pluralize(groups.length, 'Réunion', 'Réunions') + '</p>' +
      groups.map(function (g) {
        var r = g.reunion;
        return '<section class="card org-log-group">' +
          '<div class="org-log-head">' +
            '<a href="#/reunion?date=' + escapeAttr(r.date) + '" data-route="#/reunion?date=' + escapeAttr(r.date) + '" class="org-log-date">Réunion vom ' + escapeHtml(formatDate(r.date)) + '</a>' +
            '<span class="muted">' + pluralize(g.items.length, 'Punkt', 'Punkte') + '</span>' +
          '</div>' +
          '<ul class="org-list">' + g.items.map(function (it) {
            var parts = it.split('\n');
            var head = state.q ? highlightMatch(parts[0], state.q) : escapeHtml(parts[0]);
            return '<li>' + head +
              (parts.length > 1 ? '<ul class="org-sublist">' + parts.slice(1).map(function (p) {
                return '<li>' + (state.q ? highlightMatch(p, state.q) : escapeHtml(p)) + '</li>';
              }).join('') + '</ul>' : '') +
            '</li>';
          }).join('') + '</ul>' +
        '</section>';
      }).join('');
  }

  var html =
    '<div class="page-head"><div><h2>Organisation</h2>' +
    '<p class="muted">Chronologisches Logbuch aller Orga-Punkte aus den Montags-Réunions (neueste zuerst).</p></div></div>' +
    '<div class="card export-config no-print" style="margin-bottom:18px;">' +
      '<div class="field"><label for="org-q">Filter</label>' +
      '<input type="search" id="org-q" placeholder="z. B. Mobibus, Deadline, Ausfluch…" value="' + escapeAttr(state.q) + '"></div>' +
    '</div>' +
    '<div id="org-log">' + listHtml() + '</div>';

  return {
    navKey: 'orga',
    html: html,
    afterRender: function (root) {
      var input = qs('#org-q', root);
      var log = qs('#org-log', root);
      var timer = null;
      input.addEventListener('input', function () {
        clearTimeout(timer);
        timer = setTimeout(function () {
          state.q = input.value;
          log.innerHTML = listHtml();
        }, 200);
      });
    }
  };
}
