m Grupp, interagéiert mat deenen aneren. Bezéiung zu den aneren Schüler a Personal verbessert sech sichtbar.\nWeist Verantwortung (z. B. huet hien sech moies gemellt wéi de Bus Verspéidung hat).\nDéi éischte Kéier aktiv um Sport deelgeholl, mat Freed a gudder Kooperatioun.\nHuet um Gericht de Skill Trapen rop a rof goen ugewendt.\nAktuell Themen:\nThema Vape nach ëmmer präsent – kee konkrete Fait, awer d’Suspicion bleift (méi diskret Notzung). (Besoin no emotionaler, sensorieller Regulatioun, Nikotinsucht?) Weider Tendenz, Toilette als Réckzuchsraum ze notzen.\nAnti Tabak Koffer (CNAPA) ugefroot. Psychoeducatioun?\nSelbstregulatioun: Alternativen zum Vape entwéckelen (Beweegung, Paus, Otmung,…?).\nPAI\nD’Mamm beschreift eng verbessert Situatioun doheem:\nMiguel probéiert sech besser z’organiséieren a erkennt selwer, wann eppes net klappt.\nHien mécht keng Krisen, wann eppes net geet, a probéiert et nach eng Kéier.\nHien huet all Dag seng Medikamenter geholl.\nD’Mamm seet, hien wier méi motivéiert, virun allem wéinst de gudde Resultater vun den Tester déi hien heem bruecht huet. Hien kruut seng Playstation zréck an därf Weekends spillen. Hien seet och net méi, datt hie net méi an AJ wëllt goen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-20T13:00:00.000Z","updatedAt":"2025-10-20T13:00:00.000Z"},{"id":"e_reu_20251020_chase","studentId":"stud_chase","date":"2025-10-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Den Chase gëtt den Donneschdeg um 15h00 vu senger Mamm ofgeholl well hien um 16h00 RV zu Esch bei senger Psychotherapeutin Mme Kirsch huet.\nAm Bezuch hu mir iwwer de Freeze an der Konscht geschwat. Et „nervt“ hien wann deen ee falsche Stréch alles „futti“ mécht. Konnt sech net ob d‘Zil „ech loosse meng Aufgab verbesseren a schreiwen déi richteg Versioun ënnendrënner/niewendrun“ aloossen. Mir hunn eis op „ech loossen d‘Verbesserung vum Proff stoen“ geeenegt. Den Habittracker mécht den Chase Alleng doheem, hien huet sech um Späicher en Trainingseck ageriicht.\nLäscht Woch huet hien doheem bemierkt dass hie 50% vu sengem Liewen Problemer an der Schoul hat. Huet schon e laange Leidenswee hannert sech, mä gesäit elo Liicht um Enn vum Tunnel. D’Mamm gesät dass den Chase eng immens Entwécklung gemaach huet. Hie fuerdert ëmmer méi säi Raum an „lo lauschters du mir mol no,..“\nWar läscht Woch matgeholl wou d’Mamm him gesot hat dass mir iwwer säi Geroch geschwat haten. „Dat war dach just een Dag“\nD’Visite um Geriicht huet hie scho marquéiert, huet vill doheem dovunner geschwat.\nHunn e RV beim Psychater ugeschwat. D’Mamm ass net frou, dass no 5 Méint Klinik keng fäerdeg Diagnostik virläit. Eng fréi Bindungsstéierung war deen 1.Diagnostik, dovunner ass awer duerno net méi geschwat ginn. Vu dass den Chase aus villen Therapien fortgelaf ass, sutz d’Mamm heinsdo alleng mat der Therapeutin do. Si huet duerno an engem Rapport gelies, dass si eng krankhaft Bindung zum Chase hätt.\nDem Chase säi Gebuertsdag war ganz flott, och fir de Ben. Den Chase war richteg glécklech. Si hunn de Ben duerno heem op Veianen bei seng Mamm gefouert, mä nach en Ëmwee iwwer Fouren gemaach, well de Ben hinnen nach säi Foyer wollt weisen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-20T13:00:00.000Z","updatedAt":"2025-10-20T13:00:00.000Z"},{"id":"e_reu_20251020_ben","studentId":"stud_ben","date":"2025-10-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Situatioun mam Mara/Léeno, kucken inwiefern mir eis do sollen involvéieren, ech schwätzen awer mam Ben iwwert d’Aussoen par rapport zum Léeno senger Schwester. Hien riskeiert eng Plainte, de Foyer gett informeiert.\nHaat soss eng gutt Woch an wëll an der Bezuchszäit oofwiesselnd Fussball an Kickboxen maachen. En Aan drop haalen wann hien an enken Räim ass (wéi am Theater) an mat him kucken dass hien zu all Moment kann aus der Situatioun eraus. Huet vun enger Aart Panikattack geschwat wou sie am Theater waren.\nZiil ass et eng 5AD ofzeschleissen an am 1. Semester en Stage ze maan. Gett schweier bei daer Aarbechtsmotivatioun/mentaliteit dei hien aktuell un den Dag leet.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-20T13:00:00.000Z","updatedAt":"2025-10-20T13:00:00.000Z"},{"id":"e_reu_20251020_mia","studentId":"stud_mia","date":"2025-10-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"War krank vun Dënschdes un. Huet sech Suergen gemaach eppes ze verpassen, wollt awer Méindes d’Prüfung am Däitschen schreiwen. Neit Ziil wäert mat sengem Toun ze dinn hunn an soll och gespiggelt ginn vun den Enseignanten.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-20T13:00:00.000Z","updatedAt":"2025-10-20T13:00:00.000Z"},{"id":"e_reu_20251027_lilly","studentId":"stud_lilly","date":"2025-10-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"5P am LJBM, 11 Moduller awer keng an den Haaptfächer, waert redoubleieren, keng Stagen dest Joer, kennt an den L1, Sarah iwwerhellt de Bezuch","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-27T13:00:00.000Z","updatedAt":"2025-10-27T13:00:00.000Z"},{"id":"e_reu_20251027_alexp","studentId":"stud_alexp","date":"2025-10-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Filomena huet nogefrot ob dem Alex seng Plaatz opbleiwt, schwiereg se kreien et net wirklech ze paacken, stationär steht am Raum.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-27T13:00:00.000Z","updatedAt":"2025-10-27T13:00:00.000Z"},{"id":"e_reu_20251027_jason","studentId":"stud_jason","date":"2025-10-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ATVA kënnt den Donneschden um 9h. Hien emmer drun erënneren, dass wann hien Moies net am Cours dëel hëllt hien net kann un den flotten Aktivitéiten wéi Sport/Sortie oder Iessen dëel huelen. Wann en am refus ass dann rof an den Iesssall schecken.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-27T13:00:00.000Z","updatedAt":"2025-10-27T13:00:00.000Z"},{"id":"e_reu_20251027_miguel","studentId":"stud_miguel","date":"2025-10-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"JBL ass nach net opgetaucht. Hien huet se rem doheem leie gelooss.\nDe Moien e Message vun der Mamm kritt, dass hien e Vape dobäi huet, anscheinend dem Ben seng. No Récksprooch mat him, sot hien en hätt der Mamm dëst erzielt domat hien seng Vape mathuelen kann. Hien bleiwt nach emmer dobäi dass hien dem Ben seng net geholl huet.\nWiedergutmachung gett am Bezuch thematiseiert\nDënschden um 16h Gespréich mat den Elteren. Se ginn drun erennert wat am HRS mat hinnen beschwat ginn ass (Auslandsprojet), mir erheigen den Drock : Assurance soll fir d‘Lach an der Mauer opkommen, Delinquenz, Ëmgang mam Vapekonsum an der Schoul (Wann hien wärend dem Cours op d’Toilette geet) mir thematiseieren datt muer mat den Elteren.\nDr Ristow beschreiwt hien als rigid, selektiv, manipulativ, keng Impulskontroll, hyperkinetische Störung des Sozialverhaltens\nOppassen de Miguel litt vill, e spillt klauen (JBL, Apple Watch, …)\nMir hunn rem Medikamenter fonnt, ech klären mam Dr Ristow of em wat et sech handelt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-27T13:00:00.000Z","updatedAt":"2025-10-27T13:00:00.000Z"},{"id":"e_reu_20251027_chase","studentId":"stud_chase","date":"2025-10-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Mamm mengt net dass den Chase simuléiert huet. Hien hat de Kapp zou a vill gehouscht; huet och vill geschlof. Hie war de Méindeg no der Däitschprüfung schonn total platt. Den Chase mengt, d’Prüfung wär „ok“ gaang, Sonndes hat hie mol geléiert. Den Chase leet vill Wäert drop fir „normal“ ze sinn. D’Schwëster huet Dyskalkulie, de Brudder ass an der ADHS-Diagnostik, an den Chase wëll dat net och. D’Mamm freet, ob een dat net kéint thematiséieren, dass een och trotz enger Diagnos „normal“ ka sinn an dass eng Diagnos oft kann hëllefen, och en vue fir eventuell Amenagementer ze kréien am Fall wou dat néideg wär. Villäicht léist den Chase sech esou éischter op eng Diagnostik an. Eventuell am Skills?\nDës Woch ass d’Mamm elo net do; si gespaant ob mir dat mierken. Ech telefonéieren dann dës Woch och mam Papp. Den Ziedel fir an den Eurospace Center huet den Chase eréischt den Donneschdeg doheem gewisen. D’Mamm schéckt mir eng Foto vun der Autorisation parentale soubal si se huet.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-27T13:00:00.000Z","updatedAt":"2025-10-27T13:00:00.000Z"},{"id":"e_reu_20251027_ben","studentId":"stud_ben","date":"2025-10-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"de Ben mecht en CV an eng lettre de motivation am Franzéischen a kritt eng separat Nott dorobber kritt. An SCNAT soll hien eng Powerpoint Präsentatioun maan (Physik am Alldag, meiglech Themen: Drock an Ennerdrock, Vitesse, International Einheiten a Verwandlungen), Joey kuckt datt mat him an da maan mer dat während enger Woch am Daitschen + Mathe no der Allerhellegenvakanz.\nHuet sech vill Suergen gemaach wéinst der Situatioun mam Léeno an Mara. Fäert dass elo och nach seng eegen Schwester doran gezunn gëtt. Huet ganz gutt op d’Situatioun vum Vape reagéiert an soot en hätt den Miguel ignoréiert.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-27T13:00:00.000Z","updatedAt":"2025-10-27T13:00:00.000Z"},{"id":"e_reu_20251027_mia","studentId":"stud_mia","date":"2025-10-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Eischten Kéier een richtegen Gefillsausbroch am Sport gehat. Huet ganz éierlech konnten soen wéi et him geet an dass hat sech mat de Jongen vergleicht an net wierklech dozou gehéiert. De Mëttwoch mëscht hat mat am Sport, évitéiert awer Kierperkontakt an spillt och Arbitter. War am Science Center déi ganzen Zäiten nierft mir an soot mir dass hat gären een hätt wou hat kéint Zäit mat verbréngen. Huet sech gefreet dass eng néi Schülerin kënnt.\nRoueg förderen datt et Decisiounen soll huelen an sech soll positionneieren.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-27T13:00:00.000Z","updatedAt":"2025-10-27T13:00:00.000Z"},{"id":"e_reu_20251110_lilly","studentId":"stud_lilly","date":"2025-11-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Fallvirstellung nächst Woch","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-10T13:00:00.000Z","updatedAt":"2025-11-10T13:00:00.000Z"},{"id":"e_reu_20251110_alexp","studentId":"stud_alexp","date":"2025-11-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Et gouf een Gespréich mat den Elteren wou et em d’Zukunft gaangen ass an wou d’Famill Drock gemaach krut. Ab dem RDV leeft et erem ganz gutt an d’Alex ass praktesch all Dag do.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-10T13:00:00.000Z","updatedAt":"2025-11-10T13:00:00.000Z"},{"id":"e_reu_20251110_jason","studentId":"stud_jason","date":"2025-11-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gëtt den Mëttwoch an der AJ ofgeholl vun der Mamm. War d’Woch virun der Vakanz krank an anscheinend och den Freiden Moien. D’Mamm huet mer vum Incident op der Gebuertsdagsfeier erzielt an och gesoot dass den Jason 750€ vir Spiller an Temu Saachen ausginn hätt mat hirer Kreditkaart. Sie ass immens enttäuscht an wäert hoffentlech konsequent mat him sinn. Si wees sech hierer Hänn kee Root, wollt him awer trotzdem fir Chreschtdag en IPad schénken, well sie deen schonns kaaf huet. Mir hunn den Donneschden Rdv mat der ATVA. (Jason war krank virun der Vakanz)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-10T13:00:00.000Z","updatedAt":"2025-11-10T13:00:00.000Z"},{"id":"e_reu_20251110_miguel","studentId":"stud_miguel","date":"2025-11-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Nom Gespréich haut de moien mam Miguel a sengen Elteren gouf folgend festgehaal:\nVerstärkerplang: Zil vum Plang ass et, eng kloer Struktur ze schaffen, fir Verantwortung, Regelakzeptanz an d’Deelnam um Unterrecht ze stäerken.De Plang bleift beim Jean-Pierre – Miguel kritt d’Blat net.De Plang gëtt all Dag vu mir ausgefëllt, op Basis vun den Observatiounen an dem Austausch mam Team.Et gëtt keng Selbstbewäertung duerch de Schüler.All Woch kritt d’Famill eng kuerz Réckmeldung mam Punkteverlaf a mat enger Bemierkung.Punktsystem – IwwersiichtDe Miguel kann all Dag 1 Punkt pro Unterrechtsblock kréien. Punkten ginn, wann hien am Unterrecht bleift a matmécht. Kee Punkt gëtt et, wann hien Refus weist oder d’Klass verléisst.D’Medikamenter si Bedingung fir d’Beschoulung. Vape an Handy sinn fix Regelen, keng Punkten, mee Konsequenzen bei Verstéiss.Refus / IesssallWann de Schüler Refus weist, geet hien an den Iesssall.Et gëtt kee Punkt fir dëse Block.Wann hien duerno zréck kënnt, gëtt kuerz nogeschwat an de Punkt kann eventuell nogerechent ginn.BeweegungspausEng kuerz Beweegungspaus ass erlaabt, wann se ugefrot a kloer definéiert ass.Keng Toilett-Paus als Alternativ.\nWöchentlech EvaluatiounD’Auswertung geschitt all Freideg. D’Elteren kréien eng kuerz Zesummefaassung vum Punkteverlaf an dem Fortschrëtt.Bei gudder Entwécklung gëtt et eng Form vu Verstäerkung oder Privileg (z. B. Bus ëm 14:00, Playstation, Fräizäit).\n⚠️ BemierkungenRegelverstéiss (Vape, Handy, Respektloskeet) ginn dokumentéiert, awer net direkt am Punkteplang verrechent.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-10T13:00:00.000Z","updatedAt":"2025-11-10T13:00:00.000Z"},{"id":"e_reu_20251110_chase","studentId":"stud_chase","date":"2025-11-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hat eng gutt Vakanz; war och fir déi alleréischte Kéier absolut guer net nervös fir erëm unzefänken. Näischt méi wat him Angscht/Stress bereet. “D’Plaque vun der Angscht ass gutt iwwerschriwwe ginn”, esou d’Wierder vun der Mamm. Huet de Moie keng frësch Kleeder un, hat awer, do wou seng Mamm et bis gesinn/geroch huet, awer och keng Zäit méi fir sech nach aanescht unzedoen. Si bleift dohannert dass d’Kleeder den Owend an de Wäschkuerf fléien. Si ass gespaant wéi hie muer ausgesäit\nD’Biosproff wollt eis einfach d’Schülerversioun vun hirem Cours ginn, hunn awer no engem Résumé gefrot well ech fäerten dass et soss zevill gëtt.\nDe Papp mengt, dass wann an engem Fach de Wiessel op den avancé méiglech ass, dann an der Mathé. Hat mam Papp iwwer de “Sträit” mam Däitschbuch geschwat. Dat weist ganz gutt wéi wäit den Chase alles hannerfreet an sech domadder selwer am Wee steet.\nDe Regent schwätzt mam Här Tobes wéinst dem Chase senger Zensur. Hien huet nogefrot ob dat mam Materialaustausch géif klappen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-10T13:00:00.000Z","updatedAt":"2025-11-10T13:00:00.000Z"},{"id":"e_reu_20251110_ben","studentId":"stud_ben","date":"2025-11-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gëtt de Mëttwoch vum Chase senger Mamm an de Foyer bruecht. Hätt am März seng Stagen an huet nach een net obligatoreschen Stage. Huet een neit Zil an zwar soll hien sech an Gruppenaarbeschten/Gruppenaufgaben genau sou bedeelegen wie Aanerer. Hien seet him wier dat net bewosst, wann hien eng kleng Aufgab kritt an een Aaneren eng méi grouss, dann huet hien jo awer seng Aufgab gemaach an ass dann faerdeg. Gären dat am Aan haalen, spiggelen an drop opmierksam maachen.\nDossier SCNAT: Sujet mat him sichen, KI kinnt Struktur fir Powerpoint ginn","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-10T13:00:00.000Z","updatedAt":"2025-11-10T13:00:00.000Z"},{"id":"e_reu_20251110_mia","studentId":"stud_mia","date":"2025-11-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gëtt vun der Mamm op der Aire de Capellen oofgeholl. Haat eng schwéier Woch, ass Mëttwochs net komm weinst dem Sport an wëll hat heiansdo een „Gefill huet dat him seet dass et Haut net geet“. Nämlecht Thema wie beim Alex, kann ganz schlecht seng Gefiller beschreiwen an de Grond fir seng Gefiller benennen. Nächst Zil wäert och dorop ausgeluecht ginn.\nOch beim Mia den suivi vun den Dossieren am Aan behaalen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-10T13:00:00.000Z","updatedAt":"2025-11-10T13:00:00.000Z"},{"id":"e_reu_20251117_alexp","studentId":"stud_alexp","date":"2025-11-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"HPG 27.11 um 14h am HRS, Sarah iwwerhellt den Grupp mëttes\nStationär wärt ugeschwat ginn, keen wirklechen Commitment, wann se sech net drop aloosen, waert Klinik signaléieren","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-17T13:00:00.000Z","updatedAt":"2025-11-17T13:00:00.000Z"},{"id":"e_reu_20251117_jason","studentId":"stud_jason","date":"2025-11-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ATVA kemmert sech emt de Stage a freet mol ob e puer Platzen no ,wie zB bei Yolande Coop, se hunn verstaan datt de Wee zreck net an Schoul waert feieren. Rizzi huet der Mamm nach eng Keier 40 Säiten Fragebogen geschéckt, Mamm kritt anscheinend dës Woch een Retour. Och wann eng Diagnose a Richtung Autismus do wier, ass eng Waardelëscht vun bal 3 Joer fir an een Atelier protégé. An dem Fall géingen mir Kontakt mam CTSA ophuelen fir eng classe de cohabitation.\nWann bis Januar keng konkret Piste do ass, froen mir eng Diskussioun op der CNI un.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-17T13:00:00.000Z","updatedAt":"2025-11-17T13:00:00.000Z"},{"id":"e_reu_20251117_miguel","studentId":"stud_miguel","date":"2025-11-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"16 vun 17 Punkten/ Coursen am Verstärkerplang ereescht.\nAllgemeng eng gutt Woch: respektvoll, freeët a Plaz direkt eppes ze huelen.\nGruppendynamik verbessert: bréngt sech an de Grupp an, besser Relatioun mam Ben.\nPausen: spillt mëttlerweil och Fussball mat deenen aneren.\nAen drop halen: Interaktioun Jason ↔ Miguel (Language, Kierperkontakt).\nMathestonn e Freideg: Lescht 20 Minutten: Kapp op der Bänk, Frustratioun?\nBrochrechnen ass him schwéier gefall, gesot “hie gesäit de Sënn net”. Ass ouni Diskussioun an den Iesssall gaangen. Weider observéieren, wann d’Inhalter méi schwéier ginn → Frustratiounsverhalen.\nMedikamenter: Ganz Woch ageholl.\nSeet selwer: Am Euro Space Center + zweemol géint 14:00 → “Wierkung léisst no”.\n“Ech huelen se doheem net, well ech sinn jo doheem.” Hien spiert selwer d‘ Wirkung vum Medikament.\nReserve-Medikamenter sinn am Tirang ënnert mengem Pult (mat Erklärung).\n→ Mir ginn se him nemmen, wann d‘Mamm schreift, datt hien se moies net geholl huet.\nVape / Regelen: Funktionéiert ganz gutt. Miguel mécht d‘Stréchlescht selwer. Keng „Verstéiss“ lescht Woch.\nReparatioun vun der Mauer verschiebt sech, well de Papp keng Zäit hat.\nHaut kränklech ukomm, Kapuz op, Bauch- & Kappwéi (Bauchwéi zënter Samschdeg).\n1 an 2te Block: uewen geschlof, nëmmen fir Vape-Paus erof. Während dem Liesen: am Klassesall.\nHuet erzielt, datt säin Trainer opgehalen huet.\nWeider drop kucken: Verhaalen bei méi schouleschen Ufuerderungen, Wierkung vun de Medikamenter géint Mëtteg, Interaktioun Jason – Miguel","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-17T13:00:00.000Z","updatedAt":"2025-11-17T13:00:00.000Z"},{"id":"e_reu_20251117_chase","studentId":"stud_chase","date":"2025-11-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Bezuchzäit war läscht Woch ausgefall. Hat just e Gespréich mat der Mamm: Probéieren e System ze kréien mam Kleederwiessel; Den Chase ass relativ entschloss fir d’Reintegratioun am 2.Semester unzegoen (Ausso Ben); verspiert ëmmer méi Lockerheet fir an d’Schoul; ab Januar geet hien elo alleng bei d’Psychotherapeutin (ëmmer Méindes mëttes), fiert mam Zuch dohinner, ass vun him aus komm, well et och vill fir d’Elteren wär; ab Januar RV bei Neuropsychologin ufroen fir Tester ze maachen; muss duerno vun engem Psychiater confirméiert ginn. Mamm hofft dass den Chase sech op den Testing aléist (ass dat schonn am Skills behandelt ginn?-haten zoufälleg iwwer dem Ben säin ADHS geschwat,..mä am Detail gëtt et nach behandelt), well och Stärken a Schwächten dobäi erauskommen; Thema Liesen: Säi Bopa wollt him en Abonnement schenken fir eng Zäitschrëft; huet säi Buch Méindes dobäi; huet awer keng fonnt déi him zu 100% gefällt; Mamm huet gefrot ob ee just Elterevertrieder ass esou laang d’Kand beim CDSE ass? Jo sou laang eng prise en charge vum CDSE do ass","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-17T13:00:00.000Z","updatedAt":"2025-11-17T13:00:00.000Z"},{"id":"e_reu_20251117_ben","studentId":"stud_ben","date":"2025-11-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Kommunikatioun wéi ëmmer, Foyer gouf iwwert Stagen informéiert, waarden op Retour. Mireille mellt sech beim Martina Mick mat folgenden Sujeten: Schülerkaart, nei Kleeder? (Schung, neien Pullover a Wanterjacket), ass stolz datt en sech duscht an Zänn wäscht, e brauch nei Kleeder, Franzseischt Schoulbuch fehlt, 3 Mailen weinst Plainte-->keen Feedback vum Foyer, Stageplaatz sichen fir dei Woch virun der Fuesvakanz (9-13.02)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-17T13:00:00.000Z","updatedAt":"2025-11-17T13:00:00.000Z"},{"id":"e_reu_20251117_mia","studentId":"stud_mia","date":"2025-11-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Ass den Mëttwoch net mat op den Ausfluch gaangen, wosst schon Méindes wéi schweier et him géing faalen. Him waren et ze vill Ongewësshëeten, huet awer mat kengem kommunizéiert ausser mat senger Mamm Dënschdes Owes. Him gouf annoncéiert dass dës Fëeldeeg net méi excuséiert ginn, ausser et wier en CM. Ass an Tréinen ausgebrach, well hat seet hat géing sech ëmmer selwer am Wee stoen. Hat soot hat wier net an der Lag op een Erwuessenen duer ze goen fir doriwwer ze schwätzen wat net geet. Hat huet elo zouginn, dass Mëttwochs den schwéiersten Dag wier an hat net mat mir kéint schwätzen well ech jo réischt Mëttwochs ufänken. D’Propose wier déi, dass d’Carole an der Konscht op d’Mia duergëet an mat him kuerz d’Schwieregkeeten vum Dag duerno duerchgeet, fir him Gewëssheet ze ginn an awer och dass hat leiert déi Saachen ze kommunizéieren. Besoin no Therapeut ass grouss.\nE Freiden konnt et Mathesprüfung net sengen Kapaziteiten entspriechend schreiwen, ass richteg panikeiert, huet wirklech Fehler gemaach die et virdrun nach ni gemaach huet. Et war och net wirklech drop virbereed. Et well eppes änneren mee et kann net. Et leist net zou datt eppes gutt kann.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-17T13:00:00.000Z","updatedAt":"2025-11-17T13:00:00.000Z"},{"id":"e_reu_20251124_lilly","studentId":"stud_lilly","date":"2025-11-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Dr Ristow – enk Zesummenarbescht mat den Elteren an ze profitéieren fir weider Tester ze machen fir ze kucken op net nach weider Léierstéierungen am Raum stinn well am CDI Test gëtt et eng Diskrepanz – am Wëssen huet hatt 100 mee an der Mémoire ass hatt weit ënnert der Moyenne.\nAktiven Suivi beim SCAP, Pedopsychiater ass d’Madame Koenig vum SCAP mee si sinn net zefridden mat hir. D’Lilly hëllt 30mg Medikinet Retard an ech hat Si gefrot wéini Si fir d’lescht eng Réévaluatioun gemach hunn, ech krut keen genauen Datum, si hätten eng virun kuerzem gemach an d’Madame König wollt ëm 10mg ropsetzen, mee den Papp wollt dat net. Hien wär nëmmen mat 5mg averstanen. D’Mamm ass anscheinend komplett géint d’Medikatioun an seet dass et naischt brengt.\nDem Lilly seng Jongegeschichten zielt hatt just nach mir, sot him dass ech seng Bezugspersoun sinn an dass ech dat mat him beschwätzen.\nFreiden krut ech gesot dass d’Lilly et “coup de foudre” fir de Miguel huet– Haut war de Miguel am Refus, hien wollt net an de Grupp wéinst dem Lilly well hatt him ze vill hannendrun leeft an et ass zevill Kierperkontakt. well hatt him ze vill hannendrun leeft an et ass zevill Kierperkontakt.\nAccord fir en Austausch mam SCAP ass ugefrot beim Papp, CDA mat ranhuelen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-24T13:00:00.000Z","updatedAt":"2025-11-24T13:00:00.000Z"},{"id":"e_reu_20251124_jason","studentId":"stud_jason","date":"2025-11-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Konsequenzen Freiden – Fit for life\nWaert sech mussen Sport, Fit4Life an Kicker verdengen-> Belounungssystem gett agefouert an all Dag ausgewäert. Den 5.12 geht hien net mat op Sortie.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-24T13:00:00.000Z","updatedAt":"2025-11-24T13:00:00.000Z"},{"id":"e_reu_20251124_miguel","studentId":"stud_miguel","date":"2025-11-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"FB Dr. Ristow-Fennt den Verstärkerplang gutt, musse just Verstärkeren am Aan behaalen ob se fir hien nach interessant sinn. Hien funktionneiert ennert Drock. Leschten Donneschden hat de Miguel de RDV beim Dr.Ristow. Medikamenteneinahm gouf thematiseiert soudass hien ab haut seng Medikamenter bei eis hëllt. Se leien bei mir am Tirang. Emmer oppassen dass hien se och wierklech hëllt.\nLeschte Freiden ass et him schwéier gefall am Cours ze bleiwen huet sech awer drunn ginn. Fitforlife an der AJ ganz wibbeleg, huet een gudd gemierkt dass d’Medikament noléisst.\nWaarden nach op eng Réckmeldung vum Papp fir d’Mauer ze flécken.\nHaut, keen Bock, well net méi hei sinn a virun allem net mat deenen aaneren Schüler. Ganze moien am Refus--> Iessall. Am Gespréich konnt e soen, dass hien vum Lilly genervt ass. Am Cours géif hatt de ganzen Zäit hien kucken et leeft him hannen drunn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-24T13:00:00.000Z","updatedAt":"2025-11-24T13:00:00.000Z"},{"id":"e_reu_20251124_alexp","studentId":"stud_alexp","date":"2025-11-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"HPG 27.11 um 14h am HRS, kennt net mei an der Dagesklinik un.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-24T13:00:00.000Z","updatedAt":"2025-11-24T13:00:00.000Z"},{"id":"e_reu_20251124_chase","studentId":"stud_chase","date":"2025-11-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"„Ech maachen net 4 Stonne Projet/Mathé,..! Et gëtt net fir näischt e Stonneplang,…“Erklärung Mamm: am Cycle 4 huet de Schoulmeeschter sech absolut net un de Stonneplang gehal a quasi keng Niewefächer gemaach fir d’Klass op d’Epreuve virzebereeden,…\nChase ass frustréiert wann d’Resultat net zefriddestellend ass z.B. am Projet no 90 Minutten nach ëmmer net fäerdeg mat enger klénger Aufgab. Géif heinsdo léiwer alleng schaffen wéi am Team mat engem dee manner resultatsorientéiert ass\nWëll an der Vakanz an e Restaurant am Duerf schaffe goen, stellt sech awer Froë wéinst sengem CV („mäi Parcours, eréicht op enger 6e, wéi gesäit dat aus,..?“)\nAm Franséischen grousse Retard p.r. zu der Klass. Soss schoulesch?\nGespréich mam Joëlle Reef zum Thema Hygiene/Geroch: den Chase froen „Wat brauchs du?“,…","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-24T13:00:00.000Z","updatedAt":"2025-11-24T13:00:00.000Z"},{"id":"e_reu_20251124_ben","studentId":"stud_ben","date":"2025-11-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"huet eng Schülerkaart a nei Schung. Den Foyer bekemmert sech em de Stage.\nHaat beim Megalab bal eng Panikattack, huet frei genuch Bescheed ginn an ass mat mir eraus gaangen. Konnt sech guer net op d’Atelieren konzentréieren well esou vill Leit do woren. Achtsamkeet etc huet him näischt bruecht, evtl ganz scharf/sauer Kamelle/Knetsch asetzen an sou Situatiounen. Krut natierlech emmer ugebueden op d’Toilette ze goen, wat hien awer net wollt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-24T13:00:00.000Z","updatedAt":"2025-11-24T13:00:00.000Z"},{"id":"e_reu_20251124_mia","studentId":"stud_mia","date":"2025-11-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Schoul huet nogefrot wie Mia mat den Dossieren eentz gett (Abgabeterminer am Bleck haalen an mat him kucken datt et sech doheem organiseiert, 12.12 an 26.01) War den Mettwoch an Donneschden do, obwuel him et am Viraus schwéier gefall ass. Ass frou dass hat Dënschdes mam Carole kann schwätzen, fillt sech och méi wuel well den Kontakt zum Lilly gutt ass.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-11-24T13:00:00.000Z","updatedAt":"2025-11-24T13:00:00.000Z"},{"id":"e_reu_20251201_lilly","studentId":"stud_lilly","date":"2025-12-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Clearing beim CDA, Accord parental fehlt nach emmer (Breif vun der CNI ass vum 19.11), Echange SCAP\nD'CNI hat Ufank Oktober 2025 den Elteren recommandeiert datt et en suivi pédopsychiatrique axé sur les aspects socio-émotionnels sollt ginn fir d’Lilly.\nD’Lilly verdaut et ganz schlecht dass hatt vum Miguel ignoréiert gëtt an dat mécht him VILL Gedanken. Hatt kritt öfters gesot dass d’Distanz villes heelt, mee hatt huet en Drang zur Dramatik an et kann sinn dass hatt Sachen erfënnt (De Miguel géing anscheinend Remarken am Cours machen an drop hiweisen wéi schlecht hatt an der Schoul ass – Ech gesinn de Miguel awer just schaffen ouni en Toun ze soen)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-01T13:00:00.000Z","updatedAt":"2025-12-01T13:00:00.000Z"},{"id":"e_reu_20251201_jason","studentId":"stud_jason","date":"2025-12-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Kritt een non-excusé fir haut, d’Mamm huet keng Demande erageschéckt. ATVA huet en eventuelle Stage am Abrëll bei Yolande Koop fir den Jason fonnt, probéiert awer och een virdrun nach ze fannen. Reévaluatioun vum Belounungsplang, méi streng? Wat kann geännert ginn?","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-01T13:00:00.000Z","updatedAt":"2025-12-01T13:00:00.000Z"},{"id":"e_reu_20251201_miguel","studentId":"stud_miguel","date":"2025-12-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Lescht Woch un all Cours deel geholl ausser Méindes. Einnahm vun de Medikamenter moies klappt. Haut am 1 Block am Iessraum an huet geschlof. An der 30min Paus am Klassesall. An de Coursen allgemeng leeft et.\nVirun allem a Phasen mat engem méi oppene Kader (Iesssituatioun, Paus..) mécht hien oft ongewéinlech Geräischer, Téin a repst haart virun de Leit. Wéi ass et am Cours? Aktuell net kloer, ob dës Téin tic-ähnlech oder sozial/impulsiv ausgeléist ginn. (Fro un den Dr. Ristow)\nLéisst sech séier vun deenen aaneren matrappen. Fenkt awer och mat den “Dommheeten”. Um Science Festival huet hien un der leschter Aktivitéit net deel geholl. Soutz mam Jason virum Raum op den Traapen. Huet rëm e Steck Karton auserneen geholl.\nHien huet och seng Zännbiischt dobäi fir nom Iessen.\nNächsten Dënschden ass am Mobibusprogramm rem 14h00. Géif awer nach eng Woch drunn hänken. Demande un de Mobibus ass gestallt.\nDe Papp kënnt haut de Mëtten een Deel vum Lach flécken, e kennt de 15.12 rem","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-01T13:00:00.000Z","updatedAt":"2025-12-01T13:00:00.000Z"},{"id":"e_reu_20251201_alexp","studentId":"stud_alexp","date":"2025-12-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Feedback HPG vum 27.11, Dr. Meinhart Axel: psychosomatische Patientin, Trennungsängste aber auch der Wille, Vermeidung, Emotionnalität der Mutter steht im Vordergrund\nSi probeieren nach eemol an der Dagesklinik, mat Medikatioun fir den Serotonin Level bessi ze heijen, en huet hinnen awer erklärt datt et keen Wonnermettel ass an datt och welle muss a kommen soll och wann et kierperlech Beschwerden huet dei reel sinn mee wou den Urspong net e Virus oder Bakterium ass mee d’Causa den emotionnalen Stress","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-01T13:00:00.000Z","updatedAt":"2025-12-01T13:00:00.000Z"},{"id":"e_reu_20251201_chase","studentId":"stud_chase","date":"2025-12-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"war stolz dass hien et läschte Freideg gepackt hat fir an d’AJ ze kommen. Hat Angscht dass d’Mathéprüfung méi schlecht géing ausfalen. Freet sech op muer. Fënnt et „schlau“ wann hien net mam Ben an enger Grupp ass. Dass de Kleederwiessel fir hien schwéier ass, huet näischt mam Geroch vum Wäschmëttel ze ginn, mä anscheinend „just“ mam Automatismus. Huet doheem senge Geschwëster erkläert dass een d’Hoer zweemol hannertenee mat Shampoo soll wäschen ;-)))\nAb Januar mécht d’Mamm de Stage fir Remplaçante am Fondamental ze ginn. Den Chase dréckt elo heinsdo aus dass hien z.B keng Loscht huet fir op den Training, mä dass hien sech awer géing rappen. Huet d’Erfahrung gemaach dass et sech loune kann wann een sech um Rimm rappt.\nSi huet nach eemol nom Franséische gefrot. Neit Buch?? Eventuell bësse Material fir doheem?","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-01T13:00:00.000Z","updatedAt":"2025-12-01T13:00:00.000Z"},{"id":"e_reu_20251201_ben","studentId":"stud_ben","date":"2025-12-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet de Freiden den Hitlergruß gemaach, kritt eng Sortie gestrach an ass op sourcis fir déi duerno. (Hängt vum Verhalen oof) Foyer seet hien hätt an der Vakanz komplett de Rhythmus verluer duerch seng Switch, duschen Zänn wäschen an schloofen goen hätt guer net geklappt. Hien huet am Foyer geäussert dass hien sech an der Schoul grat net wuel fillt, well den Chase sech distanzéiert an hien d’Lilly „komesch“ fennt. Mireille an ech hunn de Moien mat him geschwat. Wichteg bei him ass de Kader ganz kloer an konsequent duerchzesetzen, hien profitéiert am Moment vun all Méiglechkeet opzefaalen, well dat ass schliesslech besser wéi guer net gesinn ze ginn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-01T13:00:00.000Z","updatedAt":"2025-12-01T13:00:00.000Z"},{"id":"e_reu_20251201_mia","studentId":"stud_mia","date":"2025-12-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"d’Mamm an Mia informeieren datt et schwiereg gett en komplett Zensur ze kreien, och wann et nach bessi ass bis Semesterenn: am Franzeischen war et bis elooft net do (Mettwochs a Freides) fir datt genuch Contenu do ass, et muss doheem widderhuelen, an der Mathe hu mer am Moment och keng Nott, vue datt et oft gefehlt huet, bleiwt mir keng Zait fir nach un den Dossieren mat him ze schaffen, hatt muss datt dann aleng doheem maachen. D’Schoul well datt ech Dossieren sammelen a rasschecken.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-01T13:00:00.000Z","updatedAt":"2025-12-01T13:00:00.000Z"},{"id":"e_reu_20251208_lilly","studentId":"stud_lilly","date":"2025-12-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Dem Lilly seng schoulesch Schwieregkeeten sinn ëmmer méi opfälleg esou dass et dringend ass dass mir gleich e Plang hunn. D’Pedopsychiaterin, Madame König, aus dem SCAP huet eng grouss Ronn proposéiert mat den Elteren zesummen well de Suivi och net klappt. Lilly a Jason sinn oft uneneen geroden d’lescht Woch, do muss een bessi oppassen. Grenzen Mia a Lilly.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-08T13:00:00.000Z","updatedAt":"2025-12-08T13:00:00.000Z"},{"id":"e_reu_20251208_jason","studentId":"stud_jason","date":"2025-12-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ATVA kënnt normalerweis nächst Woch Dënschdes. Bei der Rizzi sinn nach 2 Kanner virun him bei der Diagnostik an dann hunn mir endlech méi Kloerheet punkto Autismus. Drun denken dass säin schoulescht Zil ass den Fanger ze weisen an ze schwätzen. Dat heescht wann hien déi ganzen Zäit eranschwätzt an awer gutt geschafft huet, kritt hien säin Zil awer net. Mamm wëll Doheem och den Belounungssystem duerchsetzen, ob sie konsequent ass, ass déi aaner Fro.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-08T13:00:00.000Z","updatedAt":"2025-12-08T13:00:00.000Z"},{"id":"e_reu_20251208_miguel","studentId":"stud_miguel","date":"2025-12-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet den Donneschden Match a frëet ob hien um 15h ofgeholl ginn ka ginn. OK ginn fir um 15h30 am LLIS ofgeholl zeginn, e muss awer am Atelier bleiwen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-08T13:00:00.000Z","updatedAt":"2025-12-08T13:00:00.000Z"},{"id":"e_reu_20251208_alexp","studentId":"stud_alexp","date":"2025-12-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Nach kee Retour ob d’Alex ukomm ass.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-08T13:00:00.000Z","updatedAt":"2025-12-08T13:00:00.000Z"},{"id":"e_reu_20251208_chase","studentId":"stud_chase","date":"2025-12-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"war chocéiert vun de Jongen hirem Behuelen bei der ungarescher Madamm; hie mécht sech vill Gedanken iwwer déi Frëndschaft zum Ben a wéi dat soll weidergoen; Reintegratioun- wëll dat muer uschwätzen; wéi gesinn d’Enseignants dat? Mir starten Reintegratioun ab Fuesend (Mettwochs oder Freides) E weidert Zil:Choix treffen!","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-08T13:00:00.000Z","updatedAt":"2025-12-08T13:00:00.000Z"},{"id":"e_reu_20251208_ben","studentId":"stud_ben","date":"2025-12-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet d’Konsequenz fir säin Verhalen net fair fonnt, war een Block am refus, huet awer duerno tiptop geschafft. Ech hunn mat him konkret gekuckt wat een Gemengenaarbechter mëscht an sengem Alldag, an dat huet him ganz gutt gefall. De Foyer huet elo Demanden bei der Gemeng zu Tandel an Veianen gemaach. Hien polariseiert mat sengen Hitler-Aussoen, hien sicht Opmierksamkeet. D’Thema Nationalsozialismus nach eemol am Cours opgreifen.\nE kritt seng Konsequenz an Bezuchszait/Sportsoptioun.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-08T13:00:00.000Z","updatedAt":"2025-12-08T13:00:00.000Z"},{"id":"e_reu_20251208_mia","studentId":"stud_mia","date":"2025-12-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Säin Verhalen selektiv ignoréieren. Virum allem all déi Aussoen wéi : ech kann dat souwiesou net, ech well dat net, ech wees net… Positivt Verhalen verstärken an net ob dat aanert agoen an stoen loosen. Hat waert motzen oder zou maachen, mais säin Verhalen verléiert un Funktiounalitéit wann mir et ignoréieren an net drop aginn. (ähnlech wéi deemols beim Elile/Ivan..) Mia soll dem Lilly seng Grenzen matdeelen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-12-08T13:00:00.000Z","updatedAt":"2025-12-08T13:00:00.000Z"},{"id":"e_reu_20260105_lilly","studentId":"stud_lilly","date":"2026-01-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Telefon mat der Dr Königs (SCAP) den 12/12: kee regelmässegen Suivi bei hir, Rdv ginn oft ofgesot oder fannen ouni Lilly statt, kréien zanter Joeren recommandéiert bei den orthoponiste ze goen (excuse ass ëmmer datt si keen fannen), ech hunn mat der Dr Königs ausgemaach datt mir en HPG organiséieren wann de CDA bis dran ass. 2019 ass de KBII gemaach ginn an 2025 den iDS-2. Si werft Fro op wei aktiv den ONE/hir CPI ass?\nClearing mam CDA 16/12: Dem Lilly säin Fall ass während engem Clearing Gespréich firgestallt ginn an d’Haaptconclusioun ass déi dass d’Tester iDS – 2 an d’Tester vum CDI schon op eng Léierstéierung hiweisen. Si mengen dass et vill Opwand wier en Dossier ranzeginn fir d’Liesen an d’Schreiwen ze testen obwuel et schon schwarz op wäiss diagnostizéiert ass. Wat wier d’Plus-value?\nSi sinn der Meenung dass eng Medikamentenregulatioun (de Grammage ännert all Dag – dat ass guer net gutt) muss stattfannen fir d’Konzentratioun ze fuerderen an dass den Problem och deen ass dass d’Rahmenbedingungen joerenlang net gestëmmt hunn an net vun Virdeel waren fir d’Lilly.\nD’Famill schéngt hinen suspekt ze sinn esou dass Si sech gefrot hunn op do weider eppes net stëmmt (Grenziwerschreidung, de Papp huet elo ganz fréih opgehalen mat schaffen – Wat ass dat fir e Message un d’Lilly?, de RDV bei d’Orthophoniste fënnt net statt, keen regulären Suivi bei hierer Pedopsychiater, de Commitment ass net do an Si refuséieren Hellef – Virwat eigentlech?).\nD’Fro déi sech stellt: Wat braucht d’Kand elo? Hier Suggestiounen:\nAutonomieaarbecht soll geleescht ginn\nVu dass d’Lilly an engem Kompetenzzenter ass kann een mat der ATVA Zukunftsperspektiven festhalen.\nVu dass schon eng Léierstéierung am Raum steet, kann een Amenagementer aféieren am Liesen, Schreiwen a Rechnen an kucken wéi hatt domat Eenz gëtt.\nE WISQ Test machen fir wierklech z’iwerpréiwen op d’Resultat vum CDI stëmmt\nEen Vineland Test machen\nE Conseil Guidance oder eng Fachlech Berodung ufroen beim CDA (Dëst kann och gemach ginn fir d’Tester mat hinen z’interprétéieren an en Avis ze kréien vun hirer Perspektive – virun allem beim Vineland)\nUpdate 17/12 Een aus der UD kann de WISQ an den Vineland beim Lilly maan, de Gary seed mir Bescheed ween datt iwwerhëllt.\nPapp ass net mei sou kooperativ wei virdrun. Papp ass net mei sou kooperativ wei virdrun, ass informéiert. Et gëtt anscheinend keng CPI (demande refuséiert?)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-05T13:00:00.000Z","updatedAt":"2026-01-05T13:00:00.000Z"},{"id":"e_reu_20260105_jason","studentId":"stud_jason","date":"2026-01-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Verstärkerplang muss mei konsequent bewert ginn. Visite Lederwon (Betzdorf) 08.01(9h) an Yolande Coop (Betzdorf) 21.01(9h). Mamm wëll net bei den Dr. Bernard, sicht sech een aaneren.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-05T13:00:00.000Z","updatedAt":"2026-01-05T13:00:00.000Z"},{"id":"e_reu_20260105_miguel","studentId":"stud_miguel","date":"2026-01-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"demande de congé exceptionnel 28.1+29.1 : refus\nSituatioun virun der Vakanz:\nGraffiti/Clôture: Hien huet no laangem hin an hier, zouginn datt hien d’Zeechnungen wärend senger Paus op d’Paart vum Noper gemolt huet. D’Clôture gouf vun eis direkt gebotz, et ass näicht méi ze gesinn. Eng Entschëllegung gouf vun him geschriwwen a bei de Noper an d’Bréifkëscht geheit ginn (war keen doheem). Konsequenz: Méindes keng Paus, déi aaner Deeg just 1x.\nSuen/ Keess: Et hunn zweemol am Verkaafsgrupp wou de Miguel war, Geld aus der Keess gefeelt. Total 194€. D’Eltere goufen schrëftlech informéiert an et gouf d’Méiglechkeet, d’Suen anonym bis den 05.01 zréckzebréngen. Am Telefonsgespréich mam Papp huet hien erklärt, datt de Miguel Bargeld vun de Grousselteren kritt an hien schwéier kontrolléiere kann wéivill hien huet. Soss benotzt hien just seng Axess-Kaart mat där hien keen Geld ophiewe kann. Vape: Mir hu festgestallt, datt hien virun der Vakanz zwou Vapes bei sech haat. Eng gëtt hien of, déi zweet benotzt hien op der Toilette. De Papp huet se konfiskéiert.Stand haut: Bis haut keng Réckmeldung. Ass haut gutt ukomm. Konsequenz keng Vape huet en ugeholl. Gouf awer op der Toilette mat enger Redbull erwescht. Verstärkerplang gëtt bäibehaalen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-05T13:00:00.000Z","updatedAt":"2026-01-05T13:00:00.000Z"},{"id":"e_reu_20260105_alexp","studentId":"stud_alexp","date":"2026-01-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ass eng Woch ukomm, elo rem net mei, d’Elteren ginn mat an Richtung stationär Opnaam well se Angscht hunn datt et soss iwwert Geriicht geht, et steht op der Waardelescht fird’Statioun.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-05T13:00:00.000Z","updatedAt":"2026-01-05T13:00:00.000Z"},{"id":"e_reu_20260105_chase","studentId":"stud_chase","date":"2026-01-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"war virun der Vakanz erëm puer mol am Freeze. Ofzeklären bleift ob dat mat der ustehender Reintegratioun am 2.Semester ze dinn huet oder einfach mat der Middegkeet um Enn vum Trimester. Hien huet de Wecker moies net méi héieren. Wollt sech Dënschdes och am Aikido ofmellen, mä den Trainer huet him ugeruff fir hienz e iwwerrieden an ass och du gaang.\nVirun der Vakanz Mëssverständnis beim Sujet Ofhuelen an duerfir war de RV bei der Psychotherapeutin finalement net an der Praxis mä huet Online stattfonnt.\nD‘Verkafsaktiounen hunn him Spaass gemaach, huet et awer och ustrengend fonnt. Ass och nervös wéinst der Reintegratioun. D‘Situatioun erënnert d‘Mamm un déi Woch virum PEI-Gespréich läscht Joer. „Wéi wann hien Angscht viru sengem eegene Fortschrëtt hätt“.\nWar iwwerfuerdert beim Choix vum Wichtelcadeau mä huet et net zouginn.\nHoffen dass him d‘Vakanz gutt gedoen huet. Hie war mam Aikido an d‘Schwäiz. Vu dass säi jonke Brudder mat war, war d‘Mamm och mat. Ech hat elo an der Vakanz kee Kontakt mat him an och net mat den Elteren esou das sech nach net um aktuelle Stand sinn. D‘Mamm fänkt dës Woch de Stage un fir Enseignante ze ginn, hunn duerfir ab elo virun allem Kontakt mam Papp.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-05T13:00:00.000Z","updatedAt":"2026-01-05T13:00:00.000Z"},{"id":"e_reu_20260105_ben","studentId":"stud_ben","date":"2026-01-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"kritt naischt mei ze iessen ugebueden wann en ze speit kennt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-05T13:00:00.000Z","updatedAt":"2026-01-05T13:00:00.000Z"},{"id":"e_reu_20260105_mia","studentId":"stud_mia","date":"2026-01-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Dossier Bio 49/60","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-05T13:00:00.000Z","updatedAt":"2026-01-05T13:00:00.000Z"},{"id":"e_reu_20260112_lilly","studentId":"stud_lilly","date":"2026-01-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"D’Lilly konnt méi iwert seng Situatioun mat senger Mamm schwätzen, hatt gëtt vill ageengt an huet net vill Fräiheeten. Beispill: Hatt wollt an de Kino mat enger Frendin an seng Mamm ass matkomm. Säin eenzegen Ausgang (alleng, ouni d’Mamm) ass d’Jugendhaus.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-12T13:00:00.000Z","updatedAt":"2026-01-12T13:00:00.000Z"},{"id":"e_reu_20260112_jason","studentId":"stud_jason","date":"2026-01-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Feedback ATVA vun der eischter Visite. Huet dem Jason immens gutt gefall, virun allem den Holzatelier. Sie sinn bereed den Jason an den Stage ze huelen vum 02.02-06.02. D’Mamm huet sech nach bei kengem gemëllt gehat wéinst dem Diagnostik, sie hëllt awer Kontakt zu der Pedopsychiaterin op déi am Rapport stung. Plenneren eventuell op Irrel am Summer, awer net secher.\nClearing mam CTSA ass den 26.1.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-12T13:00:00.000Z","updatedAt":"2026-01-12T13:00:00.000Z"},{"id":"e_reu_20260112_miguel","studentId":"stud_miguel","date":"2026-01-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Virun der Vakanz hu mir een haard „Knuppen“ aus dem vum Späicher héieren. D’Schüler, dorënner och de MiTe selwer, hunn deemools uginn, de MiTe wier vum Stull gefall an de Kaméidi wier doduerch entstanen.\nLescht Woch an der Bezuchs­zäit huet de JaSc dem Joey matgedeelt, datt de MiTe e Knuppert um Späicher gezünd an aus der Fënster wollt geheien awer net ganz rausgeheit kritt huet. Mir hunn d’Reschter vum Knuppert um Späicher fonnt.\nSchonn virum Virfall, hat de MiTe mir identesch Knupperten aus senger Posch gewisen. Zu deem Zäitpunkt hunn ech him ausdrécklech gesot, datt hie sou Géigestänn net méi mat an d’Schoul brénge däerf.\nNodeems ech d’Elteren iwwer de Virfall informéiert hunn, kruut ech non-stop Messagë vum MiTe, an deenen hien uginn huet, datt hien ni méi mat mir schwätze géif an datt ech keng Beweiser hätt.\nHei hu mir et net méi mat engem Eenzelvirfall, mee mat enger geféierlecher, grenziwwerschreitender Handlung, mat Täuschung a widderhueltem Vertrauensbroch ze dinn.\nDe Papp deelt mat, dass de MiTe bestreit de Knuppert ugefaangen ze hunn. Fir de Papp ass awer och kloer dass hien de Knuppert ugezünd huet. De Bop hëllt hien eventuell déi éischt Woch vun der Fuesvakanz mat a Portugal an d’Bierger op de Bauerenhaff wou hien Gromperen etc setze kann.\nMoosnamen:\nDe MiTe beweegt sech net méi onbeopsiichtegt.\nAm Grupp ass ëmmer eng erwuesse Persoun dobäi.\nToilettengäng nëmmen op explizitt Nofro; eng erwuesse Persoun (wann ech am Haus sinn: ech) geet mat. (Dëst deelen ech him mat.)\nEt gëllt eng Null-Toleranz fir geféierlech oder verbuede Géigestänn.\nNëmmen nach eng Paus nom Iessen (kleng Paus gëtt bis op weideres gestrach)\nDoheem ginn rëm verstärkt Täschen kontrolléiert.\nAls Wiedergutmachung wäert ech mat him eng konkret Sécherheetsregel ausschaffen (A4-Blat: „Wat ass geféierlech / wat ass strikt verbueden?“), déi sichtbar am Raum festgehale gëtt.\nKruut och nach ze héieren, dass den JaSc an d’BeLi d’Gefill hunn, de Miguel géif an hier Rucksäck wulle goen.\nDe MiTe ass zu kengem Moment mei aleng am Grupp, hien huet ëmmer e Schied et gëtt bëssi mei ustrengend organisatoresch fir eis, d’Iwwergäng musse klappen. Hien breicht mei eng heichschwelleg Prise en charge mee d’Elteren mussen de Schrett och matgoen. Mir hunn d’CPI kontaktéiert fir en Austausch.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-12T13:00:00.000Z","updatedAt":"2026-01-12T13:00:00.000Z"},{"id":"e_reu_20260112_alexp","studentId":"stud_alexp","date":"2026-01-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"huet e Krankenschein bis Enn Januar, ass op der Wardelescht fir d’Statioun","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-12T13:00:00.000Z","updatedAt":"2026-01-12T13:00:00.000Z"},{"id":"e_reu_20260112_chase","studentId":"stud_chase","date":"2026-01-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ginn den Donneschdeg um 11h00 mat him an den LTA – RV mam Régent an eventuell Mëttegiessen do an der Kantin. PEI den 10/2 um 15h00; hat virun 2 Méint conseilléiert den Dr.Meynhardt nach eemol opzesichen well jo nach ëmmer keng Diagnos virläit. D’Mamm hat dat awer vergiess. Huet awer lo e RV ugefrot. Deemols war den ADHS-Test ofgebrach ginn. Mamm war deemols och irritéiert iwwer déi schnell Entloossung an der Klinik. Hir war dat ze „schwammeg“.\nChase war just 2 Deeg do läscht Woch. Ab dunn krank. Mamm sot dass den Aikido-Stage him gutt gedon huet. War ganz autonom, huet do och 2x den Dag geduscht. Passend Ausso vun engem Mann deen den Chase scho laang kennt: „Seng Schëlleren si méi breet ginn, ass gutt gewuess, mä seng Féiss sinn nach net fest um Buedem“","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-12T13:00:00.000Z","updatedAt":"2026-01-12T13:00:00.000Z"},{"id":"e_reu_20260112_ben","studentId":"stud_ben","date":"2026-01-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Seet dass hien op der Gemeng zu Tandel ugeholl ginn ass, krut awer nach keen Retour vum Foyer. Hien brauch anscheinend nach seng lettre de motivation, hien soll op Sarah zougoen fir en faerdeg ze maan an ze printen. Wann Wann de Ben wéi den Freiden 1 oder 2 Bléck verpasst, bleift hien Mëttes an der AJ fir Coursen nozehuelen. (Freides muss een kucken ob dat geet) Schwätzt mir vill vun Chômage, Revis an insgesamt net ze schaffen. (Neien Frend vun der Mamm huet 40 Joer an huet anscheinend nach nie geschafft) Dat faszinéiert hien irgentwéi, och wann hien seet dass hien dat net fir sech wéilt. Ech hunn him gewisen wat een kann oder net kann verdéngen mat diplôme an och ouni an wat d’Liewen zu Letzebuerg kascht. Hien kann sech guer net an d’Zukunft projezéieren an well deen Stage och net wierklech maachen. Hien seet mir hien géing déi Leit beneiden déi motivéiert sinn ze schaffen.\nWann hien net matschafft ob am Cours, Musique, Konscht, Projet asw. Oder refuséiert ranzegoen da geht hien an den Iesssall.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-12T13:00:00.000Z","updatedAt":"2026-01-12T13:00:00.000Z"},{"id":"e_reu_20260112_mia","studentId":"stud_mia","date":"2026-01-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet haut um 14h RDV weinst der Therapie (Haus 13), d’Mamm an d’Mia sinn sech bewosst dass sie dës Hëllef brauchen. Mëttwoch 9h30 RDV mam Mia an mat der Mamm fir hinnen d’Promotioun ze erklären an ze kucken wéi déi nächst Schrëtt sinn. Huet Doheem Panikattacken kritt an mech sech immens Drock wéinst allem wat bevir steht. (Stage, Dossier etc..) D’Schoul ass trotzdem relativ fuerderend, wat d’Situatioun méi schwéier mescht.\nUpdate: d’Schoul ass bereed Promotioun um Enn vum Joër op Basis vun engem Semester ze maachen an Deadline fir DIGSC An PHYSIK Dossier ass bis den 5.02 verlängert ginn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-12T13:00:00.000Z","updatedAt":"2026-01-12T13:00:00.000Z"},{"id":"e_reu_20260119_lilly","studentId":"stud_lilly","date":"2026-01-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Mir hunn den Eldib zesumme gemach an d’Lilly steet eigentlech net esou schlecht am V an SOZ, et ass ganz kloer dass de ganzen kommunikativen Deel e Problem ass (schwätzen an verstoen). Hatt kann och kloer soen dass hatt keng Virbiller huet an dass seng Elteren och keng fir hatt sinn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-19T13:00:00.000Z","updatedAt":"2026-01-19T13:00:00.000Z"},{"id":"e_reu_20260119_jason","studentId":"stud_jason","date":"2026-01-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Net gewosst ob hien kann am Liederswon méi spéit schaffen. Vum 02.02-06.02 am Stage, wéi ass et mat de Busser? Mamm huet sech beim Dr. Bernard gemëllt, warden op Retour.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-19T13:00:00.000Z","updatedAt":"2026-01-19T13:00:00.000Z"},{"id":"e_reu_20260119_miguel","studentId":"stud_miguel","date":"2026-01-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"E Freiden, wärend der Aktivitéit vum Här P. huet de Miguel eng onpassend Zeechnung gemaach. D’Lilly huet se gesinn a sech dobäi onwuel gefillt huet sech no der Aktivitéit zreckgezunn.) Hunn hien drop ugeschwaat an huet ofweisend reagéiert a keng Einsicht gewisen. Duerno ass seng Stëmmung weider gekippt. Hien gouf ëmmer méi onroueg, huet geäussert dass e keen bock méi huet an heem wëll. Hien war net am Grupp (Basket gespillt) mee ass ziellos duerch d’Haus geschlendert. An der Kichen huet hien de Frigo an Schief opgemaach. Dunn huet en sech an den Iessraum gesaat, Kapp op d’Bänk mat der Hand op den Desch geknuppt a widderholl geäussert dass hien heem well an him langweileg ass. Duerno huet e meng Uweisung: An der Camionette fir setzen, net akzeptéiert an huet sech entscheed net mat ze goen. Wou d’Camionette lass gefuer ass , wollt en dann awer mat. Dun ass e roosen ginn a mir d’Schold ginn dass e net mam Grupp konnt sinn. Hien ass rop a säin Klassesall gaangen, säin Schied hannendrun. Hien konnt net akzeptieren dass ech bei him sinn an ass op d’Toilette verschwonn. Ech him hannen drun. Soudass sech een ausweichend Verhaalen mat widderhueltem Wiessel teschent Klasseraum a Toilette.\nHien huet anscheinend Hausverbot am Auchan fir ee Joer.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-19T13:00:00.000Z","updatedAt":"2026-01-19T13:00:00.000Z"},{"id":"e_reu_20260119_chase","studentId":"stud_chase","date":"2026-01-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hunn déi zwou Situatioune vu läschte Méindeg (Ausso „Lies dach einfach Mein Kampf“ a Mangel u Motivatioun fir englesch Verben ze léieren) mat him geschwat, mä wéineg asiichteg. Schwiereg Situatioun de Mëttwoch am Däitschen – huet refuséiert e Saz ze schreiwen, well him dat proposéiert Verb net gefall huet -> huet total bloquéiert a gekrasch. Den Donneschdeg war et gutt gaang am Lycée. Ech konnt gesinn dass hien nervös war (Drockknapp un der Boxentäsch geklickst) an sech ee Moment onwuel an der Kantinn gefillt huet (kuerz Demi-Tour gemaach fir 2 Leit virzeloossen), mä dat huet hie gutt gemeeschtert. De Regent ass immens léif, empathesch a gedëlleg. Mëttes am Skills huet hien eng Liewenslinn gezeechent an eng hallef Stonn geschwat. Sot et wär him nach ni esou gutt gaang wéi grad am Moment.\nMamm huett RV‘er geholl, souwuel beim Dr.Meinhardt wéi och fir en Testing op ADHS. Duerno ass et awer fir si gedoen, sot si.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-19T13:00:00.000Z","updatedAt":"2026-01-19T13:00:00.000Z"},{"id":"e_reu_20260119_ben","studentId":"stud_ben","date":"2026-01-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Et fehlt grad un Motivatioun, Martina Mick ennerstraicht datt et rem Januar ass an datt dei schwieregst Zait fir de Ben ass, datt erklärt d‘Opstoen awer net seng Astellung wann en bis hei ass. De Ben krut d’lëscht Woch vun mir an vum Mireille d’Konsequenzen vun sengem Fehlen gesot, elo waarden mir op senge Reaktioun, soss gëtt d’PEI Gespréich zäitno mam Foyer organiséiert. Seng Absencen missten u sech geschwenn un Schoul gemellt ginn. Wann ech net do sinn, him transparent maachen wann hien 1 Block oder 2 Bléck verpasst huet, dass hien Mëttes dat muss noschaffen. Ass oppen fir eng therapeutesch Ënnerstetzung.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-19T13:00:00.000Z","updatedAt":"2026-01-19T13:00:00.000Z"},{"id":"e_reu_20260119_mia","studentId":"stud_mia","date":"2026-01-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gespréich mat den Elteren an mam Mia gehat. Hat huet sech enormen Drock gemaach wéinst den Dossieren an och wat d’Schüler an d’Personal iwwert hat denkt. Deadline gouf verlängert an d’Mia krut am der Optioun Dossier en leschten Donneschtdeg schonn vill gemaach. De Freiden wollt hat net aus dem Auto klammen, ass awer nodeem et mat der Mamm spadzéieren war eran komm. D’Mireille ass elo Bezugspersoun wann ech net am Haus sinn. Zil ass dass hat einfach elo rem an den Rhythmus kënnt. Huet sech géint den Therapeut ausgeschwat, well et een Mann ass. D’Mamm versicht eng Léisung ze fannen, bis dohinn gouf d’Mia gebieden dem Här eng Chance ze ginn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-19T13:00:00.000Z","updatedAt":"2026-01-19T13:00:00.000Z"},{"id":"e_reu_20260126_lilly","studentId":"stud_lilly","date":"2026-01-26","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Absente den 27.01 wéinst SCAP.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-26T13:00:00.000Z","updatedAt":"2026-01-26T13:00:00.000Z"},{"id":"e_reu_20260126_jason","studentId":"stud_jason","date":"2026-01-26","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"FAL 2.02. Haut Clearing Gespréich mam CTSA gehat. Neien Verstärkerplang, elo gouf d’Stonn no der Mëttespaus integréiert an sinn um iwwerlëen den Morning Meeting mat ze évaluéieren.\nStage vum 2.02-6.02 8h00-16h00\nKeng hallef Stären verginn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-26T13:00:00.000Z","updatedAt":"2026-01-26T13:00:00.000Z"},{"id":"e_reu_20260126_miguel","studentId":"stud_miguel","date":"2026-01-26","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Stage 18-23.5 PEI Gespréich: 09.02 um 11:00\nFeedback Verstärkerplang: Déi 3 Reegelen Sac/veste, Surveillance/consignes, Toilettes. Hien léisst sech drop an an akzeptéiert d’Reeglen, brauch awer nach Ënnerstetzung. Haale mer bäi bis Fuesvakanz. De Freide konnt hien am Réckbléck soen, wat net gutt waar: Hien kruut de Sëtz vun der Camionette op de Kapp. Konnt am Ufank net verbaliséieren waat lass ass. Am Musée konnt e sech net kontrolléieren an huet alles rëm ugepaak.\nDe Miguel säin Haaptzil ass et rëm zrëck an de Lycée goen. Hien denkt, wann en all Ziler/ Item vum EldiB greng huet a senger Stuf ass, hien rëm an de Lycée kann. Sou einfach wéi hien sech dat virstellt ass et awer net.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-26T13:00:00.000Z","updatedAt":"2026-01-26T13:00:00.000Z"},{"id":"e_reu_20260126_chase","studentId":"stud_chase","date":"2026-01-26","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hat eng gutt Woch. Am Däitschen an Engleschen super geschafft. An der Mathé wahrscheinlech eng schlecht (einfach–niveau de base) Prüfung geschriwwen. Denkt awer et wär gutt gaang (ass 31 ginn)\nAm Projet ass den Chase ëmmer eng Valeur sûre. War am Virfeld e bëssen opgereegt fir an de CIPA ze goen, mä hien huet dat gutt gemaach an ass ganz fein a sympathesch riwwer komm. Hien huet sech net missten ustrengen.\nHun ugefaang mat him de PEI virzebereeden. Konnt öfters soen „Dat kann ech; dat maachen ech“\nSchoulesch machen ech mir bësse Suergen ob hien eng 6G packe kann.\nEldib: V29, V30 a V31 ok\nK30, K31?, K32 – nee, wann da mit Unterstützung K33 ok, K34 och\nNeit 2.Zil: Ech mache meng Hausaufgaben","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-26T13:00:00.000Z","updatedAt":"2026-01-26T13:00:00.000Z"},{"id":"e_reu_20260126_ben","studentId":"stud_ben","date":"2026-01-26","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"War de Méinden an Donneschden guer net komm, Freiden net mat op d’Sortie. Huet seng Zigarettenstëmmel opgeraf an keeft sech elo een Äschbecher vir an matzehuelen. Konnt an der Situatioun net verbaliséieren wisou hien net wollt an d’Camionette. Wollt anscheinend net nierwend den Miguel well deen hien an d’Säiten pickt. Huet beim Mireille nach eng Kéier gesot dass hien oppen vir therapeutesch Ënnerstetzung wier. Konsequenzen bleiwen wéi gehabt, hien kann an de Pausen dat noschaffen wat en verpasst, soss keng Mëttesaktivitéit. (Ausser Skills, mir denken dass hien awer dovunn kann profitéieren) Vum Stage hunn mir nach keng News.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-26T13:00:00.000Z","updatedAt":"2026-01-26T13:00:00.000Z"},{"id":"e_reu_20260126_mia","studentId":"stud_mia","date":"2026-01-26","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Haat eng gutt Woch, war just Mëttwochs net do wéinst der Prüfung, konnt dës awer den Donneschden noschreiwen an krut eng 53. War mega stolz an erliichtert, och well et seng Dossier’en oofgeschafft kritt. Bei Prüfungen mussen mir eventuell öfter déi gutt Momenter an der Klass ausnotzen vir dës ze schreiwen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-26T13:00:00.000Z","updatedAt":"2026-01-26T13:00:00.000Z"},{"id":"e_reu_20260126_alexp","studentId":"stud_alexp","date":"2026-01-26","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"528 leçons excusées","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-01-26T13:00:00.000Z","updatedAt":"2026-01-26T13:00:00.000Z"},{"id":"e_reu_20260202_lilly","studentId":"stud_lilly","date":"2026-02-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"RDV beim SCAP: Mir hunn nach net vill Informatiounen ausser dass d’Medikatioun gewiesselt huet. E Freiden hat d’Lilly de WISC Test gemach deen relativ gutt verlaf ass. Et ass dem Jil an dem Micolas opgefall dass d’Lilly seng Besoinen gutt aschätzen kann. Si bewerten d’Resultat an dann machen mir nach eng Kéier Drock beim CDA (via d’CNI) fir d’Dys’en ze testen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-02T13:00:00.000Z","updatedAt":"2026-02-02T13:00:00.000Z"},{"id":"e_reu_20260202_jason","studentId":"stud_jason","date":"2026-02-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"haut de metten um 14h00 RDV bei der FAL, des Woch am Stage, en ass de moien gudd do ukomm. Huet ab dëser Woch eng Medikamentemstellung, hëllt Moies an Mëttes 15mg Medikinet (1 ½ Pëll). Ausserdem soll hien dës och an der Vakanz an Weekends duerch huelen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-02T13:00:00.000Z","updatedAt":"2026-02-02T13:00:00.000Z"},{"id":"e_reu_20260202_miguel","studentId":"stud_miguel","date":"2026-02-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Ass de Moien um 8:15 mam Bus ukomm a réischt um 8:40 ra komm. Konnt sech net op de cours a lossen a war de ganze Moien am Iessraum.\nDe Papp hat d’Kaap un am Gespréich, d’Mamm ass net matkomm, war deem Ganzen net gewues. D’CPI war awer dobäi na dat war déi éischte Kéier dass si de Papp gesinn huet. D‘Elteren haten dem Mireille säi Refus net verstaan well si joawer gutt kooperéieren. Elteren sinn sech och net ëmmer eens an de Papp ass net ganz present. Si krute matgedeelt dass mir mengen net richteg Mesure ze sinn na dass an dat mir dofir eng Discussioun op der CNI froen. D‘CPI huet eng Auslandsmesure ugeschwat (Etalle). Phoenix asbl rondrëm den André Feller ass och virgeschloe ginn.\nDem Papp seng Strategie ass menacéieren, sou wéi mir et och a läschter Zäit maachen, wat awer eigentlech net eis Art a Weis ass fir ze schaffen.\nDe Papp huet net verstaan dass d‘Fräistellung vun Dënschdes Mëttes just em Entgéintkommen ass a keng Belounung an Zeechen dass et gutt klappt.\nMireille huet dem Papp matgedeelt dass mir de Miguel net an der Regelschoul gesinn.\nAbus, manquement à l‘obligation scolaire,fraude… de Papp hëllt et op sech.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-02T13:00:00.000Z","updatedAt":"2026-02-02T13:00:00.000Z"},{"id":"e_reu_20260202_chase","studentId":"stud_chase","date":"2026-02-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"muss FRANC an ANGLA Prüfung nohuelen, Conseil ass den 12.02\nKleeder gi gewäsch, mä Mamm raumt se net an de Schaf. Wahrscheinlech schlofen d’Hausdéieren op de Kleeder. Mamm wëll sech anscheinend an der Vakanz nach eemol mam Sujet befaassen ?!? Dem Chase säin Zil ass dass d’Reintegratioun.\nDem Chase säin Zil ass dass d’Reintegratioun gutt klappt an de Fokus ass leider net um Schouleschen, well „wat bréngt et wann ech fir d’Prüfung geléiert hunn an duerno net am Sall sëtzen“ . Also hie wéilt schon dass béides klappt, hie wëll net einfach dohinner sëtze goen. „Béides ass wichteg, mä ech wäert awer net just léieren an da kann ech duerno vläit net do sëtzen“","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-02T13:00:00.000Z","updatedAt":"2026-02-02T13:00:00.000Z"},{"id":"e_reu_20260202_ben","studentId":"stud_ben","date":"2026-02-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"D’Gemeng vun Tandel an Vianden hunn hien net ugeholl am Stage. Foyer wollt eng Ufro zu Jonglënster maachen, ech hunn hinnen awer geschriwwen dass dëst keng sou gutt Iddi wier. Hien wier awer och interesséiert an enger Garage ze schaffen wann hien soss näischt fënnt. Schloof war lëscht Woch manner Thema. Huet am Skills konnten verbaliséieren wéi wichteg him déi Frëndschaft mam Chase wier.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-02T13:00:00.000Z","updatedAt":"2026-02-02T13:00:00.000Z"},{"id":"e_reu_20260202_mia","studentId":"stud_mia","date":"2026-02-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Konnt sech net op d’Prüfungen aloosen an ass Doheem bliwwen. D'Elteren sinn verzwéifelt an de Papp huet gesoot dass hien misst zwescht d’Mia an d’Mamm goen. Hat huet och Optioun Dossier verpasst an wäert wahrscheinlech net fäerdeg ginn. Vill méi kënnen mir net ubidden, d’Mia kritt déi Notten déi hat kann kréien, wann et net méiglech ass dann ass et 01. Beim PEI wäert beschwat ginn wéi et d’nächst Joer weidergeet an wéi d’Elteren/d’Mia sech dat virstellen, well hat net méi schoulpflichteg ass.\nMia daerf FRANC an MATHE Prüfung nohuelen, wann net kritt 01(läscht Woch war non-excusé), des Woch huet et en CM (Influenza) Conseil ass den 11.02","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-02T13:00:00.000Z","updatedAt":"2026-02-02T13:00:00.000Z"},{"id":"e_reu_20260202_alexp","studentId":"stud_alexp","date":"2026-02-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Elteren wëlle schwätzen an sech treffen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-02T13:00:00.000Z","updatedAt":"2026-02-02T13:00:00.000Z"},{"id":"e_reu_20260223_lilly","studentId":"stud_lilly","date":"2026-02-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Feedback PEI Gespréich en présence vun der Dr Königs: 1. Partie mam Lilly – d’Lilly war nervös an opgedréint an hat anscheinend säin Medikament net geholl. Den Elteren ass et schwéier gefall iwert dem Lilly säin Parcours ze schwetzen haptsächlech, déi Sachen déi gutt laafen. Zum Beispill soen si dass et gutt ass dass d’Lilly méi onofhängeg ass mee et klengt net esou (Elle grandit trop vite). D’Lilly gëtt non stop getrackt. Dem Lilly ass et och schwéier gefall allgemeng Sachen iwert sech ze soen.\n2. Partie ouni Lilly – Medikamenter, Trauma duerch Accident + en adaptéierten Suivi (Psychotherapeut + méi reegelméissegen Suivi bei der Dr Königs + Orthophoniste) goufen ugeschwat. D’Mamm war am Ufank net ofgeneigt bis dem Papp seng Reaktioun. Deen “huet sech missen kalméieren”, well hien géing dat Gerenns net méi matmachen, Si hätten dat schon alles hannert sech. “Ech well vun mengem Liewen profitéieren soulang ech nach liewen”. No dëser Resistenz sinn mir esou verbliwwen dass et non negociable ass.\nDe Papp huet sech haut entschellegt beim Mireille fir seng hefteg Reaktioun.\nDyspositif? Sarah renseigneiert sech.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-23T13:00:00.000Z","updatedAt":"2026-02-23T13:00:00.000Z"},{"id":"e_reu_20260223_jason","studentId":"stud_jason","date":"2026-02-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hëllt Moies an Mëttes 15mg Medikinet. Gëtt elo gekuckt ob d’Medikament net geännert gëtt. (Elvanse) Waren beim Cardiolog well den Jason Häerzklappen haat, schéngt souwäit alles normal, muss awer den Mëttwoch Moien ugeschloss ginn fir d’Häerz op eng méi laang Dauer ze kucken. Hien soll Mëttes awer mat an den Sport gouf der Mamm matgedeelt. Thema de moien: kritt en Holter a well deen Dag net an Schoul kommen, Réévaluatioun ass ugefrot fir den CTSA mat ranzehuelen. Situatioun Doheem huet sech däitlech verbessert säitdem d’Mamm hier nei Aarbecht huet. Stage ass gutt gaang, hien wier awer nie dohinner gaangen wier der Mamm hieren Frend net krank Doheem gewiercht fir hien ze aweschen. ATVA kënnt den 26.02 um 9h.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-23T13:00:00.000Z","updatedAt":"2026-02-23T13:00:00.000Z"},{"id":"e_reu_20260223_miguel","studentId":"stud_miguel","date":"2026-02-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Bréif un CNI fir eng Diskussioun am Plenum ass den 12.2 rausgaang. Woar an der Vakanz vill mat de Kollegen dobaussen. Huet gezockt an ass op seng Traininger gaangen. Huet mat senger Mamm um CV geschafft. Hien huet mech ëm Ënnerstëtzung gefroot fir eng Stageplaatz ze fannen. Aktuelle ass d’Haaptthema bei him, genuch Geld ze spueren fir sech e neien PC ze kaafen. Dofir wëll hien och an der Summervakanz op d’ Gemeng schaffe goen. Doheem hunn se (Miguel+Schwester) och e neie “Tokensystem” a Bezuch op Hausaarbeschtspflichten. All Woch kloer opgedeelt ween waat mescht a kréien dann dofir Täschegeld.\nHaut (23.02) am 2. Block (Däitsch) ab 11:20 am Iessraum verbruecht. Kap um Fensterbried mat den Aan zou. Gemeinsam ofgemaacht Gespréich, deem hie fir d’éischt zougestëmmt hat, huet hien refuséiert.\nDënschdes bleiwt hien bis op weideres bis 16 Auer. Projet Gaart","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-23T13:00:00.000Z","updatedAt":"2026-02-23T13:00:00.000Z"},{"id":"e_reu_20260223_chase","studentId":"stud_chase","date":"2026-02-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"geet de Freideg an den LTA. Huet Franséisch, Däitsch a Sport. PEI-Gespréich ass gutt verlaf. Hunn de Verdacht dass de Geroch vun engem Kueder kënnt, dee marquéiert. Den 12.3 Rdv beim Dr.Meinhardt. Hunn ugefrot fir do virdrun eng gemeinsam Visio (Dokter, Elteren, ech, evt. Psychotherapeutin). De 5.2 hat ech eng Visio mat de Proffen déi den Chase ab elo Freides am LTA gesäit. Hunn hinnen den Chase beschriwwen. Fänkt am Däitschen am niveau de base un. Elteren och absolut domadder averstan. De Regent huet gefrot fir e puer Arbéchten vum Chase ze gesinn fir méi e kloert Bild ze hunn. Ab desem Freiden geht hien an den LTA (ALLEM, FRANC, EDPHY). Den Chase muss sech bewosst sinn datt en doheem mei schaffen muss (an der MATHE zB)\nWann en DT (diplôme du technicien) ze usprochsvoll ass, kann den Chase och mat engem DAP nach Bëscharbéchter ginn. Wann en 2.Dag am Lycée bis dobäi kënnt, wär et gutt wann wann dat ee wär wou Mathé um Stonneplang ass. D’Uleies vun de Proffen ass kloer dass den Chase bei hinnen ukënnt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-23T13:00:00.000Z","updatedAt":"2026-02-23T13:00:00.000Z"},{"id":"e_reu_20260223_ben","studentId":"stud_ben","date":"2026-02-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Stage op der Ettelbrecker Gemeng vum 2-13.3. Foyer fënnt d’Iddi vum Liewenshaff och déi eenzeg realistesch Optioun, dëst gëtt zesummen mat den Elteren an mam Foyer diskutéiert. Foyer geseit dem Ben seng Entwécklung immens positiv, hien géing sech bei hinnen immens gutt maachen an si kucken elo therapeutesch fir de Ben eppes ze fannen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-23T13:00:00.000Z","updatedAt":"2026-02-23T13:00:00.000Z"},{"id":"e_reu_20260223_mia","studentId":"stud_mia","date":"2026-02-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Rdv an der Schoul fir Orientatioun 17.03 um 14h30. Beim PEI Gespréich kruten d’Elteren e kléngen Reality Check an si sinn sech der Situatioun bewosst, gesinn awer net an dass d’Mia sech an der ganzer Dynamik muss bewegen an/oder d’Konsequenzen vun sengem Verhalen muss erdroen. D’Mamm schützt d’Mia an ass net der Meenung dass bei him en Turnaround kënnt wann hat Doheem sëtzt an net wees wouhinn et geet. Mir hunn hinnen nach d’ATVA recommndéiert an dass d’Beschoulung bei eis am Juli fäerdeg ass. De Lycée gëtt dem Mia entweder d’Fiche de départ oder hat gëtt an enger Sektioun ageschriwwen, muss awer en présentiel sinn. D’Elteren verstinn d’Mia an sengem Verhalen an Reaktiounen net an wëssen net weider. Stage gëtt emmer rem beschwat, d’Mia blockt et awer oof an well insgesamt Doheem näischt vun der Schoul wëssen, hat wier midd an géing all Dag 2 Stonnen am Nomëtten schlofen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-23T13:00:00.000Z","updatedAt":"2026-02-23T13:00:00.000Z"},{"id":"e_reu_20260223_alexp","studentId":"stud_alexp","date":"2026-02-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"muer um 11h ass e Gespreich am HRS, ech ginn dohinner","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-02-23T13:00:00.000Z","updatedAt":"2026-02-23T13:00:00.000Z"},{"id":"e_reu_20260302_lilly","studentId":"stud_lilly","date":"2026-03-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"De Papp huet décidéiert mat der Pedopsychiaterin vum SCAP, der Madame Königs, ofzebriechen. An si sinn elo be der Dr Berthold.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-02T13:00:00.000Z","updatedAt":"2026-03-02T13:00:00.000Z"},{"id":"e_reu_20260302_jason","studentId":"stud_jason","date":"2026-03-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"huet zanter haut eng nei Medikatioun (Elvanse), hellt se net mei an der Annexe moie
