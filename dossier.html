tud_chase","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ab haut 3x am Lycée","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_ben","studentId":"stud_ben","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Visite vum Liewenshaff ass ofgesot haut well den Joey krank ass, neie Rdv ass nächste Meinden um 13h30, de Foyer relanceiert bei den Elteren\nMobibus ufroen fir de Stage beim Hein (Datum?)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_mia","studentId":"stud_mia","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Cloture ass gemach, se kommen des Woch dem Mia seng Saachen sichen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_lilly","studentId":"stud_lilly","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"- Lilly kennt muer den 02.06 net an d’Schoul wéinst 2 Dokter RDV.\n- Austausch mat der Dr Bertholdt den 4.06\n- Feedback Orthoponistin: Si fënnt dem Lilly säin Fall alarmant an konnt net schlofen well deen Fall hir souvill Suerge gemach huet. Ze gesinn dass en 14 jähregt Meedchen kaum liesen an schreiwen kann, wier ongewinnt an Si fënnt dass d’Elteren vill Excusen riets a lénks siche ginn. Mee dat wier keng Begrënnung fir dem Lilly seng Lacunen. Si hat dunn een Suivi firgeschloen vun 2x30 Minutten wöchentlech. D’Elteren haten dat awer ofgelehnt wéinst finanziellen Grënn.\nEch hat virun der Vakanz den Elteren ugeruff an hinen ze verstoen ginn dass dat net geet an dass mir grad 0 Konditiounen vun der CNI géingen erfëllen. Meng Obligatioun wier et dofir gleich ze signaléieren.\nD’RDV bei der Orthophonistin sinn elo finalement fest.\n- Den Antidepresseur ass net dem Lilly säint, Si hunn naischt esou am Haus, d’Lilly hätt sech gemellt gehat well do 10mg stoung an hatt gemengt huet et wier säin Medikinet.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_jayson","studentId":"stud_jayson","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Schouljoer net gepackt, denkt iwwer Ofbroch no; eventuell eng nei Ausbildung; Telefonéieren haut nach eemol; aktuell keng Ënnerstëtzung méi vun der ATVA;","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_levi","studentId":"stud_levi","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"krut säi contrat d’apprentissage gekënnegt, hien geht des Woch nach eemol bei de Kontrolldokter","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260608_alexp","studentId":"stud_alexp","date":"2026-06-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"kennt des Woch all Dag ausser haut. Rapport vum RDV de Freiden:\nD'Alex bléift bis de Freide vollstationär an duerno 2 Wochen Hôpital du jour, Ufank Juli wäert d’Ofschlossgespréich stattfannen. Den Dr. Meinhardt ass ganz zefridden mam Alex senger Entwécklung, hat kann besser verbaliséieren wat hat brauch an wëll par Rapport vu Professionellen awer och par Rapport zu den Elteren. Et ass ganz kloer gesot ginn, dass d’Alex bei eis an der Annexe bleift vir d’nächst Schouljoer an am Laf vum Joer kéint een un eng Reintegratioun nodenken. Nom Ofschlossgespréich wäert d’Alex weiderhin vu senger Therapeutin suivéiert ginn an den Här Schmalen vum ONE huet annoncéiert dass hien sech zeréckzitt, wat net optimal ass. D’Alex soll weiderhin seng Medikatioun (Stëmmungsophëllend) huelen bis sech alles stabiliséiert huet. Den Dr. Meinhardt wäert weiderhin dem Alex säi Pedopsychiater bleiwen, obschonns hien net immens vill Dispo huet. D’Elteren wëllen dass d’Alex d’Joer redoubléiert an dës Woch ass RDV am Réidener Lycée. D’Elteren goufen kloer dorop higewisen dass si d’Alex mussen ënnerstëtzen an senger Autonomie an net bei all Schwieregkeet déi schützend Hand ausstrecken. Wat den Transport ugeet, do hunn d’Elteren mam Averständnis vun der Psychologin gehandelt an d’Alex bruecht an erëm siche gaang. Sie sinn net der Meenung dass d’Alex dat hikritt an schwätzen him dat e bëssen an. Ech hu proposéiert Bus fuere mam Alex ze üben a kloer gemaach dass dat en zäitnot Zil ass. Leider gëtt et keen Opfangnetz am Fall wou d’Alex am September net méi kënnt. Vir d’Elteren kënnt en Internat net a Fro, dat heescht an dem Fall wäert d’Affaire iwwert SCAS/Geriicht verlafen. Ech telefonéieren dës Woch mam Här Tissier vir dee Fall ze beschwätzen. Ech soen och Bescheed soubal ech dem Alex seng Präsenzdeeg vun nächster Woch kënnen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-08T13:00:00.000Z","updatedAt":"2026-06-08T13:00:00.000Z"},{"id":"e_reu_20260608_colin","studentId":"stud_colin","date":"2026-06-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"D'Mamm bericht, datt et doheem allgemeng méi positiv leeft. De Colin géif méi iwwer positiv Saache schwätzen an hätt viru kuerzem vun sech aus virgeschloen, zesumme mam Mamm an den Intersport ze fueren. Do huet hien sech Kleeder an e Fussball kaaft. D'Mamm war iwwerrascht, well si hien nach ni aktiv Fussball spille gesinn huet. Si huet sech gefreet, datt hien d'Initiativ ergraff huet, eppes zesummen ze ënnerhuelen, wat soss éischter seelen virkënnt. D’ Mamm bleiwt awer nach skeptesch. Hien huet d'Méiglechkeet, datt hien zesumme mam Noper a senger Schwëster e Match kucke geet. Ausserdeem geet hien heiansdo lafen.\nMat der Mamm gouf thematiséiert, datt de Colin heiansdo Geschichten erzielt, déi net plausibel sinn (z. B. \"e Mann huet e Kebab op hie geschoss\"), souwéi Aussoen iwwer seng Aktivitéiten doheem, déi net ëmmer der Realitéit entspriechen. D'Mamm wäert dëst mat him beschwätzen.\nPositiv ass och opgefall, datt hien am Restaurant selwer seng Bestellung gemaach huet, wat fir d'Elteren ongewéinlech war. D'Annexe bezeechent hien doheem als \"Prisong\".\nAm Kachatelier weist de Colin eng positiv Entwécklung. Hien huet sech méi engagéiert a konnt verschidden Aufgaben deelweis autonom ausféieren. D'Mamm bericht och, datt seng fréier Kachenseignante am Lycée mat senger Aarbecht zefridde war.\nAm Sport fällt op, datt hien bei koordinativ usprochsvollen Aufgaben séier iwwerfuerdert wierkt an an d'Vermeidung geet.(“Wann ech mech konzentréieren, kréien ech Kapp wéi. Bleift wéi ugegoss stoen..., mëscht eppes aaneres wat gesot gëtt) A méi “komplexe” Spillsituatiounen (z. B. Fussball am Grupp, Schweinchen in der Mitte) weist hien eng verzögert Reaktioun an huet Schwieregkeeten, verschidde Informatiounen gläichzäiteg ze verschaffen an ëmzesetzen. Och bei Basisfäegkeeten wéi Ball fänken, Ball kontrolléieren, Gläichgewiicht halen oder Sprongübungen (op engem Been oder gläichzäiteg ob een Trëppelek) sprangen sinn däitlech Schwieregkeeten observéiert ginn.\nBei vereinfachten an individuell ugepassten Übungen (1:1 Passübungen) konnt hien sech besser op d'Aufgab alossen an aktiv matmaachen. Hien profitéiert vu kleng strukturéierten Übungssituatiounen an engem progressive Kompetenzopbau. Observatioun vun de motoreschen a koordinative Kompetenze sënnvoll.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-08T13:00:00.000Z","updatedAt":"2026-06-08T13:00:00.000Z"},{"id":"e_reu_20260608_jason","studentId":"stud_jason","date":"2026-06-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"D’Plënneren schéngt sech e bëssen ze verzögeren, den Jason beschäftegt sech vill mat der Fro wéi laang hien nach an der Annexe kann sinn, hien wees dass hien am September viraussiichtlech nach bei eis ass. D’Famill kënnt zu 6 op de Belenhaff.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-08T13:00:00.000Z","updatedAt":"2026-06-08T13:00:00.000Z"},{"id":"e_reu_20260608_alexk","studentId":"stud_alexk","date":"2026-06-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Clearing CTSA mat der Mme Barbara Leber: den Autist muss de Benefit gesinn fir ze kommen, kleng Etappen, visualiseieren, Spiegelen fir Secherheet ze ginn? (wei hues du geschlof? War et einfach haut fir ze kommen?) Hien huet eng aaner Zäitwahrnehmung virun allem lo an der Pubertät.\nAktuell op 22 Stonnen non-excusé innerhalb vun enger Woch. Bei 48 Stonnen non-excusé muss signaliséiert ginn.\nDen Alex huet fir dëst Woch een neien adaptéierte Stonneplang. Hien kann säin Wonschstonneplang dëst Woch maachen. Conditioun all Daag kommen. Mir testen dat eng Woch.\nMo: 8:30-12:00; Di: 10:00-16:00, Mi: 12:00-16:00, Do: 8:30-12:00; Freide RDV um 09:00 ATVA.\nDeal mat him maachen a punkto Stonneplang\nAn der Scol spé vum CTSA brauchen se en Certificat médical wann se just bëssi kommen\nHien huet keen Wecker, de Papp mëscht hien waakreg.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-08T13:00:00.000Z","updatedAt":"2026-06-08T13:00:00.000Z"},{"id":"e_reu_20260608_miguel","studentId":"stud_miguel","date":"2026-06-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Als Konsequenz vum Klauen am Stage (Drënkgeldkëscht an zwee Portmonnien) muss de Miguel säin Handy wärend der Schoulzäit ofginn. Leschten Dënschdeg hat hien en trotzdeem an der Täsch dobäi. Hien huet uginn, et doheem geholl ze hunn.\nD'CNI ënnerstëtzt eng Auslandsmesure. Et läit och eng volonté parentale vir. Den Zäitpunkt ass nach onkloer. D'CPI ass amgaang d'Organisatioun virzebereeden.\nDe Freideg um 18:00 huet de Miguel mir Screenshots vun enger Konversatioun mam Alex P. geschéckt. Hie wollt eis informéieren, datt d’ Alex nach ëmmer Angscht huet an d'Schoul ze kommen. De Miguel huet probéiert hatt ze berouegen an huet hir virgeschloen, sech z.B. op seng Platz ze setzen. (vis-à-vis vum Joey huet Alex dest net widderhol)\nD'Situatioun schéngt de Miguel ze belaaschten. Hie bleift respektvoll, weist awer Vermeidungsverhalen (geet dem Lilly aus dem Wee, setzt sech bewosst op aner Plazen). Haut ass hien krankgemellt. E méigleche Zesummenhang mat der aktueller Situatioun schléissen ech net aus.\nAusfluch: D'Mamm wëllt op kee Fall, datt de Miguel um Ausfluch iwwer Nuecht bleift. Virschlag: Hien hëlt un den Aktivitéiten deel, gëtt owes vun den Elteren ofgeholl a moies nees bei de Grupp bruecht.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-08T13:00:00.000Z","updatedAt":"2026-06-08T13:00:00.000Z"},{"id":"e_reu_20260608_chase","studentId":"stud_chase","date":"2026-06-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"War 3x am Lycée a fillt sech wuel do! War och de Méindeg alleng an d’Kantin (schwéier fir hien) gaang, mä huet dat ouni Problem hikritt. Am Engleschen krut hie Mëttwochs eng super Nott zeréck. Krut awer keng Äntwert wéi et de Freideg am Lycée war. Geet ab elo nieft dem Aikido och nach an den Indiaka.\nFranséisch bleift nach e risege Chantier. Huet den Dënschdeg d’Prüfung déi d‘Klass hat, hei ni eis gemaach. Hien hat mir näischt dovunner gesot. Wann ech de Message vu senger Proff net gesi gehat hätt, wär dat verpasst ginn.\nOral den Exposé deen hie Freides virun der Vakanz net am LTA gemaach hat, well hien dunn nach „krank“ war, huet hien den Donneschdeg dem Sarah virgedroen. Hie war net virbereet an huet just 7 Wierder gesot.\nSchloe vir, dass mir hien am September nach een Dag d‘Woch bei eis halen. Et geet him gutt, an hien huet eng immens Entwécklung gemaach, mä ass nach net stabil genuch fir all Stresssituatioun ze meeschteren. (opmannst fir e puer Wochen, Ofschloss géint Allerhellegen)\nFlott ze gesinn dass den IST-Zustand mat der Wonsch-Virstellung wat d‘Famill ugeet, quasi identesch ass.\nMä: haut lo net am Lycée. Rëm „krank“. War effektiv de WE krank (Schnapp,..huet och den Aikido-Stage ofgebrach) mä d‘Mamm ass net amused, dass hien de Papp de Moien rëm iwwerzeegt kritt huet, ze krank ze sinn fir an d‘Schoul ze goen. D‘Mamm huet him elo an der Mëttespaus gesot, dass hien umgaang ass seng Reinsertioun a Gefor ze bréngen. Hie war sech dat net bewosst.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-08T13:00:00.000Z","updatedAt":"2026-06-08T13:00:00.000Z"},{"id":"e_reu_20260608_ben","studentId":"stud_ben","date":"2026-06-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Visite um Liewenshaff haut um 13h30 ouni d‘Elteren. Huet an der Vakanz mat Wëssen vun der Mamm Vodka gedronk beim Noper. De Foyer wees nach net. Den Joey thematiseiert haut och mam Ben d’Wunnsituatioun wann en bis 18 ass.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-08T13:00:00.000Z","updatedAt":"2026-06-08T13:00:00.000Z"},{"id":"e_reu_20260608_lilly","studentId":"stud_lilly","date":"2026-06-08","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Wat mache mir mam Lilly en Donnesden wann hatt éischter muss fort? Mobibus soll hatt am LLIS ofhuelen\nD’Lilly ass, wéi et sech am Laf vun de leschten Wochen ugekënnegt huet, exzessif jalous op déi Persounen déi dem Miguel ze no kommen. Hatt kriselt och wann een ganz einfach Informatiounen hart ausdréckt iwert de Miguel an hatt (Beispill: Den Jason huet gesot dass de Miguel lauschtert wann hatt eppes seet).\nVu datt d’Alex P. dem Miguel méi no komm ass, ass d’Lilly aus dem Haischen an huet him gedroht (hatt wéilt hatt am léifsten schloen), hatt gepëtzt an ass einfach net léif. Den Ecart ass impressionant tëscht dem Lilly senger Wahrnehmung an seng Réalitéit.\nEch hat en Donnesden RDV mat der Dr Berthold fir dem Lilly säin Fall ze présentéieren aus eiser Perspektiv. Sie hat aner Informatiounen kritt an war och net frou doriwwer well si d’Impressioun hat dass d’Madame Everling hir d’Lilly ënnergejubelt hätt. D’Famill hat spéider och RDV mat der Dokter Berthold an ech mengen dass Si bessi méi streng mat hinen war. Fakt ass dass d’Lilly seng Dosis geännert kritt huet an dass Si och gepusht huet fir dass dem Lilly eng Psychothérapie gebuede gëtt. De Papp huet sech engagéiert fir duerno ze kucken.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-08T13:00:00.000Z","updatedAt":"2026-06-08T13:00:00.000Z"}]};

/* ---------------- Routing ---------------- */

function parseHash() {
  var raw = location.hash.replace(/^#\/?/, '');
  var qIdx = raw.indexOf('?');
  var path = qIdx === -1 ? raw : raw.slice(0, qIdx);
  var queryStr = qIdx === -1 ? '' : raw.slice(qIdx + 1);
  var query = {};
  queryStr.split('&').forEach(function (pair) {
    if (!pair) return;
    var kv = pair.split('=');
    query[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
  });
  var parts = path.split('/').filter(Boolean);
  return { parts: parts, query: query };
}

/* ---- gelernte Namen (Eltern/Geschwister etc. aus Importen) ---- */
function getLearnedNames() {
  try { return JSON.parse(localStorage.getItem(LS_PREFIX + 'learned_names') || '[]') || []; }
  catch (e) { return []; }
}
function addLearnedNames(arr) {
  try {
    var cur = getLearnedNames(), seen = {};
    cur.forEach(function (x) { if (x && x.name) seen[x.name] = 1; });
    (arr || []).forEach(function (x) {
      if (x && x.name && !seen[x.name]) { cur.push({ name: x.name, category: x.category || 'Person' }); seen[x.name] = 1; }
    });
    localStorage.setItem(LS_PREFIX + 'learned_names', JSON.stringify(cur));
  } catch (e) {}
}

}

/* ---- DOCX ---- */
function kbU16(b, o) { return b[o] | (b[o + 1] << 8); }

  }

  for (var k = 0; k < cnt; k++) {
    if (kbU32(bytes, p) !== 0x02014b50) break;
    var method = kbU16(bytes, p + 10), csize = kbU32(bytes, p + 20);
    var nlen = kbU16(bytes, p + 28), elen = kbU16(bytes, p + 30), clen = kbU16(bytes, p + 32);
    var lho = kbU32(bytes, p + 42);
    var name = new TextDecoder().decode(bytes.subarray(p + 46, p + 46 + nlen));
    if (name === wantName) {
      var lnlen = kbU16(bytes, lho + 26), lelen = kbU16(bytes, lho + 28);
      var dstart = lho + 30 + lnlen + lelen, comp = bytes.subarray(dstart, dstart + csize);
      if (method === 0) return Promise.resolve(comp.slice());
      return kbInflate(comp, 'deflate-raw');
    }

  }
  return Promise.reject(new Error('ZIP: ' + wantName + ' nicht gefunden'));
}
function kbXmlToText(xml) {
  var s = xml;
  s = s.replace(/<w:tab\b[^>]*\/>/g, '\t').replace(/<w:br\b[^>]*\/>/g, '\n').replace(/<w:cr\b[^>]*\/>/g, '\n');
  s = s.replace(/<\/w:tc>/g, '').replace(/<\/w:tr>/g, '').replace(/<\/w:p>/g, '\n');
  s = s.replace(/<w:t\b[^>]*>([\s\S]*?)<\/w:t>/g, function (_, t) { return t; });
  s = s.replace(/<[^>]+>/g, '');
  s = s.replace(//g, '\t').replace(//g, '\n');
  s = s.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&apos;/g, "'");
  s = s.replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').replace(/[ \t]{2,}/g, ' ');
  return s.trim();
}
function kbExtractDocx(bytes) {

}

/* ---- PDF (klassische xref-Tabelle, FlateDecode, CID/ToUnicode) ---- */
function kbLatin1(bytes) { var out = '', CH = 0x8000; for (var i = 0; i < bytes.length; i += CH) { out += String.fromCharCode.apply(null, bytes.subarray(i, i + CH)); } return out; }
function kbToBytes(str) { var u = new Uint8Array(str.length); for (var i = 0; i < str.length; i++) u[i] = str.charCodeAt(i) & 0xFF; return u; }

}
function kbFindKey(d, key) {

  var m = d.match(re); return m ? m[1] : null;
}
function kbRefNum(tok) { var m = tok && tok.match(/(\d+)\s+\d+\s+R/); return m ? parseInt(m[1], 10) : null; }
function kbBuildObjMap(s) {

  while ((m = re.exec(s))) { var num = parseInt(m[1], 10), start = m.index + m[0].length, end = s.indexOf('endobj', start); if (end < 0) continue; map[num] = s.slice(start, end); }
  return map;
}
function kbStreamBytes(obj) {
  var m = obj.match(/stream\r?\n/); if (!m) return Promise.resolve(null);
  var start = m.index + m[0].length, e = obj.indexOf('endstream', start), raw = obj.slice(start, e);
  if (raw.slice(-2) === '\r\n') raw = raw.slice(0, -2); else if (raw.slice(-1) === '\n' || raw.slice(-1) === '\r') raw = raw.slice(0, -1);

function kbParseToUnicode(s) {
  var cmap = {}, re = /beginbfchar([\s\S]*?)endbfchar/g, bm;
  while ((bm = re.exec(s))) { var cre = /<([0-9A-Fa-f]+)>\s*<([0-9A-Fa-f]+)>/g, cm; while ((cm = cre.exec(bm[1]))) { var src = parseInt(cm[1], 16), dh = cm[2], dst = ''; for (var i = 0; i < dh.length; i += 4) dst += String.fromCharCode(parseInt(dh.substr(i, 4), 16)); cmap[src] = dst; } }
  re = /beginbfrange([\s\S]*?)endbfrange/g;
  while ((bm = re.exec(s))) { var cre2 = /<([0-9A-Fa-f]+)>\s*<([0-9A-Fa-f]+)>\s*<([0-9A-Fa-f]+)>/g, cm2; while ((cm2 = cre2.exec(bm[1]))) { var lo = parseInt(cm2[1], 16), hi = parseInt(cm2[2], 16), base = parseInt(cm2[3], 16); for (var c = lo; c <= hi && c - lo < 65536; c++) cmap[c] = String.fromCharCode(base + (c - lo)); } }
  return cmap;

function kbFontMap(resTok, map) {

  var res = /^\s*\d+\s+\d+\s+R/.test(resTok) ? kbGetDict(map[kbRefNum(resTok)] || '') : resTok;
  var fk = kbFindKey(res, '/Font'); if (!fk) return Promise.resolve(fonts);
  var fd = /^\s*\d+\s+\d+\s+R/.test(fk) ? kbGetDict(map[kbRefNum(fk)] || '') : fk;
  var jobs = [], fre = /\/([A-Za-z0-9_.+-]+)\s+(\d+)\s+\d+\s+R/g, fm;
  while ((fm = fre.exec(fd))) {

      var fdct = kbGetDict(fobj), two = (fdct.indexOf('/Type0') >= 0) || (fdct.indexOf('Identity-H') >= 0), tou = kbFindKey(fdct, '/ToUnicode');
      if (tou && /^\s*\d+\s+\d+\s+R/.test(tou)) {
        jobs.push(kbStreamBytes(map[kbRefNum(tou)] || '').then(function (sb) { fonts[fname] = { two: two, cmap: sb ? kbParseToUnicode(sb) : {} }; }));
      } else { fonts[fname] = { two: two, cmap: {} }; }
    })(fm[1], map[parseInt(fm[2], 10)]);
  }
  return Promise.all(jobs).then(function () { return fonts; });

  function reviewHtml() {
    var r = st.report;
    var typeLabel = r.type === 'PEI' ? 'PEI — Individueller Förderplan' : (r.type === 'DS' ? 'DS — Spezialisierte Diagnose' : 'Bericht (Typ nicht sicher erkannt)');
    var studentOpts = students.map(function (s) { return '<option value="' + escapeAttr(s.id) + '"' + (s.id === st.studentId && !st.createNew ? ' selected' : '') + '>' + escapeHtml(s.name) + '</option>'; }).join('');
    var detRows = st.detected.map(function (d, i) {
      return '<label class="checkbox-row" style="display:inline-flex;align-items:center;margin:0 12px 6px 0;">' +
        '<input type="checkbox" data-det="' + i + '" ' + (d.on ? 'checked' : '') + '> ' +
        '<span style="margin-left:4px;">' + escapeHtml(d.name) + ' <span class="muted">(' + escapeHtml(d.category) + ')</span></span></label>';
    }).join('');
    var idn = r.identity || {};
    return '<div class="card export-config">' +
      '<h3 style="margin-top:0;">2. Erkannt: ' + escapeHtml(typeLabel) + '</h3>' +
      (st.warnLowText ? '<div class="warn-banner" style="margin-bottom:10px;">Es wurde nur sehr wenig Text gefunden. Falls dies ein <strong>gescanntes</strong> PDF ist, bitte die <strong>Word-Version</strong> (.docx) verwenden.</div>' : '') +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">' +
        '<div class="field"><label for="imp-student">Schüler zuordnen</label>' +
          '<select id="imp-student">' + studentOpts + '<option value="__new__"' + (st.createNew ? ' selected' : '') + '>➕ Neuen Schüler anlegen …</option></select>' +
          (st.createNew ? '<input type="text" id="imp-newname" style="margin-top:6px;" placeholder="Name des neuen Schülers" value="' + escapeAttr(st.newName || idn.name || '') + '">' : '') +
        '</div>' +
        '<div class="field"><label for="imp-date">Datum des Berichts</label><input type="date" id="imp-date" value="' + escapeAttr(st.dateIso) + '"></div>' +
      '</div>' +
      '<p class="muted" style="margin:2px 0 12px;">Stammdaten aus dem Bericht (bleiben <strong>nur lokal</strong> im Dossier): ' +
        escapeHtml(idn.name || '—') + (idn.matricule ? ' · Matrikel ' + escapeHtml(idn.matricule.slice(0, 4)) + '…' : '') + (idn.birthDate ? ' · *' + escapeHtml(idn.birthDate) : '') + (idn.schoolClass ? ' · ' + escapeHtml(idn.schoolClass) : '') + '</p>' +
      '<details open style="margin-bottom:12px;"><summary style="cursor:pointer;font-weight:600;">Erkannte Struktur &amp; vollständiger Text</summary><div style="margin-top:8px;">' + structurePreviewHtml() + '</div></details>' +
      '<hr class="divider">' +
      '<h4 style="margin:0 0 4px;">Schutz beim KI-Export</h4>' +
      '<p class="muted" style="margin:0 0 8px;">Matrikelnummer, Geburtsdatum, E-Mail und Telefon werden <strong>immer automatisch entfernt</strong>. Die folgenden Namen/Orte werden beim KI-Export ersetzt und für künftige Berichte gemerkt:</p>' +
      (detRows || '<p class="muted">Keine Namen automatisch erkannt.</p>') +
      '<div class="field" style="margin-top:8px;"><label for="imp-extra">Weitere zu schützende Namen <span class="hint">(eine pro Zeile, z. B. Eltern/Geschwister)</span></label>' +
        '<textarea id="imp-extra" rows="2" placeholder="z. B. Sabrina Scheffen">' + escapeHtml(st.extra) + '</textarea></div>' +
      '<div class="page-head" style="margin-top:14px;">' +
        '<button type="button" class="btn" id="imp-cancel">Abbrechen</button>' +
        '<button type="button" class="btn btn-primary" id="imp-save">📥 Bericht im Dossier speichern</button>' +
      '</div>' +
    '</div>';
  }

  function phaseHtml() { return st.phase === 'review' ? reviewHtml() : pickHtml(); }

  return {
    navKey: 'students',
    html: '<div class="page-head no-print"><div><h2>📄 DS/PEI-Bericht importieren</h2><p class="muted">Lädt einen Diagnostik- (DS) oder Förderplan-Bericht (PEI) ein, übernimmt ihn strukturiert ins Dossier und macht ihn für den anonymisierten KI-Export nutzbar.</p></div></div>' +
      '<div id="imp-wrap">' + phaseHtml() + '</div>',
    afterRender: function (root) {
      var wrap = qs('#imp-wrap', root);
      function rerender() { wrap.innerHTML = phaseHtml(); wire(); }
      function doSave() {
        var r = st.report; if (!r) return;
        var sid = st.studentId;
        if (st.createNew) {
          var nm = (st.newName || r.identity.name || '').trim();
          if (!nm) { showToast('Bitte einen Namen für den neuen Schüler eingeben.'); return; }
          if (!window.KB_ROSTER || !window.KB_ROSTER.add) { showToast('Schülerliste nicht verfügbar.'); return; }
          sid = window.KB_ROSTER.add(nm);
          try { if (window.KB_ROSTER.update) window.KB_ROSTER.update(sid, { anonLabel: kbGenAnonLabel() }); } catch (e) {}
        }
        if (!sid) { showToast('Bitte einen Schüler zuordnen.'); return; }
        var dateIso = st.dateIso || (new Date().toISOString().slice(0, 10));
        var body = kbReportToEntryText(r);
        var tags = [r.type === 'PEI' ? 'PEI' : (r.type === 'DS' ? 'DS' : 'Bericht')];
        if (r.goals && r.goals.length) tags.push('ELDiB');
        tags.push('Import');
        var report = {
          v: 1, type: r.type, reportDate: r.reportDate, dateIso: dateIso,
          identity: r.identity, recommendations: r.recommendations || [], goals: r.goals || [],
          sections: r.sections || {}, sourceName: st.fileName, kind: st.kind, importedAt: nowIso()
        };
        var learn = [];
        st.detected.forEach(function (d) {
          if (d.on && ['Arzt', 'Mataarbechter', 'Therapeut', 'Elteren', 'Person', 'Schüler'].indexOf(d.category) >= 0) {
            learn.push({ name: d.name, category: d.category === 'Schüler' ? 'Schüler (extern)' : d.category });
          }
        });
        (st.extra || '').split('\n').map(function (x) { return x.trim(); }).filter(Boolean).forEach(function (x) { learn.push({ name: x, category: 'Person' }); });
        addLearnedNames(learn);
        Repo.saveEntry({
          studentId: sid, date: dateIso, author: 'Import', category: st.category,
          tags: tags, text: body, report: report, source: { name: st.fileName, kind: st.kind }
        }).then(function () {
          showToast('✓ Bericht importiert');
          navigate('#/student/' + encodeURIComponent(sid) + '?hub=uebersicht');
        }).catch(function (e) { showToast('Speichern fehlgeschlagen: ' + ((e && e.message) || e), { error: true }); });
      }
      function wire() {
        var fileEl = qs('#imp-file', wrap);
        if (fileEl) fileEl.addEventListener('change', function () {
          var f = fileEl.files && fileEl.files[0]; if (!f) return;
          st.busy = true; st.err = ''; st.fileName = f.name || ''; rerender();
          kbExtractFileText(f).then(function (ext) {
            st.kind = ext.kind; st.rawText = ext.text || '';
            st.warnLowText = (st.rawText.replace(/\s/g, '').length < 200);
            st.report = kbParseReport(st.rawText);
            st.dateIso = kbReportDateIso(st.report.reportDate) || (new Date().toISOString().slice(0, 10));
            if (!st.studentId) { var mid = autoMatchStudent(); if (mid) st.studentId = mid; else { st.createNew = true; st.newName = st.report.identity.name || ''; } }
            var body = kbReportToEntryText(st.report);
            var detMap = detectNamesInText([body], { excludeNames: st.report.identity.name ? [st.report.identity.name] : [] });
            st.detected = Object.keys(detMap).map(function (nm) { return { name: nm, category: detMap[nm], on: true }; });
            st.busy = false; st.phase = 'review'; rerender();
          }).catch(function (e) {
            st.busy = false;
            st.err = 'Datei konnte nicht gelesen werden: ' + ((e && e.message) || e) + (/\.pdf$/i.test(st.fileName) ? ' — bei gescannten PDFs bitte die Word-Version (.docx) nutzen.' : '');
            rerender();
          });
        });
        var selEl = qs('#imp-student', wrap);
        if (selEl) selEl.addEventListener('change', function () { st.createNew = (selEl.value === '__new__'); st.studentId = st.createNew ? '' : selEl.value; rerender(); });
        var nnEl = qs('#imp-newname', wrap); if (nnEl) nnEl.addEventListener('input', function () { st.newName = nnEl.value; });
        var dEl = qs('#imp-date', wrap); if (dEl) dEl.addEventListener('change', function () { st.dateIso = dEl.value; });
        var exEl = qs('#imp-extra', wrap); if (exEl) exEl.addEventListener('input', function () { st.extra = exEl.value; });
        var dets = wrap.querySelectorAll('[data-det]');
        for (var i = 0; i < dets.length; i++) (function (cb) { cb.addEventListener('change', function () { st.detected[+cb.getAttribute('data-det')].on = cb.checked; }); })(dets[i]);
        var cEl = qs('#imp-cancel', wrap); if (cEl) cEl.addEventListener('click', function () { navigate(backRoute()); });
        var sEl = qs('#imp-save', wrap); if (sEl) sEl.addEventListener('click', doSave);
      }
      wire();
    }
  };
}

function resolveView(parts, query) {
  if (parts.length === 0 || parts[0] === 'dashboard') return viewDashboard({}, query);

  if (parts[0] === 'student' && parts[1]) {
    var sParams = { studentId: decodeURIComponent(parts[1]) };
    if (parts[2] === 'entry' && parts[3]) sParams.focusEntry = decodeURIComponent(parts[3]);
    return viewStudentDetail(sParams);
  }

  if (parts[0] === 'entry') {
    if (parts[1] === 'new') return viewEntryForm({
      studentId: parts[2] ? decodeURIComponent(parts[2]) : (query.student || ''),
      presetDate: query.date || '',
      presetCategory: query.category || '',
      returnTo: query['return'] || ''
    });
    if (parts[1] && parts[2] === 'edit') return viewEntryForm({ entryId: decodeURIComponent(parts[1]), returnTo: query['return'] || '' });
  }

  if (parts[0] === 'reunion') return viewReunion({}, query);
  if (parts[0] === 'orga') return viewOrgLog({}, query);
  if (parts[0] === 'search') return viewSearch({}, query);
  if (parts[0] === 'themes') return viewThemeAnalysis({}, query);
  if (parts[0] === 'export') return viewPdfExport({}, query);
  if (parts[0] === 'ai-export') return viewAiExport({}, query);
  if (parts[0] === 'report-import') return viewReportImport({}, query);
  if (parts[0] === 'backup') return viewBackup();

  return viewDashboard({}, query);
}

function navigate(hash, replace) {
  if (replace) {
    history.replaceState(null, '', hash);
    render();
  } else if (location.hash === hash) {
    render();
  } else {
    location.hash = hash;
  }
}

function render() {
  var parsed = parseHash();
  var view = resolveView(parsed.parts, parsed.query);
  var root = document.getElementById('app-root');
  root.innerHTML = shellHtml(view.navKey, view.html);
  var main = qs('#main-content', root);
  if (view.afterRender) view.afterRender(main);
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', render);

/* Globale Klick-/Tastatur-Delegation für [data-route]-Elemente
   (Sidebar, Karten, Buttons) — vermeidet Listener-Wirrwarr pro View. */
document.addEventListener('click', function (ev) {
  var el = ev.target.closest && ev.target.closest('[data-route]');
  if (el) {
    ev.preventDefault();
    navigate(el.getAttribute('data-route'));
  }
});
document.addEventListener('keydown', function (ev) {
  if (ev.key !== 'Enter' && ev.key !== ' ') return;
  var el = ev.target.closest && ev.target.closest('[data-route][role="button"]');
  if (el) {
    ev.preventDefault();
    navigate(el.getAttribute('data-route'));
  }
});

/* ---------------- Datenschutz-Hinweis (beim ersten Start) ---------------- */

function maybeShowPrivacyBanner() {
  var root = document.getElementById('banner-root');
  var dismissed = false;
  try { dismissed = !!localStorage.getItem(LS_PREFIX + 'banner_dismissed'); } catch (e) { /* Storage blockiert — Banner einfach zeigen */ }
  if (dismissed) return;
  root.innerHTML =
    '<div class="privacy-banner">' +
      '<div><strong>Alle Daten bleiben auf diesem Gerät.</strong>' +
      'Diese App läuft vollständig offline in Ihrem Browser. Es werden keinerlei Daten an externe Server gesendet, ' +
      'es gibt keine Cloud-Anbindung und keine Telemetrie. Sicherungen erstellen Sie selbst über „Backup exportieren"; ' +
      'der anonymisierte KI-Export (siehe Seitenleiste) landet ausschließlich in Ihrer Zwischenablage — niemals automatisch irgendwo sonst.</div>' +
      '<button type="button" id="banner-dismiss-btn">Verstanden</button>' +
    '</div>';
  qs('#banner-dismiss-btn', root).addEventListener('click', function () {
    try { localStorage.setItem(LS_PREFIX + 'banner_dismissed', '1'); } catch (e) {}
    root.innerHTML = '';
  });
}

/* Prüft beim Start, ob lokale Speicherung tatsächlich funktioniert.
   Wenn nicht (z. B. blockiert durch Browser-Einstellungen oder
   privates Fenster), wird ein deutlicher Warnhinweis gezeigt —
   sonst gingen Änderungen beim Schließen still verloren. */
function checkPersistenceAndWarn() {
  var ok = false;
  if (Storage.mode === 'indexeddb') {
    ok = true; // open() war erfolgreich — Schreibfehler melden die Views per Toast
  } else {
    try {
      localStorage.setItem(LS_PREFIX + '_write_test', '1');
      ok = localStorage.getItem(LS_PREFIX + '_write_test') === '1';
      localStorage.removeItem(LS_PREFIX + '_write_test');
    } catch (e) { ok = false; }
  }
  if (!ok) {
    var root = document.getElementById('banner-root');
    var warn = document.createElement('div');
    warn.className = 'privacy-banner';
    warn.style.background = '#f6e7e3';
    warn.style.borderColor = '#dcb4a8';
    warn.style.color = '#6e2a1a';
    warn.innerHTML = '<div><strong>Achtung: Lokale Speicherung ist in diesem Browser blockiert.</strong>' +
      'Einträge können erfasst, aber nicht dauerhaft gespeichert werden — beim Neuladen gehen Änderungen verloren. ' +
      'Bitte öffnen Sie die Datei in einem normalen Browserfenster (kein privater Modus) bzw. erlauben Sie Website-Daten für lokale Dateien.</div>';
    root.appendChild(warn);
  }
}

/* ---------------- Bootstrap ---------------- */

Repo.init()
  .then(function () {
    maybeShowPrivacyBanner();
    checkPersistenceAndWarn();
    render();
  })
  .catch(function (err) {
    document.getElementById('app-root').innerHTML =
      '<div class="empty-state">Fehler beim Initialisieren der lokalen Datenbank: ' + escapeHtml(err && err.message ? err.message : String(err)) +
      '<br>Bitte laden Sie die Seite neu. Falls das Problem bestehen bleibt, prüfen Sie, ob Ihr Browser IndexedDB / localStorage erlaubt.</div>';
  });

</script>
