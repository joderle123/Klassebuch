ard? Playstation ganz grousst Thema, Mamm huet schwiereg Kontroll doriwwer. Mamm grouss Bedenken wéinst Zukunft, kloer kommunizéiert ginn dass 2ten Arbeschtmarché eng Realitéit kéint sinn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-02-24T13:00:00.000Z","updatedAt":"2025-02-24T13:00:00.000Z"},{"id":"e_reu_20250303_chase","studentId":"stud_chase","date":"2025-03-03","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"D’Mamm huet vill erzielt vun Dem Chase senger Gebuert an deenen éischten 18 Méint duerno. Schwéier Zäit well do Papp do eng ganz schwéier Phase hat.\nZil vun der Mënz-Werfen: Tool aus der kleinen Psychotherapeutischen Schatzkiste; mir hunn 2 verschidde Gesiichter vum Chase kennegeléiert. Den “normalen” Teenie mat engem coolen Humor an deen ängschtlechen Chase dee Panik do virdrun huet fir e Fehler ze maachen. Deem huet den Chase och zougestëmmt. Elo entscheed d’Mënz moies wéi een Chase hien soll “spillen”.\nEt gesait no LTA aus, den Chase geht sech Schoul awer nach ukucken.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-03T13:00:00.000Z","updatedAt":"2025-03-03T13:00:00.000Z"},{"id":"e_reu_20250303_ben","studentId":"stud_ben","date":"2025-03-03","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Ass den Mëttwoch alkoholiséiert an d’Annexe komm. PEI Gespréich war an der Reih, si sinn eegenen Aussoen no “extrem ressourcenorientéiert”.. Kontakt mam Foyer trotzdem ganz schwéier (nei Matarbeschter). Den Här Kugener wiesselt elo den Grupp, entweder den Ben zitt do mat oder net. Huet am Moment keen Schloofrhythmus, mescht nuit blanche vir kënnen an d’Schoul ze kommen. Kann bei Deeg wou hien net an d’Schoul geet awer op d’Sortie/Mamm gesinn? Krut de Weekend d’Noricht dass seng Bom net méi laang ze lierwen huet + Léeno net méi do -> wéineg Motivatioun ze kommen. Mir leeschten eisen Dëel, elo ass et um Foyer + Ben en Effort ze maachen, hien ass net méi schoulpflichteg ab nächstem Joer.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-03T13:00:00.000Z","updatedAt":"2025-03-03T13:00:00.000Z"},{"id":"e_reu_20250303_alexp","studentId":"stud_alexp","date":"2025-03-03","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Mëscht sech dem Mara sengen Aussoen no vill Gedanken iwwert Laura\nAlex ass rem gutt ukomm, et huet deen 1. Block d’Laura suergevoll observeiert.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-03T13:00:00.000Z","updatedAt":"2025-03-03T13:00:00.000Z"},{"id":"e_reu_20250303_jason","studentId":"stud_jason","date":"2025-03-03","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Dierf ganz Woch keen Kicker spillen, huet den ganzen Kicker emgehéit an haat Schwieregkeeten mat der Konsequenz eenz ze ginn. Mëttwoch ass RDV beim Pédopsy, Mamm konnt sech schlussendlech awer fräi huelen. Hien feelt den Mëttwoch ab 10h.\nPlusvalue vun der Kichen?","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-03T13:00:00.000Z","updatedAt":"2025-03-03T13:00:00.000Z"},{"id":"e_reu_20250310_chase","studentId":"stud_chase","date":"2025-03-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hat eng gutt Woch. D’Strategie vun der Mënz werfen huet net gepasst; loossen dat sinn. Ass frou dass de Ben erëm do ass.\nAn der Presentatioun vun der asbl Trauerwee war den Chase ganz verschloss. Huet just ganz zum Schluss d’Fro gestallt ob et och eng Form vun Trauer wär, wann ee frou ass dass ee stierwt. Seng Boma war zum Schluss just nach Haut a Schank an hat vill gelidden. Hat der Mamm dat réckgemellt an och si huet dat ganz positiv fonnt dass den Chase och nach vun engem Externen wollt héieren, dass dat absolut ok wär wann ee frou ass dass een erléist ass. Si haten och schonn eng EMDR-Sëtzung wou den Chase d’Bild vun der ofgemoerter Boma duerch en anert ersat huet. Dat hat him vill gehollef well hien am Freeze-Zoustang war, wat seng Boma betrëfft.\nDe Moien war et net méiglech fir ze kommen. Wahrscheinlech wéinst der Mathéprüfung obwuel hie gesot krut hie bräicht se net ze schreiwen. Mamm wëll hien dass hien der Mme Penning schreiwt fir ze erkläre wat lass ass\nPEI nach net erageschéckt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-10T13:00:00.000Z","updatedAt":"2025-03-10T13:00:00.000Z"},{"id":"e_reu_20250310_ben","studentId":"stud_ben","date":"2025-03-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Ass den Dënschden op Mëttwoch an der Psychiatrie gewierscht. Alkohol war rem Thema, 4x op Fugue gaang mat enger Matbewunnerin an sinn och vun der Police op den Schinnen zu Angelduerf erwëscht ginn an zeréck an den Foyer bruecht. Duerno gouf Sachschaden bedriwwen an Police an Ambulanz sinn komm. Gouf erëm entloos, huet geduscht an wierkt erëm motivéiert. Wéisst erëm eng gewëssen Motivatioun an krut och elo 2x den Adapto Moies.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-10T13:00:00.000Z","updatedAt":"2025-03-10T13:00:00.000Z"},{"id":"e_reu_20250310_alexp","studentId":"stud_alexp","date":"2025-03-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet mir all d’Informatiounen iwwert d’Laura weiderginn. Haat Angscht dëst géing eppes un der Frëndschaft änneren, wat net den Fall ass. War de ganzen Weekend mam Laura an ass ganz gutt drop. Elteren hunn vergiess den RDV vir den Diagnostic bei der ESEB ze maachen, misst geschwënn awer stattfannen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-10T13:00:00.000Z","updatedAt":"2025-03-10T13:00:00.000Z"},{"id":"e_reu_20250310_jason","studentId":"stud_jason","date":"2025-03-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"War beim Pedopsychiater, Dr. Bernard huet gemengt et wier keen Autismus. Wollt sech keng Rapporter duerchliesen, mengt wëll den Jason vum CDSE begleet gëtt, dass säin Wee eng Reintegratioun mat CCP wäert sinn. Huet gemengt, dass wann d’Mamm den Wee wéilt goen vir eng Autismus Spektrum Diagnose, si sech un d’FAL (Fondation Autisme) soll wenden wou si eng Wardelëscht vun 4 Joer hunn. Den Dossier bei der FAL ass complet, bleift ze définéieren wat genau dat bedéit. Aaner Optioun wier Dr. Heugast Lacoste vum CDSE vir een zweeten Avis.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-10T13:00:00.000Z","updatedAt":"2025-03-10T13:00:00.000Z"},{"id":"e_reu_20250317_chase","studentId":"stud_chase","date":"2025-03-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Den Chase hat et Méindes net gepackt fir ze kommen wéinst der Mathéprüfung, konnt se awer de Freideg noschreiwen. De Mëttwoch hat hien e ganz gudden Dag. Wëll sech an Zukunft manner vum Ben oflenke loossen am Projet. Hien seet hie géing sech wuelfillen am Klassesall. Förderstonn huet hien net esou gär well do een him iwwer d’Schëller kuckt; NEUSA hat de Freideg kee Gespréich mat der Mamm well e gudde Frënd gestuerwen ass an du kee gudde Moment war.\nDen Chase war gestresst war der Mathesprüfung, e war am Freeze wei en bis un dei mei schweier Beispiller komm ass. Seng Nues huet dunn och geblutt. E kruut Propose gemaach de Rescht vun der Prüfung e Freiden ze schreiwen.\nneit Zil: ech äntwerten op Froen\nWiessel an den L1 wann d’Danielle kennt!","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-17T13:00:00.000Z","updatedAt":"2025-03-17T13:00:00.000Z"},{"id":"e_reu_20250317_ben","studentId":"stud_ben","date":"2025-03-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gett nach eng Kéier mat Medikatioun gekuckt, wéinst senger Middegkeet. Kënnt Moies net op, ass awer ganz gutt wann hien bis an der AJ ass.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-17T13:00:00.000Z","updatedAt":"2025-03-17T13:00:00.000Z"},{"id":"e_reu_20250317_alexp","studentId":"stud_alexp","date":"2025-03-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Meinden 24.03 um 14h Dyscalculie Testing.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-17T13:00:00.000Z","updatedAt":"2025-03-17T13:00:00.000Z"},{"id":"e_reu_20250317_jason","studentId":"stud_jason","date":"2025-03-17","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Ass op der Lëscht vun der FAL duerch den Besuch beim Dr. Bernard, 2029 gëtt den Diagnostique gemaach. Mamm ass verzweifelt, geséit hien iwwerhapt net am Lycée, huet d’Iddi bei der APEMH. Dofir brauchen mir awer een statut handicapé. Nächsten Step ass Kontakt mat der ATVA opzehuelen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-17T13:00:00.000Z","updatedAt":"2025-03-17T13:00:00.000Z"},{"id":"e_reu_20250324_chase","studentId":"stud_chase","date":"2025-03-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Konnt mam Chase iwwer verschidden Situatiounen an deenen hien zou gemaach huet schwätzen. Hien seet hien géing eis äntwerten. Seng Mamm seet, dass hien an esou Situatiounen an sengem Kapp äntwert. Hien erkennt an deene Momenter net wéi eng Wierder och fir eis ze héiere sinn. Fir hien ass et an der Rei doheem alles fäerdeg ze maachen wat hien duech e Freeze-Zoustand an der Schoul net gemaach krut.\nSeng Mamm empfënnt hien zur Zäit richteg gutt an ass richteg frou iwwer déi positiv Entwécklung. Hien ass och doheem vill méi selbstänneg.\nAss bal sécher dass hien nächst Joer an den LTA wëll goen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-24T13:00:00.000Z","updatedAt":"2025-03-24T13:00:00.000Z"},{"id":"e_reu_20250324_ben","studentId":"stud_ben","date":"2025-03-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Haat den Mëttwoch rem RDV mam Dr. Karst. Net vill dobäi eraus komm, mëscht sech anscheinend Gedanken wéinst senger kranker Bom, huet am Foyer an och an der AJ awer net ganz vill doriwwer geschwat. Si haalen seng Ticen am Aan. Medikatioun bleift wéi se ass. Ech haat mam Martina Mick riets, an et ass usesch haaptsächlech em dem Ben seng Middegkeet gaangen wisou den RDV ass. Den Educateur huet mir gesot, dass sie net doriwwer geschwat hunn. Den Educateur huet mir assuréiert dëst nach eng Kéier beim Dr. Karst unzeschwätzen. Mëscht am Foyer Aussoen hien wéilt eis an der AJ stolz maachen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-24T13:00:00.000Z","updatedAt":"2025-03-24T13:00:00.000Z"},{"id":"e_reu_20250324_alexp","studentId":"stud_alexp","date":"2025-03-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Néit Zil wäert sinn am Cours keen Franséisch méi mam Laura ze schwätzen. Mëscht Fortschrëtter doran ze konfrontéieren an och seng eegen Meenung ze vertrieden. (Mara) Haut Testing bei der ESEB. Geschwënn Adapto Moies huelen. Och wann kränklech, kënnt et an d’Schoul.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-24T13:00:00.000Z","updatedAt":"2025-03-24T13:00:00.000Z"},{"id":"e_reu_20250324_jason","studentId":"stud_jason","date":"2025-03-24","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Den Dr. Ristow huet eis confirméiert, dass deng Jason säin Profil genuch wier fir een Statut handicapé. Fahrplan ass elo dass d’Mamm beim Dr. Bernard nofreet fir dësen vun him ausgeschriwwen ze kréien, wann dëst net den Fall ass huet den Dr. Ristow eis säin Wuert ginn den Diagnostique ze maachen. Thema Aarbecht an wat aus him gëtt ass ganz präsent, ech schwätzen dat mat him un. An der Bezuchszäit konzentréieren ech mech elo méi intensiv mat him Achtsamkeet ze maachen, huet ganz gutt am Krav Maga geklappt an ech denken hien kann gutt dovunn profitéieren.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-24T13:00:00.000Z","updatedAt":"2025-03-24T13:00:00.000Z"},{"id":"e_reu_20250331_chase","studentId":"stud_chase","date":"2025-03-31","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Den Chase hat dat vum Jason direkt doheem erzielt. Hien schéngt wierklech net matkritt ze hunn, dass de JP gesot hat dass si sollten erausgoen well hien hat och doheem gesot dass hien net verstan hat virwat déi aner all erausgelaf sinn. Hie wollt bleiwen fir ze hëllefen am Fall wou hien gebraucht géif ginn. Dat mam „Iesse wär soss kal ginn“ war e Witz. Den Chase huet och en 1.Hëllefcours gemaach an d’Thema „verschlécken“ass bei hinnen schon oft thematiséiert ginn, well si am Bekanntekrees een Kand vu 6 Joer haten dat erstéckt war.\nBeim Thema Kleederwiessel a Geroch hat hie komplett zougemaach. Mamm seet mat de Schong wär et dat selwescht. Si seet mat engem 8-Jähregen kinnt een nach „streiden“ an de Pullover noutfalls ausdoen, mä mat engem 15-Jähregen,… Schong huet si him effektiv elo keng aner méi kaf (ausser Wanderschong a Sportsschong) well si all Joer e Puer, wat hien nie ugedoen huet an duerno ze kléng war, fortginn huet. Kleeder huet hien awer genuch! Si freet de Papp fir owes am Chase seng Kummer ze goen fir de Pullover fortzehuelen. Aus deem Grond vum Net-Kleederwiesselen haten si den Chase och op Autismus teste gelooss. Bis 5,6 Joer huet den Chase sech gär schéin ugedoen a chic gemaach.\nMamm huet eng Mail an den LTA gemaach an och do ugeruff a mat engem Här aus dem SEPAS geschwat. Den 8.5 ass Porte Ouverte; deemno wéi laang déi owes geet, froen si villäicht ob den Chase do e bëssen éischter kinnt goen. Krute gesot dass et net esou einfach wär fir op eng 6e eranzekommen well si net esouvill 7e’en hunn. D’Elteren kënnen hei villäicht eis (dem Mireille) seng Hëllef gebrauchen. D’Decisioun gëtt eréicht am Juli geholl.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-31T13:00:00.000Z","updatedAt":"2025-03-31T13:00:00.000Z"},{"id":"e_reu_20250331_ben","studentId":"stud_ben","date":"2025-03-31","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Haat eng ganz gutt Woch, war bis op den Freiden all Dag pünktlech an ass och stolz drop. Freides huet hien dem Foyer gesoot hien géing den Bus méi spéit huelen well hien keng Loscht op Mathé haat, koum fir d’Iessen an huet d’Prüfung am Franséischen nogeschriwwen. Et gouf him kommunizéiert, dass wann hien Moies fir d’Coursen net do ass wëll hien keng Loscht huet, dann gëtt Mëttes an enger Form dëst nogeholl. Et mussen Konsequenzen kommen wann hien erem mam Hitler kennt, den Joey thematiséiert dest am Bezuch mat him.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-31T13:00:00.000Z","updatedAt":"2025-03-31T13:00:00.000Z"},{"id":"e_reu_20250331_alexp","studentId":"stud_alexp","date":"2025-03-31","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet d’Tester geschriwwen fir d’Dyscalculie, den Donneschden 15h ginn ech mam Papp bei d’'ESEB fir d’Resultater. D’Alex huet awer schonn gesoot dass hien géing mengen ouni et ausgewäert ze hunn, dass et sech em Dyscalculie handelt. D’Alex huet fir d’éischt Kéier geäussert et wéilt an d’Reegelschoul, wat een groussen Fortschrëtt ass. Hat soll mat sengen Elteren doriwwer schwätzen, zemools well hat d’Schoul wëll wiesselen. Ech hunn am Bezuch mat him d’CCP an DAP’en gekuckt, hat schéngt och mat CCP zefridden ze sinn. Huet et grad e bessen méi schwéier, wëll d’Laura no dësem Schouljoer fort ass an dat mam Mara mëscht em och ze schaafen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-31T13:00:00.000Z","updatedAt":"2025-03-31T13:00:00.000Z"},{"id":"e_reu_20250331_jason","studentId":"stud_jason","date":"2025-03-31","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Haat den Freiden Péng an der Bauchregioun während enger Stonn, ech sinn mat him zeréck an d’Annexe gefuer wou d’Mamm hien sichen komm ass. Et schéngt awer alles an der Reih ze sinn. En Aan drop haalen, dass hien während dem Mëttegiessen gutt knaat an net déi ganzen Zäiten schwätzt beim Iessen. D’Mamm huet dem Dr. Bernard geschriwwen an deen huet hier en RDV proposéiert fir sech mat der Thematik vum statut handicapé auserneen ze sëtzen. Huet 2 nei Ziiler, soll am Cours schwätzen wann hien opgeruff gëtt an wann hien eppes seet soll hien\n1) iwwerleen op et thematesch passt an 2) op déi Persoun grad nolauschtert. Gären hien drop opmierksam maachen. Mat der Zensur huet alles geklappt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-03-31T13:00:00.000Z","updatedAt":"2025-03-31T13:00:00.000Z"},{"id":"e_reu_20250505_chase","studentId":"stud_chase","date":"2025-05-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"huet vun elo un Denschtdegs mettes Atelier Jardin amplaatz vum Atelier LLIS; ass immens engagéiert bei sportlechen Aktivitéiten; hat am Engleschen erëm eng Situatioun wou eng Tréin komm war; krut sech awer schnell an alleng rëm reguléiert. Net begeeschtert vum Projet um Beelenhaff, si gespaant ob hien et packt do matzemaachen(gin do muer méi gewuer); hat sech de Moien um 7h00 bei mir ofgemellt; well ech liicht Zweifel hat, hunn ech nogefrot wat hien hätt. Hat elo grad senger Mamm geschriwwen a sinn du gewuer ginn dass si dës Woch net do wär. Op meng Nofro hinn, woust si woust och näischt vu sengem Ofmellen, de Papp och net. Ourewéih stëmmt awer, dovun hat hie geschwat, mä hien hat awer gesot hie géing an d‘Schoul goen. Mamm mengt awer net dass et en Zesummenhang tëscht dem Chase sengem Fehlen an hirer „Absence“ doheem gëtt. Si huet elo mam Chase geschwat; hien huet sech de Moien selwer versuergt (Zwiwwel op d‘Ouer geluecht) an huet elo manner wéih an héiert erëm, affaire à suivre","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-05T13:00:00.000Z","updatedAt":"2025-05-05T13:00:00.000Z"},{"id":"e_reu_20250505_ben","studentId":"stud_ben","date":"2025-05-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hëllt seng Stonnen déi hien verpasst Mëttes no. Hien huet mir Zigaretten ginn, am Fall wou hien der eng Kéier net hätt, déi sinn bei mir am Tirang, do wou och d’Medikamenter sinn. (an enger gieler Këscht) Extrem loschtorientéiert wann et em d’Aarbecht geet (schoulesch wéi och physesch), mir hunn am Kapp nodeems hien bei eis an der AJ war eng eventuell Réintégratioun an den Liewenshaff. (à voir)\nHien w.e.g. zeréck huelen wann hien den Jason provozéiert. (vice versa natierlech och)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-05T13:00:00.000Z","updatedAt":"2025-05-05T13:00:00.000Z"},{"id":"e_reu_20250505_alexp","studentId":"stud_alexp","date":"2025-05-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Vill krank gewierscht, 2x virun der Annexe gewierscht an et net gepackt eran ze kommen. Huet en nidderegen Blutdrock an Kappwéi. Ech telefonéieren muer mat der Mamm, mir kënnen d’Alex mat dësen Feelstonnen (gleich 100h vir 2t Semester) net réintégréieren an ech maachen elo rem méi Drock + eventuell Réaktivatioun vum CPI. Waarden nach op den Retour vum CDA wéinst der Dyscalculie.\nWar och op der PO vum LTC a kruut gesot et soll am LTAM nofroen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-05T13:00:00.000Z","updatedAt":"2025-05-05T13:00:00.000Z"},{"id":"e_reu_20250505_jason","studentId":"stud_jason","date":"2025-05-05","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Net méi am Atelier LLIS. Muss bis 18 Joer an engem Lycée ageschriwwen sinn, dohier hëllt APEMH hien mat 16 nach net. Mir hunn Kontakt zur ATVA opgeholl an si huelen sech dem Dossier un. Et ass een Dossier complex an sie waren och nach net an dëser Situatioun. Den Jason bleift viraussichtlech bis zum Ënn vum nächsten Schouljoer bei eis an dann huet d’ATVA eng Plaatz wou hien an Däitschland kéint en Berufsvorbereitungsjahr maachen vir een Joer (hien wier duerno dann 17 ½) an dann kéint een fir en Atelier protégé kucken, evt bei Yolande Coop dei sinn mei flexibel wei APEMH. Mamm hätt Méiglechkeet an den nächsten 2 Joer 1 Joer “fräi” ze huelen vir sech em den Jason an seng Therapie ze këmmeren. (CAE)\nEsst lues a lues méi fëst Saachen, net nemmen Zopp, brauch awer nach ganz vill Ënnerstetzung dobäi.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-05T13:00:00.000Z","updatedAt":"2025-05-05T13:00:00.000Z"},{"id":"e_reu_20250512_chase","studentId":"stud_chase","date":"2025-05-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Et war läscht Woch net einfach fir an d’Annexe ze kommen. No zwee Deeg doheem, war et Mëttwochs schwéier erëm ze kommen, war awer du frou dass hien et gepackt hat. Porte Ouverte vum LTA huet dem Chase gutt gefall. Am Fr.gëtt et schwéiwer nächst Joer op enger 6G. SABSA recommandéiert eng „Vakanz“ a Frankräich oder en Dossier ze maachen. Fir de Moment versteet hien nach ganz wéineg, erkennt net wéi eng Zäit et ass,…\nAm D.an Engl. gesäit d‘DIEAN manner Schwieregkeeten fir op enger 6G matzekommen. De Problem läit bei senger Rigiditéit. Hien gesäit kee Sënn 100 Wierder ze schreiwen, a sengen An geet et mat 5 Wierder och duer. An der Mathé waren et bessi mei schweier de moien wei en eppes net verstaanen huet, konnt et net selwer soen. Am Allgemengen ass awer eng grouss Evolutioun ze erkennen; vill méi à l’aise, vill méi oppen,.. Wann dat mam LTA eppes gëtt, musse mir hinnen eng Aschätzung ginn (niveau de base, avancé??)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-12T13:00:00.000Z","updatedAt":"2025-05-12T13:00:00.000Z"},{"id":"e_reu_20250512_ben","studentId":"stud_ben","date":"2025-05-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet dëst Semester schonn 110 Feelstonnen. War d’lëscht ganz Woch all Dag minimum 4 Stonnen ze spéit, seet hien géing den Wecker net heieren, den Foyer schwätzt awer vill vun Motivatioun. De Foyer no leeft alles ganz ganz gutt beim Ben, hien wier “net méi erem ze erkënnen”, sozialiséiert sech, proposéiert Aktivitéiten an ass ingesamt ganz aktiv an kritt sech besser réguléiert. De Foyer krut awer och e kléngen Realitéitscheck wou ech hinnen soot dass de Ben um Wee ass seng 6G net ze packen an eng 5AD unzestéieren. Domadd misst hien den LTA wiesselen an kee Lycée misst hien unhuelen, vue dass hien net méi schoulpflichteg ass. De Ball léit beim Ben an beim Foyer, an de Gespréicher schéngt de Ben asiichteg ze sinn an konnt ganz gutt reflektéieren den Donneschden Mëtten. (Blieder sinn op mengem Pult wann een dës wëll liesen) Den Här Kugener schwätzt haut mam Ben, hat de Weekend keng Zäit.\nMedikatioun hëllt hien elo um 18h, net méi um 19h an hien ësst net am Grupp wann hien no 11h bei eis ukënnt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-12T13:00:00.000Z","updatedAt":"2025-05-12T13:00:00.000Z"},{"id":"e_reu_20250512_alexp","studentId":"stud_alexp","date":"2025-05-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Nämlecht wéi de Ben huet d’Alex 111 Feelstonnen an dësem Semester. Den Drock gouf den Dënschden am Gespréich mat Elteren an Alex an den Donneschden vum Mireille däitlech erhéischt. Hat huet der Mamm e Message geschriwwen wou hat vir d’éicht kommunizéiert wéi et him geet, ass awer och eraus komm wéi schwiereg et vir hat ass do eraus ze kommen. Hat war den Samsten bei sengem Therapeut an d’Mamm mëllt sech bei der Dr Aarab vir den Suivi erëm ze lancéieren, wann dëst net geet, dann sichen sie een aaneren Pedopsychiater. Wann dës Feelstonnen an dësem Rhythmus weiderginn, recommendéieren mir stationär. Huet an der Moyenne 14-15h Screentime, wat d’Elteren net besonneg schockéiert huet.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-12T13:00:00.000Z","updatedAt":"2025-05-12T13:00:00.000Z"},{"id":"e_reu_20250512_jason","studentId":"stud_jason","date":"2025-05-12","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"gett Ufank Juni bei der ATVA dispatched, si iwwerhuelen de Suivi fir démarchen Richtung Statut handicapé bei der Adem mat him ze maachen an se kucken wat bis dohinner ass. Huet e RDV beim Neurolog","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-12T13:00:00.000Z","updatedAt":"2025-05-12T13:00:00.000Z"},{"id":"e_reu_20250519_chase","studentId":"stud_chase","date":"2025-05-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Réckbléck Beelenhaff: „Kiche war ok, de Service war net ok (bei Leit froe goen wat se wëllen drénken,…), de Recht war langweileg“. War net frou d’Hallschent vum Sport verpasst ze hunn.\nThema Hausaufgab ugeschwat „hat net wëlles déi Mail ze schreiwen. Ech hat kee Grond,..“. Neit Zil: Ech machen eng Aufgab och wann ech de Senn doranner net direkt erkennen. Zil schengt schweier, et eventuel rofbriechen. Et fällt op dat hien fir all Schrett eng Opfuerderung brauch. Sous-entenduen ginn et net.\nFeedback vun der PO vum LTA „d’Schoul ass schéin“. Kann net soen wéi eng Aktivitéit hien begeeschtert huet. D‘Mamm versicht e Gespréich mat der Direktioun vum LTA ze kréien an informéiert och selwer den EIMAB dass momentan intensiv iwwer e Schoulwiessel nogeduecht gëtt.\nHu mat der Mamm och iwwer den Chase seng Sturheet geschwat. De RV fir bei d’Psychotherapeutin steet, mä den Chase well net goen. Hien mengt hien wär jo elo gutt. D’Mamm kämpft awer nach a probéiert wieder hien dovunner ze iwwerzeegen, dass et gutt a wichteg fir hien ass. De Bréif fir op de Misärshaff war net bei hir ukomm. Si kann sech virstellen, dass den Chase och baussen am Zelt wëll schlofen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-19T13:00:00.000Z","updatedAt":"2025-05-19T13:00:00.000Z"},{"id":"e_reu_20250519_ben","studentId":"stud_ben","date":"2025-05-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"HPG war haut, gutt gelaaf. Perspektiv : 5AD am LTEtt an duerno CISP Liewenshaff oder CIP/COP Klass. Kritt eng Blutanalyse an gett den Handy elo obligatoresch of owes.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-19T13:00:00.000Z","updatedAt":"2025-05-19T13:00:00.000Z"},{"id":"e_reu_20250519_alexp","studentId":"stud_alexp","date":"2025-05-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"huet Panikattacken, well net aleng sinn, och net op der Toilette, d’Mamm kruut gesot se soll mat him an Urgence psychopédiatrique fueren, CPI ass ageschalt, den Jooey waard op de Reckruff","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-19T13:00:00.000Z","updatedAt":"2025-05-19T13:00:00.000Z"},{"id":"e_reu_20250519_jason","studentId":"stud_jason","date":"2025-05-19","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"funktionneiert relativ gutt mat der rouder Kaart, Iddi dei auszedehnen ob dei aner Aktivitéiten.Huet Rdv beim Neurolog","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-05-19T13:00:00.000Z","updatedAt":"2025-05-19T13:00:00.000Z"},{"id":"e_reu_20250602_mia","studentId":"stud_mia","date":"2025-06-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"kennt des Woch all Dag bis 13h an de L2. War 2 Joer net an der Schoul: 2023-2024 5C an 2024-2035 5G avancé. Ass heichallergesch op alles mat Soja. Lauschtert gäre Musek, kacht gären an liest Mangaen op englesch.\nLaut Rapport ass Leeschtungsangscht en Thema. Huet keen Pedopsy an och keen Therapeut, steht awer beim ONE op Waardeleschten\nLaut Dr Ristow: sehr lustorientiert, sie war damals fokussiert auf soziale Ängste, Medienkonsum, Elteren setzen net genuch de Kader, Mia bestemmt wat leeft, ADHS unzureichend behandelt ?! Seng Hypothese ass datt Mia elo bis Summer gutt geif laafen an duerno net mei…\nVanessa Nilles, ORE 621 586 410\nJoey géing hat muer déi 1. Stonn huelen, eischten Bezuch. War de moien direkt am Grupp, huet gelaach","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-02T13:00:00.000Z","updatedAt":"2025-06-02T13:00:00.000Z"},{"id":"e_reu_20250602_chase","studentId":"stud_chase","date":"2025-06-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"den Ausfluch huet him immens gutt gefall; huet doheem vill vun deem Apparat geschwat deen d’UV-Strahle moosst,…\nHat eng flott Vakanz. Bësse gekeimt, dass se ze kuerz war, mä wou hie realiséiert hat, dass et just nach 5 Woche sin, war dat negativt Gefill fort.\nRV Psycholog: hunn ee fonnt dee Consultatiounen am Bësch mécht. RV elo nach 2 Woche méi spéit, mä dat do ass genau dem Chase senges.\nHie war mega stolz iwwer seng Mathéprüfung a richteg frou, dass d’Mireille him dat gesot huet. Mail EIMAB hen steet op der To do. PEI Gespréich nom 9.Juli. De Papp waard nach op de Planning vu senge Conseils de classe.\nNote pédagogique op 6G Niveau, net op S2","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-02T13:00:00.000Z","updatedAt":"2025-06-02T13:00:00.000Z"},{"id":"e_reu_20250602_ben","studentId":"stud_ben","date":"2025-06-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gespréich mam Martina Mick an Michel Kugener usech gutt verlaaf, Foyer wäert méi konsequent am Emgang mam Handy sinn. Schoulesch gouf décidéiert op eng 5AD ze goen an keng 5G weiderzeféieren, den Ben haat keng gréisser Problemer domadd. Zil wier LTEtt, do muss elo mat der Direktioun geschwat ginn an och mat der Direktioun vum LTA, wéinst all den N-E vum Ben. Adapto gouf ugeschwat an wann si lo géingen entscheeden den Transfer ze annuléieren, misst den Ben um 06h17 aus dem Haus vir den Öffentlechen ze huelen. Um Ausfluch gouf och nach eng Kéier ganz kloer wéi schwéier et ass hien aus dem Bett ze kréien. Muss nach seng 30 Euro vum Ausfluch oofginn. Feelstonnen ginn an den Pausen nogeholl.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-02T13:00:00.000Z","updatedAt":"2025-06-02T13:00:00.000Z"},{"id":"e_reu_20250602_alexp","studentId":"stud_alexp","date":"2025-06-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Famill war Mettwochs um Kierchbierg an der Akutstatioun beim Dr. Meinhardt an do gouf d’Dagesklinik ugeschwat. D’Elteren sinn net oofgenéigt, d’Alex ass awer nach skeptesch. Si sollten sech bei hinnen mëllen fir eng Visite, gouf awer nach net gemaach, d’Mamm bleift hannendrun. D’Alex gëtt vun Dag zu Dag vum Spidol krank geschriwwen. D’Vakanz war ganz schwéier, d’Alex haat vill Ängschten an zitt sech ëmmer méi zeréck, d’Mamm huet op een Motivatiounsschub gehofft, deen net komm ass. Den ONE (Schmalen Nico) mëllt sech net zeréck bei eis an och net bei der Famill... Leidensdrock och héich bei den Elteren. Mamm huet ugeschwat awer wëllen den Schoulwiessel an den LTAM ze maachen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-02T13:00:00.000Z","updatedAt":"2025-06-02T13:00:00.000Z"},{"id":"e_reu_20250602_jason","studentId":"stud_jason","date":"2025-06-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gëtt elo Ufank Juni vun der ATVA dispatched.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-02T13:00:00.000Z","updatedAt":"2025-06-02T13:00:00.000Z"},{"id":"e_reu_20250616_mia","studentId":"stud_mia","date":"2025-06-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hellt ab elo emmer den Mobibus (Méindes 12h, Dënschdes 16h an de Rëscht vir den Moment 13h). War all Dag do d’lëscht Woch, konnt mir kloer soen dass hat Freides net wëll bis 16h bleiwen, wat ganz positiv ass well hat tendéiert staark dozou alles direkt zu 100% ze maachen well hat mengt dass dat vun him verlangt ass. Zil bei him ass realistesch an progressiv d’Beschoulung ze erhéigen (war Donneschdes net komm well him alles ze vill war, hat midd war an gemengt huet net kënnen an der Schoul adäquat opzepassen opwuel hat schonn alles gesinn huet) Mamm schéngt d’Mia gutt aschätzen ze kënnen an och seng Problematik. Hat seet dass et immens motivéiert a frou wier bei eis ze sinn, fennt gudden Kontakt zu den MatschülerInnen virun allem dem Mara. Huet kee gutt Selbstbild, préparéiert emmer fir d’ésicht den Terrain andeems hat seet dass hat eppes net kann, net gutt ass etc.. Bei him mussen mir vill Spiggelen, him virun Aan sëtzen dass hat Progrès mëscht, well hat ass immens selbstkritesch an ech denken vun alleng geséit hat net dat positivt an sengen Implikatiounen. Dohier maachen ech mat him en Zil à la “Ech benennen 2 Saachen déi mir gutt gelongen sinn an dësem Block”\nHuet haut an der MATHE an am FRANC aner Reaktiounen/Blockagen gewissen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-16T13:00:00.000Z","updatedAt":"2025-06-16T13:00:00.000Z"},{"id":"e_reu_20250616_chase","studentId":"stud_chase","date":"2025-06-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"geet muer vun 10-12 bei säin Therapeut op Huelmes, kënnt duerno mam Bus an d‘AJ. D‘Mamm war glécklech den Chase um Fest vun der Frëndschaft esou ze gesinn. EIMAB ass informéiert dass den Chase net méi wëll zeréckkommen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-16T13:00:00.000Z","updatedAt":"2025-06-16T13:00:00.000Z"},{"id":"e_reu_20250616_ben","studentId":"stud_ben","date":"2025-06-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet haut RDV beim Dokter vir seng Blutanalyse ze analyséieren, kann sinn dass hien Suppléments kritt. Huet als Zil sein Energy Drink Konsum ze reduzéieren, schwätzt dovunn dass hien 2-4 den Dag drénkt. Kënnt all Dag ze spéit an verpasst den Adapto, nemmen nach eng Fro vun der Zäit bis sie den Transport astellen, kënnt awer éischter wéi soss. (net méi um 12h)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-16T13:00:00.000Z","updatedAt":"2025-06-16T13:00:00.000Z"},{"id":"e_reu_20250616_alexp","studentId":"stud_alexp","date":"2025-06-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Vill Froen wat elo soll geschéien. RDV an der Dagesklinik réicht Enn Juli, wat d’Famill frustréiert. D’Mamm seet dass d’Alex déi ganzen Zäiten krank wier, laafen vun engem Dokter zum nächsten. Famill geet all Wee mat an d’Alex seet anscheinend et wier motivéiert fir an d’Dagesklinik. (à voir) Signalement sinn ech mir net secher op dat den richtegen Message weidergëtt vue dass et sech em en psychiatreschen/medizineschen besoin handelt an d’Famill alles mat geet. Den Här Schmalen huet sech gemellt, mir telefoneieren muer. Och eng Info oder Réévaluatioun un d’CNI wier wichteg, soudass sie um Laafenden sinn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-16T13:00:00.000Z","updatedAt":"2025-06-16T13:00:00.000Z"},{"id":"e_reu_20250616_jason","studentId":"stud_jason","date":"2025-06-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Rdv mat der ATVA ass den 8.07, virdrun Teams mat hinnen. D’Mamm huet ee groussen Leidensdrock, wees net méi wat mam Jason maachen. Sie probéiert den STEP unzewenden, hier feelen momentan awer déi néideg Ressourcen an Gedold well beim Jason sou lues och d’Pubertéit an d’Spill kënnt. Huet der Mamm hier Kaart geholl an Saachen domadd bezuelt, hier Passwierder geännert, äntwert nemmen nach frech an wëll doheem näischt méi machen nemmen nach PS5 an Youtube. Si ass ganz transparent an der Kommunikatioun an immens frou dass d’ATVA sech dem Jason unhëllt. Ech hunn hier ugebueden dass si mir hier Erwaardungen un den Jason an dem Jason seng Erwardungen/Besoinen soll opschreiwen soudass ech en Token System kann mat him erstellen deen iwwersiichtlech ass an him soll méi konkret weisen wat vun him verlangt ass an dass hien sech Saachen kann erschaffen. (bei sou nidderegem IQ ass Introspektioun an Kausalitéit net do an Token Systemer fannen do hier Plaatz.)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-16T13:00:00.000Z","updatedAt":"2025-06-16T13:00:00.000Z"},{"id":"e_reu_20250630_mia","studentId":"stud_mia","date":"2025-06-30","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Mëscht sech schouleg immensen Drock (Freides Matheprüfung) obwuel hat wees dass hat just matschreift. Ass awer schonn besser wéi am Ufank (do war Drocksituatioun de Cours). Hat ass immens glécklech bei eis, ass frou dass d’Mara do ass an huet der Mamm gesoot dass hat och eng gutt Bindung mam Personal huet. Hëllt Dënschdes an Freides um 16h den Adapto. Fokus bei him ganz kloer Drock eraushuelen, hat positiv stärken an ob sengen Ressourcen opbauen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-30T13:00:00.000Z","updatedAt":"2025-06-30T13:00:00.000Z"},{"id":"e_reu_20250630_chase","studentId":"stud_chase","date":"2025-06-30","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Thema Hygiène ugeschwat – schwiereg!\nGespréich mat der Mme Grober aus der EIMAB; gesäit e Wiessel op eng 6G an den LTA och als positiv, fiche de départ eréicht wann eng Preinscriptioun do ass; den Chase ass häerzlech wëllkomm fir en Ofschlossgespréich, fir him all Gutts ze wënschen; den Chase géing dat och gutt fannen\nSchoulesch: Psychorigiditéit weider e Problem; op der enger Säit eng super Presentatioun am Däitschen, op der anerer Säit souwuel am Engleschen wéi och an der VIESO erëm komplett zougemaach\nJPA huet hie ganz gutt gemeeschtert; Mamm ass immens frou hien esou ze gesinn; si freet sech op d‘PEI-Gespréich; ass sech bewosst dass nach vill ze schaffen ass, mä gesäit awer virun allem weivill den Chase „gewues“ ass","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-30T13:00:00.000Z","updatedAt":"2025-06-30T13:00:00.000Z"},{"id":"e_reu_20250630_ben","studentId":"stud_ben","date":"2025-06-30","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hëllt Nahrungergänzungsmëttel (Zinc, Vitamin D, eppes fir d’Schilddrüse), Martina Mick wëll dat medizinesch weider ofklären loosen. Hien huet säin Energydrinkkonsum och reduzéiert an kritt heiansdo bei eis e Kaffi, wann hien et brauch. Huet eng Woch um Stéck den Adapto kritt. Den Lycée technique Ettelbrück hëllt hien op eng 5AD, den Papp muss just mam Ben dohinner goen fir sech anzeschreiwen. Mëscht momentan eng gutt Entwécklung.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-30T13:00:00.000Z","updatedAt":"2025-06-30T13:00:00.000Z"},{"id":"e_reu_20250630_alexp","studentId":"stud_alexp","date":"2025-06-30","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gouf elo 2 Wochen vum Hausdokter krank geschriwwen, bis den Dr. Meinhardt zeréck ass. Isoléiert sech Doheem nach emmer, den Här Schmalen (CPI) ass um laafenden an schwätzt weiderhinn mat der Famill, Thema Medikamenter, Medienkonsum an Pedopsychiater. Alex huet bei der Mamm Ausso gemaach dass hat net wéilt an d’Dagesklinik, awer et wéilt een Suivi vum Dr. Meinhardt, wat awer net wäert gescheien. Dohier kucken mir wat Ënn Juli eraus kënnt am Gespréich mat der Dagesklinik. Schoul wees och Bescheed an schreift d’Alex op enger 6P an. D’Famill wëll awer d’Schoul wiesselen an an den Arts et Métiers, à voir.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-30T13:00:00.000Z","updatedAt":"2025-06-30T13:00:00.000Z"},{"id":"e_reu_20250630_jason","studentId":"stud_jason","date":"2025-06-30","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"No engem éierlechen Gespréich ass d’Situatioun Doheem vill besser seet d’Mamm. Den Jason war bei der Mme Rizzi zu Lamadelaine (net an Däitschland), war no Aussoen vun der Mamm ganz authentesch mat hier an sie kréien an 3-4 Méint eng Evaluatioun vun engem Pedopsychiater wéinst dem Verdacht op Autismus. Mireille an ech haaten och een Teams mat der ATVA, mir hunn den Jason virgestallt an eis Suergen ausgedréckt. Si hunn ganz kompetent gewierkt an hunn e puer Pisten, mussen halt just den Jason kënnen léieren. (08.07)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-06-30T13:00:00.000Z","updatedAt":"2025-06-30T13:00:00.000Z"},{"id":"e_reu_20250710_mia","studentId":"stud_mia","date":"2025-07-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"War de Freiden, Dënschden an de Mëttwoch bis 16h. Mëscht am Grupp Stëmmung an hëllt och keen Blaat virun de Mond. Kann een Jason z.B. gutt op d’Plaatz sëtzen ouni dass hien beleidegt ass. Den ADHS kënnt zu Momenter sichtlech zum Vorschein, brauch emmer eppes am Grapp, knabbert un Fläschenstëpp ... Am Aan ze haalen ass méi spéit denken ech och säin Spillverhaalen, huet déi lëscht zwee Deeg no der Schoul jeweils 5-6 Stonnen mat enger Frendin online gespillt. Wann hat elo 2 ½ Mount dat weider féiert, kéint et schwéier ginn den Schoulrhytmus zeréck ze fannen, à voir. Huet ugeschwat dass hat sech bëssen Suergen mëscht, wëll hat am Ufank vum Joer wäert quasi dat eenzegt Meedchen sinn, ausser déi Deeg wou d’Mara do ass. Ech hunn mam Papp geschwat, deen wierkt ganz am Bild vun der Situatioun an huet gutt Froen gestallt, war hat lëscht Woch sichen komm. D’Mia geet mam Camper an de Süden vun Frankreich mat der Famill, freet sech op d’raus goen mat senger Frenndin an sengem Kolleg an natierlech op schloofen/zocken.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-07-10T13:00:00.000Z","updatedAt":"2025-07-10T13:00:00.000Z"},{"id":"e_reu_20250710_chase","studentId":"stud_chase","date":"2025-07-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"huet sech virgeholl all Moien ze duschen.Mat Seef. Hien huet elo eng fonnt vun deer hie kee Kappwéih kritt. Dat hat awer läscht Woch schonn net geklappt well hien dunn net komm war wou d‘Mamm net do war. War dunn awer Mëttwochs owes obwuel dat net „Waschtag“ ass. Kann oppen doriwwer schwätzen. Gëtt am PEI och als Entwicklungszil ugeschwat. Kann am MM an an der Bezuchszäit nogefrot ginn.\nAss gëschter net komm; de Rimm ass rof; huet et och den Denschdeg den Owend net an den Aikido gepackt.\nAschreiwung an den LTA ab dem 16.7\nSi ginn an Italien an d‘Vakanz. An en Haus in the middle of nowhere – Chase fënnt et langweileg do; Hien geet net schaffen an der Vakanz; et ass deen 1.Summer säit laangem wou hien Vakanz huet","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-07-10T13:00:00.000Z","updatedAt":"2025-07-10T13:00:00.000Z"},{"id":"e_reu_20250710_ben","studentId":"stud_ben","date":"2025-07-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Seng Hygiène huet sech erëm verschlechtert, den Här Kugener huet mir gesoot, hien hätt elo virun net laanger Zäit 2 Wochen gehat wou hien sech net gewäsch hätt. De Ben huet zouginn, dass hien Efforten gemaach huet wéinst engem Meedchen am Foyer, wat him awer kloer gemaach huet dass hat näischt vun him wëll. Am PEI ass eraus komm dass den Foyer immens zefridden mam Ben seng senger Entwécklung wier, hien hätt guer keng Impulsivitéit méi, hien géing näischt méi futti maachen, säin Alkoholkonsum géing sech op Familjenfester limitéieren an hien géing vill manner fëmmen. Och wier hien méi proaktiv am Kontakt zu den Jugendlechen an wéi mir och bemierken, ass säin Selbstbild besser an hien wierkt e gutt Stéck méi selbstbewosst. Hien mëscht vun sech aus Sport am Foyer (Fitness), kuckt sech op Tiktok Workouts an Übungen un an mëscht déi an hierem Fitnessraum. Hien huet fréier nie wëllen mat den aaneren aus dem Foyer Fussball spillen, well déi de Geck mat him um Terrain gemaach unn, well si halt immens gutt waren, hien mëscht mettlerweil awer mat an et ass him egal ob hien verléiert oder gewënnt, wat e riesen Schratt vir hien ass. Hien soot mir dass hien d’AJ awer wäert vermessen, virunallem wëll hien sech Moies wäert langweilen ouni Programm. Hien huet sech op ganz vill Aktivitéiten gemëllt am Foyer an fiert och mat hinnen op München 1 Woch.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-07-10T13:00:00.000Z","updatedAt":"2025-07-10T13:00:00.000Z"},{"id":"e_reu_20250710_alexp","studentId":"stud_alexp","date":"2025-07-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Net ganz vill Neies, hat huet geäussert net wëllen an d’Dagesklinik ze goen, mais dovir en Suivi vum Dr. Meinhardt ze wëllen. Mir hunn Haut PEI mam Här Schmalen vum ONE an wäerten hinnen d’Optioun virwéisen an dass kee Wee un Dagesklinik oder Stationär laanscht geet vir dass hat sech erem eng Chance huet bei eis ze kommen. Hat huet mir e Message geschriwwen vir Merci ze soen vir dëst Joer, och wann et net ëmmer positiv war, an dass hat sech freet am September erëm bei eis ze kommen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-07-10T13:00:00.000Z","updatedAt":"2025-07-10T13:00:00.000Z"},{"id":"e_reu_20250710_jason","studentId":"stud_jason","date":"2025-07-10","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"War elo déi lëscht Deeg nach méi duerch de Wand wéi soss haat ech dat Gefill, ech misst him 2-3x den Dag erënneren wat um Programm steet an ech froen mech ob d’Medikatioun richteg agestallt ass, wëll hien schéngt villes einfach net matzekréien oder oofspäicheren ze kënnen, wat zu Momenter awer schonn vill besser gaang ass. Mir waren bei der ATVA den Jason, d’Mamm an ech an si hunn den Jason an d’Mamm e bëssen besser wollten kënnen léieren. Mir ass et e bëssen riwwer komm wéi wann si een Speech vir all Schüler hätten, deen awer a kengem Fall zum Jason gepasst huet, dowéinst huet d’Mamm ganz gutt hier Ängschten hinnen konnten soen an hinnen e bëssen d’Realitéit vum Dossier virun Aan ze haalen. Si hunn vun Reintégratioun, eegenstänneg Bus fueren, eegestänneg Kontaktobnahm vum Jason etc.. geschwat an haaten zu Dräi och net wierklech um Schierm, dass den Jason muss bis 18 an enger Schoul ageschriwwen sinn. Si wäerten den 1ten RDV mat der Conseillère bei eis an der Annexe hunn an et wäert wichteg sinn direkt ob de Punkt ze kommen an vill Saachen am viraus auszeschléissen. Hien geet 2 Wochen an eng Colonie, e puer Deeg an Holland an mam Frënd vun der Mamm an Frankréich.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-07-10T13:00:00.000Z","updatedAt":"2025-07-10T13:00:00.000Z"},{"id":"e_reu_20250922_alexp","studentId":"stud_alexp","date":"2025-09-22","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Ass seit dem 1. September an der Dagesklinik. Fillt sech immens wuel an mëscht Doheem vill méi wéi virdrun. D’Alex ass bis den 31.10 krank geschriwwen, à voir wéi laang den Krankeschéin verlängert gëtt. D’Schoul huet dëst Joer erëm net um Schierm gehat, dass d’Alex bei eis ass, obwuel ech nach virun der Vakanz e Gespréich mat hinnen haat. Mëttwoch hunn ech een Telefonat mat der neier Régente. Mëllen mech nächst Woch wann d’Dagesklinik et dës Woch net mescht.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-22T13:00:00.000Z","updatedAt":"2025-09-22T13:00:00.000Z"},{"id":"e_reu_20250922_jason","studentId":"stud_jason","date":"2025-09-22","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet e gudde Start gehat an frëet sech dass hien ganz bei eis beschoult gëtt. (Bus schon confirméiert?) Hätt sollen de Freiden op de RDV bei d’ATVA goen, d’Mamm war awer krank, dofir gëtt dësen nogeholl. D’Mamm huet mir erzielt, dass d’ATVA, trotz eisem Virgespréich an dem gemeinsamen RDV an der Staat, wollt dass den Jason den RDV selver organiséiert an souguer gefrot ob hien alleng an d’Staat kéint kommen mam Bus. Ech hunn de Mëttwoch och mat hir e Gespréich, fir nach eng Kéier de Fokus dorob ze sëtzen, dass mir eng Alternative fir hien brauchen d’nächst Joer, ech mengen sie huet eng pauschal Prozedur am Kapp déi net mam Jason wäert funktionnéieren. Huet sech gutt mam Miguel verstaan bis elo am Klassesall schéngt et ze funktionnéieren. Donneschdes geet hien an den Atelier, ech hunn him nach eng Kéier visualiséiert wat et mat den Moduler op sech huet an hien war averstaanen an den Atelier ze goen. Ech sot him awer och, dass mir där Saach net wäerten eiweg nokucken, sollt hien sech entscheeden net an den Atelier ze goen. D’Mamm huet geschwënn eng nei Aarbecht mat gereegelten Auerzäiten, Jason ass richteg happy an d’Mamm och. Ziler ginn dës Woch définéiert.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-22T13:00:00.000Z","updatedAt":"2025-09-22T13:00:00.000Z"},{"id":"e_reu_20250922_miguel","studentId":"stud_miguel","date":"2025-09-22","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hien ass gutt bei eis ukomm. Hëllt aktiv um Cours an un den Aktivitéiten deelgeholl. Am MM huet hien sech virgestallt an opmierksam nogelauschtert. Hien ass kommunikativ a stellt vill Froen zu der Organisatioun (virun allem iwwer den Transport/ Fussball). An de Pausen huet hien Kicker mam JaSc gespillt. Awer och Vier gewinnt mam Mia. Nom Iessen geet hien awer gäre mat op den Terrain “richteg” Fussball spillen.\nA Bezuch op Franséisch seet hien, datt et him einfach fällt - net well hie besonnesch gutt ass, mee well de Niveau ze einfach ass. Hien huet eng schéin Schrëft a schafft präzis. Hie kann bis elo Luef unhuelen.\n! Bis elo huet hien nach keng weider Beweegungspaus am Cours gebraucht, eng kuerz Toilettepaus geet him duer.Moies kënnt hien schonn géint 7:30 unn, a bleift bis 8 Auer dobaussen um Handy. Lescht Woch soutz hien hannert dem Haus um Handy. Hien soll virum Gebai bleiwen.\nEn Teams-Channel fir d’Koordinatioun mam LBV gouf ageriicht. De Régent ass de Philippe Biever. Iesssituatioun: Mëttwoch a Donneschden huet hien matgiess, net vill mee genuch. De Freiden näicht giess, mee roueg dobäi bliwwen a bis 12:30 gewaart.\nFreides fir heem ass een Auto vun hannen a si gerannt. Keen verletzt. Se hunn lo een Ersatzauto.\nTrigger: wann en sech ongerecht behandelt fillt","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-22T13:00:00.000Z","updatedAt":"2025-09-22T13:00:00.000Z"},{"id":"e_reu_20250922_chase","studentId":"stud_chase","date":"2025-09-22","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Wierkt mol ganz entspaant an zefridden. Relativ positive Feedback aus dem Franséischcours; hu Kontakt mam Regent Marc Rippinger a mat der Psychotherapeutin opgeholl, et ass awer nach net zu engem Gespréich komm; muer 1.Bezuchszäit an den Donneschdeg 1.Gespréich mat der Mamm\nGeht all Dag moies 15Min moies laafen, an dann duschen. Kleederwiessel bleiwt en Thema","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-22T13:00:00.000Z","updatedAt":"2025-09-22T13:00:00.000Z"},{"id":"e_reu_20250922_ben","studentId":"stud_ben","date":"2025-09-22","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Freet sech erëm an der Annexe ze sinn. “Ech war déi éischten Kéier guer net nervös fir erëm an d’Schoul ze kommen” soot hien mir am Skills. (Chase idem) Haat e puer immens gutt Momenter mam Papp (Filmowend, Fouer..), mierkt een wéi vill him dat bedéit. Am Foyer geet et him momentan net super, hien huet keng Bezuchspersoun, weder Erwuessenen nach Jugendlechen. Den Chase ass momentan säin eenzeg richtegen Kolleg an am Bezuch/Skills mierkt een wéi gären hien sech matdëelt an iwwert déi verschiddensten Themen well schwätzen. AJ ass am Moment säin Safe Space, dH gären mir matdëelen wann hien eppes uschwätzt an der Woch fir dass ech dat kann opgräifen, hien vergësst oft wat hien bedréckt wann et am 1zu1 souwäit kënnt. Ass bis op d’Kichen ganz zefridden mam Programm, schéngt dat awer super gemaach ze hunn. Huet däitlech gesot, dass hien keng Loscht méi op normal Schoul huet, ech soot him hien hätt dat 1t Trimester Zäit sech nach eng Kéier zwescht 5AD an 5G ze entscheeden, wann seng Leeschtung stëmmt. Huet d’Situatioun mam Miguel fir de Moment nach ganz gutt am Grëff. Hien seet et net, mais et mëscht him eppes aus, dass hien esou gutt am Fussball ass, dH weiderhin positiv spiggelen an d’Situatioun am Aan behalen. Ziler ginn dës Woch definéiert.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-22T13:00:00.000Z","updatedAt":"2025-09-22T13:00:00.000Z"},{"id":"e_reu_20250922_mia","studentId":"stud_mia","date":"2025-09-22","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Liewt wierklech méi wéi erwaart an der digitaler Welt. Huet Deeg gehaat wou et jeweils 10 Stonnen ouni Paus gespillt huet mat sengen Kollegen, kann dëst awer eroof schrauwen wann et drëms geet an d’Schoul ze goen an e Rhythmus ze fannen. Huet mir an der Bezuchszäit eppes privates erzielt wat hat bedréckt an et huet mech e bëssen erféiert, dass him virtuell Kollegen, déi et nach nie gesinn huet, esou vill bedeiten. Ass momentan dat eenzegt Meedchen an dat mescht him just an den Pausensituatiounen eppes aus, dH gären probéieren hat ze motivéieren eppes ze maachen. (huet souguer Fussball gespillt) Hat ass dës Woch Mëttwoch an Donnëschden bis 13h an der AJ, ab nächster Woch ganz, war guer keen Thema bei him. Ass net begeeschtert vum Theater fir de Moment, probéiert sech awer drop anzeloosen. Ziler ginn dës Woch définéiert. März 2026 Stage.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-22T13:00:00.000Z","updatedAt":"2025-09-22T13:00:00.000Z"},{"id":"e_reu_20250929_alexp","studentId":"stud_alexp","date":"2025-09-29","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Dagesklinik huet sech gemëllt an wéilt gären e Schoulprogramm fir d’Alex (Haaptfächer). Régente vum Alex huet sech informéiert wéi d’Prozeduren sinn an mat wat d’Klass sech kann astellen par rapport zum Alex, si kënnt d’Alex net.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-29T13:00:00.000Z","updatedAt":"2025-09-29T13:00:00.000Z"},{"id":"e_reu_20250929_jason","studentId":"stud_jason","date":"2025-09-29","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Bus misst dës Woch ganz normal um 16h kommen. RDV mat der ATVA huet nach emmer net stattfonnt. D’Mamm ass momentan iwwerfuerdert, och wéinst all den RDV’en, wichteg ass dass d’Mme Dumong vun der ATVA den Jason eng Kéier 1zu1 gesinn huet virundeems ech mat hier schwätzen. Zil ass et d’RDVer dann an d’Annexe ze verlëen. Huet agewëllegt Mëttes seng Zänn ze wäschen, vergësst et Moies emmer an gesäit och an wisou et wichteg ass. Fir déi déi d’Pausen begleeden: Nodeems hien säin Medikament krut hien drun erënneren seng Zänn ze wäschen, net méi. Ob et klappt oder net gesinn mir dann. (nämlecht beim Ben)\nAm Bezuch schaffen ech mam Jason dat wat am Skills gemaach gëtt, e bëssen méi simplistesch, mais ech sinn erstaunt wéi hien awer reflektéieren kann wann et em hien an säin Ëmfeld geet. Atelier huet gutt geklappt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-29T13:00:00.000Z","updatedAt":"2025-09-29T13:00:00.000Z"},{"id":"e_reu_20250929_miguel","studentId":"stud_miguel","date":"2025-09-29","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"De Mëttwoch gouf de Miguel um 2 Auer vu sengem Papp ofgeholl well en komplett an der Vermeidung wor (fir éischt uewen um Späicher op der Matraze duerno am Iessraum “isoléiert” bis dass hien ugefaangen huet d’Still emzegeheien..) Gutt Gespréich mam Papp gehaat an zs mam Miguel. Konsequenz: Handy ofgeholl. Haut huet hien den Handy rëm. Den Donneschden war säin Verhaalen wéi déi éischt 3 Deeg. Ass rem méi am Grupp aktiv. Spillt an der Paus mam Jason Kicker.\nPAI gëtt erstallt fir op Situationen wéi leschten Donneschden ze reagéieren. (Moies hat hien vergiess d’Medikamenter ze huelen.)\nAm Atelier Holz huet een dëst virun allem am “Leerlauf” gemierkt (alles upaaken, wibbeleg) Während der Aufgab, schafft hien konzentréiert an um Steck. Am Ufank wollt hien net mat an huet gemengt, keen Holz upaaken ze kennen. Tatsächlech huet hien d’Holz baal net ugepaak respektiv mat sengem Plover. Waat nach opgefall ass: deen Daag huet hien ganz vill giess (Pangescher+Zopp).\nDe Verdacht besteet, dass hien während der Schoulzäit un der Vape zitt. Iesssituatioun: bleiwt wéi jidvereen 30min am Iessraum a geet wärendeems net op d’Toilette.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-29T13:00:00.000Z","updatedAt":"2025-09-29T13:00:00.000Z"},{"id":"e_reu_20250929_chase","studentId":"stud_chase","date":"2025-09-29","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Laangt Gespréich mat der Mamm (Thema « Psychorigiditéit »): Famill liest vill mä den Chase wollt nach ni liesen. Si keeft him heinsdo GeoEspace. « hie mengt heinsdo hie wär méi gescheit wéi de Rescht vun der Welt »; hunn der Mamm gesot, dass mir wëlle rausfannen wou heinsdo dee Widderstand hierkënnt; Kleederwiessel leeft net méi sou gutt wéi an der Vakanz mä awer nach net dramatesch.\nGudden Austausch mam Regent Daniel Schaus aus dem LTA an der Mme vun der ESEB; gutt Zesummenarbécht schéngt einfach ze ginn; Regent mécht e gemeinsamen Teams-Grupp op; seng Klass ass méi kleng an immens léif; mir schaffen hei méi spéit eng Plage wou den Chase un engem Dossier an der Bio ka maachen; den Chase kann och am Viraus de Regent kenneléieren…","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-29T13:00:00.000Z","updatedAt":"2025-09-29T13:00:00.000Z"},{"id":"e_reu_20250929_ben","studentId":"stud_ben","date":"2025-09-29","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Nämlecht wéi beim Jason punkto Zänn wäschen, am beschten nodeems hien seng Paus gemaach huet. Soot dass hien fir een eegenstännegt an glécklecht Liewen onbedéngt seng Hygiène an de Grëff muss kréien, a seng Zigarettensucht. Ausserdem wëll hien seng Aggressiounen ënner Kontroll haalen (war schockéiert wéinst der Situatioun mam Bic beim Annick am Cours). Säin néit Zil ass eng Otemübung (4-7-8) an ech hunn mat him geklärt dass hien dës soll uwenden wann hien mierkt dass seng Emotiounen iwwerhand kréien. Wann dier dëst bei him mierkt, hien drun erënneren. Ech starten elo d‘Bezuchzäiten mat där Übung, fir dass hien e bëssen eng Routine kritt. Hien soot mir hien sollt de Weekend akaafen goen mam Foyer (Sport+Schoulmaterial), huet hien alles? Huet iwwert d’Trennung vun sengen Elteren geschwat.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-29T13:00:00.000Z","updatedAt":"2025-09-29T13:00:00.000Z"},{"id":"e_reu_20250929_mia","studentId":"stud_mia","date":"2025-09-29","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Teams mat de Proffen gëtt ageriicht. Kann sech ëmmer méi opmaachen bei mir an kommunizéiert ganz kloer de Wonsch zu Normalitéit wou hat manner un sech zweifelt an méi aus dem Haus kënnt an “Saachen mëscht”. Huet d’Beispill vum Volleyball spillen geholl, hat géing sech dat wënschen fir sech, obwuel hat net gär Volleyball spillt, et geet éischter em déi Routine eraus ze kommen an sech mat aaneren Léit ze treffen. Fokus an Zil weiderhinn op Saachen déi hat gutt mëscht/kann/stolz ass. Ass ab dëser Woch ganz bei eis beschoult.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-09-29T13:00:00.000Z","updatedAt":"2025-09-29T13:00:00.000Z"},{"id":"e_reu_20251006_alexp","studentId":"stud_alexp","date":"2025-10-06","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Mail un d’Mme Kox gouf gemaach, nach kee Retour.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-06T13:00:00.000Z","updatedAt":"2025-10-06T13:00:00.000Z"},{"id":"e_reu_20251006_jason","studentId":"stud_jason","date":"2025-10-06","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"grouss Kriis e Freiden am MM, war schon gelueden well en net frai kruut fir den Trounwiessel, huet mam Kessen op de JP gehait an hien fils de pute vernannt. Ech hunn haard durchgegraff an eng Entschellegung gefrot oder him eng ferm Strof ugekennegt (datt Dita en siche kennt haut an hien die nächst 2 Fit for life’n net mat daerf goen) En krut sech schweier berouegt, Dita huet och mat him geschwat um Telefon, finalement huet en sech akritt, war heavy…Miguel huet net dee beschten Afloss op hien. Dita huet ageraumt datt et doheem am Moment net einfach ass an datt si sech enorm Suergen emt dem Jason seng Zukunft mecht.\nJason huet den Mëttwoch um 9h RDV an der AJ mat der Mme Dumong vun der ATVA, duerno kuerz Gespréich mat mir.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-06T13:00:00.000Z","updatedAt":"2025-10-06T13:00:00.000Z"},{"id":"e_reu_20251006_miguel","studentId":"stud_miguel","date":"2025-10-06","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Devise ass aushaalen am Moment, mir loosen en op der Toilette, e geht an den Iessraum wann en refuseiert an de Cours ze goen. Et fennt e Gespreich mam HRS statt (Filomena Saluzzi an Dr Goepel). En dierft keng Vape an och keen Telefon dobai hunn am Moment. En schleicht duerch Haus, och an de Keller, dofir ginn Diiren zougespaart.\nHien weist aktuell staark Schwankungen tëschent Verweigerung a Matmaachen. Den Donneschden Moien op der Toilette agespaart (mëttes am Atelier LLIS deelgeholl, meng Grenzen getest) – Haut “normalen” Cours, uspriechbar, integréiert.\nKontakt mam Här Pontes Glenn vun La main tendue huet stattfonnt. Si ginn keng Informatiounen weider. Een Austausch ass nemmen mat Präsenz vun den Elteren méiglech. Proposéiert gouf een gemeinsamt Gespréich (per Teams oder en présence) bei hinnen. Den Här Pontes géif awer dobäi selwer keng inhaltlesch Angaben machen, mee d’Elteren schwätze lossen a bei Bedarf ergänzen.\nDen Handy krut hien ofgeholl. D’Mamm kontaktéiert mech wann hien een dobäi huet. Wat nach opgefall ass: Nach net mat Turnen gaangen, Verhaalensopfällegkeeten weisen sech haaptsächlech Mëttwochs an Donneschdes.\nOnkloer ob de Miguel, d’Medikamenter reegelméisseg hëllt. De Papp huet am Gespréich ugedeit, dass hien se net reegelméisseg hëllt.\nBeim Mëttesiessen am Aen behaalen, ob a wéivill hien ësst.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-06T13:00:00.000Z","updatedAt":"2025-10-06T13:00:00.000Z"},{"id":"e_reu_20251006_chase","studentId":"stud_chase","date":"2025-10-06","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"freet sech elo schonn op d’Verkafsstänn (Chrëschtmaart,..); wëll am September ganz am LTA sinn, ab 2.Semester réintégration progressive, Am Projet war hie super (Video fir Sakhi gemaach, war direkt bereet fir bei eng friem Persoun unzeruffen; huet dat direkt 2x gemaach,..)\nResumé vum Gespréich mat der Mamm: hat d’Material fir seng Hausaufgab ze maachen an der Annexe vergiess, fréier hätt hien dat aus der Bunn gehäit, elo sot hien einfach dass hie moies virum MM nach genuch Zäit hätt fir se ze maachen. Hie wäert säi Gebuertsdag mat 4 Kolleegen op der Bowlingpist feieren, de Ben ass invitéiert. Wärend anerer am Aikido mol eng Paus maachen, trainéiert hie virun; ass voll motivéiert; huet gesot dass hie wëll Kleeder kafe goen.\nResumé vum Gespréich mat der Mme Kirsch-Pedrosa (Psychotherapeutin):\nSi huet och éiweg gebrauch fir « hien a Sécherheet ze bréngen »; si schwankt wat eng Diagnos ugeet. Do ass « eppes qui le dépasse, eppes wat neurologesch rageet, iergendeppes wou hie keen Accès huet ». Si hat op eng Diagnos vum Psychiater gehofft, mengt awer dass eng schizoid Perséinlechkeetsstéierung kéint sinn. Si huet dem Chase seng Schwëster just eemol kuerz am Wartesall gesinn; « déi huet och eppes ». Si huet dat selwecht erkannt wéi beim Chase; wéilt si alleguer eemol gesinn, weess just nach net wéi. Gesäit awer och eng grouss Evolutioun. Hien war och bei hir schonn oft rosen a blockéiert an huet guer net geäntwert. « Figéiert wéi wann hie säi Liewen a Gefor géif gesinn »\nRésumé vu Seancen mam Chase: régression – peur de ne pas réussir; pas de communication – figé; Seance mat nëmme Quatsch schwätzen huet gutt fonctionnéiert – Chase war total entspaant, ass opgeblitt an huet gelaacht; blitt op wann hie vum Bësch schwätzt; konnt nach ni en Ziel formuléieren; huet och vill mat den Eltere geschafft.\nFro déi d’Madame sech stellt: « Firwat kënnt de Jong net aus dem Mode figé raus?; Dissoziatioun en lien mat engem Trauma (mengt dat net) oder en lien mat enger Pathologie? » Ginn et Antecedents an der Famill? Seet dass den Chase ëmmer e Suivi / en Accompagnement wäert brauchen, fäert e bëssen en Echec am Lycée. Seet et wär och nach interessant ze kucke wéi den Chase an der Roserei fonctionéiert.\nWär frou wann den Chase ee Psychiater géing gesinn, seet awer och dass den Dr nach keng Pathologie ka feststellen, « well den Chase ass nach net fäerdeg ». Mir bleiwen am Kontakt.\nHuet am Skills gesoot dass “Sauberkeit” e ganz wichtegt Thema fir hien momentan wier. Hien wier op enger ganz gudder Spuer, wéilt dat bäibehalen wëll hien et “fir sech well maachen an och fir déi aaner, ech wëll net dass et onangenehm vir aaner Leit ass”. Huet sech bei mir (Joey) een “Habit Tracker” gefrot.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-06T13:00:00.000Z","updatedAt":"2025-10-06T13:00:00.000Z"},{"id":"e_reu_20251006_ben","studentId":"stud_ben","date":"2025-10-06","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet seng Sportsaachen an anscheinend och säin ganzt Schoulmaterial. (confirmation? Franséisch feelt ) War de Mëttwoch ganz duercherneen wéinst der Situatioun mam Miguel. Hien kënnt heihinn fir eroof ze kommen, well hien dat all Daag am Foyer huet. LtEtt huet hien an eng aaner Klass gesaat well hien nie op der 5AD opgetaucht ass... à voir wou hien elo ass, d’Mireille mëllt sech bei der CIS. (merci) Huet mir eng Foto virum Palais geschéckt fir ze beweisen dass hien do war. Seet dass säin gréisstent Bedürfniss Motivatioun ass wees awer net wéi hien dat soll ustellen, krut e puer Tipps vum Chase.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-06T13:00:00.000Z","updatedAt":"2025-10-06T13:00:00.000Z"},{"id":"e_reu_20251006_mia","studentId":"stud_mia","date":"2025-10-06","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet sech immens gutt am Sport gemaach, war zäiteweis ganz motivéiert, kann dat awer guer net reflektéieren. Hat huet extrem héisch Uspréch an Erwaardungen un sech an un Lierwenssituatiounen, dowéinst kann hat säin Ziil nach net areeschen. Hat seet et wier jo vun him erwaard an der Schoul ze schaffen, dovir wier näischt “gutt” oder “positiv”. Hat seet dass dat schon deemols beim Therapeut ugeschwat gouf an dass hat sech op déi kléng Saachen am Lierwen soll fokusséieren. (dowéinst säin neit Ziil) Hat soot mir dass hat déif dran wees dass d’Annexe déi richteg Plaatz ass, hat awer immens enttäuscht ass dass de Wee net direkt an d’Reegelschoul gaang ass. Hat ass sech dem Problem bewosst an huet och de Rôle vun Achtsamkeet an Introspektioun/Reflektioun verstaanen. Hat wëll dorunner schaffen, seet awer selver dass hat guer keng Ahnung huet wéi hat et soll maachen, hat wier d’Affer vun sengen Gedanken. Hat seet hat hätt fir de Moment keng Energie fir guer näischt, hat huet e ganz grousse Wonsch mat Kollegen eraus ze goen, eppes ze ënnerhuelen, seng Energie géing awer ganz verbraucht ginn bei eis an der Schoul. Ben an Chase konnten him awer och soen dass dat ganz normal ass am Ufank an dass dat sech mat der Zäit réguléiert. Bei Haus 13 kruuten sie eng Plaatz fir eng Therapeutin, d’Mia wollt dat awer nach net, et wier him ze vill an et wier jo mat mir, dowéinst bräicht hat et net. Mir sinn awer keen therapeuteschen Asatz, dat heescht an 3 Méint mëllt sie sech erem an dann wäerten sie d’Angebot unhuelen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-06T13:00:00.000Z","updatedAt":"2025-10-06T13:00:00.000Z"},{"id":"e_reu_20251013_alexp","studentId":"stud_alexp","date":"2025-10-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Ech haat ee Gespréich mat der Mme Kox (Psychotherapeutin aus der Dagesklinik) an sie sinn nach an der Diagnostikphase. D’Alex ass regelméisseg krank an sie huet d’Alex 3 Wochen net gesinn. Sie wosst och näischt iwwert d’Medienproblematik, d’Elteren hätten näischt gesoot. D’Alex kéint guer net iwwert säin Gefillszoustand schwätzen an hätt guer keen Accès dozou. D'Mme Kox geet vun enger Angschtstéierung aus, déi elo muss traitéiert ginn. Dagesklinik kuckt elo méi een Abléck an d’Dynamik vun der Famill ze kréien an mëllt sech den 30.Oktober bei mir.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-13T13:00:00.000Z","updatedAt":"2025-10-13T13:00:00.000Z"},{"id":"e_reu_20251013_jason","studentId":"stud_jason","date":"2025-10-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Haat eng schwéier Woch, wëll just dat maachen op wat hien Loscht huet, den J-P vernannt, Still an Couchen geschoss, Material futti gemaach etc.. Huet sech opgemaach an soot hien géing keng Opmierksamkeet méi kréien. (Annexe souwéi Doheem) Gespréich zesummen mat der Mamm gehaat, wou sie sech an den Ärm loungen zum Schluss. Hien ass hypersensibel an déi kléngsten Ausso vun der Mamm gëtt géint sie benotzt fir säin Verhalen ze rechtfertegen, dobäi ignoréiert an vergësst hien awer alles wat hien gemaach/gesoot huet. Hei an der AJ fillt hien sech alleng, wëll keen mat him Kaarten wëll spillen oder insgesamt mat him well Zäit verbréngen. Et wéist eis einfach nach eng Kéier däitlech dass hien net op engem éischten Aarbechtsmarché kann funktionnéieren an schon guer net an d’Regelschoul zeréck. D’Mme Dumong (ATVA) war de Mëttwoch bei eis, et war awer just fir den Jason kënnen ze léieren. Den 30.10 um 9h kënnt sie nach eng Kéier an dann wäerten si méi konkret iwwert seng Zukunftsperspektiven schwätzen. Sie gëtt och iwwert Situatioun vun leschter Woch informéiert. Mamm haat just mam Accueil vun der APEMH Kontakt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-13T13:00:00.000Z","updatedAt":"2025-10-13T13:00:00.000Z"},{"id":"e_reu_20251013_miguel","studentId":"stud_miguel","date":"2025-10-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Den Dënschdeg huet hien am Projet aktiv a motivéiert matgeschafft (Kürbiszopp) No der Mëttespaus ass seng Haltung allerdéngs gekippt: hien hat „kee Bock“ méi, konnt net roueg sëtze bis déi aner Schüler fäerdeg waren a war tëscht 12:30 an 14:00 erëm an engem testenden, grenziwwerschreidendem Verhalen.\nDe Mëttwoch huet hien säin Handy net ofginn an huet sech fir eng Zäit um Speicher zeréckgezunn, wou hien am „Freeze“ war. Duerno am Cours huet hien dem Sandy uvertraut, datt säi Papp hien geschloen hätt. D’Mamm gouf direkt informéiert a sot, si wéilt Hëllef ufroen. Am Nomëtteg huet e Gespréich mat den Elteren a mam Joëlle Reef stattfonnt. Dobäi gouf kloer, datt de Papp roose ginn ass, wéi hien eng Vape beim Miguel fonnt huet, déi mat der Bankkaart vun der Mamm bezuelt gouf. Wéi de Papp den Handy duerchgesicht huet, huet hien e Video aus dem LLIS fonnt, wat d’Situatioun nach verstäerkt huet a mam Handy zweemol op de Kapp vum Miguel geschloen. De Papp huet dëst Verhaalen net ofgestridden an huet sech kooperativ gewisen. Mir hunn d’Elteren drop higewisen, datt eng Zesummenaarbecht an d’Unhuele vun Hëllef noutwenneg ass, anescht misst e Signalement gemaach ginn. Et gouf e neit Gespréich fir den 20.10 an der selwechter Zesummesetzung festgehale. De Miguel wollt net beim Gespréich dobäi sinn, ass mat dem Bus heemgefuer, mee bei d’Bom gaangen, huet awer schlussendlech doheem geschlof.\nDen Donneschdeg war e méi rouegen Dag. Miguel huet gutt matgeschafft a war am Atelier aktiv. Och de Freideg war positiv: hien ass de ganze Moien a Nomëtteg präsent gewiescht, huet am Fitforlife motivéiert deelgeholl a gutt mat de Matsschüler interagéiert. Hien huet gelacht, sech wuel gefillt.\nHaut ass hien däitlech méi midd an d'Schoul komm. Am éischte Block huet hien uwewen um Späicher geschlof. Laut senger Mamm hat hien e schlechte Weekend: hien hat säi Fussballmatch wéinst disziplinäre Grënn net dierfen spillen. Am Morning Meeting huet hien awer gesot, si hätten 15:0 gewonnen an hie selwer hätt dräi Goler geschoss. D’Mamm huet och erzielt, datt si de Moien e Messer bei him fonnt huet. Hien sot der Mamm, hien hätt et um Buedem fonnt a wollt sech domat verteidegen, well eng Grupp vu Jonker am Park et „op hien ofgesinn“ hunn. D’Mamm huet d’Messer konfiskéiert, de Papp weess nach näischt dovun. Si seet, hien hätt zënter e puer Deeg en anert, méi zréckgezunnent Verhalen a géif och kaum Frënn hunn.\nMir huet de Miguel gesot, dass hien net därf soen vu weem dat Messer ass an dass dëst als Ofschreckung soll déngen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-13T13:00:00.000Z","updatedAt":"2025-10-13T13:00:00.000Z"},{"id":"e_reu_20251013_chase","studentId":"stud_chase","date":"2025-10-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"War an der Bezuchszäit mat him an den LTA fir d’Schülerkaart ze maachen; hie war e bëssen nervös am viraus an duerno frou et gemach ze hunn; ass bereet d’Fro: « wéi kommen ech aus dem Freeze raus » mat der Psychotherapeutin unzegoen (RV ass an 2 Wochen) ; hunn nach keen 2.schoulëscht Zil fonnt; Mamm ass zouversiichtlech wat den Iwwergang an den LTA ugeet, well den Direkter am 1.Gespréich direkt e Lien mam Chase opgebaut huet; den Chase ass geschlaucht vum Schoulufank (de Mëttwoch de Moien hat hie verschlof, owes lung hie schonn um 20h30 am Bett); en Dossier an der Bio,.. kinnt den Chase och deelweis doheem maachen, d’Mamm ass frou dass mir d’Thema Hygiene och an der Annexe behandelen « am Lycée kanns du net méi sou sténken wéi am Pumakäfeg »","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-13T13:00:00.000Z","updatedAt":"2025-10-13T13:00:00.000Z"},{"id":"e_reu_20251013_ben","studentId":"stud_ben","date":"2025-10-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Sinn Fächer all ofgedeckt? Sciences naturelles, Education technologique (Informatique, Dessin technique), Options et ateliers. De Ben kinnt 1h un engem Dossier SCNAT schaffen (me 13-14h), Donneschtdegs kinnt en während der Mathe Info maan.\nHuet de Weekend am Foyer geduscht an och seng Zänn gewäsch, ech war mir net bewosst dass déi lëschten Kéier 4 Méint hier wier. Schéngt motivéiert eppes dorunn ze änneren. Teamsgrupp gouf erstallt. Haat een RDV beim Endokrinolog, ass alles an der Norm.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-13T13:00:00.000Z","updatedAt":"2025-10-13T13:00:00.000Z"},{"id":"e_reu_20251013_mia","studentId":"stud_mia","date":"2025-10-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Mir kruuten Dossiere vun der Schoul fir Info, Digital Science, Bio a Physik. Wei begleeden mer Mia doranner? A wat fir enge Fächer brauch hatt net all Stonnen fir de 5G Programm ze maan? : Mettwochs vun 13-14h beim Annick mecht et Sciences naturelles an duerno Digital Science, Donneschtdegs vun 9-10h kann et den Physik’s Dossier an duerno Info maan.\nTeamsgrupp gouf erstallt. War den Mëttwoch net do wëll den Dënschden him extrem schwéier gefall ass. Huet och bei der Mamm geäussert, dass hat keen an der AJ hätt. Nähert sech awer beim Ben an Chase run an versteed sech ganz gutt mat hinnen. Huet sech guer keen Drock gemaach wéinst den Dossiere, wat ee Fortschrëtt ass. War immens houfreg op seng Konscht beim Carole. Ass och zefridden mat sengem Zil.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-13T13:00:00.000Z","updatedAt":"2025-10-13T13:00:00.000Z"},{"id":"e_reu_20251020_alexp","studentId":"stud_alexp","date":"2025-10-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Joffer aus der Dagesklinik seet och dass hat net oft do ass.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-20T13:00:00.000Z","updatedAt":"2025-10-20T13:00:00.000Z"},{"id":"e_reu_20251020_jason","studentId":"stud_jason","date":"2025-10-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Drun denken dem Jason emmer e Choix ze loosen an him ze verbildlechen wat geschitt wann hien elo refuséiert ze schaffen etc.. Huet d’lëscht Woch relativ gutt geklappt. Wëll am Moment selver säin Stonneplang zesummensëtzen an wollt net an d’Theateroptioun oder franséischen Minifilm kucken. Net vill diskutéieren, Optioun 1 ass am Sall sinn an matmaachen oder Optioun 2 ass an den Iessall + net mat den aaneren matiessen. Net op säin éiwegt Geschwätz agoen an hien emmer rem opmierksam maachen, dass hien eis während dem Schwätzen ennerbrecht. 30.10 schwätzt d’Mireille och mat der Mme vun der ATVA. Situatioun mam Kicker brauchen mir eng Léisung. Neit/aalt Zil : Ech akzeptéieren mäin Stonneplang an d’Aufgaben vum Enseignant.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2025-10-20T13:00:00.000Z","updatedAt":"2025-10-20T13:00:00.000Z"},{"id":"e_reu_20251020_miguel","studentId":"stud_miguel","date":"2025-10-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"haut um 16h zweet Gespreich mat den Elteren\nInsgesamt positiv Woch, Miguel ass méi präsent, kooperativ a fillt sech an der AJ wuel. Hëllt un den Aktivitéiten deel. Thema: éischter heem goen, keen Bock… net aktuell.\nFreeët no engem Stage.\nFënnt besser seng Plaz a
