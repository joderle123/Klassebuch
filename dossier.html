<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dossier — Annexe Junglinster</title>
<style>
:root{
  --bg:#f4f5f7; --surface:#ffffff; --border:#dde1e6; --text:#1f2630; --text-muted:#5b6573;
  --accent:#3a5a78; --accent-soft:#e7eef4;
  --danger:#b3432d; --danger-soft:#f6e7e3;
  --radius:8px;
  --shadow:0 1px 3px rgba(20,30,45,.08);
  font-size:16px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.5;
}
button,input,select,textarea{font:inherit; color:inherit;}
a{color:var(--accent);}
h1,h2,h3,h4{margin:0 0 .4em; font-weight:600; line-height:1.25;}
p{margin:.4em 0;}

/* ---------- Layout ---------- */
.app-shell{display:flex; min-height:100vh;}
.sidebar{
  width:230px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:18px 14px; gap:4px;
}
.sidebar h1{font-size:1.05rem; margin:0 6px 14px; color:var(--accent);}
.sidebar h1 small{display:block; font-size:.7rem; font-weight:400; color:var(--text-muted); margin-top:2px;}
.nav-link{
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius);
  text-decoration:none; color:var(--text); font-size:.92rem; cursor:pointer; border:none; background:none;
  width:100%; text-align:left;
}
.nav-link:hover{background:var(--accent-soft);}
.nav-link.active{background:var(--accent); color:#fff;}
.sidebar-footer{margin-top:auto; font-size:.72rem; color:var(--text-muted); padding:10px 6px;}
.main{flex:1; min-width:0; padding:24px 28px 60px; max-width:1180px;}
.topbar-mobile{display:none;}

@media (max-width: 880px){
  .app-shell{flex-direction:column;}
  .sidebar{
    width:100%; flex-direction:row; flex-wrap:wrap; align-items:center; border-right:none;
    border-bottom:1px solid var(--border); padding:10px 14px;
  }
  .sidebar h1{margin:0 10px 0 0; font-size:.95rem;}
  .sidebar h1 small{display:none;}
  .sidebar-footer{display:none;}
  .nav-link{width:auto; padding:7px 10px; font-size:.85rem;}
  .main{padding:18px;}
}

/* ---------- Banner ---------- */
.privacy-banner{
  background:#eef3f1; border-bottom:1px solid #c9dcd4; padding:12px 24px;
  display:flex; align-items:center; gap:16px; font-size:.88rem; color:#1f3a30;
}
.privacy-banner strong{display:block; margin-bottom:2px;}
.privacy-banner button{
  margin-left:auto; flex-shrink:0; background:#fff; border:1px solid #b9d2c8; color:#1f3a30;
  border-radius:var(--radius); padding:6px 12px; cursor:pointer;
}

/* ---------- Generic components ---------- */
.btn{
  display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); background:var(--surface);
  color:var(--text); border-radius:var(--radius); padding:8px 14px; cursor:pointer; font-size:.88rem;
}
.btn:hover{border-color:var(--accent); color:var(--accent);}
.btn-primary{background:var(--accent); border-color:var(--accent); color:#fff;}
.btn-primary:hover{background:#2e4a64; color:#fff;}
.btn-danger{color:var(--danger); border-color:var(--danger-soft);}
.btn-danger:hover{background:var(--danger-soft); border-color:var(--danger);}
.btn-sm{padding:5px 10px; font-size:.8rem;}
.btn[disabled]{opacity:.5; cursor:not-allowed;}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow);}
.field{display:flex; flex-direction:column; gap:5px; margin-bottom:14px;}
.field label{font-size:.82rem; font-weight:600; color:var(--text-muted);}
.field .hint{font-size:.76rem; color:var(--text-muted); font-weight:400;}
input[type=text],input[type=date],input[type=search],input[type=number],select,textarea{
  border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px; background:#fff; width:100%;
}
textarea{resize:vertical; font-family:inherit;}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent); outline-offset:1px;}
.row{display:flex; gap:14px; flex-wrap:wrap;}
.row > .field{flex:1; min-width:200px;}

.page-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap;}
.page-head .actions{display:flex; gap:8px; flex-wrap:wrap;}
.muted{color:var(--text-muted);}
.empty-state{padding:40px 20px; text-align:center; color:var(--text-muted);}

/* ---------- Toast ---------- */
.toast-root{position:fixed; bottom:18px; right:18px; display:flex; flex-direction:column; gap:8px; z-index:200;}
.toast{
  background:#22303f; color:#fff; padding:10px 16px; border-radius:var(--radius); font-size:.85rem;
  box-shadow:0 4px 14px rgba(0,0,0,.2); animation:toast-in .15s ease-out;
}
.toast.toast-error{background:var(--danger);}
@keyframes toast-in{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

/* ---------- Dashboard ---------- */
.search-bar{margin-bottom:18px;}
.search-bar input{max-width:420px;}
.card-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px;}
.student-card{
  padding:14px 16px; cursor:pointer; transition:box-shadow .12s, border-color .12s; display:flex; flex-direction:column; gap:8px;
}
.student-card:hover{border-color:var(--accent); box-shadow:0 3px 10px rgba(40,70,100,.12);}
.student-card h3{font-size:1.02rem;}
.student-card .meta-line{font-size:.8rem; color:var(--text-muted);}
.risk-pill{
  display:inline-flex; align-items:center; gap:6px; font-size:.76rem; font-weight:600; padding:3px 9px;
  border-radius:999px; color:#fff; align-self:flex-start;
}
.spark-row{display:flex; align-items:center; gap:10px;}

/* ---------- Chips / tags / categories ---------- */
.chip{
  display:inline-flex; align-items:center; gap:5px; background:var(--accent-soft); color:var(--accent);
  border-radius:999px; padding:3px 10px; font-size:.76rem; line-height:1.3;
}
.chip button{background:none; border:none; color:inherit; cursor:pointer; padding:0; font-size:.9em; line-height:1;}
.chip-row{display:flex; flex-wrap:wrap; gap:6px;}
.cat-badge{
  display:inline-block; padding:3px 10px; border-radius:999px; font-size:.74rem; font-weight:600; color:#fff; white-space:nowrap;
}
.toggle-chip{
  border:1px solid var(--border); background:#fff; border-radius:999px; padding:5px 12px; font-size:.8rem; cursor:pointer;
}
.toggle-chip.active{background:var(--accent); border-color:var(--accent); color:#fff;}

/* ---------- Student detail ---------- */
.detail-head{display:flex; flex-wrap:wrap; gap:24px; margin-bottom:20px;}
.detail-head .info-block{min-width:180px;}
.detail-head .info-block h4{font-size:.74rem; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted); margin-bottom:6px;}
.charts-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; margin-bottom:22px;}
.chart-card{padding:12px 14px;}
.chart-card h4{font-size:.84rem; margin-bottom:4px;}
.chart-card .chart-empty{font-size:.8rem; color:var(--text-muted); padding:30px 0; text-align:center;}
.chart-svg{width:100%; height:auto; display:block;}
.chart-grid-line{stroke:#e6e9ee; stroke-width:1;}
.chart-axis-label{font-size:9px; fill:#7a8696;}
.unrated-note{font-size:.74rem; color:var(--text-muted); margin-top:4px;}

.filter-bar{display:flex; flex-wrap:wrap; gap:6px; margin:6px 0 18px; align-items:center;}
.filter-bar .filter-label{font-size:.78rem; color:var(--text-muted); margin-right:4px;}

.timeline{display:flex; flex-direction:column; gap:10px;}
.entry-card{padding:0;}
.entry-head{
  display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; flex-wrap:wrap;
}
.entry-head .date{font-weight:600; font-size:.86rem; min-width:84px;}
.entry-head .author{font-size:.76rem; color:var(--text-muted);}
.entry-head .spacer{flex:1;}
.entry-body{padding:0 16px 16px; border-top:1px solid var(--border);}
.entry-body .text{white-space:pre-wrap; font-size:.92rem; margin:12px 0;}
.entry-actions{display:flex; gap:8px;}
.caret{transition:transform .12s; color:var(--text-muted); font-size:.8rem;}
.caret.open{transform:rotate(90deg);}

/* ---------- Forms ---------- */
.form-card{padding:22px; max-width:760px;}
.tag-input-wrap{border:1px solid var(--border); border-radius:var(--radius); padding:6px; display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
.tag-input-wrap input{border:none; flex:1; min-width:140px; padding:4px;}
.tag-input-wrap input:focus{outline:none;}
.slider-field{border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px;}
.slider-field .slider-row{display:flex; align-items:center; gap:12px; margin-top:8px;}
.slider-field input[type=range]{flex:1;}
.slider-value{font-weight:700; min-width:28px; text-align:center;}
.slider-field label.checkbox-label{font-weight:400; font-size:.8rem; display:flex; align-items:center; gap:6px;}

/* ---------- Search ---------- */
.search-results{display:flex; flex-direction:column; gap:10px; margin-top:16px;}
.search-result{padding:12px 16px; cursor:pointer;}
.search-result .meta{font-size:.78rem; color:var(--text-muted); margin-bottom:4px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.search-result .snippet{font-size:.88rem;}
mark{background:#ffe9a8; padding:0 2px; border-radius:2px;}

/* ---------- Export / AI ---------- */
.export-config{padding:20px; max-width:680px; margin-bottom:20px;}
.replacement-table{width:100%; border-collapse:collapse; font-size:.84rem; margin:10px 0;}
.replacement-table th,.replacement-table td{border-bottom:1px solid var(--border); padding:6px 8px; text-align:left;}
.replacement-table input{padding:4px 6px;}
.preview-box{
  white-space:pre-wrap; font-family:ui-monospace,SFMono-Regular,Consolas,monospace; font-size:.82rem;
  background:#fbfbfc; border:1px solid var(--border); border-radius:var(--radius); padding:14px; max-height:480px; overflow:auto;
}
.warn-banner{
  background:#fdf3e7; border:1px solid #eccfa3; color:#6b4a16; padding:10px 14px; border-radius:var(--radius);
  font-size:.84rem; margin-bottom:14px;
}
.checkbox-row{display:flex; align-items:flex-start; gap:8px; font-size:.86rem; margin-bottom:8px;}
.checkbox-row input{margin-top:3px;}

/* ---------- Print ---------- */
.print-sheet{display:none;}
@media print{
  body *{visibility:hidden;}
  #print-sheet, #print-sheet *{visibility:visible;}
  #print-sheet{display:block !important; position:absolute; top:0; left:0; width:100%; padding:0; margin:0;}
  .no-print{display:none !important;}
  .print-entry{break-inside:avoid; padding:10px 0; border-bottom:1px solid #ccc;}
  .print-sheet h1{font-size:18px;}
  .print-sheet h2{font-size:14px; color:#444; font-weight:400;}
}

/* ---------- Themen-Analyse ---------- */
.theme-mark{padding:0 2px; border-radius:3px; font-weight:600;}
.theme-mark.sev-3{background:#f6dcd5; color:#7c2d1c; box-shadow:inset 0 -2px 0 #b3432d;}
.theme-mark.sev-2{background:#f7ead2; color:#6b4a16; box-shadow:inset 0 -2px 0 #c07f1f;}
.theme-mark.sev-1{background:#e3ecf4; color:#2a4257;}
.theme-chip{border:1px solid transparent; cursor:pointer;}
.theme-chip.sev-3{background:#f6dcd5; color:#7c2d1c;}
.theme-chip.sev-2{background:#f7ead2; color:#6b4a16;}
.theme-chip.sev-1{background:#e3ecf4; color:#2a4257;}
.theme-chip:hover{border-color:currentColor;}

.detected-themes{margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; min-height:1.2em;}

.legend-row{display:flex; flex-wrap:wrap; gap:16px; margin-top:4px;}
.legend-item{display:inline-flex; align-items:center; gap:6px; font-size:.78rem; color:var(--text-muted);}
.legend-dot{width:10px; height:10px; border-radius:50%; display:inline-block;}

.theme-bars{display:flex; flex-direction:column; gap:4px;}
.theme-bar-row{
  display:grid; grid-template-columns:210px 1fr minmax(220px,auto); align-items:center; gap:10px;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:7px 12px; cursor:pointer; text-align:left; font-size:.84rem; width:100%;
}
.theme-bar-row:hover{border-color:var(--accent);}
.theme-bar-row.selected{border-color:var(--accent); background:var(--accent-soft);}
.theme-bar-label{font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.theme-bar-track{background:#eef0f3; border-radius:999px; height:12px; overflow:hidden;}
.theme-bar-fill{display:block; height:100%; border-radius:999px;}
.theme-bar-count{font-size:.76rem; color:var(--text-muted); white-space:nowrap;}
@media (max-width:880px){
  .theme-bar-row{grid-template-columns:1fr; gap:4px;}
}

.heatmap-table{border-collapse:collapse; font-size:.74rem;}
.heatmap-table th{padding:4px 6px; font-weight:600; color:var(--text-muted); text-align:left; white-space:nowrap;}
.heatmap-table td{padding:2px 3px; text-align:center;}
.heatmap-table .heat-theme{cursor:pointer; max-width:180px; overflow:hidden; text-overflow:ellipsis;}
.heatmap-table .heat-theme:hover, .heatmap-table .heat-theme.selected{color:var(--accent);}
.heat-cell{
  display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:22px;
  border-radius:4px; color:#fff; font-weight:700;
}

/* ---------- Misc ---------- */
.kbd{font-family:ui-monospace,monospace; background:#eef0f3; border:1px solid var(--border); border-radius:4px; padding:0 5px; font-size:.78rem;}
.section-title{font-size:.78rem; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin:24px 0 8px;}
.divider{border:none; border-top:1px solid var(--border); margin:18px 0;}

/* ---------- Réunion & Organisation ---------- */
.reunion-org{margin-bottom:18px;}
.org-list{margin:8px 0 0; padding-left:20px; display:flex; flex-direction:column; gap:7px;}
.org-list>li{font-size:.92rem; line-height:1.45;}
.org-sublist{margin:4px 0 0; padding-left:18px; color:var(--text-muted); font-size:.88rem; display:flex; flex-direction:column; gap:2px;}
.group-goal{margin-top:12px; padding:10px 12px; background:#eef4ee; border:1px solid #cfe0cf; border-radius:var(--radius); font-size:.9rem;}
.reunion-section-title{font-size:.82rem; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin:22px 0 10px;}
.reunion-student{margin-bottom:14px;}
.reunion-student-head{display:flex; align-items:center; gap:10px; margin-bottom:4px;}
.reunion-order{display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; background:var(--accent); color:#fff; font-size:.78rem; font-weight:600; flex:none;}
.reunion-student-name{font-weight:600; font-size:1.02rem; color:inherit; text-decoration:none; margin-right:auto;}
.reunion-student-name:hover{color:var(--accent); text-decoration:underline;}
.reunion-update{border-top:none; padding:4px 0 0; white-space:pre-wrap; font-size:.92rem; line-height:1.5;}
.reunion-themes{margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;}
.goal-box{margin-top:10px; padding:9px 12px; background:#f4f1ea; border:1px solid #e2dcc9; border-radius:var(--radius); font-size:.88rem;}
.goal-list{margin:4px 0 0; padding-left:18px; display:flex; flex-direction:column; gap:3px;}
.org-log-group{margin-bottom:14px;}
.org-log-head{display:flex; align-items:baseline; gap:10px; margin-bottom:6px;}
.org-log-date{font-weight:600; color:inherit; text-decoration:none;}
.org-log-date:hover{color:var(--accent); text-decoration:underline;}

</style>
</head>

/* ============================================================
   Persistenz: IndexedDB mit localStorage-Fallback.
   Alles läuft komplett lokal — keine Netzwerk-Aufrufe.
   ============================================================ */

var DB_NAME = 'cdse_dossier_db';
var DB_VERSION = 2; // v2: + Store 'reunions' (Team-Versammlungen)
var LS_PREFIX = 'cdse_dossier_v1_';

/* Schreibfehler dürfen NIE still verschluckt werden — sonst glaubt
   das Team, ein Eintrag sei gespeichert, obwohl er beim Neuladen
   verloren geht. Höchstens 1 Meldung pro 10 s, um Toast-Fluten
   zu vermeiden. */
var _lastWriteErrorAt = 0;
function reportStorageWriteError(err) {
  var now = Date.now();
  if (now - _lastWriteErrorAt < 10000) return;
  _lastWriteErrorAt = now;
  if (typeof showToast === 'function') {
    showToast('Achtung: Speichern fehlgeschlagen (' + (err && err.name ? err.name : 'Speicherfehler') + ') — Änderung geht beim Neuladen evtl. verloren!', { error: true, duration: 6000 });
  }
}

var Storage = {
  mode: null, // 'indexeddb' | 'localstorage'
  _idb: null,

  init: function () {
    var self = this;
    return new Promise(function (resolve) {
      if (!window.indexedDB) {
        self.mode = 'localstorage';
        resolve();
        return;
      }
      var req;
      try {
        req = indexedDB.open(DB_NAME, DB_VERSION);
      } catch (e) {
        self.mode = 'localstorage';
        resolve();
        return;
      }
      req.onupgradeneeded = function (ev) {
        var db = ev.target.result;
        if (!db.objectStoreNames.contains('students')) db.createObjectStore('students', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('entries')) db.createObjectStore('entries', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta', { keyPath: 'key' });
        if (!db.objectStoreNames.contains('reunions')) db.createObjectStore('reunions', { keyPath: 'id' });
      };
      req.onsuccess = function (ev) {
        self._idb = ev.target.result;
        self.mode = 'indexeddb';
        resolve();
      };
      req.onerror = function () {
        self.mode = 'localstorage';
        resolve();
      };
    });
  },

  /* ---- generic store access ---- */
  _tx: function (stores, mode) {
    return this._idb.transaction(stores, mode || 'readonly');
  },

  getAll: function (store) {
    var self = this;
    if (this.mode === 'localstorage') {
      try {
        var raw = localStorage.getItem(LS_PREFIX + store);
        return Promise.resolve(raw ? JSON.parse(raw) : []);
      } catch (e) {
        return Promise.resolve([]);
      }
    }
    return new Promise(function (resolve, reject) {
      var tx = self._tx([store]);
      var req = tx.objectStore(store).getAll();
      req.onsuccess = function () { resolve(req.result || []); };
      req.onerror = function () { reject(req.error); };
    });
  },

  putAll: function (store, items) {
    var self = this;
    if (this.mode === 'localstorage') {
      try {
        localStorage.setItem(LS_PREFIX + store, JSON.stringify(items));
      } catch (e) {
        reportStorageWriteError(e);
        return Promise.reject(e);
      }
      return Promise.resolve();
    }
    return new Promise(function (resolve, reject) {
      var tx = self._tx([store], 'readwrite');
      var os = tx.objectStore(store);
      items.forEach(function (item) { os.put(item); });
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reject(tx.error); };
    });
  },

  put: function (store, item) {
    var self = this;
    if (this.mode === 'localstorage') {
      return this.getAll(store).then(function (all) {
        var idx = all.findIndex(function (x) { return x.id === item.id; });
        if (idx >= 0) all[idx] = item; else all.push(item);
        return self.putAll(store, all);
      });
    }
    return new Promise(function (resolve, reject) {
      var tx = self._tx([store], 'readwrite');
      tx.objectStore(store).put(item);
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reportStorageWriteError(tx.error); reject(tx.error); };
    });
  },

  remove: function (store, id) {
    var self = this;
    if (this.mode === 'localstorage') {
      return this.getAll(store).then(function (all) {
        var filtered = all.filter(function (x) { return x.id !== id; });
        return self.putAll(store, filtered);
      });
    }
    return new Promise(function (resolve, reject) {
      var tx = self._tx([store], 'readwrite');
      tx.objectStore(store).delete(id);
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reject(tx.error); };
    });
  },

  clear: function (store) {
    var self = this;
    if (this.mode === 'localstorage') {
      localStorage.removeItem(LS_PREFIX + store);
      return Promise.resolve();
    }
    return new Promise(function (resolve, reject) {
      var tx = self._tx([store], 'readwrite');
      tx.objectStore(store).clear();
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reject(tx.error); };
    });
  },

  getMeta: function (key) {
    if (this.mode === 'localstorage') {
      try {
        var raw = localStorage.getItem(LS_PREFIX + 'meta_' + key);
        return Promise.resolve(raw !== null ? JSON.parse(raw) : null);
      } catch (e) { return Promise.resolve(null); }
    }
    var self = this;
    return new Promise(function (resolve, reject) {
      var tx = self._tx(['meta']);
      var req = tx.objectStore('meta').get(key);
      req.onsuccess = function () { resolve(req.result ? req.result.value : null); };
      req.onerror = function () { reject(req.error); };
    });
  },

  setMeta: function (key, value) {
    if (this.mode === 'localstorage') {
      try { localStorage.setItem(LS_PREFIX + 'meta_' + key, JSON.stringify(value)); } catch (e) {}
      return Promise.resolve();
    }
    var self = this;
    return new Promise(function (resolve, reject) {
      var tx = self._tx(['meta'], 'readwrite');
      tx.objectStore('meta').put({ key: key, value: value });
      tx.oncomplete = function () { resolve(); };
      tx.onerror = function () { reject(tx.error); };
    });
  }
};

/* ============================================================
   Repository: hält In-Memory-Cache (Datenmenge ist klein genug,
   ~Dutzende Schüler / Hunderte Einträge) und schreibt synchron
   in die Persistenzschicht durch.
   ============================================================ */

var Repo = {
  students: [],
  entries: [],
  reunions: [],

  init: function () {
    var self = this;
    return Storage.init()
      .then(function () { return Promise.all([Storage.getAll('students'), Storage.getAll('entries'), Storage.getAll('reunions')]); })
      .then(function (res) {
        self.students = res[0] || [];
        self.entries = res[1] || [];
        self.reunions = res[2] || [];
        return Storage.getMeta('seeded');
      })
      .then(function (seeded) {
        if (!seeded && self.students.length === 0 && self.entries.length === 0) {
          return self._loadSeed();
        }
        // Bestandsinstallationen: Réunion-Daten (Import aus den Team-
        // Rapporten) einmalig nachladen, ohne vorhandene Daten anzufassen.
        return Storage.getMeta('seeded_reunions').then(function (done) {
          if (!done) return self._loadReunionSeed();
        });
      });
  },

  _loadSeed: function () {
    var self = this;
    var data = window.SEED_DATA;
    self.students = data.students.slice();
    self.entries = data.entries.slice().concat((data.reunionEntries || []).slice());
    self.reunions = (data.reunions || []).slice();
    return Promise.all([
      Storage.putAll('students', self.students),
      Storage.putAll('entries', self.entries),
      Storage.putAll('reunions', self.reunions),
      Storage.setMeta('seeded', true),
      Storage.setMeta('seeded_reunions', true)
    ]);
  },

  /* Einmalige Nach-Migration: Réunions + zugehörige Einträge ergänzen.
     Vorhandene IDs werden NIE überschrieben (User-Änderungen gewinnen). */
  _loadReunionSeed: function () {
    var self = this;
    var data = window.SEED_DATA;
    var haveReunion = {};
    self.reunions.forEach(function (r) { haveReunion[r.id] = true; });
    (data.reunions || []).forEach(function (r) {
      if (!haveReunion[r.id]) self.reunions.push(r);
    });
    var haveEntry = {};
    self.entries.forEach(function (e) { haveEntry[e.id] = true; });
    var newEntries = (data.reunionEntries || []).filter(function (e) { return !haveEntry[e.id]; });
    self.entries = self.entries.concat(newEntries);
    return Promise.all([
      Storage.putAll('reunions', self.reunions),
      newEntries.length ? Storage.putAll('entries', self.entries) : Promise.resolve(),
      Storage.setMeta('seeded_reunions', true)
    ]);
  },

  /* ---- Students ---- */
  listStudents: function () {
    return self_sortByName(this.students.slice());
  },
  getStudent: function (id) {
    return this.students.filter(function (s) { return s.id === id; })[0] || null;
  },
  saveStudent: function (data) {
    var self = this;
    var clean = {
      id: data.id || ('stud_' + uid()),
      name: String(data.name || '').trim(),
      anonLabel: String(data.anonLabel || '').trim(),
      active: data.active !== false,
      createdAt: data.createdAt || nowIso()
    };
    var idx = self.students.findIndex(function (s) { return s.id === clean.id; });
    if (idx >= 0) self.students[idx] = clean; else self.students.push(clean);
    return Storage.put('students', clean).then(function () { return clean; });
  },

  /* ---- Entries ---- */
  listEntries: function () {
    return this.entries.slice();
  },
  entriesForStudent: function (studentId) {
    return this.entries.filter(function (e) { return e.studentId === studentId; });
  },
  getEntry: function (id) {
    return this.entries.filter(function (e) { return e.id === id; })[0] || null;
  },
  saveEntry: function (data) {
    var self = this;
    var isNew = !data.id;
    var clean = {
      id: data.id || ('e_' + uid()),
      studentId: data.studentId,
      date: data.date,
      author: String(data.author || '').trim(),
      category: data.category,
      tags: Array.isArray(data.tags) ? data.tags.slice() : [],
      text: String(data.text || ''),
      sliders: {
        wellbeing: normalizeSlider(data.sliders && data.sliders.wellbeing),
        stability: normalizeSlider(data.sliders && data.sliders.stability),
        attendance: normalizeSlider(data.sliders && data.sliders.attendance),
        risk: normalizeSlider(data.sliders && data.sliders.risk)
      },
      createdAt: data.createdAt || nowIso(),
      updatedAt: nowIso()
    };
    /* Strukturierte Berichts-Daten (DS/PEI-Import) + Quelle mitspeichern,
       falls vorhanden. Reisen über Sync & Backup mit, da das ganze
       Entry-Objekt serialisiert wird. */
    if (data.report && typeof data.report === 'object') clean.report = data.report;
    if (data.source && typeof data.source === 'object') clean.source = data.source;
    var idx = self.entries.findIndex(function (e) { return e.id === clean.id; });
    if (idx >= 0) self.entries[idx] = clean; else self.entries.push(clean);
    return Storage.put('entries', clean).then(function () { return clean; });
  },
  deleteEntry: function (id) {
    var self = this;
    self.entries = self.entries.filter(function (e) { return e.id !== id; });
    return Storage.remove('entries', id);
  },

  /* ---- Réunions (Team-Versammlungen) ---- */
  listReunions: function () {
    return this.reunions.slice().sort(function (a, b) { return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); }); // neueste zuerst
  },
  getReunion: function (id) {
    return this.reunions.filter(function (r) { return r.id === id; })[0] || null;
  },
  getReunionByDate: function (date) {
    return this.reunions.filter(function (r) { return r.date === date; })[0] || null;
  },
  saveReunion: function (data) {
    var self = this;
    var clean = {
      id: data.id || ('reu_' + String(data.date || '').replace(/-/g, '')) || ('reu_' + uid()),
      date: data.date,
      orgItems: Array.isArray(data.orgItems) ? data.orgItems.map(function (s) { return String(s); }).filter(function (s) { return s.trim(); }) : [],
      studentOrder: Array.isArray(data.studentOrder) ? data.studentOrder.slice() : [],
      goals: data.goals && typeof data.goals === 'object' ? data.goals : {}
    };
    var idx = self.reunions.findIndex(function (r) { return r.id === clean.id; });
    if (idx >= 0) self.reunions[idx] = clean; else self.reunions.push(clean);
    return Storage.put('reunions', clean).then(function () { return clean; });
  },
  deleteReunion: function (id) {
    this.reunions = this.reunions.filter(function (r) { return r.id !== id; });
    return Storage.remove('reunions', id);
  },
  /* Réunion-Eintrag eines Schülers zu einem Versammlungsdatum
     (Konvention: category 'Team-Réunion', date = Versammlungsdatum). */
  reunionEntryFor: function (date, studentId) {
    return this.entries.filter(function (e) {
      return e.date === date && e.studentId === studentId && e.category === 'Team-Réunion';
    })[0] || null;
  },

  /* ---- Tag-Vokabular: lernt aus Eingaben ---- */
  tagVocabulary: function () {
    var set = {};
    SEED_TAGS.forEach(function (t) { set[t] = true; });
    this.entries.forEach(function (e) { (e.tags || []).forEach(function (t) { set[t] = true; }); });
    return Object.keys(set).sort(function (a, b) { return a.localeCompare(b, 'de'); });
  },

  /* ---- Backup Export / Import ---- */
  exportAll: function () {
    return {
      format: 'cdse-dossier-backup',
      version: 2, // v2: + reunions
      exportedAt: nowIso(),
      students: this.students,
      entries: this.entries,
      reunions: this.reunions
    };
  },
  importAll: function (data, mode) {
    // mode: 'merge' | 'replace'
    var self = this;
    if (!data || !Array.isArray(data.students) || !Array.isArray(data.entries)) {
      return Promise.reject(new Error('Ungültiges Backup-Format.'));
    }
    var importReunions = Array.isArray(data.reunions) ? data.reunions : []; // v1-Backups haben keine
    if (mode === 'replace') {
      self.students = data.students.slice();
      self.entries = data.entries.slice();
      self.reunions = importReunions.slice();
    } else {
      var sIdx = {}; self.students.forEach(function (s, i) { sIdx[s.id] = i; });
      data.students.forEach(function (s) {
        if (sIdx[s.id] !== undefined) self.students[sIdx[s.id]] = s;
        else { self.students.push(s); sIdx[s.id] = self.students.length - 1; }
      });
      var eIdx = {}; self.entries.forEach(function (e, i) { eIdx[e.id] = i; });
      data.entries.forEach(function (e) {
        if (eIdx[e.id] !== undefined) self.entries[eIdx[e.id]] = e;
        else { self.entries.push(e); eIdx[e.id] = self.entries.length - 1; }
      });
      var rIdx = {}; self.reunions.forEach(function (r, i) { rIdx[r.id] = i; });
      importReunions.forEach(function (r) {
        if (rIdx[r.id] !== undefined) self.reunions[rIdx[r.id]] = r;
        else { self.reunions.push(r); rIdx[r.id] = self.reunions.length - 1; }
      });
    }
    return Promise.all([
      Storage.clear('students').then(function () { return Storage.putAll('students', self.students); }),
      Storage.clear('entries').then(function () { return Storage.putAll('entries', self.entries); }),
      Storage.clear('reunions').then(function () { return Storage.putAll('reunions', self.reunions); }),
      Storage.setMeta('seeded', true),
      Storage.setMeta('seeded_reunions', true)
    ]);
  }
};

function self_sortByName(list) {
  return list.sort(function (a, b) { return (a.name || '').localeCompare(b.name || '', 'de'); });
}

function normalizeSlider(v) {
  if (v === null || v === undefined || v === '' || v === false) return null;
  var n = Number(v);
  if (isNaN(n)) return null;
  n = Math.round(n);
  if (n < 1) n = 1;
  if (n > 10) n = 10;
  return n;
}

function uid() {
  return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
}

function nowIso() {
  return new Date().toISOString();
}


'use strict';

/* ============================================================
   Allgemeine Helfer: Escaping, Datumsformat, Farbskalen, Toasts
   ============================================================ */

function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(str) { return escapeHtml(str); }

/* ISO 'YYYY-MM-DD' -> 'DD.MM.YYYY' (Anzeige-Locale: de-LU / TT.MM.JJJJ) */
function formatDate(iso) {
  if (!iso) return '';
  var p = iso.split('-');
  if (p.length !== 3) return iso;
  return p[2] + '.' + p[1] + '.' + p[0];
}
function formatDateShort(iso) {
  if (!iso) return '';
  var p = iso.split('-');
  if (p.length !== 3) return iso;
  return p[2] + '.' + p[1] + '.';
}

function formatDateTime(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    return d.toLocaleString('de-LU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch (e) { return iso; }
}

/* Grün(gut) -> Gelb -> Rot(schlecht) Skala für Slider-Werte 1..10.
   `invert` = true bedeutet: hoher Wert ist fachlich "schlecht" (z. B. Risiko). */
function sliderColor(def, value) {
  if (value == null) return '#cbd5e1';
  var v = def && def.invert ? (11 - value) : value;
  var t = (v - 1) / 9; // 0 = schlecht/rot, 1 = gut/grün
  var hue = Math.round(t * 120);
  return 'hsl(' + hue + ', 62%, 42%)';
}

function highlightMatch(text, query) {
  if (!query) return escapeHtml(text);
  var esc = escapeHtml(text);
  var q = query.trim();
  if (!q) return esc;
  try {
    var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
    return esc.replace(re, '<mark>$1</mark>');
  } catch (e) { return esc; }
}

function snippetAround(text, query, radius) {
  radius = radius || 90;
  var lower = text.toLowerCase();
  var idx = query ? lower.indexOf(query.toLowerCase()) : -1;
  if (idx === -1) {
    return text.length > radius * 2 ? text.slice(0, radius * 2) + '…' : text;
  }
  var start = Math.max(0, idx - radius);
  var end = Math.min(text.length, idx + query.length + radius);
  var out = text.slice(start, end);
  if (start > 0) out = '…' + out;
  if (end < text.length) out = out + '…';
  return out;
}

/* ---------- Toasts ---------- */
function showToast(message, opts) {
  opts = opts || {};
  var root = document.getElementById('toast-root');
  var el = document.createElement('div');
  el.className = 'toast' + (opts.error ? ' toast-error' : '');
  el.textContent = message;
  root.appendChild(el);
  setTimeout(function () {
    el.style.transition = 'opacity .25s';
    el.style.opacity = '0';
    setTimeout(function () { el.remove(); }, 260);
  }, opts.duration || 2600);
}

/* ---------- kleine DOM-Helfer ---------- */
function qs(sel, root) { return (root || document).querySelector(sel); }
function qsa(sel, root) { return Array.prototype.slice.call((root || document).querySelectorAll(sel)); }

function downloadBlob(filename, content, mime) {
  var blob = new Blob([content], { type: mime || 'application/octet-stream' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 400);
}

function pluralize(n, singular, plural) {
  return n + ' ' + (n === 1 ? singular : plural);
}

function optionsHtml(values, selected, allowEmpty, emptyLabel) {
  var out = '';
  if (allowEmpty) out += '<option value="">' + escapeHtml(emptyLabel || '— bitte wählen —') + '</option>';
  values.forEach(function (v) {
    var label = typeof v === 'object' ? v.label : v;
    var value = typeof v === 'object' ? v.value : v;
    out += '<option value="' + escapeAttr(value) + '"' + (value === selected ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
  });
  return out;
}


'use strict';

/* ============================================================
   Handgezeichnete Inline-SVG-Liniencharts (keine Chart-Library).
   Zeigen NUR tatsächlich erfasste Werte — Lücken werden sauber
   übersprungen, niemals als 0 interpretiert.
   ============================================================ */

/**
 * @param {Array} entries  Einträge eines Schülers (chronologisch, beliebig sortiert)
 * @param {Object} def     SLIDER_DEFS-Eintrag (key, label, invert, …)
 * @param {Object} opts    { width, height, mini }
 */
function renderSliderChart(entries, def, opts) {
  opts = opts || {};
  var w = opts.width || 460;
  var h = opts.height || 130;
  var mini = !!opts.mini;

  var points = entries
    .filter(function (e) { return e.sliders && e.sliders[def.key] != null; })
    .map(function (e) { return { date: e.date, value: e.sliders[def.key], id: e.id }; })
    .sort(function (a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });

  if (points.length === 0) {
    return '<div class="chart-empty">Noch keine Werte erfasst</div>';
  }

  var pad = mini ? { top: 6, right: 6, bottom: 6, left: 6 } : { top: 12, right: 16, bottom: 22, left: 26 };
  var innerW = w - pad.left - pad.right;
  var innerH = h - pad.top - pad.bottom;
  var minV = 1, maxV = 10;

  var xy = points.map(function (p, i) {
    var x = pad.left + (points.length > 1 ? (innerW * i / (points.length - 1)) : innerW / 2);
    var y = pad.top + innerH - ((p.value - minV) / (maxV - minV)) * innerH;
    return { x: x, y: y, value: p.value, date: p.date };
  });

  var path = xy.map(function (p, i) { return (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ' ' + p.y.toFixed(1); }).join(' ');

  var gridLines = '';
  var axisLabels = '';
  if (!mini) {
    [1, 5, 10].forEach(function (v) {
      var y = pad.top + innerH - ((v - minV) / (maxV - minV)) * innerH;
      gridLines += '<line x1="' + pad.left + '" x2="' + (w - pad.right) + '" y1="' + y.toFixed(1) + '" y2="' + y.toFixed(1) + '" class="chart-grid-line"/>';
      axisLabels += '<text x="' + (pad.left - 5) + '" y="' + (y + 3).toFixed(1) + '" class="chart-axis-label" text-anchor="end">' + v + '</text>';
    });
    axisLabels += '<text x="' + pad.left + '" y="' + (h - 6) + '" class="chart-axis-label">' + escapeHtml(formatDateShort(xy[0].date)) + '</text>';
    axisLabels += '<text x="' + (w - pad.right) + '" y="' + (h - 6) + '" class="chart-axis-label" text-anchor="end">' + escapeHtml(formatDateShort(xy[xy.length - 1].date)) + '</text>';
  }

  var dots = xy.map(function (p) {
    var color = sliderColor(def, p.value);
    var r = mini ? 2 : 3.4;
    return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="' + r + '" fill="' + color + '" stroke="#fff" stroke-width="' + (mini ? 0 : 1) + '">' +
      '<title>' + escapeHtml(formatDate(p.date)) + ': ' + p.value + '</title></circle>';
  }).join('');

  var lineColor = mini ? '#94a3b8' : '#64748b';

  return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="xMidYMid meet" class="chart-svg" role="img" aria-label="Verlauf ' + escapeAttr(def.label) + '">' +
    gridLines +
    '<path d="' + path + '" fill="none" stroke="' + lineColor + '" stroke-width="' + (mini ? 1.5 : 2) + '" stroke-linejoin="round" stroke-linecap="round"/>' +
    dots +
    axisLabels +
    '</svg>';
}

/* Mini-Sparkline (Risiko-Verlauf) für Dashboard-Karten */
function renderSparkline(entries, key) {
  var def = sliderDef(key);
  return renderSliderChart(entries, def, { width: 110, height: 32, mini: true });
}

function latestSliderValue(entries, key) {
  var withValue = entries
    .filter(function (e) { return e.sliders && e.sliders[key] != null; })
    .sort(function (a, b) { return a.date < b.date ? 1 : a.date > b.date ? -1 : 0; });
  return withValue.length ? withValue[0].sliders[key] : null;
}

function countUnrated(entries, key) {
  return entries.filter(function (e) { return !e.sliders || e.sliders[key] == null; }).length;
}


'use strict';

/* ============================================================
   Anonymisierung für den KI-Export (§4).
   Läuft komplett lokal; nichts wird automatisch versendet —
   das Ergebnis landet ausschließlich (auf Wunsch) in der
   Zwischenablage.
   ============================================================ */

/**
 * Durchsucht den übergebenen Text nach bekannten / wahrscheinlichen
 * Personennamen (Behandler, Mitarbeiter, Eltern) und liefert eine
 * editierbare Vorschlagsliste "erkannter Name -> Platzhalter".
 */
function detectNamesInText(texts, opts) {
  opts = opts || {};
  var exclude = opts.excludeNames || []; // z. B. Name des gerade exportierten Schülers
  var found = {}; // name -> category
  var fullText = texts.join('\n');

  KNOWN_PERSONS.forEach(function (p) {
    if (fullText.indexOf(p.name) !== -1) found[p.name] = p.category;
  });

  /* Andere Schüler der App: Querverweise in Réunion-/Dossier-Texten
     ebenfalls anonymisieren (Platzhalter = deren anonLabel, siehe View). */
  if (typeof Repo !== 'undefined' && Repo.listStudents) {
    Repo.listStudents().forEach(function (s) {
      if (exclude.indexOf(s.name) !== -1) return;
      if (s.name && fullText.indexOf(s.name) !== -1) found[s.name] = 'Schüler';
    });
  }

  NAME_PATTERNS.forEach(function (pat) {
    var re = new RegExp(pat.regex.source, pat.regex.flags);
    var m;
    while ((m = re.exec(fullText)) !== null) {
      var name = m[0].trim();
      if (!found.hasOwnProperty(name)) found[name] = pat.category;
      if (re.lastIndex === m.index) re.lastIndex++;
    }
  });

  var familyRe = new RegExp(FAMILY_TERM_REGEX.source, FAMILY_TERM_REGEX.flags);
  var fm;
  while ((fm = familyRe.exec(fullText)) !== null) {
    var fname = fm[0].trim();
    if (!found.hasOwnProperty(fname)) found[fname] = 'Elteren';
    if (familyRe.lastIndex === fm.index) familyRe.lastIndex++;
  }

  /* Gelernte Namen aus früheren Berichts-Importen (Eltern, Geschwister, …) */
  (getLearnedNames ? getLearnedNames() : []).forEach(function (ln) {
    if (ln && ln.name && exclude.indexOf(ln.name) === -1 && fullText.indexOf(ln.name) !== -1) {
      if (!found.hasOwnProperty(ln.name)) found[ln.name] = ln.category || 'Person';
    }
  });

  /* Schul-/Institutionsnamen */
  var schoolRe = new RegExp(SCHOOL_NAME_REGEX.source, SCHOOL_NAME_REGEX.flags);
  var sm;
  while ((sm = schoolRe.exec(fullText)) !== null) {
    var sname = sm[0].replace(/\s+/g, ' ').trim();
    if (!found.hasOwnProperty(sname)) found[sname] = 'Schule';
    if (schoolRe.lastIndex === sm.index) schoolRe.lastIndex++;
  }

  /* Bekannte Ortsnamen */
  LU_PLACES.forEach(function (pl) {
    var re = new RegExp('\\b' + pl.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + '\\b');
    if (re.test(fullText) && !found.hasOwnProperty(pl)) found[pl] = 'Ort';
  });

  return found;
}

/**
 * Baut aus der Erkennungs-Map eine geordnete, nummerierte
 * Ersetzungsliste: gleiche Kategorie -> "<Kategorie> 1", "<Kategorie> 2", …
 * "Elteren" bleibt als gemeinsamer Platzhalter ohne Nummer.
 */
function buildReplacementList(detectedMap) {
  var counters = {};
  var names = Object.keys(detectedMap).sort(function (a, b) { return b.length - a.length; });
  return names.map(function (name) {
    var cat = detectedMap[name];
    var placeholder;
    if (cat === 'Elteren') {
      placeholder = 'Elteren';
    } else {
      counters[cat] = (counters[cat] || 0) + 1;
      placeholder = cat + ' ' + counters[cat];
    }
    return { name: name, category: cat, placeholder: placeholder, active: true };
  });
}

/**
 * Erkennt verwendete Institutionskürzel in den ausgewählten Einträgen
 * (für den optionalen Schalter "Institutionen ebenfalls anonymisieren").
 */
function detectInstitutions(entries) {
  var set = {};
  entries.forEach(function (e) {
    (e.tags || []).forEach(function (t) {
      if (INSTITUTION_TAGS.indexOf(t) !== -1) set[t] = true;
    });
  });
  return Object.keys(set).sort();
}

/**
 * Wendet die Anonymisierung auf einen Text an:
 *  - Schülername -> anonLabel
 *  - erkannte Personen-/Elternnamen -> Platzhalter (ggf. vom Nutzer angepasst)
 *  - optional: Institutionskürzel -> "Stell N"
 * Konkrete Datumsangaben bleiben unverändert.
 */
function anonymizeText(text, ctx) {
  var out = text;

  // 1) explizite, längere Namen zuerst ersetzen (vermeidet Teil-Überlappungen)
  ctx.replacements
    .filter(function (r) { return r.active && r.name; })
    .sort(function (a, b) { return b.name.length - a.name.length; })
    .forEach(function (r) {
      out = splitJoin(out, r.name, r.placeholder);
    });

  // 2) Institutionen (optional)
  if (ctx.anonymizeInstitutions) {
    ctx.institutionMap.forEach(function (m) {
      out = splitJoin(out, m.name, m.placeholder);
    });
  }

  // 3) Schülername(n) -> anonLabel (zuletzt, damit Vor-/Nachnamen-Teile
  //    nicht versehentlich schon durch generische Muster ersetzt wurden)
  ctx.studentNameMap.forEach(function (m) {
    out = splitJoin(out, m.name, m.anonLabel);
  });

  // 4) Hochsensible, eindeutige Kennungen IMMER entfernen (unabhängig von der
  //    Namensprüfung): Matrikel-/Sozialversicherungsnummer, E-Mail, Telefon.
  //    Die Matrikelnummer enthält u. a. das Geburtsdatum — darf nie zur KI.
  if (ctx.maskIdentifiers !== false) {
    out = out.replace(new RegExp(MATRICULE_REGEX.source, MATRICULE_REGEX.flags), '[Matrikelnr.]');
    out = out.replace(new RegExp(EMAIL_REGEX.source, EMAIL_REGEX.flags), '[E-Mail]');
    out = out.replace(new RegExp(PHONE_REGEX.source, PHONE_REGEX.flags), function (mtch) {
      // nur maskieren, wenn genug Ziffern (vermeidet Treffer auf einzelne Zahlen)
      return (mtch.replace(/\D/g, '').length >= 6) ? '[Tel.]' : mtch;
    });
  }

  return out;
}

function splitJoin(haystack, needle, replacement) {
  if (!needle) return haystack;
  return haystack.split(needle).join(replacement);
}

/**
 * Baut den vollständigen, kopierbaren KI-Export-Text zusammen:
 * Auftrag/Frage + Hinweis zur Sprache + anonymisierte Einträge.
 */
function buildAiExportText(opts) {
  // opts: { scopeLabel, taskText, entries, ctx }
  var lines = [];
  lines.push('=== Anonymisierter Auszug aus dem Schüler-Dossier ===');
  lines.push('Umfang: ' + opts.scopeLabel);
  lines.push('');
  lines.push('Aufgabe an die KI:');
  lines.push(opts.taskText || '(keine Aufgabe ausgewählt)');
  lines.push('');
  lines.push('Hinweis: Die folgenden Einträge sind im luxemburgischen Original verfasst ' +
    'und wurden vor der Weitergabe anonymisiert (Namen durch Platzhalter ersetzt). ' +
    'Konkrete Datumsangaben (Format TT.MM.JJJJ) wurden beibehalten.');
  lines.push('');
  lines.push('--- Einträge (chronologisch) ---');
  opts.entries
    .slice()
    .sort(function (a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; })
    .forEach(function (e) {
      lines.push('');
      lines.push('[' + formatDate(e.date) + '] ' + e.category + (e.tags && e.tags.length ? ' — Themen: ' + e.tags.join(', ') : ''));
      lines.push(anonymizeText(e.text, opts.ctx));
    });
  if (opts.screeningText) {
    lines.push('');
    lines.push('--- Klinisches Screening (Savoir) — Hypothesen, keine Diagnosen ---');
    lines.push('Hinweis: Aus dem integrierten Screening abgeleitete, beobachtungsbasierte ' +
      'Hypothesen zur fachlichen Einordnung — ausdrücklich KEINE Diagnose. Dient nur als ' +
      'zusätzlicher Kontext für die fachliche Beurteilung.');
    lines.push('');
    lines.push(anonymizeText(opts.screeningText, opts.ctx));
  }
  return lines.join('\n');
}


'use strict';

/* ============================================================
   Automatische Themen-Analyse (rein lexikalisch).
   Erkennt Schlagwörter aus THEME_LEXICON in Eintragstexten —
   ohne dass Tags gesetzt sein müssen — und macht sie
   quantitativ (Häufigkeit, Verlauf) und qualitativ (Belege,
   Stufen-Markierung) sichtbar.

   Wichtig (§7 der Anforderungen): Die App nimmt KEINE fachliche
   Bewertung, Diagnose oder Alarmierung vor. Sie zählt und
   markiert ausschließlich Stichwort-Treffer als Lesehilfe.
   ============================================================ */

var _compiledLexicon = null;

function compiledLexicon() {
  if (!_compiledLexicon) {
    _compiledLexicon = THEME_LEXICON.map(function (theme) {
      return {
        key: theme.key,
        group: theme.group,
        severity: theme.severity,
        regex: new RegExp('(' + theme.patterns.join('|') + ')', 'gi')
      };
    });
  }
  return _compiledLexicon;
}

/**
 * Analysiert einen einzelnen Text.
 * @returns Array von { key, group, severity, count, terms[] } — nur Themen mit Treffern.
 */
function analyzeText(text) {
  if (!text) return [];
  var results = [];
  compiledLexicon().forEach(function (theme) {
    theme.regex.lastIndex = 0;
    var m, count = 0, terms = {};
    while ((m = theme.regex.exec(text)) !== null) {
      count++;
      terms[m[0].toLowerCase()] = true;
      if (theme.regex.lastIndex === m.index) theme.regex.lastIndex++;
    }
    if (count > 0) {
      results.push({ key: theme.key, group: theme.group, severity: theme.severity, count: count, terms: Object.keys(terms) });
    }
  });
  return results.sort(function (a, b) { return b.severity - a.severity || b.count - a.count; });
}

/**
 * Findet alle Treffer-Positionen aller Themen in einem Text
 * (für die farbige Hervorhebung). Überlappungen werden entfernt:
 * höhere Stufe gewinnt, sonst der frühere Treffer.
 */
function findThemeMatches(text) {
  var matches = [];
  compiledLexicon().forEach(function (theme) {
    theme.regex.lastIndex = 0;
    var m;
    while ((m = theme.regex.exec(text)) !== null) {
      matches.push({ start: m.index, end: m.index + m[0].length, term: m[0], key: theme.key, severity: theme.severity });
      if (theme.regex.lastIndex === m.index) theme.regex.lastIndex++;
    }
  });
  matches.sort(function (a, b) { return a.start - b.start || b.severity - a.severity || a.end - b.end; });
  var kept = [];
  var lastEnd = -1;
  matches.forEach(function (m) {
    if (m.start >= lastEnd) { kept.push(m); lastEnd = m.end; }
  });
  return kept;
}

/**
 * Escaped einen Text als HTML und hebt alle Lexikon-Treffer als
 * <mark class="theme-mark sev-N"> hervor (Tooltip = Themen-Name).
 */
function highlightThemesHtml(text) {
  var matches = findThemeMatches(text);
  if (!matches.length) return escapeHtml(text);
  var out = '';
  var pos = 0;
  matches.forEach(function (m) {
    out += escapeHtml(text.slice(pos, m.start));
    out += '<mark class="theme-mark sev-' + m.severity + '" title="Thema: ' + escapeAttr(m.key) + '">' + escapeHtml(m.term) + '</mark>';
    pos = m.end;
  });
  out += escapeHtml(text.slice(pos));
  return out;
}

/**
 * Aggregiert die Analyse über eine Menge von Einträgen.
 * @returns Map key -> {
 *   key, group, severity,
 *   entryCount   — in wie vielen Einträgen das Thema vorkommt,
 *   matchCount   — Gesamtzahl der Stichwort-Treffer,
 *   students     — Map studentId -> Trefferzahl,
 *   weeks        — Map date(ISO) -> Trefferzahl (für Heatmap/Verlauf),
 *   evidence     — [{ entryId, studentId, date, terms, snippet }]
 * }
 */
function analyzeEntries(entries) {
  var agg = {};
  entries.forEach(function (e) {
    var found = analyzeText(e.text);
    found.forEach(function (f) {
      var a = agg[f.key];
      if (!a) {
        a = agg[f.key] = { key: f.key, group: f.group, severity: f.severity, entryCount: 0, matchCount: 0, students: {}, weeks: {}, evidence: [] };
      }
      a.entryCount++;
      a.matchCount += f.count;
      a.students[e.studentId] = (a.students[e.studentId] || 0) + f.count;
      a.weeks[e.date] = (a.weeks[e.date] || 0) + f.count;
      a.evidence.push({
        entryId: e.id,
        studentId: e.studentId,
        date: e.date,
        terms: f.terms,
        snippet: snippetAround(e.text, f.terms[0], 80)
      });
    });
  });
  return agg;
}

/** Sortierte Liste der aggregierten Themen: Stufe zuerst, dann Häufigkeit. */
function sortedThemeAggregates(agg) {
  return Object.keys(agg).map(function (k) { return agg[k]; })
    .sort(function (a, b) { return b.severity - a.severity || b.entryCount - a.entryCount || a.key.localeCompare(b.key, 'de'); });
}

function viewDashboard(params, query) {
  var students = Repo.listStudents();

  function studentCardHtml(s) {
    var entries = Repo.entriesForStudent(s.id);
    var sorted = entries.slice().sort(function (a, b) { return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
    var lastEntry = sorted[0];
    var riskValue = latestSliderValue(entries, 'risk');
    var hasAnyValue = entries.some(function (e) {
      return e.sliders && SLIDER_DEFS.some(function (d) { return e.sliders[d.key] != null; });
    });

    var riskBlock = '';
    if (riskValue != null) {
      riskBlock = '<div class="spark-row">' +
        '<span class="risk-pill" style="background:' + sliderColor(sliderDef('risk'), riskValue) + '">Risiko: ' + riskValue + '</span>' +
        '<span style="width:96px; flex-shrink:0;">' + renderSparkline(entries, 'risk') + '</span>' +
        '</div>';
    } else if (!hasAnyValue) {
      riskBlock = '<div class="meta-line">Noch keine Bewertungen erfasst</div>';
    }

    return '<article class="card student-card" data-route="#/student/' + s.id + '" tabindex="0" role="button" aria-label="Dossier von ' + escapeAttr(s.name) + ' öffnen">' +
      '<h3>' + escapeHtml(s.name) + '</h3>' +
      '<div class="meta-line">' + pluralize(entries.length, 'Eintrag', 'Einträge') +

      riskBlock +
      '</article>';
  }

  function gridHtml(q) {
    var needle = (q || '').trim().toLowerCase();
    var filtered = students.filter(function (s) {
      if (!needle) return true;
      if (s.name.toLowerCase().indexOf(needle) !== -1) return true;
      return Repo.entriesForStudent(s.id).some(function (e) {
        return e.text.toLowerCase().indexOf(needle) !== -1 ||
          e.category.toLowerCase().indexOf(needle) !== -1 ||
          (e.tags || []).some(function (t) { return t.toLowerCase().indexOf(needle) !== -1; });
      });
    });
    if (!filtered.length) {
      return '<div class="empty-state">Keine Schüler oder Einträge gefunden für „' + escapeHtml(q) + '".</div>';
    }
    return '<div class="card-grid">' + filtered.map(studentCardHtml).join('') + '</div>';
  }

  var html =
    '<div class="page-head">' +
      '<div><h2>Dashboard</h2><p class="muted">' + students.length + ' Schüler &middot; ' + Repo.entries.length + ' Einträge insgesamt</p></div>' +
      '<div class="actions"><button class="btn btn-primary" data-route="#/entry/new">+ Neuer Eintrag</button></div>' +
    '</div>' +
    '<div class="search-bar">' +
      '<input type="search" id="dashboard-search" placeholder="Schüler, Themen, Tags oder Texte durchsuchen…" value="' + escapeAttr(initialQuery) + '" aria-label="Schnellsuche">' +
    '</div>' +
    '<div id="dashboard-grid">' + gridHtml(initialQuery) + '</div>';

  return {
    navKey: 'dashboard',
    html: html,
    afterRender: function (root) {
      var input = qs('#dashboard-search', root);
      var grid = qs('#dashboard-grid', root);
      if (input) {
        input.addEventListener('input', function () {
          grid.innerHTML = gridHtml(input.value);
        });
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      }
    }
  };
}

var PERSON_TAG_REGEX = /^(Dr\.?|Dokter|Doktesch|Mme|Madame|Madamm|Här|Herr|Monsieur)\s/;

function deriveInstitutionTags(entries) {
  var set = {};
  entries.forEach(function (e) { (e.tags || []).forEach(function (t) { if (INSTITUTION_TAGS.indexOf(t) !== -1) set[t] = true; }); });
  return Object.keys(set).sort(function (a, b) { return a.localeCompare(b, 'de'); });
}

function derivePersonTags(entries) {
  var set = {};
  entries.forEach(function (e) { (e.tags || []).forEach(function (t) { if (PERSON_TAG_REGEX.test(t)) set[t] = true; }); });
  return Object.keys(set).sort(function (a, b) { return a.localeCompare(b, 'de'); });
}

function deriveCurrentThemes(entries, weekCount) {
  var byDateDesc = entries.slice().sort(function (a, b) { return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
  var seenDates = [];
  byDateDesc.forEach(function (e) { if (seenDates.indexOf(e.date) === -1) seenDates.push(e.date); });
  var recentDates = seenDates.slice(0, weekCount || 4);
  var counts = {};
  byDateDesc.forEach(function (e) {
    if (recentDates.indexOf(e.date) === -1) return;
    (e.tags || []).forEach(function (t) {
      if (INSTITUTION_TAGS.indexOf(t) !== -1) return;
      if (PERSON_TAG_REGEX.test(t)) return;
      counts[t] = (counts[t] || 0) + 1;
    });
  });
  return Object.keys(counts)
    .sort(function (a, b) { return counts[b] - counts[a] || a.localeCompare(b, 'de'); })
    .slice(0, 10);
}

      '<div class="info-block"><h4>Beteiligte Behandler / Mitarbeiter</h4>' + (persons.length ? '<div class="chip-row">' + persons.map(function (i) { return '<span class="chip">' + escapeHtml(i) + '</span>'; }).join('') + '</div>' : '<p class="muted">Keine erkannt</p>') + '</div>' +
      '<div class="info-block"><h4>Laufende Themen</h4>' + (themes.length ? '<div class="chip-row">' + themes.map(function (i) { return '<span class="chip">' + escapeHtml(i) + '</span>'; }).join('') + '</div>' : '<p class="muted">Keine erkannt</p>') + '</div>' +

      wireFilters();

function uniqueSorted(values, preferredOrder) {
  var set = {};
  values.forEach(function (v) { set[v] = true; });
  var unique = Object.keys(set);
  if (preferredOrder) {
    return preferredOrder.filter(function (v) { return set[v]; });
  }
  return unique.sort(function (a, b) { return a.localeCompare(b, 'de'); });
}

function flatten(arrays) {
  var out = [];
  arrays.forEach(function (a) { out = out.concat(a); });
  return out;
}
