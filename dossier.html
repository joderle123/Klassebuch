s. ATVA kennt den Donneschden um 9h. Keng Infos zum Cardiolog.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-02T13:00:00.000Z","updatedAt":"2026-03-02T13:00:00.000Z"},{"id":"e_reu_20260302_miguel","studentId":"stud_miguel","date":"2026-03-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Dëse Mëttwoch ass CNI um 8h30. 17.03 um 8 Auer RDV um Consulat fir carte d‘identité ze erneieren. Méindes vun 11:30-12:00 weider Bezuchszäit.\nAuerzäiten Training: mardis, jeudis et vendredis à 17h. Papp proposéiert amplaatz Dënschdes schon um 14:00, 2 Deeg an der Woch um 15:00. Geigepropose: Denschtdes um 15h an 1mol soll de Papp siche kommen.\nStage beim Coiffer Cap Act vum 18.05-23.05 (convention de stage muss nach ausgefëllt ginn)\nVapesituatioun: Säit de Mëttwoch keng Vape dobäi (eidel ginn). An der HG-Zäit ass et him ganz schwéier gefall (Nikotinentzug). Sin dun Velo fuere gaangen wou et him däitlech besser gaangen ass. Donneschden och keng dobäi an huet den Dag gepackt. Säin Zil ass et keng Vape méi wärend der Schoulzäit ze benotzen. Haut och keng dobäi. Awer een Aan drop haalen, net dass hien eis eppes fir mescht...\nIdentitätsfindung?","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-02T13:00:00.000Z","updatedAt":"2026-03-02T13:00:00.000Z"},{"id":"e_reu_20260302_chase","studentId":"stud_chase","date":"2026-03-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"war de Freideg am LTA. Hie wollt eleng an d’Gebai ragoen an och eleng de Sall sichen. Vu dass hien no der Schell awer nach ëmmer am Preau stoung, hunn ech mech mat him zesummen op d’Sich nom Sall gemaach. D’Franséischproff huet hien am Gank empfaang. Den Dag ass senger Ausso no gutt verlaf an et huet him gefall. Ech hat nach e Gespréich mat der Mme vun der ESEB an dem Directeur adjoint. Hunn den 19.3 mëttes e gemeinsamen RV mat Elteren, ESEB, Proffen an Direktioun. D’Bezuchszäit kann ech muer net maachen, duerfir eréischt de Mëttwoch um 13.00 Auer. Den Donneschdeg de Mëtteg huet hie RV beim Dr.Meinhardt. Ech gi mat dohinner fir dem Dr. méi e komplett Bild vum Chase ze ginn. Ech hat e Gespréich ugefrot virum Chase sengem RV den Donneschdeg mä vu dem Dr. sengem volle Planning hunn si proposéiert dass ech mat um RV kéint dobäi sinn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-02T13:00:00.000Z","updatedAt":"2026-03-02T13:00:00.000Z"},{"id":"e_reu_20260302_ben","studentId":"stud_ben","date":"2026-03-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"huet haut et net an de Stage gepackt, well et muer nach eemol probeieren. Ass läscht Woch 2mol reischt kuerz virun 16h opgetaucht... Eis Recommandation ass CISP Liewenshaff, Ben well dat awer net. Gespréich mat Elteren an Foyer gett organiséiert.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-02T13:00:00.000Z","updatedAt":"2026-03-02T13:00:00.000Z"},{"id":"e_reu_20260302_mia","studentId":"stud_mia","date":"2026-03-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ass haut rem ofgemellt weinst der Engleschprüfung, kann am Moment Denschtdegs um 14h heem. Wie fueren mer wieder? 01 wann et net kennt? Et kann definitif net sinn datt et eng 5G avancé certificeiert kritt… Mir sinn dogeint datt Promotioun op der Basis vun enger Semesterzensur gemaach gett. Et ass keng Demande un eis do, mir haalen op him entgeint ze kommen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-02T13:00:00.000Z","updatedAt":"2026-03-02T13:00:00.000Z"},{"id":"e_reu_20260302_alexp","studentId":"stud_alexp","date":"2026-03-02","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"den Dr Meinhardt recommandeiert dem Alex sengen Elteren en Internat fir datt Alex dee Rhythmus behällt deen et elo huet (Schlofen, Handy, …) D’Internat vu Reiden steht am Raum zesummen mat engem Schoulwiessel an den ALR. De Papp war mei retizent wie d‘Mamm a punkto Internat. Fazit vum Dr Meinhardt deen Situatioun gutt resumeiert: D’Elteren haalen d’Alex a schwengen mat, datt ass awer net datt wat hatt brauch, et brauch een deen Struktur gett och wann et him kierperlech net gutt geht (psychosomatesch).","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-02T13:00:00.000Z","updatedAt":"2026-03-02T13:00:00.000Z"},{"id":"e_reu_20260309_lilly","studentId":"stud_lilly","date":"2026-03-09","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Zensur, kritt et een Modul bai? Modul 1 am Daitschen, Sport an Atelier Kichen. Atelier Metal. Frai Schreiwprouwen am FR an DE (z.B Diktat) fir den Testing. D’Sarah mellt hinnen zreck datt et net méiglech ass, hat blockéiert.\nDe Papp krut eng Mail wou mir konkret Kontakter ernimmt hunn fir dem Lilly e Suivi ze bidden, hien muss sech just mellen. Et gouf och rëm drun erënnert dass d’Lilly et suivi pedopsychiatrique brauch laut der CNI an dass e Pediater net duer geet. --> 0 Reaktioun","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-09T13:00:00.000Z","updatedAt":"2026-03-09T13:00:00.000Z"},{"id":"e_reu_20260309_jason","studentId":"stud_jason","date":"2026-03-09","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Zensur, kritt en een Modul bai? Daitsch Modul 5, Culge a Franc net, Sport jo. Optioun Metal erem e riesen Thema, wann hien net well schaffen dann soll en do setzen. Classe de cohabitation zu Miersch ass momentan voll.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-09T13:00:00.000Z","updatedAt":"2026-03-09T13:00:00.000Z"},{"id":"e_reu_20260309_miguel","studentId":"stud_miguel","date":"2026-03-09","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Rdv CPI&co 16.03 9h30, keen Vertrauensvirschoss\nDaitsch Modul 5? Franc Module 4, Culge Module 5 ?, Konscht, Sport, Atelier métal\nLëscht Woch huet de Miguel keng Vape oofginn. Hien huet behaapt, dass hien keng Vape méi am schoulsche Kontext brauch (daat wier säin Zil). Opgefall ass awer, datt hien méi dacks op d’Toilette geet. D’Eltere reprochéieren eis, wéisou mer Moies him d’Vape net ofhuelen. Gläichzäiteg betounen si, datt si frou a stolz sinn, datt hien et packt an der Schoulzäit net ze k onsuméieren a gesinn d’ Toilettepausen eventuell als Stressregulatioun...\nHaut huet hien d’Vape ofginn. 1. Block Däitsch - am Iessall (keen Bock op Däitsch) An der Paus heut en no senger 5 min Paus gefrot. Hunn him se refuséiert well e “jo keng méi brauch”. Hien ass roose ginn, an den Iessraum gestiermt a gesot hien géif d’ganz Woch net schaffen. Laut den Elteren war déi lescht Woch fir de Miguel ganz stressvoll wéinst der CNI Réunioun (wéineg Schlof, Angschtreaktiounen) Hien géif sech vill Gedanken maachen. Hei kréie mir och reprochéiert, net bescheed gesot ze hunn dass mir un d’CNI runtrieden. Dieren weiderhinn zousperren: Lescht Woch hunn ech en erwëscht wéi en an de Büro geschlach ass. Wou e mesch gesinn huet, war en erfouert an huet behaapt hien hätt mesch gesicht...\nD’Vertrauensbasis tëscht Schoul, Miguel an den Elteren ass ganz fragil. D’Elteren erkläre verschidde Verhalensweisen duerch Stress an Angscht am Zesummenhang mat der CNI-Situatioun.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-09T13:00:00.000Z","updatedAt":"2026-03-09T13:00:00.000Z"},{"id":"e_reu_20260309_chase","studentId":"stud_chase","date":"2026-03-09","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Bezuchszäit beim Chase well hien sech de Mëttwoch ofgemellt hat an ech 1.woust dass hien net krank wär an 2.ech hie viru Freides (2.Kéier am LTA) nach wollt mat him schwätzen. Hie war do Moies schlecht opkomm an net gutt drop, mä ab 8:20 Auer huet hie fonctionnéiert. Ass awer net op d’Iddi komm fir mat engem Bus méi spéit an d’Annexe ze kommen. Wann ech him dat proposéiert gehat hätt, hätt hien dat anscheinend gemaach. Den Chase huet du moies doheem Hausaufgabe gemaach, sot hien. Hien war nervös fir de Freideg, méi wéi fir déi éischte Kéier, obwuel et gutt gaang war. Wahrscheinlech „Angscht“ virum Franséischen.\nDen Chase hat net un d’Franséischprüfung geduecht, hat also och absolut näischt dofir geléiert. De Wëllen fir ab elo Vollgas am Franséischen ze ginn fir dee grousse Retard opzeschaffen, ass nach net richteg erkennbar. Den Chase weess och nach net ob deen nach kënnt. Ech hu gefrot „Wat hues du geduecht wou ech geschriwwen hunn ech géing laanschtkommen? Bestëmmt „Oh nee“! „ Den Chase huet gemengt déi Wierder hätten et gutt getraff;-). Et war ganz offensichtlech, dass den Chase sech geschummt huet an net wuelgefillt huet, well ech elo gesinn hu wéi si „hausen“. D’Haus ass an engem schlechten, net gepflegten Zoustand a bannen gesäit et och net propper a schéin decoréiert aus, mä éischter knaschteg a vernooléissegt (futtist Regal am Gank, vill Saachen laanscht Maueren um Buedem,..). War duerno einfach mat ragaang well ech gesot hunn ech misst dréngend op d’Toilett, mä d’Buedzëmmer war anscheinend besat an et gëtt anscheiend keng separat Toilett. Mir huet et éischter geschéngt dass den Chase net wilt dass ech banne wär. Hunn hien dun och erléist a si gaang. Hunn dem Chase réckgemellt, dass d’Saach mam Geroch sech gebessert hätt an ob hien eppes geännert hätt. Hien huet seng Kummer geraumt an d’Kaazenhoer gestaubsaugt. D’Kazen ginn anscheinend och lo net méi an d’Kummer. Den Hond ass awer am Dag bei him an der Kummer (mat Fënster zou!). Denken jo dass d’Kummerdier dann awer opsteet, mä da klappt d’Geschicht mat de Kazen awer net méi ganz?! Hunn och raushéieren dass déi 3 Kanner deen Dag doheem waren. Seng Schwëster vun 13 a säi Brudder vun 10 Joer, allen zwee krank. Den Chase wollt hinnen eppes kachen, si wollten awer näischt. Hu gefrot ob seng krank Geschwëster eng zousätzlech Motivatioun gewiercht wären fir doheem ze bleiwen, mä dat war et anscheinend net. Dat huet och seng Mamm confirméiert. D’Mamm huet och nach bestätegt dass den Chase wierklech nervös war fir de Freideg. Huet Mëttwochs owes gekrasch (hien géing sech wéi blockéiert spieren,…). Positiv Réckmeldung awer och erëm de Freideg vun den LTA-Proffen. Den Chase war owes och glécklech a frou. An der Mëttesstonn war hien an d’Sportssektioun gaang! Dem Chase seng Therapeutin wëll eis „Bibel“ (Buch mat den ElDib-Ziler) gesinn. Wäert, virum RV den Donneschdeg beim Dr.Meinhardt, nach eemol mat hir schwätzen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-09T13:00:00.000Z","updatedAt":"2026-03-09T13:00:00.000Z"},{"id":"e_reu_20260309_ben","studentId":"stud_ben","date":"2026-03-09","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Zensur, wat fehlt? Option Musique, Option Anglais, Vieso (vum Sandra), Info (vum Sarah)\nWar de Méinden net, an de Freiden e bëssen ze spéit an den Stage, fir de Rescht war hien emmer do an motivéiert seet den Foyer. Ech ginn hien haut besichen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-09T13:00:00.000Z","updatedAt":"2026-03-09T13:00:00.000Z"},{"id":"e_reu_20260309_mia","studentId":"stud_mia","date":"2026-03-09","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Rdv Orientation LNB 17.03 14h30. Huet der Mamm kloer gesot dass hat net well. Mir mussen och do un en Signalement denken.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-09T13:00:00.000Z","updatedAt":"2026-03-09T13:00:00.000Z"},{"id":"e_reu_20260309_alexp","studentId":"stud_alexp","date":"2026-03-09","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Rdv Dr Meinhardt 23.03 15h","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-09T13:00:00.000Z","updatedAt":"2026-03-09T13:00:00.000Z"},{"id":"e_reu_20260316_lilly","studentId":"stud_lilly","date":"2026-03-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"D’Lilly ass enttäuscht an de Miguel an kapselt sech of. De Papp hellt anscheinend RDV fir de Suivi ze starten deen mir recommandéiert hunn. Mir warden. Hien seet dass hien selwer misst no sech kucken well hien soss net méi laang liewen géing...","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-16T13:00:00.000Z","updatedAt":"2026-03-16T13:00:00.000Z"},{"id":"e_reu_20260316_jason","studentId":"stud_jason","date":"2026-03-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Geet den 25.3 um 10h op Useldeng an eng Epicerie vir sech déi Stageplaz unzekucken, hien kinnt do sain zweeten Stage vun enger Woch maan.\nAss am Skills dobai dei 3 Keieren wou de Gary seng ETEP Stonnen huet (da geht hien net mat an den Atelier Métal)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-16T13:00:00.000Z","updatedAt":"2026-03-16T13:00:00.000Z"},{"id":"e_reu_20260316_miguel","studentId":"stud_miguel","date":"2026-03-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Debriefing vun Gespreich moies: Fazit de Problem ass a war emmer Schoul, mir sinn net konsequent genuch a kommunizeieren net kloer. An hiren Aan, mussen si emmer bestroofen fir eppes wat si net gesinn. Doheem ass alles an der Reih. D’CPI huet eis gesot datt Scheedung zanter 3 Wochen am Raum steht. D’Mamm huet mei wie eng Keier gesot datt si en hellt a mat him aPortugal geht. Elteren beschwätzen ennert eneen ob si fraiwelleg un de Juge runtrieden (d’CPI ennerstetzt si dobai a prepareiert de Breif). Mir signaleieren. D’CPI recommandeiert den IMP zu Etalle, d’Mamm huet keen Vertrauen an dei Professionnel an och net datt datt dooten dann dat richtegt ass. Den 24.03 um 16h ass datt nächst Gespreich an der AJ (PEI + Kader klären)\nDe Miguel kritt keng Informatiounen zu Juge an IMP zu desem Zaitpunkt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-16T13:00:00.000Z","updatedAt":"2026-03-16T13:00:00.000Z"},{"id":"e_reu_20260316_chase","studentId":"stud_chase","date":"2026-03-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Den Chase huet e gutt Referat am Däitschen gehal an eng anstänneg franséisch Prüfung geschriwwen. Rendez-vous beim Dr.Meinhardt ass gutt verlaf. Den Chase huet sech bereet erklärt sech op Medikatioun anzeloossen respektiv auszeprobéieren. Hëllt et säit gëschter Moien. De Freideg am Lycée ass et rëm gutt gaang. Hun dësen Donneschdeg de Mëtteg RV mat de Proffen, dem Chase sengem Papp an der Direktioun vum LTA. Eventuel Mëttwochs als 2.Dag am Lycée dobäi huelen no der Vakanz oder am Plaatz vum Freiden.\nDem Chase an dem Conseil de classe kloer maachen datt Iwwergangsphase mei komplizeiert gett vun der Gestioun. Soubaal den Chase e Fach am Lycée huet kritt den LTA de Lead, mee et muss dofir gesuergt sinn datt hien Matière vun der Woch am Virfeld huet","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-16T13:00:00.000Z","updatedAt":"2026-03-16T13:00:00.000Z"},{"id":"e_reu_20260316_ben","studentId":"stud_ben","date":"2026-03-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"War super motivéiert, wollt méi laang an den Stage an huet gesoot hien wéilt onbedengt Landschaftsgärtner ginn. Waren um RDV beim Dr. Karst, hien hëllt Moies keen Risperdal méi, hien seet seng Tic’en wieren vill méi present. Verännerungen am Aen haalen.\nDe Ben ass elo ganz fixeiert op dei Ekipp vun der Gemeng, elo schafft den Joey mat em drun fir sech och op aner Meiglechkeeten anzeloosen. E kinnt e Stage zu Keespelt beim Bauer „A Lill“ maan an do och souguer evt speider eng Aarbecht kreien. Mir organiseieren elo deemnächst en HPG fir Zukunftsperspektiven ze klären (mat Foyer an Elteren): DAP Landschaftsgärtner, SNJ, schaffen goen, CISP,…","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-16T13:00:00.000Z","updatedAt":"2026-03-16T13:00:00.000Z"},{"id":"e_reu_20260316_mia","studentId":"stud_mia","date":"2026-03-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Mamm gouf informéiert dass mir en Signalement mussen schreiwen wéinst den Non-excusé. Mia war haut do.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-16T13:00:00.000Z","updatedAt":"2026-03-16T13:00:00.000Z"},{"id":"e_reu_20260316_alexp","studentId":"stud_alexp","date":"2026-03-16","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Rdv Dr Meinhardt 23.03 15h","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-16T13:00:00.000Z","updatedAt":"2026-03-16T13:00:00.000Z"},{"id":"e_reu_20260323_lilly","studentId":"stud_lilly","date":"2026-03-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Dem Lilly säin RDV bei der Dokter Berthold steet des Woch un.\nSie probéieren aner Weeër ze goen wéi déi déi mir recommandéiert hunn an ginn awer all Kéiers rem rappelléiert dass et net dat ass wat dem Lilly eppes bréngt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-23T13:00:00.000Z","updatedAt":"2026-03-23T13:00:00.000Z"},{"id":"e_reu_20260323_jason","studentId":"stud_jason","date":"2026-03-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ATVA kënnt den Dënschden um 13h30-14h30 fir mam Jason säin CV ze maachen. Rdv e Mëttwoch zu Useldeng, Joey begleed (Vanessa ass am Congé), 23 Moduler op der Zensur, d’Schoul huet no engem avis d’orientation grfot, ech sot mir kinnten net wirklech een ginn deen realistesch wier (hien huet Accès op all CCP’en) Den Gary huet dem CTSA geschriwwen fir ze froen wou den Dossier drun ass, den Dossier ass ukomm mee nach net dispatched","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-23T13:00:00.000Z","updatedAt":"2026-03-23T13:00:00.000Z"},{"id":"e_reu_20260323_miguel","studentId":"stud_miguel","date":"2026-03-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"muer um 16h ass PEI Gespréich, mir soen datt mir de Service de médiation scolaire aschalten wellen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-23T13:00:00.000Z","updatedAt":"2026-03-23T13:00:00.000Z"},{"id":"e_reu_20260323_chase","studentId":"stud_chase","date":"2026-03-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Bis elo leeft d’Reintegratioun gutt. Fillt sech wuel an der Klass. Papp ass nach virsichteg wéinst Angscht viru Mobbing. Krut 30/60 an dem Dossier Sciences naturelles deen hien wärend dem 1.Semester autonom ausgefëllt huet. Ab dem 3.Trimester Mëttwochs a Freides am LTA. Dann huet hie Mathé, Däitsch, Englesch a Sciences sociales jeweils 1x bei eis an 1x am LTA. Franséisch just nach 1x d‘Woch (freides am LTA) a guer net méi hei. Kritt Aufgaben un deenen en hei (eventuell an der Konscht) oder doheem ka schaffen. D‘Mme Krack huet en Teams opgemaach (Krack-Neu-Sabri) wou si Material fir den Chase drasetzt. Den LTA huet dann de Lead an all deene Fächer! SCNAT feelt nach ëmmer ganz (am LTA hunn se 3x 50 Min). Duerfir kënnt ab dem 27.Abrëll kënnt dann nach Méindes dobäi. Den Chase bleiwt elo bis Juli am Niveau de base am Däitschen. Digital science muss net onbedéngt ofgedeckt ginn. An der SCNAT kritt hien erëm Aufgaben bis en dat Fach am LTA huet.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-23T13:00:00.000Z","updatedAt":"2026-03-23T13:00:00.000Z"},{"id":"e_reu_20260323_ben","studentId":"stud_ben","date":"2026-03-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Gemeng Ettelbréck bild aus fir de Landschaftsgärtner, se stellen och nach an der Carrière A an (ouvrier non qualifié), vill Gemengen maachen dat net mei. Meeschtens awer bessi mei aal Lait iwwert ADEM mat engem OTI (Occupation temporaire indemnisée) De Ben huet mir kloer gesoot dass hien well schaffen goen an méi spéit säin DAP nomaachen. Hien ass och gewëllt beim Bauer zu Keespelt testen/kucken ze goen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-23T13:00:00.000Z","updatedAt":"2026-03-23T13:00:00.000Z"},{"id":"e_reu_20260323_mia","studentId":"stud_mia","date":"2026-03-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Feedback Rdv LNB. Mir brauchen Datumer fir Prüfungen, 01 wann et net kennt. Mat der Zensur vum 1. Semester wier hat souguer am Couloir fir eng Réussite vun enger 5C. Mia huet refuséiert haut an Gespréich an Annexe ze kommen.Signalement ass eraus gaang.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-23T13:00:00.000Z","updatedAt":"2026-03-23T13:00:00.000Z"},{"id":"e_reu_20260323_alexp","studentId":"stud_alexp","date":"2026-03-23","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Rdv Dr Meinhardt 15h00 HRS","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-03-23T13:00:00.000Z","updatedAt":"2026-03-23T13:00:00.000Z"},{"id":"e_reu_20260413_alexp","studentId":"stud_alexp","date":"2026-04-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"15J, 6G am Ermesinde, adopteiert, Hautpotentiel, krut rezent Autismusspektrum Diagnose vum HRS (Clearing mam CTSA ufroen soubal de Rapport médical do ass), si huelen rem RDV beim Dr Pignoloni,HRS mécht keen Suivi, seng Psychotherapeutin Mme Karp ass aktuell am Congé de maternité, Elteren sichen no Ersatz. War an der Dagesklinik, konnt sech net richteg drop aloossen. Conditioun vum Dr Meinhardt: Schoul soss Statioun. Adoptivelteren sinn getrennt zanter 2022, si schaffen allebeid um CEJHP. En huet eng Schwester vun 20 Joer, Emma. Spillt Volleyball 2mol Woch plus Matcher (an Airsoft, wei Paintball) Ech hunn driwwert informéiert datt mir net dem Ermesinde säin System iwwerhuelen, kritt keng Zensur dëst Trimester, realistesch Aschätzung maan wou mer schoulesch stinn an hin kennegoen. Lycéeswiessel evt LJBM oder ALR.\nHat eng ISA vum CEjHP (Sam Nilles), kucken ob mer dei brauchen fir nächst Schouljoer? E wunnt beim Papp, Bus huelen ass en Thema, de Papp wärt en am Moment feieren an mir froen de Mobibus fir de Retour un.\nHuet am Moment all zweet Woch Psychomot Freides mëttes, kucken fir datt ze änneren.\nAss un Musik interesséiert, spillt Piano an Drums, komponéiert selwer um Computer. Ass un der Geschichte interesséiert (2. Weltkrich, Japan, Pazifik, ...)\nWeilt gären en Animé ophuelen an well och eemol eng Firma an deem Beraich opmaachen. Ka Schwammen a Velofueren, keng Allergien/Onverträglechkeeten bekannt. Esst gären koreanesch/asiatesch. Mengt et géif em hei net schmachen.\nKennt an den L2, Bezuch iwwerhellt den Jean-Pierre, Bezugszait Meindes um 11h15\nEt huet dem JP am eischten Bezuch verzielt datt hien sech als FemBoy verkleed. Huet als Zil uginn: liewen...\nElteren sinn net ganz zefridden mat der Prise en charge vum HRS, Psychologin ass gewiesselt ginn. Alex leeft gutt op der Statioun. Internat ass hinnen ze deier, si kreien datt net finanziell gestemmt. Den Dr Meinhardt huet ze verstoen ginn datt Elteren datt Alex soss placeiert waert ginn. No der Vakanz soll elo e Schoulversuch bei eis gestart ginn, bis elo huet awer nach keen sech gemellt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-13T13:00:00.000Z","updatedAt":"2026-04-13T13:00:00.000Z"},{"id":"e_reu_20260413_colin","studentId":"stud_colin","date":"2026-04-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"16J, 6P, liewt mat senger Mamm dem Steifpapp an den 3 Hallefschwesteren zesummen zu Rosport. Kommunikatiounsproblemer doheem, hien fillt sech net geheiert, gesinn. Meng Beobachtungen beim Eischtgespréich waren datt ech ech ganz distant Mamm erliewt hunn, si hunn opginn, et brengt naischt eppes. Autismusspektrum Diagnose stoung am Raum, Elteren gesinn awer net wat datt brenge soll, och weinst de Waardezaiten\nEch gesinn hien am L2, Bezuch iwwerhellt den Jean-Pierre, Bezuchszait ass Dneschtdegs vun 13-14h. De Colin wärt bis Summervakanz weiderhin Meindes an de Lycée goen, do huet en 2h Daitsch an 2h Culge, mettes 1h Sport an 2h Optioun Musik. Teams mam Conseil de classe muss seier erstallt ginn. Brauch keen Mobibus kennt mam öffentlechen Transport.\nWonschiessen: Spagetti carbonara (ouni Rahm), Pizza oder Schnitzel\nInteressen/Hobbien: Computer spillen, Lego, Zeechnen. Geif gären an de Fitness goen. Ass net gären am Mettelpunkt, well seng Rouh. Breicht een Brell/Kontaktlensen, well awer net. Ka Velofueren a an och Schwammen\nGeht vum 8-10.6 mat senger Schoulklass op De Panne. Huet 12 Moduler (à confirmer, kreien nach eng Copie vun der Zensur)\nSeng Elteren wenschen sech fir hien datt en sech mei zoutraut, en ordentlechen Start an Berufswelt.\nALLEM M3 en voie d‘acquisition, FRANC M2 kennt elo, MATHE M2 en voie d’acquisition, CULGE kennt elo M6","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-13T13:00:00.000Z","updatedAt":"2026-04-13T13:00:00.000Z"},{"id":"e_reu_20260413_lilly","studentId":"stud_lilly","date":"2026-04-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Dr Bertholdt an Mme Everling kennt op Besuch, den Joey an Carole ginn mat de Schüler.innen op den Terrain","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-13T13:00:00.000Z","updatedAt":"2026-04-13T13:00:00.000Z"},{"id":"e_reu_20260413_jason","studentId":"stud_jason","date":"2026-04-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Stage zu Useldeng an der Epicerie vum 20-24.4, Mobibus ze speit ugefrot ginn, den Joey kuckt mat der Patronne op de stage ob mer emt eng Woch verleen kennen\nHuet verschloof haut an keen konnt hien bréngen.\nFeedback Medikamenter un Dr Bertholdt wann se kennt? (consentement vun der Mamm anhuelen)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-13T13:00:00.000Z","updatedAt":"2026-04-13T13:00:00.000Z"},{"id":"e_reu_20260413_miguel","studentId":"stud_miguel","date":"2026-04-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Signalement ass raus, 14.04 hunn si RDV mat der Mediation scolaire, hien war bei engem neien Psychiater (keen Pédopsychiater) Dr Tomozei, an deem Kontext huet hien eng nei Medikatioun: moies wéi gewinnt an um 12 Auer 1 Medikinet (léit alles bei mir am Tirang)\n16.04 gëtt um 15:00 ofgeholl (am LLIS) ->RDV Sportsdokter.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-13T13:00:00.000Z","updatedAt":"2026-04-13T13:00:00.000Z"},{"id":"e_reu_20260413_chase","studentId":"stud_chase","date":"2026-04-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Feedback Mamm: den Chase hat Freed un der Geo Arbécht ze schaffen (mindestens 4 Stonnen drugeschafft); zu der Mobbing-Geschicht an der EIMAB: war dun an eng aner Klass gesat ginn a wou do erëm eppes virgefall war, konnt hien direkt Hëllef froen. Ass elo op 15 mg ropgaang mam Medikament. Freides virun der Vakanz war näischt Spezielles am LTA. Si haten Däitsch- a Sporttest, mä dat war keen Thema fir hien. An der Vakanz all Dag 30 Minutte Sport gemaach a seng Kummer geraumt, mam Kolleeg an de Bësch,…\nAss ab dëser Woch Mëttwochs a Freides am LTA. Ab dem 27.4, Méindes, Mëttwochs a Freides. Virun der Vakanz huet hien gesot dass hien sech freet op den 2.Dag am Lycée, woust awer net ob et elo ze schnell géing goen. Hunn um 15h00 en Teams-Gespréich mat den Enseignanten vu Mëttwochs. D’Wahrscheinlechkeet ass grouss, dass dem Chase seng Klass um FvdF dobäi wäert sinn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-13T13:00:00.000Z","updatedAt":"2026-04-13T13:00:00.000Z"},{"id":"e_reu_20260413_ben","studentId":"stud_ben","date":"2026-04-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"HPG den 29.04, ass awer nach net confirmeiert… zweeten Stage steht an de Stären. Huet en Vakanzenjob. Huet bei der Mamm geschloof an huet et gëschter net gepackt an den Foyer, huet anscheinend Suergen wéinst der Beschoulung.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-13T13:00:00.000Z","updatedAt":"2026-04-13T13:00:00.000Z"},{"id":"e_reu_20260413_mia","studentId":"stud_mia","date":"2026-04-13","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"krut Denschdes virun der Vakanz den Punkt op den i gesat a ganz kloer erklärt wat et fir Meiglechkeeten huet an datt et net geht sou mat Leit emzegoen. Huet sain Physikdossier ofginn. Huet et haut net gepackt, war anscheinend prett an huet de lëschten Moment entscheed net ze kommen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-13T13:00:00.000Z","updatedAt":"2026-04-13T13:00:00.000Z"},{"id":"e_reu_20260420_alexk","studentId":"stud_alexk","date":"2026-04-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Individuelle Stonneplang mol déi nächst 2 Wochen: Mo: bis 12 (um 11:15 Bezuchszäit) Dë:vu 10:00 bis 16:00 Më: ganzen Dag bis 16:00, Do: bis 14:00, Fr: bis 13:00.\nHuet läscht Woch vun 5 Deeg. 3 gepackt. De Papp hëllt lo méi eng “opbauend” Haltung an andeems hien den Alex motivéiert dëst Woch mindestens 4 Deeg ze packen.\nZu sengem Schlofverhaale kann een soen dass hien just mat Musek kann aschlofen. Gëschter owend haten se eng Diskussion. De Papp huet den Internet ausgemaach fir dass e schléift. Waar awer kontraproduktiv soudass hien de Wifi rem um 2 Auer an der Nuecht ugemaach huet.\nDe Papp huet mam Alex, eis Beobachtungen vum selbstverletzenden Verhaalen: Bläistëft an d’Hand picken, thématiséiert. Alex konnt dëst confirméieren:” Et soll wéi doen domat de Stress ophällt”. Si wëllen him een Skillsrank matginn.\nThema Suizid: waar bei him Thema, dowéinst ass hien hospitaliséiert ginn. Ech thematisiéieren dat mam Alex dass en seng Themen fir sech soll haalen a wann hien Besoin huet driwwer ze schwätze bei mech soll kommen.\nSchoulesch huet den Alex nach keng richteg Mathe gemaach. Papp schwätzt iwwert eng Mathe “Phobie”. D’Eltere wënschen sech eng Bestandsopnahm, virun allem an der Mathe wou hien drun ass.\nMobibus? Hunn nach net ugefrot. Sinn nach ze vill Onkloerheeten. Géif nach eng Woch waarden bis sech alles apendelt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-20T13:00:00.000Z","updatedAt":"2026-04-20T13:00:00.000Z"},{"id":"e_reu_20260420_colin","studentId":"stud_colin","date":"2026-04-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"De Colin war d’ganz Woch präsent, huet un de Coursen deelgeholl (war mol präsent). Hien huet Freides am Réckbléck uginn dass hien Stolz op sech ass well hien d’ganz Woch gepackt huet an ufänkt sech unzepassen.\nPausesituationen waar hien lescht Woch net beim Grupp. Soutz uewen sech “auszerouen”. Dest Woch ass Zil, hien e bessi méi an d’ Pausesituatiounen z’intégréieren.\nDoheem huet hien den Elteren näicht iwwer seng Deeg an der AJ erzielt. Dofir war d’Mamm emsou méi frou iwwer mäin Uruff.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-20T13:00:00.000Z","updatedAt":"2026-04-20T13:00:00.000Z"},{"id":"e_reu_20260420_lilly","studentId":"stud_lilly","date":"2026-04-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"retour consentement ?\nDe Papp ass a Spuenien fëschen an dofir konnt d’Lilly e Freiden net an d’Schoul kommen well hatt zousätzlech e RDV beim Zänndokter hat um 14 Auer an d’Mamm hatt net sichen kann kommen wéinst PTSD (Accident).\nD’Lilly huet sech erëm selwer ofgemellt amplatz dass d’Elteren dat gemach hunn, an ech hunn nach eng Kéier drop higewisen dass dat net geet.\nRDV en Donneschden mat der Dr Berthold: zimlech informativ fir si.\nInformativ fir eis war, dass d’Madame Everling net komm ass nodeems mir kloer gemach hunn dass mir eis un de secret professionnel mussen halen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-20T13:00:00.000Z","updatedAt":"2026-04-20T13:00:00.000Z"},{"id":"e_reu_20260420_jason","studentId":"stud_jason","date":"2026-04-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Stage elo vum 27.04-4.05, dei nei convention de stage ass am MLG ukomm, e Mëttwoch huet den Joey Rdv mam CTSA. Krut een n-e vir lëschten Méinden. Mamm ass am gaangen ze paaken, dauert net mei laang mam plenneren. Se plënneren viraussichtlich am Mee. Mobibus fiert net vun Irrel aus (oder?)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-20T13:00:00.000Z","updatedAt":"2026-04-20T13:00:00.000Z"},{"id":"e_reu_20260420_miguel","studentId":"stud_miguel","date":"2026-04-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Medikatioun, e leeft elo gudd sou krass/traureg wei datt ass... Convention de stage ufroen (alj@lbv.lu),","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-20T13:00:00.000Z","updatedAt":"2026-04-20T13:00:00.000Z"},{"id":"e_reu_20260420_chase","studentId":"stud_chase","date":"2026-04-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"läschten Dënschdeg hat d’Mamm annoncéiert , dass den Chase moies net gutt drop wär; bei eis hu mir awer näischt bemiertkt; war gutt drop. Läschten Donneschdeg immens gutt drop, de Freideg net an de Lycée (Bauchwéih); hätt Franséischprüfung gehat, schreiwt déi elo muer be eis no (mat Ecoute! Beim Sandra am 1.Block oder bei mir am Bezuch?; kucken dat mam Sandra). Haut war hie furchtbar, souwuel am Engleschcours wéi och op der Schoulfoire.\nHat läschte Méindeg déi bäschte Therapiesstonn säit Ufank, laut der Mme Kirsch-Pedrosa","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-20T13:00:00.000Z","updatedAt":"2026-04-20T13:00:00.000Z"},{"id":"e_reu_20260420_ben","studentId":"stud_ben","date":"2026-04-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"war läscht Woch just 1 Dag do, HPG ass confirméiert. Fir hien gëtt et keng Extrawurschten méi, entweder hien hällt sech un de Programm oder geet an den Iesssall. Refuséiert eppes an der Geschicht ze leieren wou hien 01 krut, huet awer net agesinn eppes ze maachen fir die nächst Prüfung, suguer den Chase huet him et ugerooden. “Wat ass dann wann ech eng Datz hunn.”","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-20T13:00:00.000Z","updatedAt":"2026-04-20T13:00:00.000Z"},{"id":"e_reu_20260420_mia","studentId":"stud_mia","date":"2026-04-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"geht bei Therapeutin mee et packt et net heihinner. D’Mamm ass driwwert informeiert ginn datt mir sou net weiderfueren kennen an datt ATVA elo schon matagebonnen misst ginn wann se die Hellef wellen…","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-20T13:00:00.000Z","updatedAt":"2026-04-20T13:00:00.000Z"},{"id":"e_reu_20260420_alexp","studentId":"stud_alexp","date":"2026-04-20","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"nach keng Neiegkeeten wienie e Schoulversuch gestart gett","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-20T13:00:00.000Z","updatedAt":"2026-04-20T13:00:00.000Z"},{"id":"e_reu_20260427_alexp","studentId":"stud_alexp","date":"2026-04-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"kennt de Mëttwoch de moien. Ech huelen hat déi éischt 30-45min an duerno geet hat normal an, den Cours. Vir de Moment kënnt hat 1x d’Woch an demno wéi Charly Tissier bréngt et klappt gett progressiv ropgesat.heihinner. Internat an fräiwëlleg Foyer kennt fir Elteren net a Fro.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-27T13:00:00.000Z","updatedAt":"2026-04-27T13:00:00.000Z"},{"id":"e_reu_20260427_alexk","studentId":"stud_alexk","date":"2026-04-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Bleiwt HP onofhängeg vum neie Diagnostik. 15.05 RDV Psychologin.\nMéindes, Dënschdes absent, Mëttwoch um 10h10 ukomm (am plaatz vun 8h), Donneschden absent, Freiden bis 12h obwuel bis 13h ausgemaach wor.\nDass effektiv sou dass de Papp schwéngt immens mat. Den Dënschden wou den Alex behaapt huet hien hätt Kapp wéi a kéint dofir net an d’Schoul kommen huet de Papp him gesot dass hien dann och net op den Training goe kann. Doropshin ass den Alex aggressiv gin. Um Telefon seet mir de Papp hien wéisst net op et produkiv oder kontraproduktiv ass hien net op den Training ze loosen. Op meng Fro ob hien sou eng Konsequenz beim Alex duerchgezunn huet, huet e mat Nee geäntwert.Freiden huet den Alex behaapt dass säin Papp him versprach a confirméiert hätt dass en bis 12 Auer bleiwt...D’Mireille huet dem Papp an dem Alex kloer gemaach dass net si déi sinn déi bestemmen wéi dem Alex säin Dag ausgesäit.\nBis elo huet hien nemme misse maachen wat hien well. Toun mat den Erwuessenen?\nMathe: ganz nidderschwelleg ugefaangen : z.B 19-7 ass gaangen, 2x5 gaangen, 2x 7 net gaangen. Punkt vor Strich geet net. Ganz Basic ennerwee. Weist seng kognitiv Fähegkeeten net.\nEn huet eng erofloosend Art a Weis mat den Erwuessenen (och mat sengen Elteren) wierkt arrogant, hien huet d’Muecht. Keng Frustratiounstoleranz. En ass ganz anescht am schouleschen Setting wei an de Pausen.\nHaut an der Bezuchszäit huet hien mir méi iwwer säin Projet Anime Serie geschwaat. Hien brauch Synchronsprecher op Däitsch. Ech hunn mech selwer virgeschloen an him gesot e soll muer mol bessi Material, Skript, Zeechnungen matbrengen. Ka sinn dass en dofir muer säin Laptop matbrengt.\nWëll net mat den aaneren Iessen an him schmaacht d’iessen och net...","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-27T13:00:00.000Z","updatedAt":"2026-04-27T13:00:00.000Z"},{"id":"e_reu_20260427_colin","studentId":"stud_colin","date":"2026-04-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Wéi ass et mam Austausch vum Schoulmaterial? Klappt daat mëttlerweil? Donneschden hongreg an AJ komm. Mat den Elteren thematiséieren. Se sollen him eng Packung Müsli oder sou matginn.\nFest vun der Frëndschaft net do, um Ausflug mat senger Klass.\nAm Daitschen jo, am Engleschen manner.\nBeim Sandra soll hien CULGE Module 6 maan (awer keng VIESO), entweder wat am H&P oder mat den Tipptopp Bicher schaffen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-27T13:00:00.000Z","updatedAt":"2026-04-27T13:00:00.000Z"},{"id":"e_reu_20260427_lilly","studentId":"stud_lilly","date":"2026-04-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"retour consentement ? orthophoniste?\nD’Lilly well verschidde Sachen net verstoen (Beispill: Excuse vum Dokter heescht keen Sport), ech mengen dass et wichteg ass him direkt ze soen wéi et ass an wat mir erwarden.\nHatt mengt hatt misst fir déi aner Schüler do sinn an si motivéieren, hatt muss domat ophalen an et wier gutt hatt all Kéiers drun ze erënneren.\nKeng Progressioun am schouleschen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-27T13:00:00.000Z","updatedAt":"2026-04-27T13:00:00.000Z"},{"id":"e_reu_20260427_jason","studentId":"stud_jason","date":"2026-04-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"am Stage elo vum 27.04-4.05, en ass gutt do ukomm. Mobibus Ausland geht net, och net ab Grenz, de Schüler muss eng Adress am Land hunn. Den 21.05 um 10h30 kënnt den CTSA an den Theater observéieren, den 15.05 schwätzten si mat der Mamm a mam Jason. Wann den Jason seng Medikamenter vergiess huet ze huelen, dierfen mir him déi an der AJ ginn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-27T13:00:00.000Z","updatedAt":"2026-04-27T13:00:00.000Z"},{"id":"e_reu_20260427_miguel","studentId":"stud_miguel","date":"2026-04-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ass lëscht Woch 2x wärend senger Vape Paus, bei den Duarte gaangen, obwuel ech him kuerz virdrun gesot hunn, dass ech och meng Paus maachen an do laanscht fueren. De Freiden hat hien e Leatherman (Täschemesser 8cm) dobäi. Hien huet mir deen vum selwen gewisen an hunn him en ofgeholl. Dass dem Papp säin Messer, dem Miguel géif dëst benotzen fir u senger Trottinette ze schrauwen awer net fir mat an d’Schoul.\nEt besteet erhéischten Verdacht dass hien eng zweet Vape bei sech huet an all Moment wou hien alleng ass profitéiert, ze vapen. Hien huet och ugefaangen mat Bieden (daat kann hien awer nëmmen wann et roueg an hien alleng ass) Oppassen: net dass hien dat benotzt fir op der Toilette kënnen ze vapen. Hien huet dat am Turnen bruecht, dass en dofir op d‘Toilette gaangen ass.\nDen Donneschden nom Iessen fueren ech mam Miguel op Déifferdéng, convention de stage beim Coiffersalon Cap Act ausfëllen. D’Schoul huet eis informéiert dass si oft Stagen an deem Betriib refuséieren, well Patronne oft vill Stagiairen hëllt an de Verdacht schon e puer mol opkomm ass, dat do Stagen net esou serieux oflafen.\nD’Gespréich mat der Médiation Scolaire ass gutt verlaaf a waren frou fir en Echange mat sou wohlwollenden Professionnellen. Si hunn awer drop opmierksam gemaach datt et ëmmer mei Jonker ginn wei de Miguel an datt si eis an dem Miguel seng Elteren wëllen dobäi ennersetzen de passenden Projet Scolaire fir hien ze fannen.\nDe Miguel kritt doheem agetrichert datt mir hien hei net wëllen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-27T13:00:00.000Z","updatedAt":"2026-04-27T13:00:00.000Z"},{"id":"e_reu_20260427_chase","studentId":"stud_chase","date":"2026-04-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"war Méindes net gutt drop; seng sozial Batterie war net opgelueden“; konnt sech net op d’Schoulfoire aloossen, hien krut awer gesot, dass dat esou, och an der Regelschoul net geet. Et ass net ëmmer all Aktivitéit fir de ganze Grupp interessant,..Dënschdes war seng sozial Batterie nach ëmmer net opgelueden, sot hien mä hien war souwuel am CIPA wéi och fir de Recht awer relativ gutt drop. Huet déi Franséischprüfung bei eis nogeschriwwen. Hie ka guer net aschätzen wéivill dat gëtt. Wëll awer demnächst iergendwann am LTA an de Franséisch-Appui goen. Dënschdes am Bezuch hat hie mir och nach verséchert Mëttwochs a Freides an den LTA ze goen. Hie sot, hien hätt keng Angscht an d’Schoul ze goen, héchstens virun der Prüfung. Hat dun awer an der Nuecht hefteg Problemer mat Mo an Daarm a war du weder Mëttwochs am LTA, nach Donneschdes bei eis. Dee Bauchwéih vun deem Freideg virdrun ka mat der Franséischprüfung ze di gehat hunn, mä dat Kranksinn vu läschter Woch schéngt richteg gewiercht ze sinn. D’Mamm seet hie wéilt net feelen a wéilt näischt verpassen. De Freideg war hien dunn am LTA an et war anscheinend e „gudden“ Dag. Mir sollten eigentlech ab haut op 3 Deeg LTA an der Woch eropschrauwen, mä mir probéieren elo mol fir d’éischt déi 2 Deeg an der Woch ze packen. Kucke elo ob et dës Woch klappt, wann net, gi mir rëm op een Dag (an da bleiwen mer awer eng Zaitchen bei engem). Gudde Kontakt zum Regent an der Mme vun der ESEB 22.05, 19.06 sinn dei nächst FRANC Prüfungen.\nDe Samschdeg hat hien Aikido-Stage, gëschter war am Viraus awer mol nach näischt geplangt","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-27T13:00:00.000Z","updatedAt":"2026-04-27T13:00:00.000Z"},{"id":"e_reu_20260427_ben","studentId":"stud_ben","date":"2026-04-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Den 29.04 ass HPG, d’Fro déi sech stëllt ass schaffen goen oder awer Lierwenshaff. War den Freiden um 15h do, opwuel hien wosst dass keen do wier. Huet an der Vakanz en “Experiment” gemaach wou hien keen Medikament geholl huet bei der Mamm. Dr. Karst seet dass de Ben net an d’Schoul komm ass wëll hien keen Schloofrhythmus méi hat.Ben: HPG den 29.04, Martina Mick well datt hien e Plang B huet (net just Gemeng), Jobdag 7.05 mam Joey oder Mireille (Cactus Lallange)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-27T13:00:00.000Z","updatedAt":"2026-04-27T13:00:00.000Z"},{"id":"e_reu_20260427_mia","studentId":"stud_mia","date":"2026-04-27","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"krut gesot et misst eng Entscheedung huelen, Schoul oder net","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-04-27T13:00:00.000Z","updatedAt":"2026-04-27T13:00:00.000Z"},{"id":"e_reu_20260504_alexp","studentId":"stud_alexp","date":"2026-05-04","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Nach keng Réckmeldung wéini dem Alex säin nächsten Dag ass. War immens frou hei ze sinn, gesäit sech am September an den Réidener Lycée goen an fest bei den Elteren ze wunnen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-04T13:00:00.000Z","updatedAt":"2026-05-04T13:00:00.000Z"},{"id":"e_reu_20260504_alexk","studentId":"stud_alexk","date":"2026-05-04","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hien packt et aktuell net, reegelméisseg an d’Schoul ze kommen. Mir hunn den Androck, datt d’Schwieregkeeten éischter am schoulesche Kontext leien, onofhängeg vu sengem Autismus. An deem Kader iwwerleeë mir, en adaptéierte Stonneplang beim Ministère unzefroen.\nRDV mat den Elteren: Virraussiichtlech nächste Méinden um 15:00\nInfos aus DS: 2017 CHL Psychologin Mme Karp stellt fest: Vorliegen einer besonderen sensorischen Integration und eine narzistisstische Verletzlichkeit aufgrund einer Bindungsstörung, die zu aggressivem und destruktivem Verhalten führt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-04T13:00:00.000Z","updatedAt":"2026-05-04T13:00:00.000Z"},{"id":"e_reu_20260504_colin","studentId":"stud_colin","date":"2026-05-04","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Versteet net wéisou hien an d’ AJ muss kommen. Versicht virun allem an de Bezuchszäiten duerch argumentéieren e Wee zrëck an de Lycée ze fannen (z.B Freides géif hien ëmmer mam Schoulbus bei seng Bom fueren, lo geet dat net méi.., “Franséischcours géif him am Lycée méi bréngen, wëll do méi Austausch ass an d’ Geleejenheet huet méi ze schwätzen. Hei géif hien nëmmen méi domm ginn.” Hien hätt sech elo un de Rhythmus vum Lycée ugepasst. Hei een aanere Setting, am Lycée alles zesumme gemaach. Säin Zil Rentrée 26/27 ganz am Lycée ze sinn, en huet awer selwer gemierkt, dass hien ëmmer rëm mat deem Thema kënnt an doduerch net weider kënnt wéi z.B Sport an der Bezuchszäit maan.\nHien zielt vill Geschichten, e kreckelt der gären, e bleiwt net bei der Wourecht am Morning Meeting, e schmunzelt oft, liicht manipulatif.\nD’ Eltere si frou dass hien all Dag kënnt. Moies mëscht hien sech ouni Diskussioun färdeg. Huet och Zäit fir eppes z’iessen a kann sech och eppes mathuelen. Wann hien heem kënnt seet e net Moien, verzitt sech an d’Kummer. D’Mamm huet Gefill hien ignoréiert manner. Am Summer geet hien 2 Wochen op d’ Gemeng schaffen. De Papp huet hien ugemellt. Et fällt op dass hien extremst d’Haut vu sengen Fangeren zitt, se sinn bluddeg.\nAss frou iwwert Opmierksamkeet, wann een niewt em setzt. E muss mat der Hand geholl ginn.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-04T13:00:00.000Z","updatedAt":"2026-05-04T13:00:00.000Z"},{"id":"e_reu_20260504_lilly","studentId":"stud_lilly","date":"2026-05-04","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"D’Lilly huet sech d’lescht Woch méi drun ginn wéi soss. Consentement ass nach net do. Et hellt rëm 30mg Medikinet, mir wëllen wëssen wei et wat fir eng Medikamenter hellt. Mir kommen schoulesch net weider obwuel am klengen Setting mat him geschafft gëtt, et mécht ëmmer rem dei nämmlecht Fehler. Et schafft, mee et kennt net wirklech weider. Silben liesen oder 1x1 kennt et net weider. Sarah a J-P trainéieren datt verstäerkt mat him am 1:1.\nLilly ass harmoniebedürfteg a net nodroend.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-04T13:00:00.000Z","updatedAt":"2026-05-04T13:00:00.000Z"},{"id":"e_reu_20260504_jason","studentId":"stud_jason","date":"2026-05-04","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"ass frou am Stage, en ass awer och frou fir muer rem bei eis well et get him schlecht am Bus, de Bus brauch 41 Stonnen😉\nWat ass de Plang B wann et näischt mam CTSA gëtt? àCIP Klass an mei laang Stagen (ATVA) bis do eng Plaatz ass, ATVA gëtt ze bedenken datt si och net sou vill Meiglechkeeten vu Patronen hunn\nMamm seet de Mobibus kéint den Jason an Däitschland sichen goen, wier just een aaneren Service (Jean-Pierre freet no) Gëtt awer wahrscheinlech September bis se plenneren. Ordonnance fir d’Medikament (gielen Ziedel) huet se missen ofginn, se huet och keng Photo gemach, freet e neien Certificat bei der Dr.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-04T13:00:00.000Z","updatedAt":"2026-05-04T13:00:00.000Z"},{"id":"e_reu_20260504_miguel","studentId":"stud_miguel","date":"2026-05-04","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Leschten Donneschden war geplangt vun 12:00 bis 14:00 op Déifferdeng ze fueren convention de stage ze ënnereschreiwen. Huet refuséiert well hien net um 14:00 mat zréck wollt kommen an him fir dohinner net den Handy ginn hunn. Hien huet behaapt dass dat sou mat senger Mamm ausgemaach ginn ass. Ass op de Späicher gaangen a loung uewen um Balken (Selbstgefährdung)\nD’Mamm hätt him gesot, ech soll him den Ziedel matginn fir dass si selwer bei de Patron ginn.\nHaut am MM huet hien de Grupp gestéiert mat sengen Kommentarer. 6-7 Huet wärend dem 1. Block geschlof. Vape Paus (geblärt) duerno Paus mam Grupp.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-04T13:00:00.000Z","updatedAt":"2026-05-04T13:00:00.000Z"},{"id":"e_reu_20260504_chase","studentId":"stud_chase","date":"2026-05-04","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet mir am Bezuch erzielt dass de Bus Freides um Wee fir an d’Schoul eng Pann hat. Fréier wär hien dann niimols méi an der Schoul ukomm. Hei ass hien dunn einfach zu Fouss drop lassgetrëppelt well hien net wollt ze spéit kommen. War och nach ee Stéck an déi falsch Richtung gaang, mä huet et schlussendlech zur Zäit gepackt. Hat just eng Situatioun am Sport wou hien sech kuerz onwuel gefillt huet. Si hu Parcours gemaach an de Proff verlaangt do eng aner Rull wéi déi déi hien aus dem Aikido kennt. Den Chase mécht natierlech déi „richteg“ a gesäit kee Sënn dran elo eng aner ze maachen!! Geet trotzdem gär an de Sport, och an der Mëttespaus an d‘Sportsektioun; d‘Kantine wär méi stresseg an dauert och ze laang. Krut eng 32 am Franséischen an eng 54 am Däitschen zréck. Mathé léiert hie mat ChatGPT (iwwersetzen vun den Textproblemer). De Mëttwoch hat hien e gudden Dag am LTA.\nDe Méindeg de Mëtteg ginn ech a seng Klass an d‘Tutoratstonn (12:40-13:30). Iddi fir den Chase matzehuelen? Proposéieren fir ab dem 1.6 och Méindes an den LTA ze goen am Fall wou et elo 3 Wochen mat deenen 2 Deeg klappt.\nDe Méindeg de Mëtteg ginn ech a seng Klass an d‘Tutoratstonn (12:40-13:30). Den Chase geht do mat (eventuell Meindes mëttes dann a senger Klass bleiwen). Ab dem 1.6 (no der Pengschtvakanz) och géif hien dann och Méindes an den LTA goen am Fall wou et elo 3 Wochen mat deenen 2 Deeg klappt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-04T13:00:00.000Z","updatedAt":"2026-05-04T13:00:00.000Z"},{"id":"e_reu_20260504_ben","studentId":"stud_ben","date":"2026-05-04","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"de Ben war dobai, dem Ben seng Mamm net, war net mam Bus bis op Jonglënster komm weinst engem Chantier op der Streck,de Ben kruut die die Optiounen virgestallt: CISP Liewenshaff (eis Recommandatioun), direkt schaffe goen als non qualifié (aweer net just op Gemeng virstelle goen) an zreck an den LTA fir en DAP Landwirtschaftsgärtner.\nEn Donneschtdeg huet hien d’Bezuchszait refuseiert a well sech keng Gedanken maachen iwwert seng Zukunft. Wollt näischt vun sengen Optiounen wëssen. Ech hat en haut an d‘Gespreich geruff, ech mengen hien huet de Message verstaan an ugeholl.\nMir ginn den Donneschden op d’Job Days (Start 10h30), ech kënnen den Organisator, dat heescht mir kënnen ganz geziilt bei d’Patron’en.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-04T13:00:00.000Z","updatedAt":"2026-05-04T13:00:00.000Z"},{"id":"e_reu_20260504_mia","studentId":"stud_mia","date":"2026-05-04","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"naischt neies, d’Schoul ass informeiert. Ech telefoneieren mat der Mamm an der ATVA.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-04T13:00:00.000Z","updatedAt":"2026-05-04T13:00:00.000Z"},{"id":"e_reu_20260511_alexp","studentId":"stud_alexp","date":"2026-05-11","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Hätt haut sollen kommen huet sech awer anscheinend déi kléng Zéiw gebrach. Den Här Tissier ass sech net secher ob et net en Vermeidungsversuch vum Alex an sengem Papp ass fir net an d’AJ ze kommen (hat hätt sollen den Öffentlechen huelen). Si maachen eng Röntgen fir ze kucken ob et effektiv gebrach ass. Den Här Tissier huet gesot dass den Papp all Fortschrëtter an Richtung Autonomie vum Alex torpedéiert. Hat kënnt wann alles klappt den Freiden (ganzen Dag).","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-11T13:00:00.000Z","updatedAt":"2026-05-11T13:00:00.000Z"},{"id":"e_reu_20260511_alexk","studentId":"stud_alexk","date":"2026-05-11","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Clearing ATVA, Conseiller ass de Fabrice Krez: Underachiever, Schwachpunkt mémoire de travail, Dyspraxie? (kann en diagonal Lignen zeechnen), Schmerzemfanne? Kann en Koreanesch? mandarin? ween war den Tuteur am LEM am projet personnel, Interêt: Video schneiden leieren\n11.05 um 15h Gespréich mat den Elteren. Sinn Fraen en Trigger? e kuckt sech de schouleschen Content mol net un. Oder ass de schouleschen Kontext den Trigger?\nEn ass am Kontext Cours deelweils zimmlech iwwerhieflech, respektlos, an oppostionnel. Et geht gutt wanns de hien maache leis wat hien well, soubals de eppes ubidds/frees ass et eriwwer.\nWann e laacht ass en wie ausgewiesselt.\nSchouleschen Feedback/Niveau? e kennt keng Begreffer, en huet keng grondleent Kenntnisser, et ass keng Basis do.\nMathe et ass keng Basis do, Niveau 3. Schouljoer, VP\nEnglesch: gudden Vokabular, Satzbau, um Spelling/Grammar muss geschafft ginn, do wier et général\nDaitsch:hien probéiert ze vertuschen, refuseiert alles wat Grammaire ass,VP\nFranzéisch:VP, mir probeieren Module 2\nMir gesinn dei sozial Kompontent vum Asperger net. Hien refuséiert Ennerstetzung.\nTwice Exceptional (2e) – Hochbegabung und Teilleistungsstörung im selben Kopf? Underachiever\nAm Gespréich mat den Elteren stoungen virun allem zwou zentral Froestellungen am Fokus:\nDiskrepanz tëscht intellektuellem Potenzial a schoulescher Leeschtung\nAm schouleschen Alldag weist den Alex aktuell:\neng niddreg Belastbarkeet bei schouleschen Ufuerderungen\nkeng Basis, Grondkenntnisser\nséier Frustratioun\nstaark Vermeidungstendenzen am schoulesche Kontext.\nGläichzäiteg bestinn awer Hiweiser op:\nhuet sech Piano an Englesch selwer bäibruecht (huet beim Piano seng eegen (ganz staark) Technik ass awer net bereed Basics am Solfège ze leieren)\naner Sproochen (Koreanesch, Russesch, Japanesch) well en léieren mee kritt datt awer och net emgesaat, och wann Motivatioun do ass\nMir souwéi d’Elteren stellen sech dofir weider d’Fro, ob nieft der diagnostizéiertem ASS zousätzlech:\nDys’en\nLéierschwieregkeeten,\nexekutiv Problemer,\nVeraarbechtungsproblemer\nEng Roll spille kéinten. Mir emfroen eis fir Conseil/Guidance fir eis beim CDA/CTSA\nZukunftsperspektiv / schoulesch Orientatioun\nMir hunn den Elteren erklärt, datt den Alex schoulesch e wesentlech méi niddrege Leechtungsniveau weist wéi fir säin Alter ze erwaarde wier.\nAus eiser Siicht schéngt aktuell eng Orientatioun Richtung 5P (mat 0 Moduler= a speider CIP Klass sënnvoll.\nFolgend Möiglechkeeten goufen ugeschwat:\nAm Lycée Ermesinde ageschriwwen bleiwen -> Ofklärung, ob do an Zukunft eng CIP Struktur ugebuede gëtt.\nOder Neiorientatioun: Lycée Réiden oder Mamer, Elteren hunn eng Präferenz fir den LJBM.\nWeider Infoen:\nDen aktuelle Stonneplang haale mer virleefeg bäi\nD’ Elteren huelen d’ Ënnerstetzung vun der ATVA un, mir kruten den schrëftlechen Accord\nHypothes betreffend männlech/weiblech Léierpersounen: D’ Elteren gesinn hei keng Parallel oder Opfällegkeet\nThema Homeschooling/Online Nohellef ass an engem Niewesaatz opkomm: och dat klappt net gefall a net weidergefouert. Interessant wie gewiescht, datt den Alex beim Piano eng ongewéinlech Technik ëntwéckelt hätt. Mat der de Porff net vill hätt ufänke kënnen. Atypesch Léierstrategien? Och mat de Sproochen japanesch/koreanesch déi hien doheem léieren wëll, obwuel en domat staark iwwerfuerdert ass.D’Elteren hunn erkläert, datt den Alex Online-Nohëllef gehaat huet.Dobäi hätt hien Diktater geschriwwen\nD’Elteren hunn beschriwwen, datt den Alex schwéier aschléift an e staarkt Owesritual brauch. Hien hätt regelméisseg Podcasts gelauschtert fir anzeschlofen.D’Elteren hunn den Androck, datt auditiv vermëttelt Informatioune gutt bei him hänke bleiwen. Fréier hätt den Alex wéineg gelies; wann, dann éischter Mangaen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-11T13:00:00.000Z","updatedAt":"2026-05-11T13:00:00.000Z"},{"id":"e_reu_20260511_colin","studentId":"stud_colin","date":"2026-05-11","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Huet déi lescht Woch insgesamt eng positiv Entwécklung gewisen. Besonnesch gutt gefall hunn him de Mathescours an den Ausfluch en Dënschdeg beim Echternacher Séi. Nodeems eng Réckmeldung iwwert säi Schaffverhale gemaach gouf, huet hien sech sichtbar méi Méi ginn an och méi Eigeninitiativ bei den Aufgaben gewisen. Säin eegent Zil fir dës Woch ass et, méi selbststänneg ze schaffen. Positiv observéierbar waren och méi Autonomie am Alldag souwéi seng Participatioun um Vëlofueren, obwuel hien virdru gesot hat, datt hien dat net gär huet. Och am Sport huet hien selwer d’Gefill gehat, datt et besser gelaf ass. Aktuell sicht hien Opmierksamkeet iwwer „Dommheeten, Geräischer. Bei sou engem Verhaalen direkt stoppen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-11T13:00:00.000Z","updatedAt":"2026-05-11T13:00:00.000Z"},{"id":"e_reu_20260511_lilly","studentId":"stud_lilly","date":"2026-05-11","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"huet den 19.5 den eischten Rdv bei der Orthophonistin. Consentement ass nach ëmmer net do. D’Lilly hat läscht Woch eng méi schwéier Woch well seng Boma um Stierwen loung. En Donnesden ass et dann och zum Stiewesfall komm an d’Lilly ass ofgeholl ginn. Ech fannen dass de Papp dat gutt gehändelt huet. D’Lilly war am Generellen zimlech duercheneen an d’Bezugszäit war schwiereg well ech souguer op franzéisch net vill verstanen hat. Dem Lilly seng Interpretatiounen dierfen gäeren ënnert d’Loupe geholl ginn, well se baséieren net emmer op Wourechten. Beispill: Wann d’Jongen op der Couche leien mengt d’Lilly dass si dat machen fir de Geck mat him ze machen. Oder en Dënsden, huet hatt 3 mol säin Numm héieren beim Ben an beim Miguel an hatt ass direkt dovuner ausgangen dass et ëm hatt gangen ass well sie och gläichzäiteg ronderem gegeckst huet. Hatt huet schon e gutt Gespier, dofir soll een och net d’Sach a Fro stellen, mee et ass awer och net emmer wéi hatt mengt. Fir eng Vue d’Ensemble ze kréien huet d’Lilly e Gespréich mam Ben gehat deen sech och drop ageloss huet an him konnt soen dass hien genervt ass vun him well hatt “ëmmer de Prof spillt”. Begriewnis vun der Boma ass e Mëttwoch.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-11T13:00:00.000Z","updatedAt":"2026-05-11T13:00:00.000Z"},{"id":"e_reu_20260511_jason","studentId":"stud_jason","date":"2026-05-11","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"huet haut RDV mat der Mamm um CTSA fir den DS (21.05 Observatioun bei eis während der Optioun Theater), war e Freiden net do well de Concert deen Owend virdrun ze laang gedauert huet, krut eng absence non-excusé. Et ass un der Mamm een aaneren Service ze kontaktéieren vir den Transport iwwert d’Grenz ze organiséieren.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-11T13:00:00.000Z","updatedAt":"2026-05-11T13:00:00.000Z"},{"id":"e_reu_20260511_miguel","studentId":"stud_miguel","date":"2026-05-11","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Vun Dënschden un ass d‘Woch insgesamt gutt verlaf. Hien war an all de Coursen präsent an huet matgeschafft. Et fällt op, datt hien méi kooperativ war a sech besser un d’Ofmaachunge gehalen huet. Hien ass frou iwwer seng Stage Plaatz. Gläichzäiteg huet hien awer méi dacks no Vape-Pausen gefrot. Hien huet dobäi selwer matgedeelt, datt hien déi lescht Woch keng zweet Vape dobäi hat. Besonnesch gutt gefall hunn him d’Vëlofueren an de Mathescours, well hien de Modul 5 ofgeschloss huet. Säin Zil fir dës Woch ass et, säi Vape-Konsum op all 2 Stonnen ze reduzéieren.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-11T13:00:00.000Z","updatedAt":"2026-05-11T13:00:00.000Z"},{"id":"e_reu_20260511_chase","studentId":"stud_chase","date":"2026-05-11","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Läscht Woch war et méi schwiereg am Bezuch. Den Chase ass/war liicht iwwerfuerdert mat der Gestioun vum Teams, WebUntis,.. Hat d‘Norichte vun de Proffen aus dem LTA einfach net gekuckt a gemengt „ech fänken elo net och nach un all Dag den Teams ze kucken,..“ Et war och ganz schwéier fir der Proff eng kuerz Réckmeldung ze schécken „Kennen déi jo net,…“. Kommt/wollt eng Zäit laang op näischt méi äntwerten. Hat Mëttwochs Geosprüfung am LTA, ass awer anscheinend ok gaang. An der Bio huet hien dës Woch mol sécher Material. Den 18.5 schreift d‘Klass Prüfung. Annick, kann hien déi da bei dir am Cours schreiwen? De Mëtteg ass den Chase leider net am LTA mat dobäi wann ech senger Klass eise Solidaritéitsprojet an d‘FvdF virstelle ginn. Hien huet RV zu Esch bei senger Psychotherapeutin. Dës Woch och RV beim Dr. Meinhardt. D’Elteren si mol zefridde mat der Medikatioun an den Chase spiert och keng Niewewierkunge méi. D‘Mamm hëlleft fir d‘Gestioun vum Teams mat an de Grëff ze kréien. Den 20.5 maachen d’6G-Schüler aus dem LTA um Daycare mat. Den Chase huet sech och ugemellt a mol am Cactus Houwald ugefrot. War e Film op Franséisch kucken an obwuel hien net alles verstan huet, zimmlech begeeschtert. E Freideg am Lycée war et ok laut him.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-11T13:00:00.000Z","updatedAt":"2026-05-11T13:00:00.000Z"},{"id":"e_reu_20260511_ben","studentId":"stud_ben","date":"2026-05-11","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Mir hunn viraussichtlech een Stage bei Hein fonnt (zu Remich), wat awer 1 Stonn vun Fueren mam Auto ass. De Ben war ganz frou dass hien konnt mat engem Patron schwätz obschonns et him wierklech schwéier gefall ass. Ech froen un den Stage op den 01-05.06 (die Woch no der Pëngschtvakanz) ze lëen. Hien huet sech fir d’Optioun “Schaffe goen” entscheed no der 5AD, ech krut hien awer dozou anzewëllegen den Liewenshaff opmannst kucken ze goen. War de Freiden an haut net do.\nE Freiden 15/05 huet Mireille Rdv am LTA fir iwwert eng Admissioun an de CISP Liewenshaff ze schwätzen, ech kucken dann och mam Martina fir eng Visite ze organiseieren.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-11T13:00:00.000Z","updatedAt":"2026-05-11T13:00:00.000Z"},{"id":"e_reu_20260511_mia","studentId":"stud_mia","date":"2026-05-11","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"d’Mamm huet nogefrot wat Démarchen sinn fir eng fiche de départ ze froen, ech hunn Schoul driwwert informeiert.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-11T13:00:00.000Z","updatedAt":"2026-05-11T13:00:00.000Z"},{"id":"e_reu_20260518_alexp","studentId":"stud_alexp","date":"2026-05-18","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Plang fir des Woch: Alex kennt e Mëttwoch an en Donneschdeg, Rdv am ALR no der Péngschtvakanz (12.06), d’Elteren kruten vun der Schoul gesot datt Gespréich géif mat mir zesummen stattfannen. No der Vakanz ass och Gespréich am HRS (5.06), den Joey geht dohinner. Falls den Papp irgentwann sollt optauchen, net op een Gespréich agoen, mais dorop opmierksam maachen dass hien dat mat mir oder dem Mireille soll beschwätzen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-18T13:00:00.000Z","updatedAt":"2026-05-18T13:00:00.000Z"},{"id":"e_reu_20260518_alexk","studentId":"stud_alexk","date":"2026-05-18","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"“Du hast einen hochbegabten Jugendlichen mit Asperger vor dir, dessen Begabung das ASS-Profil jahrelang verdeckt hat — bis das Kompensationsbudget aufgebraucht war. Was du jetzt als Depression siehst, ist die Erschöpfung nach Jahren des „ich bin doch klug, also muss ich es schaffen\". Neurokognitiv liegt hier typischerweise eine ausgeprägte Index-Spreizung im WISC-V vor — verbales Verständnis und fluides Schließen oft 130+, Arbeitsgedächtnis und Verarbeitungsgeschwindigkeit deutlich darunter. Diese Spreizung produziert ein lebenslanges Mismatch zwischen dem, was der Jugendliche denken kann, und dem, was er unter Zeitdruck und in lauten Klassenräumen tatsächlich abrufen kann.\nWas wir brauchen, ist eine doppelte Anpassung. Die Begabung braucht herausforderndes Material — Akzeleration, Enrichment. Das ASS-Profil braucht Struktur, Vorhersehbarkeit und sensorische Anpassungen. Standard-Förderung deckt nur eine Seite ab — und die andere bricht ein. “\nDe Weekend hat den Alex e puer “Minikrisen”, wou et emmer dremm gaangen ass, datt hien seng Musek oder seng Pläng net géif hikréien. War de Weekend mat Zäit an d’ Bett (12:00-01:00) an moies opkomm. Geschter Owend rem total refuséiert, net ukomm bis spéid an Nuecht. Hien huet och an 2 Wochen B-Day (2.06). Dem Papp fällt op dass ronderem säin Gebuetsdaag säin Verhaalen nach méi schwiereg ass, Frustratiounen a Krisen si virprogramméiert. Hien huet onrealistesch Virstellungen a kritt se net ëmgesaat. 11.06 RDV bei der Mme Rizzi. Dëse Freiden um 10:00 RDV Dr. Pignoloni (Medikatioun/Antidepressiva). D’Elteren wëllen Hëllef beim groupe de support fir Autismus an der Belge ufroen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-18T13:00:00.000Z","updatedAt":"2026-05-18T13:00:00.000Z"},{"id":"e_reu_20260518_colin","studentId":"stud_colin","date":"2026-05-18","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Leschten Donneschden ass hien säin Bop an d’Klinik besiche gaangen. Hien war schockéiert säin Bop an deem Zoustand ze gesinn a mescht sech Suergen well keen weess wéi et weider geet. Doheem kritt hien dëst och zimlesch direkt sou matgedeelt. Dëst Situatioun hat de Freiden Auswierkungen op dem Colin säin Wuelbefannen. Moies konnt en sech duerch d’Fächer oflenken. Mëttes ass et him immens schwéier gefall sech ze konzentréiren. Op meng Fro ob hien am Workshop vun der ATVA eppes matkritt äntwert hien mir: Brauch net opzepassen, ech kann näicht a mech brauch souwéisou keen. Hunn d’Mamm op seng Motorik, Koordinatioun higewisen. Si hätt de Colin nach nie laafe gesinn a wou e kleng wor, hätt hien nie Sport gemaach. A Bezuch op den Openthalt an der Klinik huet d’ Mamm gesot, de Colin wier den sensibelschen an der Famill, bei him géif dat méi eppes maachen.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-18T13:00:00.000Z","updatedAt":"2026-05-18T13:00:00.000Z"},{"id":"e_reu_20260518_jason","studentId":"stud_jason","date":"2026-05-18","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Beobachtung CTSA des Woch. Krut vun der Madamm Leber erklärt wat Autismus ass an hien schéngt immens frou ze sinn dass seng Mamm hien elo besser versteed. Hien well oft läscht Wuert hunn (zB beim Raumen vum Pult). Am Theater weist hien schon extrem Reaktiounen, zB wann en roosen soll ginn: e gëtt dann richteg ausfaalend. E kann sech och net an net Situatiounen eraversetzen dei net mat senger Liewenssituatioun iwwerteneen stemmen (zB ziel denger Schwester...à nee ech hu keng Schwester). Sarah an Annick spillen datt Spill en Donneschtdeg an der Theateroptioun, perfekt fir wann Mme Leber kucke kennt.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-18T13:00:00.000Z","updatedAt":"2026-05-18T13:00:00.000Z"},{"id":"e_reu_20260518_miguel","studentId":"stud_miguel","date":"2026-05-18","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"am Stage des ganz Woch, de J-P war haut fir Mëtteg dohinner an e geet och e Mëttwoch nach eemol, d’Elteren äntwerten net mei wirklech op Feedback mailen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-18T13:00:00.000Z","updatedAt":"2026-05-18T13:00:00.000Z"},{"id":"e_reu_20260518_chase","studentId":"stud_chase","date":"2026-05-18","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"hat de Méindeg vergiess bei d’Psychotherapeutin op Esch ze fueren. De RV den Dënschdeg beim Dr.Meinhardt war gutt. Den Dr war ganz zefridden mam Chase senger Entwécklung. Huet vill méi geschwat wéi soss.\nFeedback Chase Mëttwoch LTA: „Haut war et gudd den Spendenlaaf huet Spaß gemeet“\nFeedback Regent: „Den Chase ass haut beim Spendelaf matgelaf an huet sech immens dru ginn. Ee Moment ass en dunn awer bei eis komm, fir ze soen, dass en iergendwéi Blutt am Mond schmaache géif. Mir hunn ech dunn bei d'éischt Hëllef-Equipe bruecht, déi da no him gekuckt hunn. Eventuell huet den Chase sech am Mond gebass. Si hunn awer elo näicht soss festgestallt. E sollt duerno lues maachen a wann et misst sinn, trëppelen oder ophalen. En ass dunn nach e puer Ronne färdeg gelaf, huet sech e Moment dunn awer op d'Mauer gesat a war e Moment fir sech, huet och souwäit ech dat gesinn hunn, liischt gekrasch. Ech sinn no enger Weil da bei e gangen, fir mech ze vergewësseren, dass alles ok ass an hu nach emol gesot, dass e kann ophalen oder lues maachen. En ass kuerz duerno rem weidergelaf. Obwuel mir gesot hunn, dass e roueg kann trëppelen, wollt en onbedéngt lafen. An der Mettesstonn hunn ech den Chase virun der Kantinn gesinn, e Bréitchen iessen. Ech hunn e gefrot, wéi et em geet an hien sot, gutt. E war midd, mee huet gutt ausgesinn. Voilà. Ech hoffen et geet em gutt, e war immens éiergäizeg an huet sech wierklech druginn.“\nFeedback Chase Freideg LTA: “Haut war alles gudd och wann ech nét vill loscht op Franseich hat“\nNach ongewëss wat den DayCare de Mëttwoch ugeet. Vun der Franséischproff krut hien de Choix ob hien den Exposé bei eis oder virun der Klass am LTA maachen. Den Chase huet sech fir dat zweet entscheed. De Moien huet hien d’Bioprüfung am Annick senger Stonn geschriwwen. Den Donneschdeg Mathéprüfung.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-18T13:00:00.000Z","updatedAt":"2026-05-18T13:00:00.000Z"},{"id":"e_reu_20260518_ben","studentId":"stud_ben","date":"2026-05-18","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Feedback vum Gespréich am LTEtt: d‘Schoul ennerstetzt de Wee fir a Richtung CISP Liewenshaff ze denken. Die nächst Etapp ass fir e Rdv um Liewenshaff auszemaachen fir zesummen mat den Elteren kucken ze goen. Kontakt ass do Mme Claudine Welbes. No engem Stage vun 10 Wochen, kennt et reischt zur definitver Admissioun, während der Stagezait verdingt een naischt, et leiert een die 5 verschidde Beraicher kennen fir duerno een Atelier ze wielen. Hien soll e Motivatiounsbreif schreiwen.\nD’Schoul wärt dem Ben seng Absencen mellen, d’Elteren kreien dann e Breif heemgescheckt vum Ministère. De Foyer deelt Suerg datt de Ben bei seng Mamm geht wann en der 18 kritt… De Ben huet elo geschwenn d’Gespréich vir ze entscheeden wou et higeet ab 18, hien huet mir awerr gesoot hien wéilt wahrscheinlech bis 20 am Foyer bleiwen wann dëst méiglech ass. Drun denken dass d’Kichen ab 13h zou ass an wann de Ben no 12h ukënnt hien vir d’éischt de Cours vun Moies nohëllt virundeems hien bei der Nomëttesaktivitéit mat mëscht. W.e.g. drun denken an d’Klassebuch opzeschreiwen wat hien ze maachen huet an dem Fall.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-18T13:00:00.000Z","updatedAt":"2026-05-18T13:00:00.000Z"},{"id":"e_reu_20260518_mia","studentId":"stud_mia","date":"2026-05-18","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"d’Mamm huet sech bei der Schoul gemellt fir et ofzemellen, d’Schoul seed Bescheed wann d’fiche de départ ausgefëllt ass (Ofschlossrapport schreiwen)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-18T13:00:00.000Z","updatedAt":"2026-05-18T13:00:00.000Z"},{"id":"e_reu_20260518_lilly","studentId":"stud_lilly","date":"2026-05-18","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Consentement krute mir ënnerschriwwen zeréck. Muer gëtt hatt um 11:45 ofgeholl well hatt am fréihen Nomëtten e RDV hun bei der Orthophonistin fir e Bilan.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-05-18T13:00:00.000Z","updatedAt":"2026-05-18T13:00:00.000Z"},{"id":"e_reu_20260601_alexp","studentId":"stud_alexp","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"kennt des Woch Dënschdeg, Mëttwoch, Donneschdeg an nächst Woch all Dag ausser Freiden,e Freiden ass Rdv am HRS, dei Woch drop am ALR. Elteren kréien keen Gespreichsangebot wann de Taxi spillen","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_alexk","studentId":"stud_alexk","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Wann den Alex sech net u sai Plang hält kritt en non-excusé, bis elo ass alles entschellegt ginn.\nAustausch mam Fabrice KERG vun der ATVA a mam Philippe DEMART vum LEM: Promotioun op eng 5PRO, mir schreiwen datt op den Complément au Bulletin als classe visée, hien kritt keng LEM-Zensur.\nMuer um 11h ass Austausch mam Psychomotoriker vum CeHJP, mir stellen Froen\nClearing beim CTSA ass den 8.06 um 9h00\nFeedback RDV beim Dr Pignoloni (CHL):Hëllt säit enger Woch Antidepressiva. Aktuell hu si keen Psycholog. Seng Psychologin kënnt réischt a puer Méint zréck. En attentant gi si nächst Woch bei d’Mme Rizzi fir e Suivi. Geschwat gouf och iwwert eventuel Dys’en an datt den Alex déi Tester dann am CDA misst maachen\nBeim Dr Ristow beschwätzen mer den Alex.","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_colin","studentId":"stud_colin","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"vum 08.06-10.06 mam LLIS um Ausfluch","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_jason","studentId":"stud_jason","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"CTSA wärt eng scolspé ausschwätzen, phase d’observation fënnt awer net mei dëst Schouljoer statt dat ass secher","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_miguel","studentId":"stud_miguel","date":"2026-06-01","author":"Team (Réunion)","category":"Team-Réunion","tags":["Réunion"],"text":"Feedback Stage: Sinn hien zweemol besiche gaangen, et huet alles gutt geschéngt, positiven Retour\nDënschden Mëtten wärend senger Paus vun 12:00-14:00 wor hien beim Zänndokter a krut eng Zahnspang.\nHien huet mir haut matgedeelt dass hien 15€ um Buedem am Pausenraum vum Salon fonnt huet. Hien huet se agestach a sech Panini Stickeren domat kaaf. Wou hien an lescht Woch den Evaluationsfiche siche gangen ass hun si en drop ugeschwat: Si hätten et op der Kamera gesinn a hien soll se zréck ginn soss kritt hien Fiche net a se géifen bei d’Police goen. De Miguel wees net wat hien maache soll well e keng 15€ huet a sech net traut sengen Eltere bescheed ze soen well déi lescht Wochen gutt gelaaf ass a senge Elteren ufänken him rëm méi ze vertrauen. Haut deelt hien dëst senger assistance en famille mat a seet senger Mamm bescheed a frëet si no Geld fir dass hien haut se am Salon ofgëtt.\nCNI e Mëttwoch um 8h30\nNet mei beim HRS am suivi, Dr. Marie-Christine Liegeois-Dom (nach net konfirmiert vun den Elteren)","sliders":{"wellbeing":null,"stability":null,"attendance":null,"risk":null},"createdAt":"2026-06-01T13:00:00.000Z","updatedAt":"2026-06-01T13:00:00.000Z"},{"id":"e_reu_20260601_chase","studentId":"s
